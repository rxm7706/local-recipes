# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.0"

package:
  name: djc-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/djc-core/djc_core-${{ version }}.tar.gz
  sha256: 21ae213c0466298274f78d59e0fea3a1427fac4f356a9a0b504790f37c4de8e8

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.8,<2.0
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.8,<2.0
  run:
    - python

tests:
  - python:
      imports:
        - djc_core
      pip_check: true

about:
  homepage: https://github.com/django-components/djc-core
  license: MIT AND Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
    - crates/djc-safe-eval/submodules/ruff/crates/ruff_annotate_snippets/LICENSE-MIT
    - crates/djc-safe-eval/submodules/ruff/crates/ruff_annotate_snippets/LICENSE-APACHE
  summary: Core library for django-components written in Rust.
  description: |
    Core library for django-components written in Rust.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: djc-core
  cfe-upstream-registry: pypi
  cfe-upstream-name: djc-core
  cfe-purls:
    - pkg:conda/djc-core@${{ version }}
    - pkg:pypi/djc-core@${{ version }}
  cfe-upstream-repo: https://github.com/django-components/djc-core
  cfe-upstream-homepage: https://github.com/django-components/djc-core
  cfe-import-names: [djc_core]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/djc-core-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T11:10:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
