# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: suitenumerique/meet is a deployed Django web application, not
# a library. `pip install` ships the importable backend module
# (meet); running the service additionally requires Postgres,
# Redis/Celery, OIDC provider, S3-compatible storage, SMTP, and frontend
# build artifacts that this recipe does not install. conda-forge declines
# web-application recipes as a matter of policy.
#
# Pinned to commit a4997e743119 on suitenumerique/meet (no PyPI release).
# Build context: src/backend/ subdirectory (this recipe pip-installs from
# there).
#

context:
  version: "1.17.0"
  commit: "a4997e743119093374de48fe537ba5400f3c2df2"
  python_min: "3.13"

package:
  name: suite-meet
  version: ${{ version }}

source:
  - url: https://github.com/suitenumerique/meet/archive/${{ commit }}.tar.gz
    sha256: 3c2a53e9aca540eb4d343da5990ccfd702ba908665c91f2bcd2144072371eb5d
  # Org-level MIT LICENSE fallback for apps whose repo ships none directly.
build:
  number: 0
  noarch: python
  script:
    - cd src/backend && ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - boto3
    - brotli
    - brevo-python
    - celery
    - dj-database-url
    - django-configurations
    - django-cors-headers
    - django-countries
    - django-filter
    - django-lasuite
    - django-parler
    - redis-py
    - django-redis
    - django-storages
    - django-timezone-field
    - django-pydantic-field
    - django
    - djangorestframework
    - drf-spectacular
    - dockerflow
    - easy-thumbnails
    - factory-boy
    - gunicorn
    - jsonschema
    - markdown
    - nested-multipart-parser
    - psycopg
    - pydantic
    - pyjwt
    - python-frontmatter
    - python-magic
    - requests
    - sentry-sdk
    - whitenoise
    - mozilla-django-oidc
    - livekit-api
    - aiohttp
    - urllib3
    - phonenumbers

# CFEP-25-justified: Django web-app backend — `import <module>` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE, and the test env
# can't resolve the full transitive Django-plugin chain. site_packages
# presence is the testable invariant.
tests:
  - package_contents:
      site_packages:
        - meet

about:
  homepage: https://github.com/suitenumerique/meet
  repository: https://github.com/suitenumerique/meet
  summary: La Suite numérique meet backend (Django web application — local-only)
  description: |
    suitenumerique/meet backend. Distribution name "meet".
    This is a Django web service, not a library — installing this conda
    package gives you the importable backend code; running the service
    requires additional infrastructure (Postgres + Redis + Celery + OIDC +
    S3 + SMTP + frontend).
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - rxm7706
