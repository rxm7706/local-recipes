# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.0"

package:
  name: asttrs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/asttrs/asttrs-${{ version }}.tar.gz
  sha256: 39f3cd8bbecdeecff6c851d9cdb59e600a22611967cb2a0e1c5988d01a23233d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - attrs
    - black
    - cattrs
    - isort
    - ast-decompiler

tests:
  - python:
      imports:
        - asttrs
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/ryanchao2012/asttrs
  repository: https://github.com/ryanchao2012/asttrs
  license: MIT
  license_file: LICENSE
  summary: A attrs-style wrapper for python ast

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: asttrs
  cfe-upstream-registry: pypi
  cfe-upstream-name: asttrs
  cfe-purls:
    - pkg:conda/asttrs@${{ version }}
    - pkg:pypi/asttrs@${{ version }}
  cfe-upstream-repo: https://github.com/ryanchao2012/asttrs
  cfe-upstream-homepage: https://github.com/ryanchao2012/asttrs
  cfe-import-names: [asttrs]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/asttrs-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
