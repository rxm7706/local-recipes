# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.23.4"

package:
  name: tree-sitter-cpp
  version: ${{ version }}

source:
  url: https://github.com/tree-sitter/tree-sitter-cpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 7a2c55afe3028f4105f25762ea58cc16537d1f5a1dcd9cca90410b3cd5d46051

build:
  number: 2
  # abi3 packages build once at python_min and ship one artifact per platform.
  skip: is_abi3 and not is_python_min
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_cpp
      # Verify the abi3 wheel works on the build-time Python AND the latest.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/tree_sitter_cpp/_binding.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%/tree_sitter_cpp/_binding.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://github.com/tree-sitter/tree-sitter-cpp
  summary: C++ grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-cpp

extra:
  recipe-maintainers:
    - killua156
    - mgorny
    - rxm7706
