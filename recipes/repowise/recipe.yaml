# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  python_min: "3.11"
  version: "0.8.0"

package:
  name: repowise
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/repowise/repowise-${{ version }}.tar.gz
  sha256: 0c75fbe4841de7c5767567516c488a9039ef523c6266851d8b9f0ded0c6e3925

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - repowise = repowise.cli.main:cli
      - repowise-augment = repowise.cli.augment_hook:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=75
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.27,<1
    - tree_sitter >=0.23,<1
    - tree-sitter-python >=0.23,<1
    - tree-sitter-typescript >=0.23,<1
    - tree-sitter-javascript >=0.23,<1
    - tree-sitter-go >=0.23,<1
    - tree-sitter-rust >=0.23,<1
    - tree-sitter-java >=0.23,<1
    - tree-sitter-cpp >=0.23,<1
    - tree-sitter-kotlin >=1,<2
    - tree-sitter-ruby >=0.23,<1
    - tree-sitter-c-sharp >=0.23,<1
    - tree-sitter-swift >=0.0.1
    - tree-sitter-scala >=0.23,<1
    - tree-sitter-php >=0.23,<1
    - tree-sitter-luau
    - networkx >=3.3,<4
    - scipy >=1.11,<2
    - jinja2 >=3.1,<4
    - pathspec >=0.12,<1
    - structlog >=24,<25
    - sqlalchemy >=2.0,<3
    - aiosqlite >=0.20,<1
    - alembic >=1.13,<2
    - pydantic >=2.8,<3
    - tenacity >=9,<10
    - gitpython >=3.1,<4
    - pyyaml >=6.0,<7
    - lancedb >=0.12,<1
    - click >=8.1,<9
    - rich >=13,<14
    - watchdog >=4.0,<5
    - fastapi >=0.115,<1
    - uvicorn >=0.32
    - mcp >=1.0,<2.0
    - apscheduler >=3.10,<4
    - cryptography >=43,<47
    - anthropic >=0.40,<1
    - openai >=1.50,<3
    - google-genai >=1.0,<2
    - litellm

tests:
  - python:
      imports:
        - repowise
      pip_check: false
      python_version:
      - ${{ python_min }}.*
      - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - repowise --help
      - repowise-augment --help

about:
  summary: Codebase intelligence for developers and AI — generates and maintains a structured wiki for any codebase
  license: AGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/repowise-dev/repowise
  documentation: https://github.com/repowise-dev/repowise/blob/main/docs/USER_GUIDE.md

extra:
  recipe-maintainers:
    - rxm7706
