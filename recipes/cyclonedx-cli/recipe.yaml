# CFE comments
# Header:
#    # Binary-repackage recipe: upstream ships self-contained, single-file
#    # .NET 8 executables (~76-86 MB each) on GitHub Releases, one per
#    # platform/arch. The .NET runtime is bundled, so there is no run-dep on
#    # a dotnet runtime. Source-build on conda-forge is not possible (no
#    # dotnet SDK feedstock; conda-forge CI forbids the NuGet network restore).
# source:
#    # Per-platform single-file sources, gated by target-platform selectors.
#    # Standard-5 platform -> upstream asset map:
#    #   linux-64      -> cyclonedx-linux-x64
#    #   linux-aarch64 -> cyclonedx-linux-arm64
#    #   osx-64        -> cyclonedx-osx-x64
#    #   osx-arm64     -> cyclonedx-osx-arm64
#    #   win-64        -> cyclonedx-win-x64.exe
#    # Upstream also ships musl / linux-arm(v7) / win-x86 / win-arm64 assets;
#    # those have no standard conda-forge subdir, so they are intentionally
#    # out of scope. No upstream checksums file is published, so sha256 values
#    # were computed by streaming each asset through sha256sum (2026-06-20).
# build:
#    # No compiler/stdlib (nothing is compiled from source). The binary is
#    # copied verbatim to bin/ (unix) or Library\bin (win) and marked +x.
# requirements:
#    # Intentionally empty. Self-contained .NET deployment bundles the runtime.
#    # FOLLOW-UP: .NET globalization may need system ICU and TLS may need
#    # OpenSSL on some hosts. The linux-64 build host has system libicu/openssl,
#    # so the local --version test passes. If a clean conda env fails at startup
#    # with "Couldn't find a valid ICU package", add `icu` (and possibly
#    # `openssl`) to run:, or document DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1.
#    # Left minimal pending real-world verification beyond linux-64.
# tests:
#    # `cyclonedx --version` resolves the binary on PATH on all platforms
#    # (bin/ on unix, Library\bin on win).
# build-coverage:
#    # LOCAL BUILD COVERAGE: only the linux-64 leg is buildable/testable on
#    # this linux-64 host. The other 4 legs' sha256 are verified but their
#    # binaries were not executed locally (cross-platform) -- they would be
#    # exercised by conda-forge CI if/when submitted.
####
