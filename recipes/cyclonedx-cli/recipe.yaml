# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.32.0"

package:
  name: cyclonedx-cli
  version: ${{ version }}

source:
  - if: linux and x86_64
    then:
      url: https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${{ version }}/cyclonedx-linux-x64
      sha256: 454879e6a4a405c8a13bff49b8982adcb0596f3019b26b0811c66e4d7f0783e1
      file_name: cyclonedx
  - if: linux and aarch64
    then:
      url: https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${{ version }}/cyclonedx-linux-arm64
      sha256: abf0b7c5648a5b127791d691cad41f004aceea27c75bb42c9572fdc9694770cf
      file_name: cyclonedx
  - if: osx and x86_64
    then:
      url: https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${{ version }}/cyclonedx-osx-x64
      sha256: a13a5de12d10cfccf8f222614b99af243fee5491b0ec73850b1d6fa050d4ad4a
      file_name: cyclonedx
  - if: osx and arm64
    then:
      url: https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${{ version }}/cyclonedx-osx-arm64
      sha256: 83be8a9599f1dce1252208bd4d0bb15308eca0546814fb72b48b7246d35e832e
      file_name: cyclonedx
  - if: win
    then:
      url: https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${{ version }}/cyclonedx-win-x64.exe
      sha256: b1c00dbb40e628ec8c1252771871341ac4d4aaf032f832d83bd22cb2b1d258ae
      file_name: cyclonedx.exe

build:
  number: 0
  script:
    - if: unix
      then:
        - mkdir -p "${PREFIX}/bin"
        - cp cyclonedx "${PREFIX}/bin/cyclonedx"
        - chmod +x "${PREFIX}/bin/cyclonedx"
    - if: win
      then:
        - if not exist "%LIBRARY_BIN%" mkdir "%LIBRARY_BIN%"
        - copy /Y cyclonedx.exe "%LIBRARY_BIN%\cyclonedx.exe"

tests:
  - script:
      - cyclonedx --version

about:
  homepage: https://cyclonedx.org/
  repository: https://github.com/CycloneDX/cyclonedx-cli
  documentation: https://github.com/CycloneDX/cyclonedx-cli/blob/main/README.md
  license: Apache-2.0
  license_file: LICENSE
  summary: CycloneDX CLI tool for SBOM analysis, merging, diffs and format conversions
  description: |
    The CycloneDX CLI tool can be used for SBOM (Software Bill of Materials)
    analysis, merging SBOMs, generating diffs, validation, signing, and format
    conversions between supported SBOM formats. It is distributed by upstream as
    self-contained .NET binaries (the .NET runtime is bundled into each
    single-file executable), so no separate runtime dependency is required.

extra:
  recipe-maintainers:
    - rxm7706

