# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.27.0"

package:
  name: duckdb-server
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/duckdb-server/duckdb_server-${{ version }}.tar.gz
  sha256: c99d715172846ac63449c44fed80e889f57102e833d75f61f06e88f7494cbe3e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - duckdb-server = pkg.__main__:serve

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - diskcache
    - python-duckdb >=1.5.2
    - pandas
    - pyarrow
    - socketify
    - ujson

tests:
  - python:
      imports:
        - pkg
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - duckdb-server --help

about:
  summary: A DuckDB server for Mosaic
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/uwdata/mosaic/tree/main/packages/duckdb-server
  repository: https://github.com/uwdata/mosaic
  description: |
    A Python-based DuckDB server for the Mosaic data visualization
    framework. Serves DuckDB query results over a socket/HTTP interface
    with Arrow and JSON output, backed by a disk cache.

extra:
  recipe-maintainers:
    - rxm7706

