# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.24.0"

package:
  name: django-tree-queries
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-tree-queries/django_tree_queries-${{ version }}.tar.gz
  sha256: 8971da3fd15a1e6a52a5a2af76c086aa460e6974a130d9ec90ca0d0588baf848

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - django
    - django-js-asset

tests:
  - python:
      imports:
        - tree_queries
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Tree queries with explicit opt-in, without configurability
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/feincms/django-tree-queries
  repository: https://github.com/feincms/django-tree-queries

extra:
  recipe-maintainers:
    - rxm7706

