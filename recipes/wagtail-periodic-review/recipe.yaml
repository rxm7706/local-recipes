# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.0"

package:
  name: wagtail-periodic-review
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-periodic-review/wagtail_periodic_review-${{ version }}.tar.gz
  sha256: c56e89abcb475e30255510e0be30228761e5ea6c3d6cbad3916637ff44607164

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - wagtail >=6.3
    - python-dateutil >=2.8,<3.0.0

tests:
  - python:
      imports:
        - wagtail_periodic_review
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Wagtail package for periodic page content reviews
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/torchbox/wagtail-periodic-review
  repository: https://github.com/torchbox/wagtail-periodic-review
  documentation: https://github.com/torchbox/wagtail-periodic-review/blob/main/CHANGELOG.md

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
