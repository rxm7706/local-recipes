# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.2"

package:
  name: django-orghierarchy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-orghierarchy/django_orghierarchy-${{ version }}.tar.gz
  sha256: 2038480d29d95864973f1d5488fef72c54ba7eb183cb7f0c54408742ccb24578

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - django-mptt
    - djangorestframework
    - requests
    - swapper

tests:
  - python:
      imports:
        - django_orghierarchy
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Reusable Django application for hierarchical organizations.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/City-of-Helsinki/django-orghierarchy
  repository: https://github.com/City-of-Helsinki/django-orghierarchy

extra:
  recipe-maintainers:
    - rxm7706

