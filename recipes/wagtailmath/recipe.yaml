# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.1"

package:
  name: wagtailmath
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtailmath/wagtailmath-${{ version }}.tar.gz
  sha256: a4bc2bb3dd9ca0069b439a7315fd18685ccdffc38044f8027950b6fd42adecd3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - wagtail >=5.2

tests:
  - python:
      imports:
        - wagtailmath
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Wagtail StreamField block for rendering mathematical equations
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/wagtail-nest/wagtail-polymath
  repository: https://github.com/wagtail-nest/wagtail-polymath
  documentation: https://github.com/wagtail-nest/wagtail-polymath/blob/main/docs/
  description: |
    Wagtail StreamField block for rendering mathematical equations in the
    Wagtail CMS via MathJax.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: wagtailmath
  cfe-upstream-registry: pypi
  cfe-upstream-name: wagtailmath
  cfe-purls:
    - pkg:conda/wagtailmath@${{ version }}
    - pkg:pypi/wagtailmath@${{ version }}
  cfe-upstream-repo: https://github.com/wagtail-nest/wagtail-polymath
  cfe-upstream-homepage: https://github.com/wagtail-nest/wagtail-polymath
  cfe-import-names: [wagtailmath]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/wagtailmath-feedstock
  cfe-forge-recipe-updates-needed:
