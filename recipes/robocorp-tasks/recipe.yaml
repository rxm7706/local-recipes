schema_version: 1

context:
  name: robocorp-tasks
  version: 4.1.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/robocorp_tasks-${{ version }}.tar.gz
  sha256: 4780880cba1b265dc8e436d0e5dac13e15f957777c80e169a18e91fcd6930866

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10,<4.0
    - poetry-core
    - pip
  run:
    - python >=3.10.0,<4.0.0
    - robocorp-log >=2.4,<4
    - psutil >=5.0.0,<6.0.0
    - docstring_parser_fork >=0.0.5,<0.0.6
    - packaging >=24.0.0,<25.0.0

tests:
  - python:
      imports:
        - robocorp_tasks
      pip_check: true

about:
  summary: The automation framework for Python
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE

extra:
  recipe-maintainers:
    - rxm7706