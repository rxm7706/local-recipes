# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.2.0.1"

package:
  name: django-yugabytedb
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-yugabytedb/django_yugabytedb-${{ version }}.tar.gz
  sha256: 2c03362c54b190ec935ee6d057ed39ba7db90c02b6e773698ba1d5248f8a4c94

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=4.2

tests:
  - python:
      imports:
        - django_yugabytedb
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Django backend for YugabyteDB
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://www.yugabyte.com/
  repository: https://github.com/yugabyte/yb-django
  documentation: https://docs.yugabyte.com/
  description: |
    Django database backend for YugabyteDB. It mirrors Django's PostgreSQL
    backend (subclassing it) and adapts the type system and operations for
    YugabyteDB's distributed SQL engine.

extra:
  recipe-maintainers:
    - rxm7706

