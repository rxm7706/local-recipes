# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.1"

package:
  name: lfx-duckduckgo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/py3/l/lfx-duckduckgo/lfx_duckduckgo-${{ version }}-py3-none-any.whl
  sha256: 99a19080d9581656260a42f29c4083af70969908d02fb03fa6b352bc8d933b75

build:
  noarch: python
  number: 0
  script: pip install lfx_duckduckgo-${{ version }}-py3-none-any.whl --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - ddgs >=9.0.0
    - langchain-community >=0.4.1,<1.0.0
    - lfx >=1.10.0.rc0,<2.0.0

tests:
  - python:
      imports:
        - lfx_duckduckgo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langflow-ai/langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org/extensions
  license: MIT
  license_file: LICENSE
  summary: DuckDuckGo Search component as a standalone Langflow Extension Bundle.
  description: |
    lfx-duckduckgo packages the DuckDuckGo Search component as a standalone
    Langflow Extension Bundle (lfx plugin), exposing it as a reusable
    component for Langflow flows.

extra:
  recipe-maintainers:
    - rxm7706

