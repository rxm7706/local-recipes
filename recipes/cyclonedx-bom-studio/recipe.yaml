  cfe-last-checked: 2026-06-20T11:05:00Z
  cfe-generated-by-version: 8.38.0
  cfe-generated-at-datetime: 2026-06-20T11:05:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T11:52:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
