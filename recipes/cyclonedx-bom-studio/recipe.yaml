# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.9.2"
  # Upstream publishes no releases/tags (private SPA) — pin to a main commit.
  commit: f2a6d30b8836a79083ab8776b5b5d91fb7b949fc

package:
  name: cyclonedx-bom-studio
  version: ${{ version }}

source:
  url: https://github.com/CycloneDX/cyclonedx-bom-studio/archive/${{ commit }}.tar.gz
  sha256: 505eb2f419e9de1b72d7e610c10935688a9be9b8a60db319c937b740fa8a3f7c

build:
  number: 0
  noarch: generic
  script:
    file: build.sh

requirements:
  build:
    - nodejs >=20
  run:
    - python >=3.7

tests:
  - script:
      - test -f "${PREFIX}/share/cyclonedx-bom-studio/index.html"
      - test -x "${PREFIX}/bin/cyclonedx-bom-studio"
  - package_contents:
      files:
        - share/cyclonedx-bom-studio/index.html
        - bin/cyclonedx-bom-studio

about:
  homepage: https://cyclonedx.studio/
  repository: https://github.com/CycloneDX/cyclonedx-bom-studio
  license: Apache-2.0
  license_file: LICENSE
  summary: CycloneDX BOM Studio — browser-based visual editor for CycloneDX BOMs
  description: |
    CycloneDX BOM Studio is a Vue 3 single-page web application for creating,
    editing, validating, and exporting CycloneDX Bills of Materials (BOMs).
    This package builds the static site with Vite and ships a launcher
    (`cyclonedx-bom-studio`) that serves the bundled SPA on a local port.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: cyclonedx-bom-studio
  cfe-upstream-registry: github
  cfe-upstream-name: CycloneDX/cyclonedx-bom-studio
  cfe-purls:
    - pkg:conda/cyclonedx-bom-studio@${{ version }}
    - pkg:github/cyclonedx/cyclonedx-bom-studio@${{ commit }}
  cfe-upstream-repo: https://github.com/CycloneDX/cyclonedx-bom-studio
  cfe-upstream-homepage: https://cyclonedx.studio/
  cfe-import-names: []
  cfe-source-kind: github-commit
  cfe-noarch: generic
  cfe-pip-check: "false:not-a-python-package"
  cfe-on-conda-forge-status: blocked-pending-prerequisites
