# CFE comments
# Header:
#    # LOCAL-ONLY build of a private, unreleased Vue 3 + Vite browser SPA.
#    # NOT conda-forge-submittable (private, no release/tag, not on npm); the
#    # source is pinned to a main-branch commit because no tag exists.
# source:
#    # GitHub archive of commit f2a6d30b (package.json version 0.9.2). On any
#    # "update", bump BOTH context.commit AND the sha256 together — there is no
#    # tag to autotick, and context.version tracks package.json's version field.
# build:
#    # noarch:generic: the built static site + launcher are arch-independent.
#    # The build runs `npm ci` + `npx vite build` (NETWORK during build — fine
#    # for a local build; conda-forge CI forbids it, another reason this is
#    # local-only). vue-tsc type-check is intentionally skipped (dev-only; does
#    # not change dist/). BASE_URL=./ makes asset paths relative so the site
#    # serves from any directory.
# requirements:
#    # build: nodejs (Node 20+) for Vite. run: python for the http.server
#    # launcher. The unix launcher script is bash; Windows is NOT covered
#    # (acceptable for a local-only linux/mac package).
# tests:
#    # Confirms the bundled index.html and the bin/ launcher are present +
#    # executable. The SPA itself can't be exercised headless in the test env.
####
