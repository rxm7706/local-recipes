schema_version: 1

context:
  name: robocorp-storage
  version: 1.1.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/robocorp_storage-${{ version }}.tar.gz
  sha256: ae9d0f654e88047ea8efcce9d7cbb1017a52993da57b83c38d243395c3198d96

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10,<4.0
    - poetry-core
    - pip
  run:
    - python >=3.10.0,<4.0.0
    - requests >=2.28.2
    - tenacity >=8.0.1

tests:
  - python:
      imports:
        - robocorp_storage
      pip_check: true

about:
  summary: Robocorp Asset Storage library
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE

extra:
  recipe-maintainers:
    - rxm7706