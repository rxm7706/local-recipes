# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.8"

package:
  name: excel-mcp-server
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/excel-mcp-server/excel_mcp_server-${{ version }}.tar.gz
  sha256: 98f6b25957cc105a0d68d9a98a5830204ab3f3f7a79de27a91ae8d1a9291fdcd
  patches:
    - patches/fix-package-location.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - excel-mcp-server = excel_mcp.__main__:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - mcp >=1.10.1
    - fastmcp >=2.0.0,<3.0.0
    - openpyxl >=3.1.5
    - typer >=0.16.0
    - python-dotenv >=1.0.0

tests:
  - python:
      imports:
        - excel_mcp
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - excel-mcp-server --help

about:
  license: MIT
  license_file: LICENSE
  summary: Excel MCP Server for manipulating Excel files
  homepage: https://excelmcpserver.com
  repository: https://github.com/haris-musa/excel-mcp-server

extra:
  recipe-maintainers:
    - rxm7706

