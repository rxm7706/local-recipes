# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.13.0"

package:
  name: mcp-django
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mcp-django/mcp_django-${{ version }}.tar.gz
  sha256: 7b1f6d9ce9f7993a81254fe32868bccf1828f70ce8a55ebfaadd2947216da54a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.7.21,<0.8
    - pip
  run:
    - python >=${{ python_min }}
    - django >4.2
    - email-validator >=2.0.0
    - fastmcp >=2.11.3
    - httpx >=0.28.1
    - platformdirs >=4.5.0
    - pydantic >=2.11.7

tests:
  - python:
      imports:
        - mcp_django
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/joshuadavidthomas/mcp-django
  repository: https://github.com/joshuadavidthomas/mcp-django
  documentation: https://github.com/joshuadavidthomas/mcp-django
  license: MIT
  license_file: LICENSE
  summary: A Model Context Protocol (MCP) server for Django integration with LLM assistants.
  description: |
    A Model Context Protocol (MCP) server for Django integration with LLM
    assistants.

extra:
  recipe-maintainers:
    - rxm7706

