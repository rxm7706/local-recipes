# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: aurelio-sdk
  version: "0.0.19"
  python_min: "3.10"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/aurelio_sdk-${{ version }}.tar.gz
  sha256: 14107e7440ff2efd0b4a08c52fb595e7680bd4bc973a0ddfb3b64157c6666b91

build:
  number: 0
  noarch: python
  # Upstream's pyproject.toml hardcodes `[project] version = "0.0.0"` as
  # a placeholder — real releases set the version through git tags +
  # poetry-dynamic-versioning, but the plugin is disabled in
  # pyproject.toml (`enable = false`) and there's no .git in the sdist,
  # so the wheel ships with version 0.0.0 unless we patch it. Replace
  # the placeholder with the recipe's version before pip-building so
  # `pip check` is happy in downstream consumers (semantic-router etc.).
  script:
    - sed -i 's/^version = "0.0.0".*/version = "${{ version }}"/' pyproject.toml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core >=1.0.0
    - poetry-dynamic-versioning >=1.0.0,<2.0.0
  run:
    - python >=${{ python_min }}
    - aiohttp >=3.10.11,<4
    - requests >=2.32.3,<3
    - pydantic >=2.9.2,<3
    - colorlog >=6.8.2,<7
    - requests-toolbelt >=1.0.0,<2
    - python-dotenv >=1.0.1,<2
    - aiofiles >=24.1.0,<25
    - tornado >=6.4.2

tests:
  - python:
      imports:
        - aurelio_sdk
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://www.aurelio.ai
  repository: https://github.com/aurelio-labs/aurelio-sdk
  license: MIT
  license_file: LICENSE
  summary: Python SDK for Aurelio AI APIs (semantic chunking, embeddings, …)
  description: |
    The official Python SDK for Aurelio AI's semantic-chunking,
    embeddings, and document-ingestion APIs. Used as a transitive
    dependency of `semantic-router` to access Aurelio's hosted services.

extra:
  recipe-maintainers:
    - rxm7706
