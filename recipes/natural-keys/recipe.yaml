# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.1.1"

package:
  name: natural-keys
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/n/natural-keys/natural-keys-${{ version }}.tar.gz
  sha256: 67dbfdfd975fe19256c7385aae56b6c7d65d9f595523d1c75703ef91e292da16

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}
    - django >=3.2,<5.0
    - html-json-forms >=1.0.0

# CFEP-25-justified: Django app — `import natural_keys` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE / settings.configure().
tests:
  - package_contents:
      site_packages:
        - natural_keys
  - python:
      pip_check: true

about:
  summary: Enhanced support for natural keys in Django and Django REST Framework.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/wq/django-natural-keys
  repository: https://github.com/wq/django-natural-keys
  documentation: https://wq.io/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
