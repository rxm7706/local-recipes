# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.2"

package:
  name: datastar-py
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/datastar-py/datastar_py-${{ version }}.tar.gz
  sha256: c6f86e2b48c3a5ea08570a4e958267307a5ffc0253c259f054dc3bb6de8a2c0e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - datastar_py
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Helper functions and classes for the Datastar library
  license: MIT
  license_file: LICENSE.md
  homepage: https://data-star.dev/
  repository: https://github.com/starfederation/datastar-python
  documentation: https://github.com/starfederation/datastar-python/blob/develop/README.md
  description: |
    Helper functions and classes for the Datastar hypermedia framework. Provides
    Server-Sent Event generators plus optional integration shims for FastAPI,
    Starlette, Sanic, Quart, Django, Litestar, and FastHTML (each loaded only
    when its framework is present).

extra:
  recipe-maintainers:
    - rxm7706

