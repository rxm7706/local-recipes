# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: "getdaft"
  version: "0.7.14"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://github.com/Eventual-Inc/Daft/archive/refs/tags/v${{ version }}.tar.gz
  sha256: abb04fed676ef0e1a9ece768220554ef8bb516ab1f668fb019e816804112f75c
  patches:
    # daft v0.7.14 pins nightly-2025-09-03 via rust-toolchain.toml; conda-forge's
    # rust_dev label ships a much newer nightly where ArrayChunks::into_remainder
    # was de-Option-wrapped. Patch drops the Some() unwrap so the crate builds
    # against any current nightly. Drop on the next upstream daft bump that
    # adopts the new API.
    - patches/0001-fix-into_remainder-api.patch

build:
  number: 0

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - python
        - maturin >=1.5.0,<2.0.0
    - pkg-config
    - make
    - cargo-bundle-licenses
    - if: unix
      then: unzip
    - nodejs
  host:
    - python
    - pip
    - maturin >=1.5.0,<2.0.0
    - openssl
    - xz-tools
  run:
    - python
    # Upper caps match daft's pyproject.toml dependencies (v0.7.14).
    # pip check fails if these aren't honored — upstream tests against
    # these specific ranges; bump on the next daft version.
    - pyarrow >=8.0.0,<24.0.0
    - fsspec <2026.3.0
    - tqdm <4.68.0
    - typing_extensions >=4.0.0
    - packaging

tests:
  - python:
      imports:
        - daft
  - script:
      - pip check
    requirements:
      run:
        - pip

about:
  license: Apache-2.0
  summary: Distributed Dataframes for Multimodal Data
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://www.getdaft.io/
  repository: https://github.com/Eventual-Inc/Daft
  documentation: https://www.getdaft.io/projects/docs/

extra:
  recipe-maintainers:
    - rxm7706
    - thewchan
    - whophil
