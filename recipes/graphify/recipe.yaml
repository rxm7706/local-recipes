# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: graphify
  version: "0.4.9"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/safishamsi/graphify/archive/v${{ version }}.tar.gz
  sha256: 1d1262f01ff54ac8c2b588e8b885bc062011fcaa25758ad9cf6bb5daa5a09b77

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - graphify = graphify.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - networkx
    - tree-sitter >=0.23.0
    - tree-sitter-python
    - tree-sitter-javascript
    - tree-sitter-typescript
    - tree-sitter-go
    - tree-sitter-rust
    - tree-sitter-java
    - tree-sitter-c
    - tree-sitter-cpp
    - tree-sitter-ruby
    - tree-sitter-c-sharp
    - tree-sitter-kotlin
    - tree-sitter-scala
    - tree-sitter-php
    - tree-sitter-swift
    - tree-sitter-lua
    - tree-sitter-zig
    - tree-sitter-powershell
    - tree-sitter-elixir
    - tree-sitter-objc
    - tree-sitter-julia

tests:
  - python:
      imports:
        - graphifyy
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
  - requirements:
      run:
        - pip
    script:
      - graphify --help

about:
  summary: AI coding assistant skill (Claude Code, Codex, OpenCode, Cursor, OpenClaw, Factory Droid, Trae) - turn any folder of code, docs, papers, images, or videos into a queryable knowledge graph
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/graphifyy/
  repository: https://github.com/safishamsi/graphify


extra:
  recipe-maintainers:
    - rxm7706
