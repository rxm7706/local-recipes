# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.7"

package:
  name: lyric-component-ts-transpiling
  version: ${{ version }}

source:
  # Vendor-the-blob pattern (itkwasm-downsample-wasi precedent): the PyPI
  # sdist ships a pre-built WASI binary (component_ts_transpiling.wasm) as
  # package data. The WASI engine that executes it is supplied by lyric-py's
  # embedded wasmtime crate at runtime — not a build-time dependency here.
  url: https://pypi.org/packages/source/l/lyric-component-ts-transpiling/lyric_component_ts_transpiling-${{ version }}.tar.gz
  sha256: 05a1f1258d7c2784a594803edd47ab285a72541ab903bf324fa366a1c343e4db

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    # Sole upstream runtime dep (lockstep release with the lyric-* family).
    - lyric-task >=0.1.7

tests:
  - python:
      imports:
        - lyric_component_ts_transpiling
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      # Confirm the vendored WASI blob shipped in the wheel; do not invoke it
      # (executing the worker would require a full WASI runtime harness).
      - python -c "import os, lyric_component_ts_transpiling as m; w = os.path.join(os.path.dirname(m.__file__), 'component_ts_transpiling.wasm'); assert os.path.isfile(w), w; print('wasm OK:', os.path.getsize(w), 'bytes')"

about:
  homepage: https://github.com/lyric-project/lyric-runtime
  repository: https://github.com/lyric-project/lyric-runtime
  license: MIT
  # PyPI sdist ships no LICENSE; vendored from the upstream v0.1.7 tag.
  license_file: LICENSE
  summary: TypeScript-transpiling WebAssembly component for Lyric (pre-built WASI component).

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: lyric-component-ts-transpiling
  cfe-upstream-registry: pypi
  cfe-upstream-name: lyric-component-ts-transpiling
  cfe-purls:
    - pkg:conda/lyric-component-ts-transpiling@${{ version }}
    - pkg:pypi/lyric-component-ts-transpiling@${{ version }}
  cfe-upstream-repo: https://github.com/fangyinc/lyric
  cfe-upstream-homepage: https://github.com/fangyinc/lyric
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/lyric-component-ts-transpiling-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
