# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.11.6.1"

package:
  name: openmetadata-ingestion
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/openmetadata-ingestion/openmetadata_ingestion-${{ version }}.tar.gz
  sha256: cd3e8caf084c95cd0fb08800491cb202fde864483f40e0e528815acbfc77d04a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - metadata = metadata.cmd:metadata

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=70.3.0,<70.4.0
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - mysql-connector-python >=9.1
    - packaging
    # typing_inspect is the conda-forge package name for typing-inspect pypi package
    - typing_inspect
    - cryptography >=42.0.0
    - requests >=2.23
    - chardet ==4.0.0  # Needs Equal
    - shapely
    - antlr4-python3-runtime ==4.9.2  # Needs Equal
    - python-dotenv >=0.19.0
    - cached-property ==1.5.2  # Needs Equal
    - snowflake-connector-python >=3.13.1,<4.0.0
    - sqlalchemy >=1.4.0,<2
    - pydantic-settings >=2.0,<3.0,>=2.7.0
    # mypy_extensions is the conda-forge package name for mypy-extensions pypi package
    - mypy_extensions >=0.4.3
    - httpx >=0.28.0,<0.29.0
    - email-validator >=2.0
    - setuptools >=78.1.1,<78.2.0
    - boto3 >=1.20,<2.0
    - google-cloud-secret-manager ==2.24.0  # Needs Equal
    # memory_profiler is the conda-forge package name for memory-profiler pypi package
    - memory_profiler
    - jsonpatch <2.0,>=1.24
    - jinja2 >=2.11.3
    - azure-identity >=1.12,<2.0
    - importlib-metadata >=4.13.0
    - google-crc32c
    - pydantic >=2.0,<3.0,>=2.7.0,<2.12
    - requests-aws4auth >=1.1,<2.0
    - jaraco.functools <4.2.0
    - collate-sqllineage >=2.0,<3.0
    # Manual Add of collate-sqlfluff
    - collate-sqlfluff  # Needed for collate-sqllineage
    - pyyaml >=6.0,<7.0
    - python-kubernetes >=21.0.0
    - python-dateutil >=2.8.1
    - collate-data-diff >=0.11.6
    - tabulate ==0.9.0  # Needs Equal
    - pymysql >=1.0,<2.0
    - azure-keyvault-secrets
    # Manual Add of cachetools
    - cachetools

tests:
  - python:
      imports:
        - airflow_provider_openmetadata
        - metadata
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - metadata --help #re.error: global flags not at the start of the expression at position 1
      - pip check

about:
  homepage: https://open-metadata.org/
  license: CC0-1.0
  license_file: LICENSE
  summary: Ingestion Framework for OpenMetadata
  repository: https://github.com/open-metadata/OpenMetadata
  documentation: https://docs.open-metadata.org/
  description: |
    Ingestion Framework for OpenMetadata

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: openmetadata-ingestion
  cfe-upstream-registry: pypi
  cfe-upstream-name: openmetadata-ingestion
  cfe-purls:
    - pkg:conda/openmetadata-ingestion@${{ version }}
    - pkg:pypi/openmetadata-ingestion@${{ version }}
  cfe-upstream-repo: https://github.com/open-metadata/OpenMetadata
  cfe-upstream-homepage: https://open-metadata.org/
  cfe-import-names: [airflow_provider_openmetadata, metadata]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/openmetadata-ingestion-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T13:00:21Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T13:00:21Z
  cfe-local-build-status: not-attempted
  cfe-local-build-datetime: none
  cfe-local-build-platform: none
  cfe-local-build-tool: none
