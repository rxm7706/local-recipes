# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.5.1"

package:
  name: django-solo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-solo/django_solo-${{ version }}.tar.gz
  sha256: ca3b2e44dbb4726446941ca8d765c247123f709f051d07e62eacf97330ffde01

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - typing_extensions >=4.0.1

tests:
  - python:
      imports:
        - solo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Django Solo helps working with singletons
  license: CC-BY-3.0
  license_file: LICENSE
  homepage: https://github.com/lazybird/django-solo/
  repository: https://github.com/lazybird/django-solo/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
