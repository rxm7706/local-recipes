{% set name = "google-re2" %}
{% set version = "1.1.20251105" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace("-", "_") }}-{{ version }}.tar.gz
  sha256: 1db14a292ee8303b91e91e7c37e05ac17d3c467f29416c79ac70a78be3e65bda

build:
  number: 1
  # abseil headers (pulled in via re2) require C++17; MSVC defaults to C++14
  # and upstream setup.py never passes /std. cl.exe reads the CL env var, so
  # set it on Windows only. && keeps CL in the same shell as pip install.
  script:
    - 'set "CL=/std:c++17" && {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation'  # [win]
    - '{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation'                          # [not win]

requirements:
  build:
    - python                                  # [build_platform != target_platform]
    - cross-python_{{ target_platform }}      # [build_platform != target_platform]
    - pybind11                                # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
  host:
    - python
    - pybind11
    - pip
    - re2
    - setuptools
  run:
    - python
  run_constrained:
    - pyre2 ==9999999999

test:
  imports:
    - re2
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/google/re2/tree/main/python
  summary: RE2 Python bindings
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/google/re2

extra:
  recipe-maintainers:
    - xylar
