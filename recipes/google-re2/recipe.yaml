# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: google-re2
  version: "1.1.20251105"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 1db14a292ee8303b91e91e7c37e05ac17d3c467f29416c79ac70a78be3e65bda

build:
  number: 1
  #skip: winAdd_Platforms
  script:
    env:
      CL: "/std:c++17"
    content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then: python
    - if: build_platform != target_platform
      then: cross-python_${{ target_platform }}
    - if: build_platform != target_platform
      then: pybind11
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
  host:
    - python
    - pybind11
    - pip
    - re2
    - setuptools
  run:
    - python
  run_constraints:
    - pyre2 ==9999999999

tests:
  - python:
      imports:
        - re2
  - requirements:
      run:
        - pip
    script:
      - pip check

about:
  summary: RE2 Python bindings
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/google/re2/tree/main/python
  repository: https://github.com/google/re2

extra:
  recipe-maintainers:
    - xylar

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: google-re2
  cfe-upstream-registry: pypi
  cfe-upstream-name: google-re2
  cfe-purls:
    - pkg:conda/google-re2@${{ version }}
    - pkg:pypi/google-re2@${{ version }}
  cfe-upstream-repo: https://github.com/google/re2
  cfe-upstream-homepage: https://github.com/google/re2/tree/main/python
  cfe-import-names: [re2]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/google-re2-feedstock
  cfe-forge-recipe-updates-needed:
    - win-build-msvc-cxx17-flag
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-25T00:00:00Z
  cfe-generated-by-version: 8.43.0
  cfe-generated-at-datetime: 2026-06-25T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-25T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
