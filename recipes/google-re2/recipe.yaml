#    # PR #24 (conda-forge/google-re2-feedstock, "re-instate win build") fails
#    # ONLY on win_64 (all 5 py variants) with absl/base/policy_checks.h(77)
#    # "fatal error C1189: C++ versions less than C++17 are not supported".
#    # The _re2 pybind11 extension pulls in abseil headers via re2, which
#    # require C++17. MSVC defaults to C++14 and upstream setup.py sets only
#    # extra_compile_args=['-fvisibility=hidden'] (ignored by cl.exe, D9002) —
#    # it never passes a /std flag. GCC 14 / Clang 19 already default to
#    # >=C++17 so linux/osx pass.
#    #
#    # FIX (applied): set CL=/std:c++17 via build.script.env. cl.exe reads the
#    # CL / _CL_ env var and prepends it to every compile, so the missing
#    # /std:c++17 reaches MSVC. Harmless on unix (gcc/clang do not read CL).
#    # This is the MINIMAL, config-style recipe change requested.
#    #
#    # Why NOT conda-forge.yml / conda_build_config.yaml: neither can inject a
#    # compile flag. conda-forge.yml only configures conda-smithy/CI (rerender:
#    # provider, os_version, test, channels) — no compiler-flag or env-var
#    # injection into the build step. conda_build_config.yaml only declares
#    # build VARIANTS/pins (and jinja vars you would still have to wire into the
#    # recipe); it cannot set a process env var or pass /std to cl.exe. On
#    # Windows, distutils/setuptools' MSVCCompiler does NOT honour CFLAGS/
#    # CXXFLAGS — the ONLY env var cl.exe consumes is CL/_CL_ — so the flag must
#    # be set in the recipe build script (here) or patched into setup.py.
#    #
#    # Alternative recipe forms: (a) win-scoped script branch
#    # `set CL=/std:c++17 && pip install ...` under `if: win` (scopes the var to
#    # Windows; more lines); (b) a patches/ diff adding ['/std:c++17'] to
#    # extra_compile_args under sys.platform=='win32' (the upstream root-cause
#    # fix; heavier, re-rolls on version bumps).
