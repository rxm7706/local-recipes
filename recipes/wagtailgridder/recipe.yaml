# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.0"

package:
  name: wagtailgridder
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtailgridder/wagtailgridder-${{ version }}.tar.gz
  sha256: e50cfb74de403560848140c422311aa8b36ef728aae68c8be5a55b8cfc2c9c24

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=67
    - setuptools-scm >=7
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - wagtail >=4.1
    - wagtail-modeladmin

tests:
  - python:
      imports:
        - wagtailgridder
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Dynamic, interactive grid layout for the Django CMS Wagtail.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/wharton/wagtailgridder
  repository: https://github.com/wharton/wagtailgridder
  documentation: https://github.com/wharton/wagtailgridder
  description: |
    wagtailgridder provides a dynamic, interactive grid layout for the
    Django CMS Wagtail, allowing content editors to arrange blocks in a
    responsive grid.

extra:
  recipe-maintainers:
    - rxm7706

