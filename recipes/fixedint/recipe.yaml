# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.0"

package:
  name: fixedint
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fixedint/fixedint-${{ version }}.tar.gz
  sha256: aeea0c7a3a54e5371ed632f9a97719316699f64f863ffce4414ef0f925255d17

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - fixedint
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: simple fixed-width integers
  license: PSF-2.0
  license_file: LICENSE
  homepage: https://github.com/nneonneo/fixedint
  repository: https://github.com/nneonneo/fixedint
  description: |
    Simple fixed-width integers.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: fixedint
  cfe-upstream-registry: pypi
  cfe-upstream-name: fixedint
  cfe-purls:
    - pkg:conda/fixedint@${{ version }}
    - pkg:pypi/fixedint@${{ version }}
  cfe-upstream-repo: https://github.com/nneonneo/fixedint
  cfe-upstream-homepage: https://github.com/nneonneo/fixedint
  cfe-import-names: [fixedint]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/fixedint-feedstock
  cfe-forge-recipe-updates-needed:
    - meta-yaml-to-recipe-yaml
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
