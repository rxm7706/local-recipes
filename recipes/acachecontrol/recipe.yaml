# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.7"

package:
  name: acachecontrol
  version: ${{ version }}

source:
  url: https://github.com/MasterSergius/acachecontrol/archive/v${{ version }}.tar.gz
  sha256: 186e85ddd0d1b374f4828883e0d13581c4162a07363172fb87b99bd456085ec6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<4.0
    - aiohttp >=3.10.2

tests:
  - python:
      imports:
        - acachecontrol
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Cache-Control for aiohttp
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/MasterSergius/acachecontrol
  repository: https://github.com/MasterSergius/acachecontrol

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: acachecontrol
  cfe-upstream-registry: github
  cfe-upstream-name: MasterSergius/acachecontrol
  cfe-purls:
    - pkg:conda/acachecontrol@${{ version }}
    - pkg:pypi/acachecontrol@${{ version }}
  cfe-upstream-repo: https://github.com/MasterSergius/acachecontrol
  cfe-upstream-homepage: https://github.com/MasterSergius/acachecontrol
  cfe-import-names: [acachecontrol]
