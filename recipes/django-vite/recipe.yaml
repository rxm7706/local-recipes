# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.1.0"

package:
  name: django-vite
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-vite/django_vite-${{ version }}.tar.gz
  sha256: 8b4ffe4a9fa81ff568bfb195e74dde8694aaf13fd4b656ae60bf59cce08b85e8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=3.2

tests:
  - python:
      imports:
        - django_vite
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Integration of Vite in a Django project.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/MrBin99/django-vite
  repository: https://github.com/MrBin99/django-vite
  description: |
    django-vite integrates the Vite frontend build tool into a Django
    project, providing template tags that emit the correct asset links
    in both Vite dev-server mode and production (manifest) mode.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
