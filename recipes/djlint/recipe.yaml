# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.39.2"

package:
  name: djlint
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/djlint/djlint-${{ version }}.tar.gz
  sha256: dd27ef03bd26d1e0a167da26ec2a6fcb511dddd032b2553abf71a5c31eaa8b34

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - djlint = djlint:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - click >=8.0.1
    - colorama >=0.4.4
    - cssbeautifier >=1.14.4
    - jsbeautifier >=1.14.4
    - json5 >=0.9.11
    - pathspec >=0.12
    - pyyaml >=6
    - regex >=2023
    - tomli >=2.0.1
    - tqdm >=4.62.2
    - typing_extensions >=3.7.4

tests:
  - python:
      imports:
        - djlint
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - djlint --help

about:
  summary: HTML Template Linter and Formatter
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://github.com/djlint/djLint
  repository: https://github.com/djlint/djLint
  documentation: https://djlint.com
  description: |
    djLint is an HTML template linter and formatter. It supports a range of
    template languages (Django, Jinja, Nunjucks, Handlebars, GoLang, Angular)
    and can lint for common formatting issues and reformat templates in place.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
