# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "10.1"

package:
  name: pyobjc-framework-applicationservices
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyobjc-framework-applicationservices/pyobjc-framework-ApplicationServices-${{ version }}.tar.gz
  sha256: bb780eabadad0fbf36a128041dccfd71e30bbeb6b110852d37fd5c98f4a2ec04

build:
  number: 0
  skip: not osx
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - pyobjc-core >=${{ version }}
    - pyobjc-framework-cocoa >=${{ version }}
    - pyobjc-framework-quartz >=${{ version }}
    - pyobjc-framework-coretext >=${{ version }}

tests:
  - python:
      imports:
        - ApplicationServices
        - PyObjCTools
      pip_check: true

about:
  summary: Wrappers for the framework ApplicationServices on macOS
  license: MIT
  license_file: License.txt
  homepage: https://github.com/ronaldoussoren/pyobjc
  repository: https://github.com/ronaldoussoren/pyobjc

extra:
  recipe-maintainers:
    - rxm7706

