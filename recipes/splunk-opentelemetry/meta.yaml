{% set version = "2.10.1" %}
{% set python_min = "3.10" %}

package:
  name: splunk-opentelemetry
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/splunk-opentelemetry/splunk_opentelemetry-{{ version }}.tar.gz
  sha256: 7a73cdae339855f2c7a5020825e919c3575decea44b5beae222b18dadb0bc284

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - opentelemetry-api ==1.41.0
    - opentelemetry-sdk ==1.41.0
    - opentelemetry-propagator-b3 ==1.41.0
    - opentelemetry-exporter-otlp-proto-grpc ==1.41.0
    - opentelemetry-exporter-otlp-proto-http ==1.41.0
    - opentelemetry-instrumentation ==0.62b0
    - opentelemetry-instrumentation-logging ==0.62b0
    - opentelemetry-instrumentation-system-metrics ==0.62b0
    - opentelemetry-semantic-conventions ==0.62b0
    - protobuf >=6.33.5
    - wrapt >=1.0.0,<2.0.0

test:
  imports:
    - splunk_otel
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/signalfx/splunk-otel-python
  summary: The Splunk distribution of OpenTelemetry Python Instrumentation provides a Python agent that automatically instruments your Python application to capture and report distributed traces to SignalFx APM.
  license: Apache-2.0
  license_file: LICENSE.txt
  #license_file: LICENSE
  license_family: Apache
  description: |
    This package provides entrypoints to configure OpenTelemetry.
  doc_url: https://github.com/signalfx/splunk-otel-python
  dev_url: https://github.com/signalfx/splunk-otel-python
  license: Apache-2.0
  license_file:
    - COPYRIGHT.txt
    - LICENSE.txt

extra:
  recipe-maintainers:
    - rxm7706
