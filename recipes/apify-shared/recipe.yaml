# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.2.0"

package:
  name: apify-shared
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/apify-shared/apify_shared-${{ version }}.tar.gz
  sha256: ad48a96084e3c38faa1bac723a47929a1bb2c771544da2f0cb503eabdecfc79a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - apify_shared
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://apify.com
  repository: https://github.com/apify/apify-shared-python
  documentation: https://github.com/apify/apify-shared-python
  license: Apache-2.0
  license_file: LICENSE
  summary: Tools and constants shared across Apify projects
  description: |
    Apify-shared is a Python library that contains tools and constants
    shared across Apify projects.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
