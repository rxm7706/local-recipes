# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.4.12"

package:
  name: django-survey-and-report
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-survey-and-report/django_survey_and_report-${{ version }}.tar.gz
  sha256: 516f861fff3c7fa602a72a54d855500d9e35664cd9b06008fdc5b652106871bc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=67.5.1
  run:
    - python >=${{ python_min }}
    - django >=2.2,<7
    - pytz >=2018.9
    - pyyaml >=4.2b1

# CFEP-25-justified: Django web-app backend — `import survey` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE configured.
tests:
  - package_contents:
      site_packages:
        - survey

about:
  summary: A django survey app that can export results as CSV or PDF using your native language.
  license: AGPL-3.0-only
  license_file: LICENSE.txt
  homepage: https://github.com/Pierre-Sassoulas/django-survey
  repository: https://github.com/Pierre-Sassoulas/django-survey

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
