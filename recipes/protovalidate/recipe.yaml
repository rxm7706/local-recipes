# CFE comments
# Header:
#    # Flyte-2 closure, LOCAL-ONLY (not cf-submittable): see docs/specs/flyte-conda-forge.md § BLOCKER.
# source:
#    # patches/0001 ships the buf.validate protobuf stubs upstream's wheel omits
#    # (they live in gen/, written by `buf generate`). Makes protovalidate the
#    # single owner of buf.validate for the flyte closure; flyteidl2 strips its
#    # bundled older copy and depends on protovalidate. Verified: protovalidate's
#    # newer buf.validate is a superset that flyteidl2's protos also tolerate.
# requirements:
#  run:
#    # protovalidate runtime imports only buf.validate + celpy (cel-python); the
#    # gen/cel stubs are unused at runtime, so cel/ is NOT shipped (avoids any
#    # cel-python top-level collision). python_min 3.11 = the cel-python cf floor.
