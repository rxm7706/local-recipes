# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.1.0"
  python_min: "3.11"

package:
  name: wagtail-ai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-ai/wagtail_ai-${{ version }}.tar.gz
  sha256: 377a8a179c5272a31b8b9ea26a2b5c792a3a5ffecc4b364b5df2ea472582958d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - wagtail >=7.1
    - django-ai-core
    - llm >=0.12

tests:
  - python:
      imports:
        - wagtail_ai
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Get a hand writing your content with AI super powers!
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/wagtail/wagtail-ai
  repository: https://github.com/wagtail/wagtail-ai

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: wagtail-ai
  cfe-upstream-registry: pypi
  cfe-upstream-name: wagtail-ai
