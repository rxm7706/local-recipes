# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.7.4"

package:
  name: pytest-pythonpath
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-pythonpath/pytest-pythonpath-${{ version }}.tar.gz
  sha256: 64e195b23a8f8c0c631fb16882d9ad6fa4137ed1f2961ddd15d52065cd435db6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<4.0
    - pytest >=2.5.2,<7

tests:
  - python:
      imports:
        - pytest_pythonpath
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: pytest plugin for adding to the PYTHONPATH from command line or configs.
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/bigsassy/pytest-pythonpath
  repository: https://github.com/bigsassy/pytest-pythonpath
  description: |
    pytest plugin for adding to the PYTHONPATH from command line or configs.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
