# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.9.11"

package:
  name: python-flanker
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/flanker/flanker-${{ version }}.tar.gz
    sha256: 974418e5b498fd3bcb3859c22e22d26495257f9cf98b744c17f2335aca86e001

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - attrs
    - chardet >=1.0.1
    - cryptography >=0.5
    - idna >=2.5
    - ply >=3.10
    - regex >=0.1.20110315
    - six
    - tld
    - webob >=0.9.8

tests:
  - python:
      imports:
        - flanker
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"


about:
  homepage: https://www.mailgun.com/
  license: Apache-2.0
  license_file: LICENSE
  summary: Mailgun Parsing Tools
  description: |
    Mailgun Parsing Tools

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: python-flanker
  cfe-upstream-registry: pypi
  cfe-upstream-name: flanker
  cfe-name-aliases:
    - flanker
    - flanker-python
  cfe-purls:
    - pkg:conda/python-flanker@${{ version }}
    - pkg:pypi/flanker@${{ version }}
  cfe-upstream-repo: https://github.com/mailgun/flanker
  cfe-upstream-homepage: https://www.mailgun.com/
  cfe-on-conda-forge-status: confirmed-on-conda-forge
