# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.2"

package:
  name: verlib2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/verlib2/verlib2-${{ version }}.tar.gz
  sha256: a0a6af9838d8d26c18225a30c8d57fb70714462e3cd29f2451e7982d5a51e21e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - versioningit
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - verlib2
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A standalone variant of packaging.version, without anything else.
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/pyveci/verlib2
  repository: https://github.com/pyveci/verlib2
  description: |
    A standalone bundle of "distutils.version" and "packaging.version",
    without anything else. verlib2 vendors the version-handling code from
    setuptools/packaging so projects can depend on a stable version parser
    without pulling in the full packaging library.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
