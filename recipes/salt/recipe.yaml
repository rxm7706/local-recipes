schema_version: 1

context:
  version: "3007.14"

package:
  name: salt
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/salt/salt-${{ version }}.tar.gz
  sha256: 9fcc89154fab351d0a875661972b79f0555caa75f80efafa2d42885a7025f075

build:
  number: 0
  noarch: python

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - aiohttp >=3.13.3
    - certifi >=2024.7.4
    - cffi >=2.0.0
    - cheroot >=10.0.1
    - cherrypy >=18.6.1
    - croniter >=0.3.0,!=0.3.22
    - cryptography >=42.0.0,<43.0.0
    - distro >=1.0.1
    - frozenlist >=1.5.0
    - immutables >=0.21
    - importlib-metadata >=8.7.0
    - jinja2 >=3.1.5
    - jmespath
    - looseversion
    - markupsafe <3.0.0
    - msgpack-python >=1.0.0
    - packaging ==24.0
    - psutil >=5.0.0
    - pyopenssl >=24.0.0
    - python-dateutil >=2.8.1
    - python-gnupg >=0.4.7
    - pyyaml
    - requests >=2.32.5
    - setproctitle >=1.2.3
    - timelib >=0.3.0
    - tornado >=6.5.4
    - urllib3 >=2.6.3
    - virtualenv
    - zipp >=3.19.1
    - rpm-vercmp

tests:
  - python:
      imports:
        - salt
      pip_check: false
  - script:
      - salt --version
      - salt-minion --version
      - salt-master --version
      - salt-call --version

about:
  homepage: https://saltproject.io
  repository: https://github.com/saltstack/salt
  license: Apache-2.0
  license_file: LICENSE
  summary: Portable, distributed, remote execution and configuration management system

extra:
  recipe-maintainers:
    - wolfv
