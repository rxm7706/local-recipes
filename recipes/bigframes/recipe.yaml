    - pkg:pypi/bigframes@${{ version }}
  cfe-upstream-repo: https://github.com/googleapis/google-cloud-python/tree/main/packages/bigframes
  cfe-upstream-homepage: https://dataframes.bigquery.dev
  cfe-import-names: [bigframes, bigframes_vendored]
