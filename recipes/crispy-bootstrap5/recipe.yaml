# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2026.3"

package:
  name: crispy-bootstrap5
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/crispy-bootstrap5/crispy_bootstrap5-${{ version }}.tar.gz
  sha256: e7f5adb36acfbb456444c46e82c436931c796c539e9c620be4fa9dc9c9d6679c

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - django-crispy-forms >=2.3

tests:
  - python:
      imports:
        - crispy_bootstrap5
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/django-crispy-forms/crispy-bootstrap5
  repository: https://github.com/django-crispy-forms/crispy-bootstrap5
  documentation: https://github.com/django-crispy-forms/crispy-bootstrap5
  summary: Bootstrap5 template pack for django-crispy-forms

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: crispy-bootstrap5
  cfe-upstream-registry: pypi
  cfe-upstream-name: crispy-bootstrap5
