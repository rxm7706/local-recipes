# CFE comments
# Header:
#    crispy-bootstrap5 is a noarch:python Django template pack (Bootstrap5)
#    for django-crispy-forms. Pure-Python, setuptools.build_meta backend.
# requirements:
#  host:
#    setuptools >=77.0.3 mirrors upstream pyproject [build-system].requires.
#    No wheel (G8): single PEP-517 backend (setuptools.build_meta).
#  run:
#    upstream requires-python ">=3.9" is below the conda-forge 3.10 floor, so
#    python_min is omitted from context and clamped to the default 3.10.
#    Deployed feedstock carries a speculative "<4.0" upper bound on python;
#    canonical CFE shape uses the lower-bound-only ">=${{ python_min }}".
# tests:
#    import crispy_bootstrap5 loads only __init__.py (sets __version__); no
#    Django settings access at import time, so the canonical CFEP-25
#    python.imports test works standalone — no package_contents escape hatch.
