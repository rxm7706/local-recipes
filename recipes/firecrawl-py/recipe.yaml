    - pkg:pypi/firecrawl-py@${{ version }}
  cfe-upstream-repo: https://github.com/firecrawl/firecrawl
  cfe-upstream-homepage: https://github.com/firecrawl/firecrawl
  cfe-import-names: [firecrawl]
  cfe-source-kind: pypi-sdist
