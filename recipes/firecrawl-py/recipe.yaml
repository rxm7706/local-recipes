# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: firecrawl-py
  version: "4.3.6"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/firecrawl_py-${{ version }}.tar.gz
  sha256: 303827a86d0f6237a8ddcaa0bcdaa4c5ee11d9a4880b0685302b8d9a0e191ee0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - requests
    - httpx
    - python-dotenv
    - websockets
    - nest-asyncio
    - pydantic >=2.0
    - aiohttp
    - pytest
    - pytest-asyncio

tests:
  - python:
      imports:
        - firecrawl
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python SDK for Firecrawl API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/firecrawl/firecrawl
  repository: https://github.com/firecrawl/firecrawl

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: firecrawl-py
  cfe-upstream-registry: pypi
  cfe-upstream-name: firecrawl-py
  cfe-purls:
