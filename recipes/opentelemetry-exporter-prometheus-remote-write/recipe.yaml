# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.63b1"

package:
  name: opentelemetry-exporter-prometheus-remote-write
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opentelemetry-exporter-prometheus-remote-write/opentelemetry_exporter_prometheus_remote_write-${{ version }}.tar.gz
  sha256: 19b7f49d18b2bb75df77d781c4629800315dcc0b21e4e6d821156b3db5f19ece

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - protobuf >=5.26,<7.0
    - requests >=2.28,<3.dev0
    - opentelemetry-api >=1.12,<2.dev0
    - opentelemetry-sdk >=1.12,<2.dev0
    - python-snappy ~=0.6

tests:
  - python:
      imports:
        - opentelemetry.exporter.prometheus_remote_write
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Prometheus Remote Write Metrics Exporter for OpenTelemetry
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/exporter/opentelemetry-exporter-prometheus-remote-write
  repository: https://github.com/open-telemetry/opentelemetry-python-contrib
  documentation: https://opentelemetry-python-contrib.readthedocs.io/
  description: |
    This library allows exporting metrics to Prometheus-compatible
    backends that support the Prometheus Remote Write protocol, as part
    of the OpenTelemetry Python instrumentation ecosystem.

extra:
  recipe-maintainers:
    - rxm7706

