# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: pyodide-py
  version: 0.29.3

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pyodide_py-${{ version }}.tar.gz
  sha256: d553d60d95ba8ed3a368f2d1448c4283a3d752511f25d86b3cadfc79a58e4a07

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.13
    - setuptools >=61.2
    - pip
  run:
    - python >=3.13

tests:
  - python:
      imports:
        - pyodide
        - webbrowser
      pip_check: true

about:
  summary: A Python package providing core interpreter functionality for Pyodide
  license: Unlicense
  license_file: PLEASE_ADD_LICENSE_FILE

extra:
  recipe-maintainers:
    - rxm7706