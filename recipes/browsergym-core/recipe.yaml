# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.14.3"

package:
  name: browsergym-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/browsergym-core/browsergym_core-${{ version }}.tar.gz
  sha256: 3a2e0e095445df2ff5093307a7a8bd2e978a5f912613f38479de9cebbd9b7568

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-requirements-txt
    - pip
  run:
    - python >=${{ python_min }}
    - beautifulsoup4 >=4.12
    - gymnasium >=0.27
    - lxml <6.0.0,>=4.9
    - mcp >=1.6.0
    - python-dotenv >=1.0.0
    - typer >=0.16.0
    - numpy >=1.14
    - pillow >=10.1
    - playwright-python ==1.44
    - pyparsing >=3

tests:
  - python:
      imports:
        - browsergym.core
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/browsergym-core/
  license: Apache-2.0
  license_file: LICENSE
  summary: "BrowserGym: a gym environment for web task automation in the Chromium browser"
  repository: https://github.com/ServiceNow/BrowserGym
  documentation: https://github.com/ServiceNow/BrowserGym
  description: |
    BrowserGym is a gym environment for web task automation in the Chromium
    browser. browsergym-core provides the core gym environment, action and
    observation spaces, and the Playwright-driven browser backend on which
    the BrowserGym task suites build.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: browsergym-core
