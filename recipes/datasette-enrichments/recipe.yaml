# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.1"

package:
  name: datasette-enrichments
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/datasette-enrichments/datasette_enrichments-${{ version }}.tar.gz
  sha256: e3c578a924b7cd9b9e099bef47d4d636df377a58449068741be50ddf365754a1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - datasette
    - wtforms
    - datasette-secrets >=0.2

tests:
  - python:
      imports:
        - datasette_enrichments
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Tools for running enrichments against data stored in Datasette
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/simonw/datasette-enrichments
  repository: https://github.com/simonw/datasette-enrichments
  documentation: https://enrichments.datasette.io/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
