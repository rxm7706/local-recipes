# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.4"

package:
  name: wagtail-plotly
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-plotly/wagtail_plotly-${{ version }}.tar.gz
  sha256: be6b866941ca9024749243028231238de3e2a0dab5fc6fa825452b2c2adbefd2

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - plotly >=4.14.3
    - wagtail >=3.0
    - wagtail-json-widget >=0.0.1

tests:
  - python:
      imports:
        - wagtail_plotly
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Plotly for Wagtail CMS
  description: |
    Provides tabular data input for interactive visualisations in Wagtail.
    Developers manage plot availability and styling in code with an option to
    allow users to apply further styling via JSON in the admin. It uses
    Plotly.py, so any of Plotly's supported visualisations can be hoisted into
    Wagtail easily.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/cursive-works/wagtail-plotly
  repository: https://github.com/cursive-works/wagtail-plotly

extra:
  recipe-maintainers:
    - rxm7706

