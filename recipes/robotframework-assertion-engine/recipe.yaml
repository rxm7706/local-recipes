# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.0.1"

package:
  name: robotframework-assertion-engine
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/robotframework-assertion-engine/robotframework_assertion_engine-${{ version }}.tar.gz
  sha256: f8c1dd2757064808a432558f46a395da942f223d74a110419fc689992f9d600e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - robotframework >=6.1.1
    - robotframework-pythonlibcore >=3.0.0

tests:
  - python:
      imports:
        - assertionengine
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Generic way to create meaningful and easy to use assertions for the Robot Framework libraries.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/MarketSquare/AssertionEngine
  repository: https://github.com/MarketSquare/AssertionEngine
  documentation: https://github.com/MarketSquare/AssertionEngine

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
