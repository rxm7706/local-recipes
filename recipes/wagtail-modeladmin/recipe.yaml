# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.4.0"

package:
  name: wagtail-modeladmin
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-modeladmin/wagtail_modeladmin-${{ version }}.tar.gz
  sha256: 11b051e4595242cec5f71b9e30acf1ca6b08809d27e3fa148d7f8e77cf60d9fe

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - wagtail >=7.0

tests:
  - python:
      imports:
        - wagtail_modeladmin
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Add any model in your project to the Wagtail admin. Formerly wagtail.contrib.modeladmin.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/wagtail-nest/wagtail-modeladmin
  repository: https://github.com/wagtail-nest/wagtail-modeladmin
  description: |
    Add any model in your project to the Wagtail admin. A reusable Django app
    that re-packages the former wagtail.contrib.modeladmin module so models can
    be administered through the Wagtail admin interface.

extra:
  recipe-maintainers:
    - rxm7706

