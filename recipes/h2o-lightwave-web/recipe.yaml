# CFE comments
# Header:
#    # WAVE-E C1: feedstock is v0 meta.yaml at 1.8.9 (already current); local
#    # meta.yaml was stale at 1.0.0 and is refreshed to mirror the deployed v0.
#    # This recipe.yaml is the proposed v0-to-v1 migration. Both files coexist
#    # until the feedstock itself migrates. gh-numbering: NOT an artifact —
#    # PyPI history is monotonic 0.24.2 to 1.8.9; local 1.0.0 genuinely behind.
# source:
#    # CORRECTION vs the deployed feedstock: the feedstock builds from the
#    # h2oai/wave GitHub monorepo archive (./py/h2o_lightwave_web), but that
#    # subdir ships NO www/ web assets in the source tree (they are generated
#    # from ui/ at release time and copied into the wheel). A from-source build
#    # therefore produces an EMPTY package — 2 .py files, none of the 423
#    # bundled JS/CSS/font/HTML assets that ARE the package. Verified by
#    # building the GitHub-source variant: 0 www/ files in the .conda. The PyPI
#    # py3-none-any wheel (1.8.9 ships wheel-only, no sdist) is the only artifact
#    # with the real content (423 www/ files). recipe-regenerate updates-needed
#    # flags that the deployed feedstock likely ships the same empty shell and
#    # should switch to the wheel source.
# requirements:
#  host:
#    # wheel install — pip + python only in host (no build backend; the wheel
#    # is prebuilt). The feedstock's hatchling host dep is from-source only.
#  run:
#    # zero runtime deps — pure web-asset/data package (wheel METADATA has no
#    # Requires-Dist). python is the only run dep.
# about:
#    # upstream requires-python >=3.8 is below the conda-forge 3.10 floor, so
#    # python_min is omitted from context (default floor applies). Classifiers
#    # cap at 3.11 but that is stale upstream metadata, not a real ceiling.
#    # License-File pattern 2 (ship in-recipe): the wheel's bundled dist-info
#    # LICENSE is only a 53-byte copyright stub, not the full Apache-2.0 text,
#    # and rattler-build does not extract the .whl into the work dir anyway. So
#    # the full LICENSE + NOTICE are copied from the GitHub archive into the
#    # recipe dir and referenced as bare paths.
# tests:
#    # h2o_lightwave_web is a genuinely importable module (__init__.py defines
#    # get_web_files() over the bundled www/ tree), so the standard
#    # python.imports CFEP-25 triad holds — no package_contents escape hatch.
