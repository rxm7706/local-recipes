# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: a2a-sdk
  version: "1.0.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/a2a_sdk-${{ version }}.tar.gz
  sha256: bd28fb7c3f2601045fade74c9872e10828e91db1fd63c6320b0e57a692621be0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - uv-dynamic-versioning
    - pip
  run:
    - python >=${{ python_min }},<4
    - httpx >=0.28.1
    - httpx-sse >=0.4.0
    - pydantic >=2.11.3
    - protobuf >=5.29.5
    - google-api-core >=1.26.0
    - json-rpc >=1.15.0
    - culsans >=0.11.0
    - googleapis-common-protos >=1.70.0
    - packaging >=24.0
tests:
  - python:
      imports:
        - a2a
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: A2A Python SDK
  description: Official Python SDK for the Agent2Agent (A2A) Protocol
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/a2aproject/a2a-python

extra:
  recipe-maintainers:
    - rxm7706
