# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.9.0"
  python_min: "3.11"

package:
  name: alt-profanity-check
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/alt-profanity-check/alt_profanity_check-${{ version }}.tar.gz
  sha256: b84e66e672f0d851eee96ce4ba1be50730431de6daac5ccd26e3096765e171f0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - profanity_check=profanity_check.command_line:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - scikit-learn ==1.9.0
    - joblib ==1.5.3
    - numpy

tests:
  - python:
      imports:
        - profanity_check
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - profanity_check --help

about:
  homepage: https://github.com/dimitrismistriotis/alt-profanity-check
  license: MIT
  license_file: LICENSE
  summary: A fast, robust library to check for offensive language in strings. Dropdown replacement of "profanity-check".

extra:
  recipe-maintainers:
    - rxm7706

