# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.1"

package:
  name: django-excel-tools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-excel-tools/django_excel_tools-${{ version }}.tar.gz
  sha256: 9695cc25f0582256ff83434b18864823ca526423c44fa6009353eb6e35fdb6b0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools-git-version
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=3.1
    - openpyxl >=3.0.4

tests:
  - python:
      imports:
        - django_excel_tools
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Common function when working with excel.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/NorakGithub/django-excel-tools
  repository: https://github.com/NorakGithub/django-excel-tools

extra:
  recipe-maintainers:
    - rxm7706

