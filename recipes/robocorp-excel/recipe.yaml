schema_version: 1

context:
  name: robocorp-excel
  version: 0.5.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/robocorp_excel-${{ version }}.tar.gz
  sha256: 7a3dec4dc23ed6bbd08e1acbbfc1ad7e5f6b3b2028bada802164297e3c825a3a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10,<4.0
    - poetry-core
    - pip
  run:
    - python >=3.10.0,<4.0.0
    - pillow >=9.1.1
    - xlrd >=2.0.1,<3.0.0
    - xlwt >=1.3.0,<2.0.0
    - xlutils >=2.0.0,<3.0.0
    - openpyxl >=3.1.0,<4.0.0
    - typing_extensions >=4.5.0,<5.0.0
    - types-openpyxl >=3.1.5,<4.0.0

tests:
  - python:
      imports:
        - robocorp_excel
      pip_check: true

about:
  summary: Robocorp Excel automation library
  license: Apache-2.0
  license_file: PLEASE_ADD_LICENSE_FILE

extra:
  recipe-maintainers:
    - rxm7706