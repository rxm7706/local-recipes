# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.59"

package:
  name: vizro
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/vizro/vizro-${{ version }}.tar.gz
  sha256: 043186ac698cd55f9f56ab965b408bf82ede3a9db87d7ac76b9c65ccd375c975

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - dash >=4,<5
    - dash-bootstrap-components >=2
    - dash-ag-grid ==33.3.3
    - dash-mantine-components >=2.0.0
    - vizro-dash-components >=0.1.1
    - pandas >=2
    - plotly >=5.24.0
    - pydantic >=2.7.0
    - flask-caching >=2
    - wrapt >=1
    - black
    - autoflake
    - packaging
    - python-box

tests:
  - python:
      imports:
        - vizro
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Vizro is a low-code framework for building high-quality data visualization apps.
  license: MIT AND Apache-2.0
  license_file:
    - LICENSE.txt
    - examples/visual-vocabulary/LICENSE.txt
  homepage: https://vizro.mckinsey.com/
  repository: https://github.com/mckinsey/vizro
  documentation: https://vizro.readthedocs.io/en/stable/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
