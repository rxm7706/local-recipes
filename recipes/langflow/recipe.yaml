schema_version: 1

context:
  version: "1.10.0"
  python_min: "3.11"

package:
  name: langflow
  version: ${{ version }}

source:
  url: https://pypi.org/packages/py3/l/langflow/langflow-${{ version }}-py3-none-any.whl
  sha256: 86576b62093f34fcfd86e42dd1bd28f4ec5f42c531b5c76790262120f2833c1e

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install langflow-${{ version }}-py3-none-any.whl --no-deps --no-build-isolation -vv

