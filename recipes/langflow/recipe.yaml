  - python:
      imports:
        - langflow
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langflow/
  license: MIT
  license_file: LICENSE
  summary: A Python package with a built-in web application
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org
  description: |
    Langflow is a low-code app builder for RAG and multi-agent AI applications.
    It is Python-based and agnostic to any model, API, or database. This
    distribution is a thin umbrella meta-package that pulls in langflow-base
    (with its [complete] extra) plus the lfx-arxiv, lfx-docling, lfx-duckduckgo,
    and lfx-ibm component packages.

extra:
