# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.3"

package:
  name: wagtailcharts
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtailcharts/wagtailcharts-${{ version }}.tar.gz
  sha256: 9ceb7deb7af7fba851bcb1092ca4915343715615060f713c4a937d352a269a80

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - wagtail >=3.0

tests:
  - python:
      imports:
        - wagtailcharts
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Chart.js charts for Wagtail
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/overcastsoftware/wagtailcharts/
  repository: https://github.com/overcastsoftware/wagtailcharts/
  description: |
    WagtailCharts lets you build beautiful interactive Chart.js charts
    directly from the Wagtail StreamField editor, with configurable chart
    types, colors, and data tables.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
