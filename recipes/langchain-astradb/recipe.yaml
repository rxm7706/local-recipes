# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.0"

package:
  name: langchain-astradb
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-astradb/langchain_astradb-${{ version }}.tar.gz
  sha256: 23686094c74802862e92fb45141f89092472bfdedb373bfd8b748d4caeecc11f

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=0.3.74,<2.0.0
    - astrapy >=2.0.1,<3.0.0
    - numpy >=1.21

tests:
  - python:
      imports:
        - langchain_astradb
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-astradb/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting Astra DB and LangChain
  repository: https://github.com/langchain-ai/langchain-datastax/tree/main/libs/astradb
  description: |
    An integration package connecting Astra DB and LangChain.

extra:
  recipe-maintainers:
    - rxm7706

