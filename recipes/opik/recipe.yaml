# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.73"

package:
  name: opik
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opik/opik-${{ version }}.tar.gz
  sha256: c843f60719adfada1ece49dff51a3562ec28baa7ab7f4492d177b06b7e591b09

build:
  number: 0
  noarch: python
  script: |
    export VERSION="${PKG_VERSION}"
    python -c "import pathlib, re; p = pathlib.Path('setup.py'); s = p.read_text(); s = re.sub(r'long_description=open\(\s*os\.path\.join\(HERE, \"\.\.\", \"\.\.\", \"README\.md\"\), encoding=\"utf-8\"\s*\)\.read\(\),', 'long_description=\"\",', s); p.write_text(s)"
    ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - boto3-stubs >=1.34.110
    - mypy-boto3-bedrock-runtime >=1.43.0,<1.44.0
    - click
    - httpx
    - rapidfuzz >=3.0.0,<4.0.0
    - litellm >=1.79.2,!=1.81.*,!=1.82.*,!=1.83.0,!=1.83.1,!=1.83.2,!=1.83.3,!=1.83.4,!=1.83.5,!=1.83.6
    - openai
    - pydantic-settings >=2.0.0,<3.0.0,!=2.9.0
    - pydantic >=2.0.0,<3.0.0
    - pytest
    - rich
    - sentry-sdk >=2.0.0
    - tenacity
    - tqdm
    - uuid6
    - jinja2
    - watchfiles >=1.0.0,<2.0.0
    - if: not (linux and aarch64)
      then:
        - tree_sitter >=0.23,<1.0
        - tree-sitter-javascript >=0.23,<1.0
        - tree-sitter-typescript >=0.23,<1.0

tests:
  - python:
      imports:
        - opik
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/opik/
  license: Apache-2.0
  license_file: LICENSE
  summary: Comet tool for logging and evaluating LLM traces
  repository: https://github.com/comet-ml/opik
  documentation: https://www.comet.com/docs/opik/
  description: |
    Opik is an open-source platform from Comet for evaluating, testing, and
    monitoring LLM applications. This package provides the Python SDK for
    logging and evaluating LLM traces, running evaluations, and integrating
    Opik observability into LLM workflows.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
