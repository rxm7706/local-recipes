# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.8.0"

package:
  name: flake8-logging
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flake8-logging/flake8_logging-${{ version }}.tar.gz
  sha256: 765046763d44d1dc051071c047fe0fa056d71a524505207c3fbdc47532e7d8af

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - flake8 >=3,!=3.2

tests:
  - python:
      imports:
        - flake8_logging
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Flake8 plugin that checks for issues using the standard library logging module.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/adamchainz/flake8-logging
  repository: https://github.com/adamchainz/flake8-logging
  description: |
    A Flake8 plugin that checks for issues using the standard library
    logging module.

extra:
  recipe-maintainers:
    - rxm7706

