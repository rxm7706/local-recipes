# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.1"

package:
  name: lfx-docling
  version: ${{ version }}

source:
  url: https://pypi.org/packages/py3/l/lfx-docling/lfx_docling-${{ version }}-py3-none-any.whl
  sha256: 952059d3b027e7ec37aa99e1637bd97d9c8871bade9ebdf7781ce96c6edb65c0

build:
  noarch: python
  number: 0
  script: pip install lfx_docling-${{ version }}-py3-none-any.whl --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }},<3.15
    - docling-core >=2.36.1,<3.0.0
    - httpx >=0.28.1,<1.0.0
    - lfx >=1.10.0,<2.0.0

tests:
  - python:
      imports:
        - lfx_docling
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langflow-ai/langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org/bundles-docling
  license: MIT
  license_file: LICENSE
  summary: Docling document processing components as a standalone Langflow Extension Bundle.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
