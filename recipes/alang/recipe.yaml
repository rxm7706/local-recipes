# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.4"

package:
  name: alang
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/alang/alang-${{ version }}.tar.gz
  sha256: 9b72414a06bf2289ff7b289a711497221445964d2bb6cbca27be17164e7036f0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - alang
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A programming language specializing in cross-compiling to lots of other languages
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/praeclarum/alang
  repository: https://github.com/praeclarum/alang
  description: |
    A programming language specializing in cross-compiling to lots of other
    languages (C, GLSL, JavaScript, Metal, WGSL, and more).

extra:
  recipe-maintainers:
    - rxm7706
    - praeclarum

#### CFE metadata AND comments
