{% set version = "1.41.1" %}
{% set python_min = "3.10" %}

package:
  name: opentelemetry-api
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/opentelemetry-api/opentelemetry_api-{{ version }}.tar.gz
  sha256: 0ad1814d73b875f84494387dae86ce0b12c68556331ce6ce8fe789197c949621

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - typing-extensions >=4.5.0
    - importlib-metadata >=6.0,<8.8.0

test:
  imports:
    - opentelemetry
    - opentelemetry.context
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/open-telemetry/opentelemetry-python/tree/main/opentelemetry-api
  summary: OpenTelemetry Python API
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - mariusvniekerk
    - marcelotrevisani
