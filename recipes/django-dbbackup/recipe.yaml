# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.3.0"

package:
  name: django-dbbackup
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-dbbackup/django_dbbackup-${{ version }}.tar.gz
  sha256: 2c880dba7650539e8a724174fedb5213062c4fcda3aa09e1c5f3f573192106cb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - django >=5.0

tests:
  - python:
      imports:
        - dbbackup
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Management commands to help backup and restore a project database and media.
  license: BSD-3-Clause
  license_file: LICENSE.md
  homepage: https://github.com/Archmonger/django-dbbackup
  repository: https://github.com/Archmonger/django-dbbackup
  documentation: https://archmonger.github.io/django-dbbackup
  description: |
    django-dbbackup provides Django management commands to help back up and
    restore a project's database and media files, with support for compression,
    encryption, and multiple storage backends.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
