# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.1.1"

package:
  name: wagtail-seo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-seo/wagtail_seo-${{ version }}.tar.gz
  sha256: 8dbd2648f9c5c1a6c185a2253bd505bc50242867b0a3eacfa938332444b80923

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=65.0
    - pip
  run:
    - python >=${{ python_min }}
    - wagtail >=4.0,<8.0

tests:
  - python:
      imports:
        - wagtailseo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Search engine and social media optimization for Wagtail.
  homepage: https://github.com/coderedcorp/wagtail-seo
  license: BSD-3-Clause
  license_file: LICENSE.txt
  repository: https://github.com/coderedcorp/wagtail-seo

extra:
  recipe-maintainers:
    - rxm7706

