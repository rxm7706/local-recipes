# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.12.0a0"

package:
  name: opentelemetry-exporter-gcp-monitoring
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opentelemetry-exporter-gcp-monitoring/opentelemetry_exporter_gcp_monitoring-${{ version }}.tar.gz
  sha256: 2b285078cddd4af78a363a55b5478e89f7df6f15bba9139d3f484099e534df4c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-cloud-monitoring ~=2.0
    - opentelemetry-api ~=1.30
    - opentelemetry-sdk ~=1.30
    - opentelemetry-resourcedetector-gcp >=1.5.0dev0,<2

tests:
  - python:
      imports:
        - opentelemetry.exporter.cloud_monitoring
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Google Cloud Monitoring exporter for OpenTelemetry
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/GoogleCloudPlatform/opentelemetry-operations-python/tree/main/opentelemetry-exporter-gcp-monitoring
  repository: https://github.com/GoogleCloudPlatform/opentelemetry-operations-python

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
