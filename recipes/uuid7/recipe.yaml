# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: "uuid7"
  version: "0.1.0"
  python_min: "3.10"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 8c57aa32ee7456d3cc68c95c4530bc571646defac01895cfc73545449894a63c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - uuid_extensions
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: UUID version 7, generating time-sorted UUIDs with 200ns time resolution and 48 bits of randomness
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/stevesimmons/uuid7

extra:
  recipe-maintainers:
    - rxm7706
