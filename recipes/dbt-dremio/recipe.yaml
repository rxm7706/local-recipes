# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.10.1"

package:
  name: dbt-dremio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dbt-dremio/dbt_dremio-${{ version }}.tar.gz
  sha256: 6b0bc19dffe45984bee95217078579936f276630e3892c8816bba3efcbb0f22f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
  run:
    - python >=${{ python_min }}
    - dbt-core >=1.10
    - dbt-common >=1.27,<2.0
    - dbt-adapters >=1.16.1,<2.0
    - requests >=2.31.0

tests:
  - python:
      imports:
        - dbt.adapters.dremio
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: The Dremio adapter plugin for dbt
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/dremio/dbt-dremio
  repository: https://github.com/dremio/dbt-dremio

extra:
  recipe-maintainers:
    - rxm7706

