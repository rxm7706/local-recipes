# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.24.1"

package:
  name: django-socio-grpc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-socio-grpc/django_socio_grpc-${{ version }}.tar.gz
  sha256: 6706ed6667341a1c962ff9a03a23638d00c28d1bf862be59330397a0d2da3265

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0,<2.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - djangorestframework
    - grpcio-tools >=1.50.0,<2.0.0
    - lark >=1.0.0,<2.0.0
    - grpcio-health-checking

tests:
  - python:
      imports:
        - django_socio_grpc
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Fork of django-grpc-framework with more feature maintained by the socio team. Make GRPC with django easy.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/socotecio/django-socio-grpc
  repository: https://github.com/socotecio/django-socio-grpc

extra:
  recipe-maintainers:
    - rxm7706

