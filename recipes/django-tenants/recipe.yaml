# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.10.1"

package:
  name: django-tenants
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-tenants/django_tenants-${{ version }}.tar.gz
  sha256: cf3ea79a23a6df8db3ed24d4220a1c037749e6070a36864f5f9d50550c2a4fa7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=2.1,<6.1

tests:
  - python:
      imports:
        - django_tenants
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Tenant support for Django using PostgreSQL schemas.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/django-tenants/django-tenants
  repository: https://github.com/django-tenants/django-tenants

extra:
  recipe-maintainers:
    - rxm7706

