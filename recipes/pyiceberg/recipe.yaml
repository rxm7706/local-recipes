    - pkg:pypi/pyiceberg@${{ version }}
  cfe-upstream-repo: https://github.com/apache/iceberg-python
  cfe-upstream-homepage: https://iceberg.apache.org/
  cfe-import-names: [pyiceberg]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/pyiceberg-feedstock
