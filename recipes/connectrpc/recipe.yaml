# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.10.1"

package:
  name: connectrpc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/connectrpc/connectrpc-${{ version }}.tar.gz
  sha256: eaf093a4f0d1b9c854c71839083ed5242a551100e99cf52e3cc5e35663f2a5ea

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.11.0,<0.12.0
    - pip
  run:
    - python >=${{ python_min }}
    - protobuf >=5.28
    - pyqwest >=0.5.1

tests:
  - python:
      imports:
        - connectrpc
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Server and client runtime library for Connect RPC
  description: |
    # Connect for Python
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/connectrpc/connect-python
  repository: https://github.com/connectrpc/connect-py
  documentation: https://connectrpc.com/docs/python/getting-started/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: connectrpc
  cfe-upstream-registry: pypi
  cfe-upstream-name: connectrpc
  cfe-purls:
    - pkg:conda/connectrpc@${{ version }}
    - pkg:pypi/connectrpc@${{ version }}
  cfe-upstream-repo: https://github.com/connectrpc/connect-python
  cfe-upstream-homepage: https://github.com/connectrpc/connect-python
  cfe-import-names: [connectrpc]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: "true"
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
