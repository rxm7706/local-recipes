# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.2"

package:
  name: bynder-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/bynder-sdk/bynder-sdk-${{ version }}.tar.gz
  sha256: 586775fdb14945a6ff8096127a1f84e9bd6c506b3ea507eb2d408c6ad370d37f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - requests >=2.20.0,<=3.0.0
    - requests-oauthlib >=1.1.0,<=2.0.0

tests:
  - python:
      imports:
        - bynder_sdk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Bynder SDK can be used to speed up the integration of Bynder in Python
  license: MIT
  license_file: LICENSE
  homepage: https://bynder.com
  description: |
    The Bynder Python SDK speeds up the integration of Bynder in Python
    applications. It wraps the Bynder REST API and handles OAuth
    authentication so developers can interact with the Bynder digital
    asset management platform from Python.

extra:
  recipe-maintainers:
    - rxm7706

