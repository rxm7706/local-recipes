# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: suitenumerique/docs is a deployed Django web application, not
# a library. `pip install` ships the importable backend module
# (impress); running the service additionally requires Postgres,
# Redis/Celery, OIDC provider, S3-compatible storage, SMTP, and frontend
# build artifacts that this recipe does not install. conda-forge declines
# web-application recipes as a matter of policy.
#
# Pinned to commit f7f0c4d3e3e0 on suitenumerique/docs (no PyPI release).
# Build context: src/backend/ subdirectory (this recipe pip-installs from
# there).
#

context:
  version: "5.1.0"
  commit: "f7f0c4d3e3e0860da58922e3f2d183697c932375"
  python_min: "3.13"

package:
  name: suite-docs
  version: ${{ version }}

source:
  - url: https://github.com/suitenumerique/docs/archive/${{ commit }}.tar.gz
    sha256: 996b2ba5c441b692f4c457ac85c6d29bd9b48da2b0b79ad4cd6de78bf5579ecf
  # Org-level MIT LICENSE fallback for apps whose repo ships none directly.
build:
  number: 0
  noarch: python
  script:
    - cd src/backend && ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - beautifulsoup4
    - boto3
    - brotli
    - celery
    - dj-database-url
    - django-configurations
    - django-cors-headers
    - django-countries
    - django-csp
    - django-filter
    - django-lasuite
    - django-parler
    - django-redis
    - django-storages
    - django-timezone-field
    - django
    - django-treebeard
    - djangorestframework
    - django-waffle
    - drf-spectacular
    - dockerflow
    - easy-thumbnails
    - emoji
    - factory-boy
    - gunicorn
    - jsonschema
    - langfuse
    - lxml
    - markdown
    - mistralai
    - mozilla-django-oidc
    - nested-multipart-parser
    - openai
    - psycopg
    - pycrdt
    - pydantic
    - pydantic-ai-slim
    - pyjwt
    - python-magic
    - redis-py
    - requests
    - sentry-sdk
    - uvicorn
    - whitenoise

# CFEP-25-justified: Django web-app backend — `import <module>` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE, and the test env
# can't resolve the full transitive Django-plugin chain. site_packages
# presence is the testable invariant.
tests:
  - package_contents:
      site_packages:
        - impress

about:
  homepage: https://github.com/suitenumerique/docs
  repository: https://github.com/suitenumerique/docs
  summary: La Suite numérique docs backend (Django web application — local-only)
  description: |
    suitenumerique/docs backend. Distribution name "impress".
    This is a Django web service, not a library — installing this conda
    package gives you the importable backend code; running the service
    requires additional infrastructure (Postgres + Redis + Celery + OIDC +
    S3 + SMTP + frontend).
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
