# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.18.3"

package:
  name: pypac
  version: ${{ version }}

source:
  url: https://github.com/carsonyl/pypac/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 878c1374dc872dba81914f13e154de9d091e283527259eae9db72daf2d734d4c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - requests >=2.0.0
    - tldextract >=2.2.3
    - dukpy >=0.2.2
    - if: osx
      then:
        - pyobjc-framework-SystemConfiguration >=3.2.1

tests:
  - python:
      imports:
        - pypac
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Proxy auto-config and auto-discovery for Python.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/carsonyl/pypac
  repository: https://github.com/carsonyl/pypac
  documentation: https://pypac.readthedocs.io
  description: |
    PyPAC is a library for finding and using proxy auto-config (PAC) files in
    Python. It can find PAC files via the operating system's auto-discovery
    settings and via DNS, parse them, and select the appropriate proxy for a
    given URL. It also provides a requests Session subclass that handles PAC
    proxy resolution transparently.

extra:
  recipe-maintainers:
    - rxm7706

