    - pkg:github/podman-desktop/podman-desktop@v${{ version }}
  cfe-upstream-repo: https://github.com/podman-desktop/podman-desktop
  cfe-upstream-homepage: https://podman-desktop.io/
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/podman-desktop-feedstock
  cfe-forge-recipe-updates-needed: none
