# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.1.3"

package:
  name: wolframalpha
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wolframalpha/wolframalpha-${{ version }}.tar.gz
  sha256: 56226efeca0f55acec5e17dd2f6537a178d0bf4feec4df0615165e2968bb49b8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - setuptools-scm >=3.4.1
    - pip
  run:
    - python >=${{ python_min }}
    - xmltodict
    - more-itertools
    - jaraco.context
    - httpx
    - multidict

tests:
  - python:
      imports:
        - wolframalpha
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/wolframalpha/
  license: MIT
  license_file: LICENSE
  summary: Wolfram|Alpha 2.0 API client
  repository: https://github.com/jaraco/wolframalpha
  documentation: https://wolframalpha.readthedocs.io/en/latest/
  description: |
    A Python client library for the Wolfram|Alpha v2.0 API, providing a
    simple interface to query the Wolfram|Alpha computational knowledge
    engine and parse its structured XML responses.

extra:
  recipe-maintainers:
    - rxm7706

