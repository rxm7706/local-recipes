# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.3"

package:
  name: cmudict
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/cmudict/cmudict-${{ version }}.tar.gz
  sha256: f6c1cb9a2ffecef387bf1a1b93be6c61c91bc6f41714f183c3eb4d5b3e1ff5f6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - importlib-metadata >=5
    - importlib-resources >=5

tests:
  - python:
      imports:
        - cmudict
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: GPL-3.0-or-later AND BSD-2-Clause
  license_file:
    - LICENSE
    - src/cmudict/data/LICENSE
  summary: A versioned python wrapper package for The CMU Pronouncing Dictionary data files.
  homepage: https://github.com/prosegrinder/python-cmudict
  repository: https://github.com/prosegrinder/python-cmudict
  description: |
    A versioned Python wrapper package for The CMU Pronouncing Dictionary
    data files. The Carnegie Mellon University Pronouncing Dictionary is an
    open-source machine-readable pronunciation dictionary for North American
    English that contains over 134,000 words and their pronunciations.

extra:
  recipe-maintainers:
    - rxm7706

