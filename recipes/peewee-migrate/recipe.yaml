# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.15.0"

package:
  name: peewee-migrate
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/peewee-migrate/peewee_migrate-${{ version }}.tar.gz
  sha256: 0fd9fbc5cb2e6749d88b38c48c4ca24fb4a25368751b9c7a76cc1c78c767cf83

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pw_migrate = peewee_migrate.cli:cli
      - pw-migrate = peewee_migrate.cli:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.10.2,<0.11.0
    - pip
  run:
    - python >=${{ python_min }}
    - peewee
    - click

tests:
  - python:
      imports:
        - peewee_migrate
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pw_migrate --help
      - pw-migrate --help

about:
  summary: Support for migrations in Peewee ORM
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/klen/peewee_migrate
  repository: https://github.com/klen/peewee_migrate

extra:
  recipe-maintainers:
    - rxm7706

