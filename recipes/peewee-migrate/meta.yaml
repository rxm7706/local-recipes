{% set name = "peewee-migrate" %}
{% set version = "1.15.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/peewee_migrate-{{ version }}.tar.gz
  sha256: 0fd9fbc5cb2e6749d88b38c48c4ca24fb4a25368751b9c7a76cc1c78c767cf83

build:
  entry_points:
    - pw_migrate = peewee_migrate.cli:cli
    - pw-migrate = peewee_migrate.cli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - uv-build >=0.10.2,<0.11.0
    - pip
  run:
    - python >={{ python_min }},<4.0
    - peewee
    - click

test:
  imports:
    - peewee_migrate
  commands:
    - pip check
    - pw_migrate --help
    - pw-migrate --help
  requires:
    - pip

about:
  home: https://github.com/klen/peewee_migrate
  summary: Support for migrations in Peewee ORM
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
