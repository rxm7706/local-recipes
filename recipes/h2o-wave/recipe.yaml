# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.8.9"

package:
  name: h2o-wave
  version: ${{ version }}

source:
  url: https://github.com/h2oai/wave/archive/v${{ version }}.tar.gz
  sha256: e6acc1c4f146ef623216c0611c7cae32911df1cf3727e4cfcf8d862beb80270f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install ./py/h2o_wave -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - wave = h2o_wave.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - click
    - httpx >=0.16.1
    - inquirer
    - starlette >=0.16.0,<2
    - uvicorn >=0.17.6

tests:
  - python:
      imports:
        - h2o_wave
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python driver for H2O Wave Realtime Apps
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
    - py/h2o_wave/LICENSE
  homepage: https://wave.h2o.ai/
  repository: https://github.com/h2oai/wave
  documentation: https://wave.h2o.ai/
  description: |
    H2O Wave is a lightweight software stack for programming interactive web
    applications entirely in Python (no HTML/Javascript/CSS required).

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
