{% set name = "wagtail-transfer" %}
{% set version = "0.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 02aea3460e0c536e9fc2159fb44f6e8562b9c5f5488496df74040c2b18cdd67a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - django
    - django-modelcluster
    - django-taggit
    - django-treebeard
    - djangorestframework
    - requests
    - python >={{ python_min }}
    - wagtail >=5.2

test:
  imports:
    - wagtail_transfer
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/wagtail/wagtail-transfer
  summary: Content transfer for Wagtail
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
