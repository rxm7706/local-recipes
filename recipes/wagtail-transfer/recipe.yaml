# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.11"

package:
  name: wagtail-transfer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-transfer/wagtail_transfer-${{ version }}.tar.gz
  sha256: 02aea3460e0c536e9fc2159fb44f6e8562b9c5f5488496df74040c2b18cdd67a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django
    - django-modelcluster
    - django-taggit
    - django-treebeard
    - djangorestframework
    - requests
    - wagtail >=5.2

tests:
  - python:
      imports:
        - wagtail_transfer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Content transfer for Wagtail
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/wagtail/wagtail-transfer
  repository: https://github.com/wagtail/wagtail-transfer
  description: |
    An extension for Wagtail allowing content to be transferred between
    multiple instances of a Wagtail project.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
