# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.11.0"

package:
  name: bmalph
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/bmalph/-/bmalph-${{ version }}.tgz
  sha256: f23f8c20efdb56c0759bd1f9266763a157c76e29db5fc530dd60f4b2f52b5cf1

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - bmalph --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Unified AI Development Framework - BMAD phases with Ralph execution 
    loop
  description: |
    [BMAD-METHOD](https://github.com/bmad-code-org/BMAD-METHOD) planning + [Ralph](https://github.com/snarktank/ralph) autonomous implementation, wired through platform-specific instructions, skills, and command indexes.
  homepage: https://github.com/LarsCowe/bmalph
  repository: https://github.com/LarsCowe/bmalph

extra:
  recipe-maintainers:
    - rxm7706
