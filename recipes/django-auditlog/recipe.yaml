# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.4.1"

package:
  name: django-auditlog
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-auditlog/django_auditlog-${{ version }}.tar.gz
  sha256: ad07b9db452d5fa8303822cccd78cd3fcb2c2863aeb6abe039ec45739b4d7e33

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools-scm
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - python-dateutil >=2.7.0

tests:
  - python:
      imports:
        - auditlog
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Audit log app for Django
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/jazzband/django-auditlog
  repository: https://github.com/jazzband/django-auditlog
  documentation: https://django-auditlog.readthedocs.io
  description: |
    django-auditlog (Audit Log) is a reusable app for Django that makes
    logging object changes a breeze. Changes of a model object are stored
    and can be displayed and reverted from the admin or programmatically.

extra:
  recipe-maintainers:
    - rxm7706

