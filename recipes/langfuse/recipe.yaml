# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.7.1"
  python_min: '3.10'

package:
  name: langfuse-python
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/langfuse/langfuse-${{ version }}.tar.gz
    sha256: f9e262eceedb353b191c1da1f8452d1e8ebf52297ca20e160cda0206608e3a40

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - release = scripts.release:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - httpx >=0.15.4,<1.0
    - pydantic >=1.10.7,<3.0
    - backoff >=1.10.0
    - wrapt >=1.14,<2.0
    - packaging >=23.2,<25.0
    #- idna >=3.7,<4.0
    #- anyio >=4.4.0,<5.0.0
    #- requests >=2,<3
    - opentelemetry-api >=1.33.1,<2
    - opentelemetry-sdk >=1.33.1,<2
    - opentelemetry-exporter-otlp-proto-http >=1.33.1,<2

tests:
  - python:
      imports:
        - langfuse
      pip_check: true  # wrapt >=2 on conda-forge conflicts with upstream <2 cap
      python_version:
        - ${{ python_min }}.*
        - "*"


about:
  homepage: https://pypi.org/project/langfuse/
  license: MIT
  license_file: LICENSE
  summary: A client library for accessing langfuse
  description: |
    A client library for accessing langfuse
  repository: https://github.com/langfuse/langfuse-python

extra:
  recipe-maintainers:
    - moritzwilksch
    - rxm7706
