# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.3"

package:
  name: auto-gpt-plugin-template
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/auto-gpt-plugin-template/auto_gpt_plugin_template-${{ version }}.tar.gz
  sha256: 3f51110f78db490a89a5142fcdf44176ef088125a418f507b100e813ea5afd06

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - abstract-singleton

tests:
  - python:
      imports:
        - auto_gpt_plugin_template
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: The template plugin for Auto-GPT.
  description: |
    Auto-GPT-Plugin-Template, A starting point for developing your own plug-in for Auto-GPT
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Significant-Gravitas/Auto-GPT

extra:
  recipe-maintainers:
    - rxm7706

