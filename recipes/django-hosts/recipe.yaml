# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "7.0.0"

package:
  name: django-hosts
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-hosts/django_hosts-${{ version }}.tar.gz
  sha256: 08006bc09f5af69638721ced0657f24044835a22a608732ee1004adc9c95fb7c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools-scm
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2

tests:
  - python:
      imports:
        - django_hosts
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Dynamic and static host resolving for Django. Maps hostnames to URLconfs.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://django-hosts.readthedocs.io/
  repository: https://github.com/jazzband/django-hosts
  documentation: https://django-hosts.readthedocs.io/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
