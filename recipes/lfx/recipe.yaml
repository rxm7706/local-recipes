# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.10.0"

package:
  name: lfx
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 45a317111a5d7cbc2709e683a72a80779801a658f61e506b612978588788ab71

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install src/lfx -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - lfx = lfx.__main__:main
      - lfx-mcp = lfx.mcp.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - ag-ui-protocol >=0.1.10
    - aiofile >=3.8.0,<4.0.0
    - aiofiles >=24.1.0,<25.0.0
    - asyncer >=0.0.8,<1.0.0
    - cachetools >=6.0.0
    - chardet >=7.3.0
    - cryptography >=46.0.7
    - defusedxml >=0.7.1,<1.0.0
    - docstring_parser >=0.16,<1.0.0
    - emoji >=2.14.1,<3.0.0
    - fastapi >=0.135.0,<1.0.0
    - filelock >=3.20.1,<4.0.0
    - httpx >=0.24.0,<1.0.0
    - h2 >=3,<5
    - json-repair >=0.30.3,<1.0.0
    - langchain-classic >=1.0.7,<1.1.0
    - langchain-core >=1.2.28,<2.0.0
    - langchain >=1.2.0,<1.3.0
    - langflow-sdk >=0.1.0
    - loguru >=0.7.3,<1.0.0
    - markitdown >=0.1.4,<2.0.0
    - mcp >=1.17.0,<2.0.0
    - nanoid >=2.0.0,<3.0.0
    - networkx >=3.4.2,<4.0.0
    - opendsstar ==1.0.26
    - orjson >=3.11.6,<4.0.0
    - pandas >=2.0.0,<3.0.0
    - passlib >=1.7.4,<2.0.0
    - pillow >=11.1.0,<13.0.0
    - platformdirs >=4.3.8,<5.0.0
    - pydantic-settings >=2.10.1,<3.0.0
    - pydantic >=2.0.0,<3.0.0
    - pypdf >=6.10.0,<7.0.0
    - python-dotenv >=1.0.0,<2.0.0
    - pyyaml >=6.0.0,<7.0.0
    - rich >=13.0.0,<14.0.0
    - setuptools >=80.0.0,<81.0.0
    - structlog >=25.4.0,<26.0.0
    - tomli >=2.2.1,<3.0.0
    - typer >=0.16.0,<1.0.0
    - typing_extensions >=4.14.0,<5.0.0
    - uvicorn >=0.34.3,<1.0.0
    - validators >=0.34.0,<1.0.0
    - wheel >=0.46.2,<1.0.0

tests:
  - python:
      imports:
        - lfx
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - lfx --help
      - lfx-mcp --help

about:
  homepage: https://github.com/langflow-ai/langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org
  license: MIT
  license_file: LICENSE
  summary: Langflow Executor - A lightweight CLI tool for executing and serving Langflow AI flows

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
