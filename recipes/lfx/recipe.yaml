  cfe-conda-name: lfx
  cfe-upstream-registry: pypi
  cfe-upstream-name: lfx
  cfe-purls:
    - pkg:conda/lfx@${{ version }}
    - pkg:pypi/lfx@${{ version }}
  cfe-upstream-repo: https://github.com/langflow-ai/langflow
  cfe-upstream-homepage: https://github.com/langflow-ai/langflow
  cfe-import-names: [lfx]
  cfe-source-kind: github-tag:lfx-in-langflow-monorepo-src-lfx-no-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: blocked-pending-prerequisites
