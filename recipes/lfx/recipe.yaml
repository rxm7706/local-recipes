# CFE comments
# Header:
#    # lfx = "Langflow eXecutor", langflow's core runtime; a langflow-family
#    # split living in the langflow-ai/langflow monorepo at src/lfx/.
#    # grayskull cannot generate this recipe: PyPI ships a wheel only (no
#    # sdist), so the recipe is hand-authored from the canonical wheel URL.
# context:
#    # python_min 3.11 (not the 3.10 default): lfx depends on langflow-sdk, whose
#    # chain hard-imports jsonquerylang -> typing.NotRequired (PEP 655, py3.11+)
#    # (G41). conda-forge has no py3.10 langflow-sdk build, so a py3.10 test leg
#    # can't resolve it. Matches langflow-suite's python_min.
# source:
#    # GitHub monorepo tag archive (G54): lfx ships a wheel only on PyPI (no
#    # sdist), but its source IS in the langflow-ai/langflow monorepo at src/lfx/,
#    # so conda-forge prefers building that subdir (hatchling backend, G55). lfx
#    # version == the monorepo tag (1.10.0), so v${{ version }} is the tag.
#    # NB: this standalone recipe mirrors the langflow-suite `lfx` output.
# about:
#    # No LICENSE in the wheel and pyproject declares no license field; the
#    # langflow-ai/langflow monorepo LICENSE is MIT (Copyright 2024 Langflow).
#    # LICENSE shipped in-recipe (canonical pattern 2) because the wheel omits it.
# build:
#  python:
#    entry_points:
#      # lfx + lfx-mcp console scripts from the wheel's entry_points.txt.
# requirements:
#  run:
#    # httpx[http2] extra flattened (G25): the http2 extra pulls h2 -> added
#    #   `h2` alongside `httpx`.
#    # docstring_parser (underscore) is the conda-forge feedstock spelling
#    #   (G10): PyPI ships `docstring-parser` (hyphen) but conda-forge ships
#    #   `docstring_parser`; the hyphen form fails the solve.
#    # langflow-sdk (>=0.2.1 in 1.10.1) is a langflow-family package, now a
#    #   langflow-suite OUTPUT (G72 fold), NOT a standalone conda-forge feedstock;
#    #   resolvable from the local channel, prerequisite blocker for cf submission.
#  run_constraints:
#    # opendsstar is an optional-dependencies group in lfx 1.10.1 (was a hard run
#    #   dep in 1.10.0). Demoting it breaks the lfx -> opendsstar ->
#    #   langchain-text-splitters>=1.1.0 chain that conflicted with langchain
#    #   1.2.x; with langchain ~=1.3.0 (text-splitters 1.1.x) they reconcile.
#    #   Upstream marker gates it to py3.11-3.13 on non-(darwin x86_64); the
#    #   per-(py,platform) marker can't be expressed on a noarch artifact
#    #   (G12/G35), so it is listed unconditionally. NOT on conda-forge.
#    # magika reaches lfx via markitdown. 0.6.3's wheel caps onnxruntime<=1.20.1
#    #   on win32 (absent in 0.6.2/1.0+); exclude only 0.6.3 (!=) so the Windows
#    #   pip check passes. Stopgap until markitdown-feedstock PR #20 lands.
#    # setuptools <81 mirrors upstream's explicit cap (related to G34's
#    #   pkg_resources/setuptools-81 class); load-bearing under pip_check.
