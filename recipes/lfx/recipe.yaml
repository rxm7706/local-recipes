#    # sdist), so the recipe is hand-authored from the canonical wheel URL.
# source:
#    # GitHub monorepo tag archive (G54): lfx ships a wheel only on PyPI (no
#    # sdist), but its source IS in the langflow-ai/langflow monorepo at src/lfx/,
#    # so conda-forge prefers building that subdir (hatchling backend, G55). lfx
#    # version == the monorepo tag (1.10.0), so v${{ version }} is the tag.
#    # NB: this standalone recipe mirrors the langflow-suite `lfx` output.
# about:
#    # No LICENSE in the wheel and pyproject declares no license field; the
#    # langflow-ai/langflow monorepo LICENSE is MIT (Copyright 2024 Langflow).
#    # LICENSE shipped in-recipe (canonical pattern 2) because the wheel omits it.
# build:
#  python:
#    entry_points:
#      # lfx + lfx-mcp console scripts from the wheel's entry_points.txt.
# requirements:
#  run:
#    # httpx[http2] extra flattened (G25): the http2 extra pulls h2 -> added
#    #   `h2` alongside `httpx`.
#    # docstring_parser (underscore) is the conda-forge feedstock spelling
#    #   (G10): PyPI ships `docstring-parser` (hyphen) but conda-forge ships
#    #   `docstring_parser`; the hyphen form fails the solve.
#    # opendsstar ==1.0.26 is a known third-party blocker, NOT on conda-forge.
#    #   Upstream marker gates it to py3.11-3.13 on non-(darwin x86_64); for a
#    #   noarch artifact the per-(py,platform) marker can't be expressed in run:
#    #   without violating G12/G35, so it is listed unconditionally. It is a
