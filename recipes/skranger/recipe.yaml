# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.0"

package:
  name: skranger
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/skranger/skranger-${{ version }}.tar.gz
  sha256: c97530f66a0f30b36d8e65b816932e79bda7ed09f7dd0db0694ba4c042e7724d

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - pip
    - poetry-core
    - setuptools
    - numpy
    - cython
  run:
    - python
    - scikit-learn >=1.0

tests:
  - python:
      imports:
        - skranger
      pip_check: true

about:
  summary: Python bindings for C++ ranger random forests
  license: GPL-3.0-or-later
  license_file:
    - LICENSE.txt
    - skranger/ranger/COPYING
  homepage: https://github.com/crflynn/skranger
  repository: https://github.com/crflynn/skranger
  documentation: https://github.com/crflynn/skranger
  description: |
    Python bindings for C++ ranger random forests. skranger provides
    scikit-learn compatible estimators (classification, regression,
    survival, probability) wrapping the ranger C++ random-forest library
    via a Cython extension.

extra:
  recipe-maintainers:
    - rxm7706

