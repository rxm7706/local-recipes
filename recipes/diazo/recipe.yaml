# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.6"

package:
  name: diazo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/diazo/diazo-${{ version }}.tar.gz
  sha256: 1e38270b8f9dbf172c5ffb054f69623d8e46bb69737b245c2e3a99d8179761d3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - diazocompiler = diazo.compiler:main
      - diazorun = diazo.run:main
      - diazopreprocessor = diazo.rules:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - cssselect
    - lxml
    - webob

tests:
  - python:
      imports:
        - diazo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - diazocompiler --help
      - diazorun --help
      - diazopreprocessor --help

about:
  summary: Diazo implements a Deliverance like language using a pure XSLT engine. With Diazo, you "compile" your theme and ruleset in one step, then use a superfast/simple transform on each request thereafter. Alternatively, compile your theme during development, check it into version control, and not touch Diazo during deployment.
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: http://diazo.org

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: diazo
  cfe-upstream-registry: pypi
  cfe-upstream-name: diazo
  cfe-purls:
    - pkg:conda/diazo@${{ version }}
    - pkg:pypi/diazo@${{ version }}
  cfe-upstream-repo: http://diazo.org
  cfe-upstream-homepage: http://diazo.org
  cfe-import-names: [diazo]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
