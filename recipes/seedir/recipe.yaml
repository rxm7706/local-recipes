# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.1"

package:
  name: seedir
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/seedir/seedir-${{ version }}.tar.gz
  sha256: 9fb82a6133f92a711bb2d46b2a142f56712e242a4fc03fef2fea9418d307efe2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - seedir = seedir.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - natsort

tests:
  - python:
      imports:
        - seedir
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - seedir --help

about:
  summary: Package for creating, editing, and reading folder tree diagrams.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/earnestt1234/seedir
  repository: https://github.com/earnestt1234/seedir
  description: |
    Package for creating, editing, and reading folder tree diagrams.
    seedir produces ASCII-art style folder tree diagrams from a directory
    on disk, and can also parse such diagrams back into folder structures.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
