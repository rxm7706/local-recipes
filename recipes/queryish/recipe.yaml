# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3"

package:
  name: queryish
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/q/queryish/queryish-${{ version }}.tar.gz
  sha256: 7f5e32cb466b4c87d8e8e1b8272da68ba43c413155a868453558e4ad6a4dc8d5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<4.0
    - requests >=2.28,<3.0

tests:
  - python:
      imports:
        - queryish
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A library for constructing queries on arbitrary data sources following Django's QuerySet API
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/wagtail/queryish

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: queryish
  cfe-upstream-registry: pypi
  cfe-upstream-name: queryish
  cfe-purls:
    - pkg:conda/queryish@${{ version }}
    - pkg:pypi/queryish@${{ version }}
  cfe-upstream-repo: https://github.com/wagtail/queryish
  cfe-upstream-homepage: https://github.com/wagtail/queryish
  cfe-import-names: [queryish]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/queryish-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
