# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.13.1"

package:
  name: gotenberg-client
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gotenberg-client/gotenberg_client-${{ version }}.tar.gz
  sha256: cdd6bbb535cd739b87446cd1b4f6347ed7f9af6a0d4b19baf7c064b75528ee54

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.27,<2
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.27
    - typing_extensions

tests:
  - python:
      imports:
        - gotenberg_client
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Python client for interfacing with the Gotenberg API
  license: MPL-2.0
  license_file: LICENSE
  homepage: https://github.com/stumpylog/gotenberg-client/
  repository: https://github.com/stumpylog/gotenberg-client/
  documentation: https://stumpylog.github.io/gotenberg-client/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: gotenberg-client
