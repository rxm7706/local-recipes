    - pkg:pypi/gotenberg-client@${{ version }}
  cfe-upstream-repo: https://github.com/stumpylog/gotenberg-client/
  cfe-upstream-homepage: https://github.com/stumpylog/gotenberg-client/
  cfe-import-names: [gotenberg_client]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
