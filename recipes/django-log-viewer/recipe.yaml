# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.8"

package:
  name: django-log-viewer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-log-viewer/django_log_viewer-${{ version }}.tar.gz
  sha256: 3b70837cc1877356831a5d4831d30426809ccd12a0705b7fb11512ee17f3b50a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django

tests:
  - python:
      imports:
        - log_viewer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Django log viewer
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/agusmakmun/django-log-viewer
  repository: https://github.com/agusmakmun/django-log-viewer

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
