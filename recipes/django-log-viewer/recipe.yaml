    - pkg:pypi/django-log-viewer@${{ version }}
  cfe-upstream-repo: https://github.com/agusmakmun/django-log-viewer
  cfe-upstream-homepage: https://github.com/agusmakmun/django-log-viewer
  cfe-import-names: [log_viewer]
