# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.4.2"

package:
  name: django-health-check
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-health-check/django_health_check-${{ version }}.tar.gz
  sha256: ad6669bab773ef74714bb45b9cea692da2054dd68c197282db56709afd6d55bf

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2
    - flit-scm
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=5.2
    - dnspython >=2.0.0
    - psutil

tests:
  # CFEP-25-justified: Django web-app backend — `import health_check` raises
  # ImproperlyConfigured without DJANGO_SETTINGS_MODULE configured.
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - python -c "import django; from django.conf import settings; settings.configure(); django.setup(); import health_check"
      - pip check

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/codingjoe/django-health-check
  summary: Monitor the health of your Django app and its connected services.

extra:
  recipe-maintainers:
    - rxm7706

