# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.13.0"

package:
  name: impit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/impit/impit-${{ version }}.tar.gz
  sha256: ec5ff2932c6ccdd3004b0f5e0d0d9bce5c8a6f48df4f226e5ee172bc79952df8

build:
  number: 2
  script:
    # reqwest's http3 feature (used by impit) is gated behind this cfg flag.
    # Setting it here works on all platforms, unlike an inline `env` prefix.
    env:
      RUSTFLAGS: "--cfg reqwest_unstable"
      CARGO_HTTP_MULTIPLEXING: "false"
    content:
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - perl
    - make
    - cargo-bundle-licenses
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - maturin >=1,<2
  host:
    - python
    - maturin >=1,<2
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - impit
      pip_check: true

about:
  summary: A library for making HTTP requests through browser impersonation
  license: Apache-2.0
  license_file:
    - LICENSE.md
    - THIRDPARTY.yml
  homepage: https://apify.github.io/impit/python/
  repository: https://github.com/apify/impit
  documentation: https://apify.github.io/impit/python/

extra:
  recipe-maintainers:
    - Pijukatel

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: impit
  cfe-upstream-registry: pypi
  cfe-upstream-name: impit
  cfe-purls:
    - pkg:conda/impit@${{ version }}
    - pkg:pypi/impit@${{ version }}
  cfe-upstream-repo: https://github.com/apify/impit
  cfe-upstream-homepage: https://apify.github.io/impit/python/
  cfe-import-names: [impit]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/impit-feedstock
