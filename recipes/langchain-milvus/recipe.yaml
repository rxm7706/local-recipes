# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.3"

package:
  name: langchain-milvus
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-milvus/langchain_milvus-${{ version }}.tar.gz
  sha256: 406c2d88da133741f5cc3e2fea4b36386182b35500205c70d003382ded210e41

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.0.0
    - pymilvus >=2.6.0,<3.0

tests:
  - python:
      imports:
        - langchain_milvus
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-milvus/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting Milvus and LangChain
  repository: https://github.com/langchain-ai/langchain-milvus
  documentation: https://github.com/langchain-ai/langchain-milvus/tree/main/libs/milvus
  description: |
    LangChain Milvus provides integration between LangChain, a framework for
    building applications with large language models (LLMs), and Milvus, a
    vector database designed for similarity search and AI applications. It
    enables efficient vector storage and retrieval for use cases such as
    semantic search, recommendation systems, and Retrieval Augmented
    Generation (RAG).

extra:
  recipe-maintainers:
    - rxm7706

