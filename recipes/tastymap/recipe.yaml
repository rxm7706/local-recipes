# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.1"

package:
  name: tastymap
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tastymap/tastymap-${{ version }}.tar.gz
  sha256: c1ca63c4a0ac93147db8fde11d7aee79a4d4aa14dbe15287482bdf67dd63a76c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - tastymap = tastymap.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-regex-commit
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - matplotlib-base
  run_constraints:
    - panel
    - param
    - requests
    - xarray
    - netcdf4
    - pooch

tests:
  - python:
      imports:
        - tastymap
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
        - panel
        - param
        - requests
        - xarray
        - netcdf4
        - pooch
    script:
      - pip check
      - tastymap --help

about:
  summary: Color palettes for your palate
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ahuang11/tastymap
  repository: https://github.com/ahuang11/tastymap
  documentation: https://ahuang11.github.io/tastymap/

extra:
  recipe-maintainers:
    - rxm7706

