# CFE comments
# Header:
#    # PyPI distribution name is `wasmtime`; the conda-forge package is
#    # `wasmtime-py` (disambiguates the pyo3 Python binding from the
#    # underlying Rust runtime). Import name is `wasmtime` (G7/G10).
# build:
#    # The PyPI sdist uses an in-tree PEP-517 build backend
#    # (ci/_custom_build/backend.py) that runs ci/download-wasmtime.py to
#    # fetch a precompiled wasmtime C-API binary (.so/.dll/.dylib) from
#    # github.com/bytecodealliance/wasmtime/releases for the target platform,
#    # then setuptools packages it. This is a network fetch during build, not
#    # a from-source Rust compile — there is no Cargo.toml / .rs / .cpp in the
#    # sdist. The build is fast (download, not compile). The compiler('rust')
#    # + cargo-bundle-licenses build deps mirror the upstream feedstock recipe.
# requirements:
#  build:
#    # No compiler('cxx') — feedstock omits it and the sdist ships no C++
#    # source (.ci_support carries no cxx_compiler variant). The prior local
#    # recipe's cxx compiler was speculative; dropped to match the feedstock.
# tests:
#    # Compiled recipe (per-Python builds bundling a native lib) — not
#    # noarch:python — so the import test uses the plain compiled-test form,
#    # not the CFEP-25 [python_min, "*"] cross-version matrix.
