# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "45.0.0"

package:
  name: wasmtime-py
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wasmtime/wasmtime-${{ version }}.tar.gz
  sha256: 2ad4bf7ca286ceea35c1e420d10b368d7f83faf9a5ffde87b4ee334a9b7f55f3

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - pip
    - setuptools
    - setuptools-git-versioning >=2.0,<3
    - wheel
  run:
    - python

tests:
  - python:
      imports:
        - wasmtime
      pip_check: true

about:
  homepage: https://github.com/bytecodealliance/wasmtime-py
  summary: A WebAssembly runtime powered by Wasmtime
  description: |
    Python embedding of Wasmtime, a fast and secure runtime for WebAssembly.
    Wasmtime is a standalone runtime for WebAssembly, using Cranelift as its
    code generator. It runs WebAssembly code outside of the web browser and
    can be used both as a command-line utility or as an embedded runtime.
  license: Apache-2.0 WITH LLVM-exception
  license_file: LICENSE
  documentation: https://docs.wasmtime.dev/lang-python.html
  repository: https://github.com/bytecodealliance/wasmtime-py

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: wasmtime-py
  cfe-upstream-registry: pypi
  cfe-upstream-name: wasmtime
  cfe-purls:
    - pkg:conda/wasmtime-py@${{ version }}
    - pkg:pypi/wasmtime@${{ version }}
  cfe-upstream-repo: https://github.com/bytecodealliance/wasmtime-py
  cfe-upstream-homepage: https://github.com/bytecodealliance/wasmtime-py
  cfe-import-names: [wasmtime]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/wasmtime-py-feedstock
  cfe-forge-recipe-updates-needed: meta-yaml-to-recipe-yaml
  cfe-forge-blocker-list: []
