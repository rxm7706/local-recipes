# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.10"
  python_min: "3.11"

package:
  name: cocoindex
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/cocoindex/cocoindex-${{ version }}.tar.gz
  sha256: d2d04f6fc7f3894c3f5b92ff03ae3d6bd410aeb893048ba633c5b5eee9e14f3d

build:
  number: 2
  script:
    env:
      # PEP 540 UTF-8 mode — forces Python to use UTF-8 for all I/O
      # regardless of Windows codepage. Without this the win Azure leg
      # fails inside `pip install` with
      # `Error reading output: ... stream did not contain valid UTF-8`
      # because rattler-build captures pip's stdout and tries to UTF-8
      # decode it; Windows console codepage (cp1252) breaks the decode
      # when cargo/maturin/pip emit non-ASCII characters (license names,
      # package descriptions, paths with accents).
      PYTHONUTF8: "1"
      # Per conda-forge.org/docs/maintainer/example_recipes/rust/ — STRIP +
      # fat LTO are the recommended defaults for Rust builds. The abi3
      # matrix collapse below (skip + version_independent on is_abi3) means
      # we pay this LTO cost ONCE per platform, not once per Python version,
      # which keeps the Windows Azure leg inside the 6h timeout.
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then: |
          export CFLAGS="${CFLAGS:-} -D_BSD_SOURCE -D_DEFAULT_SOURCE"
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
        else: |
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  # abi3 matrix collapse — rustworkx-feedstock pattern (chosen over the
  # `is_abi3 and not is_python_min` form used by tree-sitter feedstocks
  # because conda-smithy mis-aligns the zip-keyed is_python_min flag when
  # python_min is overridden upward from the pinning's default 3.10).
  # Cargo.toml declares pyo3 abi3-py311 so a single CPython-stable-ABI wheel
  # works across Python ≥3.11. Build once at python_min, ship one artifact
  # per platform.
  skip: not (match(python, python_min ~ ".*") and is_abi3)
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.10.0,<2.0
  host:
    - python
    - pip
    - maturin >=1.10.0,<2.0
    - if: is_abi3
      then: python-abi3
  run:
    - python
    - typing_extensions >=4.12
    - click >=8.1.8
    - rich >=14.0.0
    - python-dotenv >=1.1.0
    - watchdog >=6.0.0
    - numpy >=1.23.2
    - psutil >=7.2.1
    - msgspec >=0.19.0

tests:
  - python:
      imports:
        - cocoindex
      pip_check: true
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: not win
    then:
      - script:
          - cocoindex --help
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/cocoindex/_internal/core.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%\cocoindex\_internal\core.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://cocoindex.io/
  repository: https://github.com/cocoindex-io/cocoindex
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Incremental indexing engine for AI agents — keeps derived indexes fresh from source updates with minimal recomputation.

extra:
  recipe-maintainers:
    - rxm7706
