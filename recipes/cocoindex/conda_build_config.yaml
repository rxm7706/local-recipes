# cocoindex requires Python ≥3.11 (pyproject.toml: requires-python = ">=3.11"
# + Cargo.toml: pyo3 abi3-py311). Override conda-forge-pinning's default
# python_min of 3.10 so the abi3 matrix-collapse skip rule
# `not (match(python, python_min ~ ".*") and is_abi3)` filters variants
# against the elevated floor (3.11) instead of the pinning default.
python_min:
  - "3.11"
