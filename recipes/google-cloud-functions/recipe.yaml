# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.23.0"

package:
  name: google-cloud-functions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-cloud-functions/google_cloud_functions-${{ version }}.tar.gz
  sha256: 09ab9d9f6dd231b0ca91800be54c366aadd06900de890f2689f8f303684f9639

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    - grpcio >=1.33.2,<2.0.0
    - proto-plus >=1.22.3,<2.0.0
    - protobuf >=4.25.8,<8.0.0
    - grpc-google-iam-v1 >=0.14.0,<1.0.0

tests:
  - python:
      imports:
        - google.cloud.functions_v1
        - google.cloud.functions_v2
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Google Cloud Functions API client library
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-functions
  documentation: https://cloud.google.com/functions/docs

extra:
  recipe-maintainers:
    - rxm7706

