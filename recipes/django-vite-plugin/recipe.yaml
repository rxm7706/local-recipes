# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.1.2"

package:
  name: django-vite-plugin
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-vite-plugin/django_vite_plugin-${{ version }}.tar.gz
  sha256: 90dd9de1c89eebadb4db49226ee8ce6c3b962ded0bb9991ef957e55af71c289f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - django_vite_plugin
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Vite build tools integration for django
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/protibimbok/django-vite-plugin
  repository: https://github.com/protibimbok/django-vite-plugin
  description: |
    Vite build tools integration for Django. Provides template tags and
    management commands to integrate the Vite frontend build tool with
    Django projects.

extra:
  recipe-maintainers:
    - rxm7706

