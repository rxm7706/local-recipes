{% set name = "django-vite-plugin" %}
{% set version = "4.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/django_vite_plugin-{{ version }}.tar.gz
  sha256: 90dd9de1c89eebadb4db49226ee8ce6c3b962ded0bb9991ef957e55af71c289f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - django_vite_plugin
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Vite build tools integration for django
  home: https://github.com/protibimbok/django-vite-plugin
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
