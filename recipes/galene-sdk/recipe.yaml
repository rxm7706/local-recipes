# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: not published to PyPI. Library is otherwise a clean Python SDK
# candidate (small dep tree, clean pyproject.toml, all runtime deps on
# conda-forge). Pinned to GitHub HEAD commit since no release tag exists.
# When upstream publishes to PyPI, this recipe becomes a 1-line update +
# Tier-A submission.

context:
  version: "0.1.0"
  commit: "6f4ad2c987eb7748e5a23ad3fd1b6b0b771fe20c"
  python_min: "3.12"  # upstream pyproject.toml requires-python = ">=3.12"

package:
  name: galene-sdk
  version: ${{ version }}

source:
  url: https://github.com/suitenumerique/gallene-sdk/archive/${{ commit }}.tar.gz
  sha256: 6d5297bbb92c9fbff2e427c38aaa4ecf0ea15268c24458e0c6baca5b77dc7580

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - pyjwt >=2.12.1
    - httpx >=0.27.0
    - pydantic >=2.7.0
    - websockets >=16.0
    - aiortc >=1.14.0

tests:
  - python:
      imports:
        - galene.api
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/suitenumerique/gallene-sdk
  repository: https://github.com/suitenumerique/gallene-sdk
  summary: Python SDK for Galène (SFU) integration in La Suite numérique
  description: |
    galene-sdk provides a Python client for the Galène SFU (selective
    forwarding unit) used by La Suite numérique frontend integrations. Built
    on aiortc for WebRTC plumbing. Repo name is "gallene-sdk" but the
    distribution and import name use the canonical "galene_sdk" spelling.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
