# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: collate-data-diff
  version: "0.11.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/collate_data_diff-${{ version }}.tar.gz
  sha256: f13879e644edf4caaa51a0483cb51ab4290a2dfff9a3f4ae10492dc9e72a46b5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - data-diff = data_diff.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - pydantic >=1.10.12  #,<2.0.0
    - dsnparse <0.2.0
    - click >=8.1
    - rich
    - toml >=0.10.2
    - mysql-connector-python >=9.1
    - dbt-core >=1.0.0,<2.0.0
    - deepdiff >=8.6.1,<9.0
    - keyring
    - tabulate >=0.9.0
    - urllib3 <2
    - typing_extensions >=4.0.1
    - attrs >=23.1.0
    - mashumaro >=2.9,<3.11.0
  run_constraints:
    - psycopg2 *
    - snowflake-connector-python >=3.15.0,<4.0.0
    - cryptography *
    - trino-python-client >=0.314.0
    - presto-python-client *
    - clickhouse-driver *
    - python-duckdb *
    - preql >=0.2.19
    - vertica-python *
    - oracledb *
    - pyodbc >=4.0.39

tests:
  - python:
      imports:
        - data_diff
      pip_check: true
      python_version: ${{ python_min }}.*
#  - requirements:
#      run:
#        - python ${{ python_min }}.*
#    script:
#      - data-diff --help

about:
  homepage: https://pypi.org/project/collate-data-diff/
  license: MIT
  license_file: LICENSE
  summary: Command-line tool and Python library to efficiently diff rows across two different databases.
  repository: https://github.com/datafold/data-diff
  documentation: https://docs.datafold.com
  description: |
    collate-data-diff compares rows across two different databases efficiently,
    as both a command-line tool and a Python library. It supports cross-database
    diffing for engines such as PostgreSQL, MySQL, Snowflake, BigQuery, Redshift,
    Presto/Trino, Oracle, and DuckDB, and integrates with dbt.

    This is Collate's (OpenMetadata) maintained fork of the now-archived
    datafold/data-diff project; the published distribution declares
    github.com/datafold/data-diff as its repository of record.

extra:
  recipe-maintainers:
    - rxm7706

