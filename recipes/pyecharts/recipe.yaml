# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.1.0"

package:
  name: pyecharts
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyecharts/pyecharts-${{ version }}.tar.gz
  sha256: 077f8205390aea705b8cc0be9d0c09916a2c060e9e5c8d9c9d11b7d8f4bdc1da

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - jinja2 >=2.11.3
    - prettytable
    - simplejson

tests:
  - python:
      imports:
        - pyecharts
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python options, make charting easier
  license: MIT
  license_file: LICENSE
  homepage: https://pyecharts.org/
  repository: https://github.com/pyecharts/pyecharts
  documentation: https://pyecharts.org/#/en-us/
  description: |
    Apache Echarts is easy-to-use, highly interactive and highly performant
    javascript visualization library under Apache license. Since its first
    public release in 2013, it now dominates over 74% of Chinese web
    front-end market. Yet Python is an expressive language and is loved by
    data science community. Combining the strength of both technologies,
    pyecharts is born.

extra:
  recipe-maintainers:
    - rxm7706

