# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.2"

package:
  name: sketch
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sketch/sketch-${{ version }}.tar.gz
  sha256: 45bfd2d41ad4939a0c8ad8ad86cef00ea1709a5e3c4c32e2ed20d255c0a09b9f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=45
    - wheel
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}
    - pandas >=1.3.0
    - datasketch >=1.5.8
    - datasketches >=4.0.0
    - ipython
    - lambdaprompt >=0.6.1
    - packaging

tests:
  - python:
      imports:
        - sketch
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Compute, store and operate on data sketches
  description: |
    Sketch is an AI code-writing assistant for pandas users that
    understands the context of your data, greatly improving the
    relevance of suggestions. Sketch is usable in seconds and doesn't
    require adding a plugin to your IDE.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/approximatelabs/sketch
  repository: https://github.com/approximatelabs/sketch

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: sketch
  cfe-upstream-registry: pypi
  cfe-upstream-name: sketch
  cfe-purls:
    - pkg:conda/sketch@${{ version }}
    - pkg:pypi/sketch@${{ version }}
  cfe-upstream-repo: https://github.com/approximatelabs/sketch
  cfe-upstream-homepage: https://github.com/approximatelabs/sketch
  cfe-import-names: [sketch]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/sketch-feedstock
  cfe-forge-recipe-updates-needed:
