# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: suitenumerique/find is a deployed Django web application, not
# a library. `pip install` ships the importable backend module
# (find); running the service additionally requires Postgres,
# Redis/Celery, OIDC provider, S3-compatible storage, SMTP, and frontend
# build artifacts that this recipe does not install. conda-forge declines
# web-application recipes as a matter of policy.
#
# Pinned to commit abb01c2c0883 on suitenumerique/find (no PyPI release).
# Build context: src/backend/ subdirectory (this recipe pip-installs from
# there).
#

context:
  version: "0.0.1"
  commit: "abb01c2c0883e7a026624a54856a968a91bfed3b"
  python_min: "3.12"

package:
  name: suite-find
  version: ${{ version }}

source:
  - url: https://github.com/suitenumerique/find/archive/${{ commit }}.tar.gz
    sha256: 580d822e7ad40b29ded3159152eb9d04de83d7fbcc6a82ca980a2e78617e9600
  # Org-level MIT LICENSE fallback for apps whose repo ships none directly.
build:
  number: 0
  noarch: python
  script:
    - cd src/backend && ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - celery
    - django-configurations
    - django-cors-headers
    - django-lasuite
    - django-redis
    - django
    - djangorestframework
    - dockerflow
    - drf-spectacular
    - gunicorn
    - mozilla-django-oidc
    - opensearch-py
    - psycopg
    - py3langid
    - pydantic
    - pyjwt
    - redis-py
    - requests
    - sentry-sdk
    - whitenoise

# CFEP-25-justified: Django web-app backend — `import <module>` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE, and the test env
# can't resolve the full transitive Django-plugin chain. site_packages
# presence is the testable invariant.
tests:
  - package_contents:
      site_packages:
        - find

about:
  homepage: https://github.com/suitenumerique/find
  repository: https://github.com/suitenumerique/find
  summary: La Suite numérique find backend (Django web application — local-only)
  description: |
    suitenumerique/find backend. Distribution name "find".
    This is a Django web service, not a library — installing this conda
    package gives you the importable backend code; running the service
    requires additional infrastructure (Postgres + Redis + Celery + OIDC +
    S3 + SMTP + frontend).
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
