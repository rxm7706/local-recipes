# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.4"

package:
  name: datasette-search-all
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/datasette-search-all/datasette_search_all-${{ version }}.tar.gz
  sha256: 371de80eff4f2f0e5ba70cc8efcdd68c1089ebf03d743febced250012d678911

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - datasette >=0.63.1

tests:
  - python:
      imports:
        - datasette_search_all
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Datasette plugin for searching all searchable tables at once
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/simonw/datasette-search-all
  repository: https://github.com/simonw/datasette-search-all
  description: |
    Datasette plugin that adds a search interface for querying all
    searchable (full-text-indexed) tables across a Datasette instance
    from a single search box.

extra:
  recipe-maintainers:
    - rxm7706

