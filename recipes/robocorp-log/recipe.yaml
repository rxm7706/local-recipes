# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.1.2"

package:
  name: robocorp-log
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/robocorp-log/robocorp_log-${{ version }}.tar.gz
  sha256: 57df58ab49c51dbdcfa1291f46bb2d02bfd4b9a5f5c8149eac4eca2ff4a845b7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<4.0.0
    - tomli >=2.0.1,<3.0.0
    - psutil >=5.0,<8.0

tests:
  - python:
      imports:
        - robocorp.log
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Automatic trace logging for Python
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/robocorp/robocorp/
  repository: https://github.com/robocorp/robocorp/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
