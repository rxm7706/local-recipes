{% set name = "wagtail-footnotes" %}
{% set version = "0.15.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/wagtail_footnotes-{{ version }}.tar.gz
  sha256: be37c78598d3a40f6f2b5a6b291c2733e41441d9fceb24f1c5ddf1f481a7847e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2,<4
    - pip
  run:
    - python >={{ python_min }}
    - wagtail >=6.3
    - django >=4.2

test:
  imports:
    - wagtail_footnotes
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Add footnotes to rich text in your Wagtail pages
  home: https://github.com/torchbox/wagtail-footnotes
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
