# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.32.0"

package:
  name: azure-ai-ml
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/azure-ai-ml/azure_ai_ml-${{ version }}.tar.gz
  sha256: edb90219520412132fac100a31a40264a2145150dc4a60fb884acdacc8ded7d5

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pyyaml >=5.1.0,<7.0.0
    - azure-core >=1.23.0
    - azure-mgmt-core >=1.3.0
    - marshmallow >=3.5,<4.0.0
    - jsonschema >=4.0.0,<5.0.0
    - tqdm <5.0.0
    - strictyaml <2.0.0
    - colorama <1.0.0
    - pyjwt <3.0.0
    - azure-storage-blob >=12.10.0
    - azure-storage-file-share
    - azure-storage-file-datalake >=12.2.0
    - pydash >=6.0.0,<9.0.0
    - isodate <1.0.0
    - azure-common >=1.1
    - typing_extensions <5.0.0
    - azure-monitor-opentelemetry

tests:
  - python:
      imports:
        - azure.ai.ml
        - azure.ai.ml._arm_deployments
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file:
    - NOTICE.txt
    - LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python
  repository: https://github.com/Azure/azure-sdk-for-python
  documentation: https://github.com/Azure/azure-sdk-for-python/blob/main/README.md
  summary: Microsoft Azure Machine Learning Client Library for Python
  description: |
    Microsoft Azure Machine Learning Client Library for Python.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: azure-ai-ml
  cfe-upstream-registry: pypi
  cfe-upstream-name: azure-ai-ml
  cfe-purls:
    - pkg:conda/azure-ai-ml@${{ version }}
    - pkg:pypi/azure-ai-ml@${{ version }}
  cfe-upstream-repo: https://github.com/Azure/azure-sdk-for-python
  cfe-upstream-homepage: https://github.com/Azure/azure-sdk-for-python
  cfe-import-names: [azure.ai.ml]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/azure-ai-ml-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
