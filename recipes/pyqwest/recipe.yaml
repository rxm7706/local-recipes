# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.2"

package:
  name: pyqwest
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyqwest/pyqwest-${{ version }}.tar.gz
  sha256: 17c41121b9dc400133aae282ce8b00bc8d59e75e095b18ca1d9fb5bd1a3ee33a

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      PYTHONUTF8: "1"
    content:
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - maturin >=1.12,<2.0
  host:
    - python
    - pip
    - maturin >=1.12,<2.0
  run:
    - python
    - opentelemetry-api >=1.39.1

tests:
  - python:
      imports:
        - pyqwest
      pip_check: true

about:
  summary: A modern, high-performance HTTP client for Python and Rust.
  description: |
    pyqwest is a modern, high-performance HTTP client for Python and Rust.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/curioswitch/pyqwest
  repository: https://github.com/curioswitch/pyqwest
  documentation: https://github.com/curioswitch/pyqwest

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: pyqwest
  cfe-upstream-registry: pypi
  cfe-upstream-name: pyqwest
  cfe-purls:
    - pkg:conda/pyqwest@${{ version }}
    - pkg:pypi/pyqwest@${{ version }}
  cfe-upstream-repo: https://github.com/curioswitch/pyqwest
  cfe-upstream-homepage: https://github.com/curioswitch/pyqwest
  cfe-import-names: [pyqwest]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: "true"
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list:
