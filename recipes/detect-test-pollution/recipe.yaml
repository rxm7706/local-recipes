# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.2.0"

package:
  name: detect-test-pollution
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/detect-test-pollution/detect_test_pollution-${{ version }}.tar.gz
  sha256: 94f383759bbab309771ceedb8dd526a62fa59607e5f7e41f5b33bbc656bfcea9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - detect-test-pollution = detect_test_pollution:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pytest

tests:
  - python:
      imports:
        - detect_test_pollution
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - detect-test-pollution --help

about:
  summary: a tool to detect test pollution
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/asottile/detect-test-pollution
  repository: https://github.com/asottile/detect-test-pollution

extra:
  recipe-maintainers:
    - rxm7706

