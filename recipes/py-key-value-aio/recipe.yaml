# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.5"

package:
  name: py-key-value-aio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/py-key-value-aio/py_key_value_aio-${{ version }}.tar.gz
  sha256: c6563a2c6abe5da5e20f4f9e875c2a9b425a2244a54fadbf46cf140a9eea45d7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.8.2,<0.9.0
    - pip
  run:
    - python >=${{ python_min }},<4
    - beartype >=0.20.0
    - typing-extensions >=4.15.0
  run_constraints:
    - cachetools >=5.0.0
    - diskcache >=5.0.0
    - pathvalidate >=3.3.1
    - redis-py >=4.3.0
    - pymongo >=4.0.0
    - valkey-glide >=2.1.0
    - hvac >=2.3.0
    - types-hvac >=2.3.0
    - aiomcache >=0.8.0
    - elasticsearch >=8.0.0
    - aiohttp >=3.12
    - aioboto3 >=13.3.0
    - types-aiobotocore-dynamodb >=2.16.0
    - keyring >=25.6.0
    - dbus-python >=1.4.0
    - pydantic >=2.11.9
    - rocksdict >=0.3.2
    - cryptography >=45.0.0

tests:
  - python:
      imports:
        - key_value
        - key_value.shared
        - key_value.aio
        - key_value.aio.stores.base
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - python -c "from importlib.metadata import version; v = version('py-key-value-aio'); print(v); assert v == '${{ version }}'"
      - pip check

about:
  homepage: https://github.com/strawgate/py-key-value
  repository: https://github.com/strawgate/py-key-value/tree/main/key-value/key-value-aio
  documentation: https://github.com/strawgate/py-key-value/blob/main/README.md
  license: Apache-2.0
  license_file: LICENSE
  summary: Async Key-Value, A pluggable interface for KV Stores

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: py-key-value-aio
  cfe-upstream-registry: pypi
  cfe-upstream-name: py-key-value-aio
  cfe-purls:
    - pkg:conda/py-key-value-aio@${{ version }}
    - pkg:pypi/py-key-value-aio@${{ version }}
  cfe-upstream-repo: https://github.com/strawgate/py-key-value
  cfe-upstream-homepage: https://pypi.org/project/py-key-value-aio/
  cfe-import-names: [key_value, key_value.shared, key_value.aio, key_value.aio.stores.base]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/py-key-value-feedstock
  cfe-forge-recipe-updates-needed: none
