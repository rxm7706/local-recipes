# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.23"

package:
  name: django-soft-delete
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-soft-delete/django_soft_delete-${{ version }}.tar.gz
  sha256: 814659f0d19d4f2afc58b31ff73f88f0af66715ccef3b4fcd8f6b3a011d59b2a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.24.0
    - pip
  run:
    - python >=${{ python_min }}
    - django

tests:
  - python:
      imports:
        - django_softdelete
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/san4ezy/django_softdelete
  repository: https://github.com/san4ezy/django_softdelete
  summary: Soft delete models, managers, queryset for Django

extra:
  recipe-maintainers:
    - rxm7706

