# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.2.14"

package:
  name: django-data-browser
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-data-browser/django_data_browser-${{ version }}.tar.gz
  sha256: 3bdb85b6d453da0d7b8880ec531bd9c26f6bdb90002e37bede677f29488acb55

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - hyperlink
    - python-dateutil
    - sqlparse

tests:
  - python:
      imports:
        - data_browser
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Interactive user-friendly database explorer.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/tolomea/django-data-browser
  repository: https://github.com/tolomea/django-data-browser

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
