    - pkg:pypi/gita@${{ version }}
  cfe-upstream-repo: https://github.com/nosarthur/gita
  cfe-upstream-homepage: https://github.com/nosarthur/gita
  cfe-import-names: [gita]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
