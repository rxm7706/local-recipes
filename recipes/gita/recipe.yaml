# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.16.8.2"

package:
  name: gita
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gita/gita-${{ version }}.tar.gz
  sha256: 064e5cbcfa5df76409cfd8e70142f8153f6ecc40fb35d3a28a0a04054d5fb3fd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - argcomplete
    - packaging

tests:
  - python:
      imports:
        - gita
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - gita --help

about:
  summary: Manage multiple git repos with sanity
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/nosarthur/gita
  repository: https://github.com/nosarthur/gita
  description: |
    gita is a command-line tool to manage multiple git repositories side by
    side. It displays the status of each repo, runs delegated git/shell
    commands across groups of repos, and provides shell auto-completion.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: gita
  cfe-upstream-registry: pypi
  cfe-upstream-name: gita
  cfe-purls:
