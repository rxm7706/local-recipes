# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.0"

package:
  name: okta-jwt-verifier
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/okta-jwt-verifier/okta_jwt_verifier-${{ version }}.tar.gz
  sha256: 4fe6e4f4ffff6c03b6b63a7709b879bdaf57025ae1dcc06ea2f32dd4a07963df

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }}
    - pyjwt >=2.8.0,<3.0.0
    - acachecontrol >=0.3.6,<0.4.0
    - retry
    - requests

tests:
  - python:
      imports:
        - okta_jwt_verifier
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - python -c "assert __import__('okta_jwt_verifier').__version__ == '${{ version }}'"
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  summary: A Python library for OKTA JWT tokens validation
  license: Apache-2.0
  license_file: LICENSE.md
  homepage: https://github.com/okta/okta-jwt-verifier-python
  repository: https://github.com/okta/okta-jwt-verifier-python
  description: |
    Okta JWT Verifier for Python — verifies Okta-issued JWT access and ID
    tokens locally (signature, claims, and expiry) without a network
    round-trip per request.

extra:
  recipe-maintainers:
    - rxm7706

