# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.3"

package:
  name: kedro-pandera
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/k/kedro-pandera/kedro_pandera-${{ version }}.tar.gz
  sha256: d42168b74bfecc6ab551438e794b613ca6304342bfa772a78619d7d8baae3f5b

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools-scm
    - setuptools
    - pip
  run:
    - python >=${{ python_min }},<3.12
    - pandera >=0.15
    - kedro >=0.19.0,<0.20
    - pyyaml >=5.1
    - black
    - frictionless <=4.40.8

tests:
  - python:
      imports:
        - kedro_pandera
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/Galileo-Galilei/kedro-pandera
  summary: A kedro plugin to use pandera in your kedro projects
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/Galileo-Galilei/kedro-pandera

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: kedro-pandera
  cfe-upstream-registry: pypi
  cfe-upstream-name: kedro-pandera
  cfe-purls:
    - pkg:conda/kedro-pandera@${{ version }}
    - pkg:pypi/kedro-pandera@${{ version }}
  cfe-upstream-repo: https://github.com/Galileo-Galilei/kedro-pandera
  cfe-upstream-homepage: https://github.com/Galileo-Galilei/kedro-pandera
  cfe-import-names: [kedro_pandera]
