# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: suitenumerique/dictaphone is a deployed Django web application, not
# a library. `pip install` ships the importable backend module
# (dictaphone); running the service additionally requires Postgres,
# Redis/Celery, OIDC provider, S3-compatible storage, SMTP, and frontend
# build artifacts that this recipe does not install. conda-forge declines
# web-application recipes as a matter of policy.
#
# Pinned to commit 8ab4ab75e342 on suitenumerique/dictaphone (no PyPI release).
# Build context: src/backend/ subdirectory (this recipe pip-installs from
# there).
#

context:
  version: "0.7.1"
  commit: "8ab4ab75e342e6e7cad60bac173d372f1c70687f"
  python_min: "3.14"

package:
  name: suite-dictaphone
  version: ${{ version }}

source:
  - url: https://github.com/suitenumerique/dictaphone/archive/${{ commit }}.tar.gz
    sha256: 45c973ef5f81d63040f67794c1e619e03bc58a588cec9d7329404fa7798cf00e
  # Org-level MIT LICENSE fallback for apps whose repo ships none directly.
build:
  number: 0
  noarch: python
  script:
    - cd src/backend && ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - boto3
    - brotli
    - celery
    - dj-database-url
    - django-configurations
    - django-cors-headers
    - django-countries
    - django-filter
    - django-lasuite
    - django-parler
    - redis-py
    - django-redis
    - django-storages
    - django-timezone-field
    - django-pydantic-field
    - django
    - djangorestframework
    - drf-spectacular
    - dockerflow
    - gunicorn
    - jsonschema
    - nested-multipart-parser
    - psycopg
    - pydantic
    - python-frontmatter
    - python-magic
    - requests
    - sentry-sdk
    - whitenoise
    - mozilla-django-oidc
    - aiohttp
    - posthog
    - djangorestframework-simplejwt

# CFEP-25-justified: Django web-app backend — `import <module>` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE, and the test env
# can't resolve the full transitive Django-plugin chain. site_packages
# presence is the testable invariant.
tests:
  - package_contents:
      site_packages:
        - dictaphone

about:
  homepage: https://github.com/suitenumerique/dictaphone
  repository: https://github.com/suitenumerique/dictaphone
  summary: La Suite numérique dictaphone backend (Django web application — local-only)
  description: |
    suitenumerique/dictaphone backend. Distribution name "dictaphone".
    This is a Django web service, not a library — installing this conda
    package gives you the importable backend code; running the service
    requires additional infrastructure (Postgres + Redis + Celery + OIDC +
    S3 + SMTP + frontend).
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - rxm7706
