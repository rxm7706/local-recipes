# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.1.1"

package:
  name: djangocms-link
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/djangocms-link/djangocms_link-${{ version }}.tar.gz
  sha256: 16c3026e795260e54c6305eb5cf0f1302fe3b1840ff4929d7e8336a455640519

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}
    - django-cms >=3.7,!=4.1,!=4.1.1,!=4.1.2
    - djangocms-attributes-field >=1

tests:
  - python:
      imports:
        - djangocms_link
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Adds a link plugin to django CMS
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/django-cms/djangocms-link
  repository: https://github.com/django-cms/djangocms-link

extra:
  recipe-maintainers:
    - rxm7706

