# source:
#    # GitHub tag archive (G54 source preference): PyPI ships a wheel only (no
#    # sdist), but the source IS on GitHub (base62.py + setup.py at the tag), so
#    # conda-forge prefers building from source over repackaging the wheel.
#    # setup.py sets version=base62.__version__ (read from base62.py — no G39).
# about:
