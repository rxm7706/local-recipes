# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.19"

package:
  name: ag-ui-protocol
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ag-ui-protocol/ag_ui_protocol-${{ version }}.tar.gz
  sha256: 43c27f60d41712dcad0e9e0a203cbdf1c8e248b22417374c5c68321c448af4ea

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.8.0,<0.9
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic >=2.11.2

tests:
  - python:
      imports:
        - ag_ui.core
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ag-ui-protocol/ag-ui
  summary: 'AG-UI: the Agent-User Interaction Protocol. Bring Agents into Frontend Applications.'
  description: |
    AG-UI: the Agent-User Interaction Protocol. Bring Agents into Frontend
    Applications.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
