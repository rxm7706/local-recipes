    - pkg:pypi/propelauth-py@${{ version }}
  cfe-upstream-repo: https://github.com/propelauth/propelauth-py
  cfe-upstream-homepage: https://github.com/propelauth/propelauth-py
  cfe-import-names: [propelauth_py]
  cfe-source-kind: pypi-sdist
