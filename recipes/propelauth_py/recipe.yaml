# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.3.2"

package:
  name: propelauth_py
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/propelauth-py/propelauth_py-${{ version }}.tar.gz
  sha256: e9542011605ecad06a2ef15b84cf9ed1f6d6c50c48b6c5bf53a92e95717a0580

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pyjwt >=2,<3
    - cryptography >=3.4.0
    - requests
    - httpx >=0.28.1

tests:
  - python:
      imports:
        - propelauth_py
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A python authentication library
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/propelauth/propelauth-py
  repository: https://github.com/propelauth/propelauth-py

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
