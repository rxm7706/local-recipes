# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.26.0"

package:
  name: smolagents
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/smolagents/smolagents-${{ version }}.tar.gz
  sha256: 4ec92313265f9cfbcabfc88e192b4bc4505f8475dc5f33dc872062fc567037bd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - huggingface_hub >=0.31.2
    - requests >=2.32.3
    - rich >=13.9.4
    - jinja2 >=3.1.4
    - pillow >=10.0.1
    - python-dotenv

tests:
  - python:
      imports:
        - smolagents
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/smolagents/
  license: Apache-2.0
  license_file: LICENSE
  summary: "smolagents: a barebones library for agents. Agents write python code to call tools or orchestrate other agents."
  repository: https://github.com/huggingface/smolagents
  documentation: https://huggingface.co/docs/smolagents
  description: |
    smolagents is a barebones library for agents that think in code. Agents
    write their actions as Python code snippets that call tools and orchestrate
    other agents, rather than emitting structured JSON tool calls. The core
    library is minimal and model-agnostic, and supports any LLM backend through
    Hugging Face Hub inference, local transformers models, and a range of
    optional integrations. This recipe ships only the core dependencies; the
    optional toolkit, browser, sandbox, and provider integrations are extras
    that are not pulled in here.

extra:
  recipe-maintainers:
    - rxm7706

