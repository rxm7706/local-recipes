# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6"

package:
  name: django-online-issues
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-online-issues/django_online_issues-${{ version }}.tar.gz
  sha256: 7fe5c184f1aeca97d37cd86aa0801d35abe46522db8c4ce20153fd2b1fd6421b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatch-vcs >=0.4
    - hatchling >=1.25
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4
    - django-stubs-ext
    - markdown >=3.8.2
    - requests >=2.32.5

tests:
  - python:
      imports:
        - issues
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/saxix/django-issues
  repository: https://github.com/saxix/django-issues
  documentation: https://github.com/saxix/django-issues
  summary: A reusable Django app for collecting and reporting user-submitted issues (tickets). It provides a view and a form to submit tickets and forwards them to configurable backends like GitLab, GitHub, email, or simply the development console.

extra:
  recipe-maintainers:
    - rxm7706

