# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.2"

package:
  name: gekko
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gekko/gekko-${{ version }}.tar.gz
  sha256: a399cd9f896c864adbdfbb9dd052f957d106f454e0a711bd53db696c889ace7e

build:
  number: 0
  noarch: python
  script:
    - if: not win
      then: rm -rf gekko/bin
      else: rd /s /q "gekko\bin"
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy >=1.8

tests:
  - python:
      imports:
        - gekko
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Machine learning and optimization for dynamic systems
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/BYU-PRISM/GEKKO
  repository: https://github.com/BYU-PRISM/GEKKO

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
