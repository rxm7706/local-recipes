# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.2.0"

package:
  name: django-flags
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-flags/django_flags-${{ version }}.tar.gz
  sha256: a3aee5e0d11e24e35f5ae4a423d52cad721f639181c1b1251e0148d8530a3f81

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=63
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - jinja2
    - django-debug-toolbar

tests:
  - python:
      imports:
        - flags
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: CC0-1.0
  license_file: LICENSE
  homepage: https://cfpb.github.io/django-flags/
  repository: https://github.com/cfpb/django-flags
  summary: Feature flags for Django projects
  description: |
    Feature flags for Django projects.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
