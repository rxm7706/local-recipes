# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "6.0.3"
  python_min: "3.12"

package:
  name: django-mongodb-backend
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-mongodb-backend/django_mongodb_backend-${{ version }}.tar.gz
  sha256: d5bbe460c4f1d6366242993c8894d03752a789737ef9dcd09b496bb9135d360f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-requirements-txt >=0.4.1
    - pip
  run:
    - python >=${{ python_min }}
    - django >=6.0,<6.1
    - pymongo >=4.7,<5.0

tests:
  - python:
      imports:
        - django_mongodb_backend
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Django MongoDB Backend
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://www.mongodb.com/docs/languages/python/django-mongodb/current/
  repository: https://github.com/mongodb/django-mongodb-backend
  documentation: https://django-mongodb-backend.readthedocs.io
  description: |
    Django MongoDB Backend is a database backend that lets you use MongoDB
    as the data store for Django applications, providing a Django ORM
    interface backed by MongoDB collections.

extra:
  recipe-maintainers:
    - rxm7706

