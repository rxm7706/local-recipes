# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.9.0"

package:
  name: flake8-no-pep420
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flake8-no-pep420/flake8_no_pep420-${{ version }}.tar.gz
  sha256: 5dcd9e23bdd545cb957dd23987d9d227e733d1610717b0e13591262df1a33413

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - flake8 >=3,!=3.2

tests:
  - python:
      imports:
        - flake8_no_pep420
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A flake8 plugin to ban PEP-420 implicit namespace packages.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/adamchainz/flake8-no-pep420
  repository: https://github.com/adamchainz/flake8-no-pep420

extra:
  recipe-maintainers:
    - rxm7706

