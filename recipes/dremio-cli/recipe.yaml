# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.1.2"
  python_min: "3.11"

package:
  name: dremio-cli
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dremio-cli/dremio_cli-${{ version }}.tar.gz
  sha256: 44595ce1c28c7ea1a68528ff74c16bc35ceb2f71db100504d129e65b1fae2887

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - dremio = drs.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - typer >=0.9
    - httpx >=0.27
    - pyyaml >=6
    - pydantic >=2
    - rich >=13
    - prompt-toolkit >=3.0

tests:
  - python:
      imports:
        - drs.client
        - drs.auth
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - dremio --help

about:
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/dremio-cli/
  repository: https://github.com/dremio/cli
  documentation: https://docs.dremio.com/dremio-cloud/api/
  summary: A comprehensive command-line interface for Dremio Cloud.
  description: Dremio developer CLI, and AI agent skills — query, catalog, schema, reflections, jobs, and access for Dremio Cloud.

extra:
  recipe-maintainers:
    - rxm7706

