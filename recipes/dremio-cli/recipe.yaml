# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: dremio-cli
  version: 2.0.0
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dremio_cli-${{ version }}.tar.gz
  sha256: c78082a222ee1081a72c76a0900c8c4066bf79120e67a9c6f169731afffe2bce

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - dremio = drs.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - typer >=0.9
    - httpx >=0.27
    - pyyaml >=6
    - pydantic >=2

tests:
  - python:
      imports:
        - dremio_cli
      pip_check: true
      python_version:
        - ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - dremio --help

about:
  summary: A comprehensive command-line interface for Dremio Cloud and Dremio Software
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/your-org/dremio-cli

extra:
  recipe-maintainers:
    - rxm7706
