# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.9"

package:
  name: customersatisfactionmetrics
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/customersatisfactionmetrics/customersatisfactionmetrics-${{ version }}.tar.gz
  sha256: 3074b61bee2775b3221c5b0dbfc759a955e983e8c7c47e923d9843477bc3c66e

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=3.0

tests:
  - python:
      imports:
        - customersatisfactionmetrics
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: http://github.com/pescheckit/customersatisfactionmetrics
  repository: http://github.com/pescheckit/customersatisfactionmetrics
  summary: This Django package allows you to create and manage surveys including CSAT, NPS, CES, and Generic Surveys. It supports both anonymous and logged-in user responses with user metadata tracking.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
