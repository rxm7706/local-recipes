# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.5.3"

package:
  name: collate-sqlfluff
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/collate-sqlfluff/collate_sqlfluff-${{ version }}.tar.gz
  sha256: feed770a232250b66f77d34aa1c1471a09e4f77b78f1824aca6d2400a06ec9ca

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - sqlfluff = sqlfluff.cli.commands:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=40.8.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - platformdirs
    - chardet
    - click <=8.3.0
    - colorama >=0.3
    - diff-cover >=2.5.0
    - jinja2
    - pathspec
    - pytest
    - pyyaml >=5.1
    - regex
    - tblib
    - toml
    - tqdm

tests:
  - python:
      imports:
        - sqlfluff
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/sqlfluff/sqlfluff
  license: MIT
  license_file: LICENSE.md
  summary: The SQL Linter for Humans
  repository: https://github.com/sqlfluff/sqlfluff

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
