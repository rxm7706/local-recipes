# yaml-language-server: $schema=https://raw.githubusercontent.com/conda-forge/conda-smithy/main/conda_smithy/data/conda-forge.json
# conda-forge.yml — pre-seeds the feedstock
conda_build_tool: rattler-build
conda_install_tool: pixi
bot:
  automerge: true
  check_solvable: true
  inspection: hint-all
build_platform:
  linux_aarch64: linux_64
  osx_arm64: osx_64
provider:
  linux_aarch64: azure
  osx_arm64: azure
test: native_and_emulated

#### CFE metadata AND comments
# CFE comments
#    # Pre-seeds the feedstock (CFE skill default, G83): these keys are INERT in
#    # a staged-recipes PR (build_all.py reads only conda_build_tool) and are
