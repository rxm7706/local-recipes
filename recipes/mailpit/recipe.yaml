# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.30.3"

package:
  name: mailpit
  version: ${{ version }}

source:
  url: https://github.com/axllent/mailpit/archive/v${{ version }}.tar.gz
  sha256: 1e6a94e92b5e6ebbdaed7ec2dd280b7d200185697d723044c5a9fc239fcdb6d8

build:
  number: 1
  script:
    - if: unix
      then: build.sh
    - if: win
      then: build.bat

requirements:
  build:
    - ${{ compiler('go-cgo') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - go-licenses
    - nodejs >=18

tests:
  - script:
      - mailpit --help

about:
  summary: A small, fast, low memory, zero-dependency, multi-platform email testing tool & API for developers
  description: |
    Mailpit is an email testing tool for developers. It acts as an SMTP server,
    captures all sent emails, and displays them in a modern web interface.
    It also provides a REST API for integration testing.

    Key features:
    - Fast, lightweight, and low memory usage
    - Multi-platform support (Linux, macOS, Windows)
    - Modern web UI for viewing emails
    - REST API for automated testing
    - Support for SMTP relay
    - Message tagging and search
    - Real-time web UI updates
  license: MIT
  license_file:
    - LICENSE
    - library_licenses/
  homepage: https://github.com/axllent/mailpit
  repository: https://github.com/axllent/mailpit
  documentation: https://mailpit.axllent.org/docs/

extra:
  recipe-maintainers:
    - rxm7706

