# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.0"

package:
  name: behave-django
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/behave-django/behave_django-${{ version }}.tar.gz
  sha256: 194dfa3317ed47062d1e3da6c06060faadcf50ee985656e437f2e3b35854c807

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }}
    - behave >=1.3.3
    - django >=5.2
    - beautifulsoup4

tests:
  - python:
      imports:
        - behave_django
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  summary: Behave BDD integration for Django
  homepage: https://github.com/behave/behave-django
  repository: https://github.com/behave/behave-django
  documentation: https://behave-django.readthedocs.io/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: behave-django
  cfe-upstream-registry: pypi
  cfe-upstream-name: behave-django
