# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: xorq-datafusion
  version: "0.2.7"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace("-", "_") }}-${{ version }}.tar.gz
  sha256: be1dbdbef6ea513df1aae189fe5fa6e54a8e8556dc824a74a888473b4c1929cb

build:
  number: 0
  script:
    env:
      # Per conda-forge.org/docs/maintainer/example_recipes/rust/ — recommended
      # for any Rust build. maturin invokes cargo build and inherits these.
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      # Multi-line `then: |` so OPENSSL_DIR export persists into pip install
      # (per SKILL.md G1: separate `- ` list entries run in independent shells).
      - if: unix
        then: |
          export OPENSSL_DIR="$PREFIX"
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
        else: |
          set "OPENSSL_DIR=%LIBRARY_PREFIX%"
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          %PYTHON% -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: true

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - maturin >=1,<2

    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python
    - maturin >=1.7,<2.0
    - pip
  run:
    - python
    - pyarrow >=18.0.0,<22.0.0

tests:
  - python:
      imports:
        - xorq_datafusion
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: xorq Python DataFusion Bindings.
  homepage: https://github.com/xorq-labs/xorq-datafusion
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - rxm7706
