# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.26"
  python_min: "3.11"

package:
  name: flyteidl2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/py3/f/flyteidl2/flyteidl2-${{ version }}-py3-none-any.whl
  sha256: 7ac8c7e3fabaabb8dbf6db330c3895a97d960aba2edc48ea6b5efbcae56ed7b5
  file_name: flyteidl2-${{ version }}-py3-none-any.whl

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install flyteidl2-${{ version }}-py3-none-any.whl -vv --no-deps
    - ${{ PYTHON }} -c "import shutil, sysconfig, os; shutil.rmtree(os.path.join(sysconfig.get_paths()['purelib'], 'buf'), ignore_errors=True)"

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - googleapis-common-protos
    - protoc-gen-openapiv2
    - protobuf >=4.21.1
    - protovalidate >=1.0.0

tests:
  - python:
      imports:
        - flyteidl2
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: IDL for Flyte 2 — protobuf-generated Python stubs
  description: |
    flyteidl2 contains the Flyte 2 platform IDL: the protobuf message and
    gRPC service definitions and their generated Python stubs.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/flyteorg/flyte
  repository: https://github.com/flyteorg/flyte
  documentation: https://docs.flyte.org

extra:
  recipe-maintainers:
    - rxm7706

