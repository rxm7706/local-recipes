# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.25"

package:
  name: validate-pyproject
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/validate-pyproject/validate_pyproject-${{ version }}.tar.gz
  sha256: e68c12d1cb0d8ddc269ffc42875a81727ddb7865000aa6d2f77d833b55c53f0b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - validate-pyproject = validate_pyproject.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2.0
    - setuptools-scm >=7.1
    - pip
  run:
    - python >=${{ python_min }}
    - python-fastjsonschema >=2.16.2,<=3

tests:
  - python:
      imports:
        - validate_pyproject
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - validate-pyproject --help

about:
  summary: Validation library and CLI tool for checking on pyproject.toml files using JSON Schema
  license: BSD-3-Clause AND MIT AND MPL-2.0
  license_file:
    - NOTICE.txt
    - LICENSE.txt
    - src/validate_pyproject/pre_compile/NOTICE.template
    - tests/invalid-examples/pdm/LICENSE
    - tests/examples/flit/LICENSE
    - tests/examples/atoml/LICENSE
    - tests/examples/trampolim/LICENSE
    - tests/examples/pdm/LICENSE
  homepage: https://github.com/abravalheri/validate-pyproject
  repository: https://github.com/abravalheri/validate-pyproject
  documentation: https://validate-pyproject.readthedocs.io
  description: |
    validate-pyproject is a validation library and CLI tool for checking on
    pyproject.toml files using JSON Schema. It validates the standardized
    [build-system] and [project] tables, as well as the [tool.setuptools]
    table, and is extensible via plugins for other tool tables.

extra:
  recipe-maintainers:
    - rxm7706

