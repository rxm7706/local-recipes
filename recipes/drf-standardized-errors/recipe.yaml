# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.16.0"

package:
  name: drf-standardized-errors
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/drf-standardized-errors/drf_standardized_errors-${{ version }}.tar.gz
  sha256: 77b367955af7ed246db12d299a5a75a71eccef54dae4ef69ead29f5fb01be192

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - django >=3.2
    - djangorestframework >=3.12

tests:
  - python:
      imports:
        - drf_standardized_errors
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Standardize your API error responses.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ghazi-git/drf-standardized-errors
  repository: https://github.com/ghazi-git/drf-standardized-errors
  documentation: https://drf-standardized-errors.readthedocs.io/en/latest/
  description: |
    drf-standardized-errors transforms Django REST Framework error responses
    into a single, predictable, standardized format, with support for
    customizing error codes and generating OpenAPI schema for the error
    responses.

extra:
  recipe-maintainers:
    - rxm7706

