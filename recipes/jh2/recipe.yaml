# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.0.13"

package:
  name: jh2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jh2/jh2-${{ version }}.tar.gz
  sha256: f8c78cffb3a35c4410513c3eb7989de36028c84277c04f07c97909dd94c23a75

build:
  number: 0
  script:
    env:
      PYTHONUTF8: "1"
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler("rust") }}
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - maturin
    - cargo-bundle-licenses
  host:
    - python
    - maturin >=1.7,<2.0
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - jh2
      pip_check: true

about:
  summary: HTTP/2 State-Machine based protocol implementation
  license: MIT
  license_file:
    - LICENSE
    - tests/http2-frame-test-case/LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/jawah/h2

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: jh2
  cfe-upstream-registry: pypi
  cfe-upstream-name: jh2
  cfe-purls:
    - pkg:conda/jh2@${{ version }}
    - pkg:pypi/jh2@${{ version }}
  cfe-upstream-repo: https://github.com/jawah/h2
  cfe-upstream-homepage: https://github.com/jawah/h2
  cfe-import-names: [jh2]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/jh2-feedstock
  cfe-forge-recipe-updates-needed:
    - meta-yaml-to-recipe-yaml
    - dependency-fix
    - platform-expansion
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-21T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-21T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-21T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
