{% set name = "copilotkit" %}
{% set version = "1.55.3" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/CopilotKit/CopilotKit/archive/v{{ version }}.tar.gz
  sha256: d217270d2eaf2829a2b9d96150dda981a4a28829e9d8df1b569f3865fbd0e9b6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install sdk-python/ -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - langgraph >=0.3.25,<2.0
    - langchain >=0.3.0
    - ag-ui-langgraph >=0.0.29,<0.0.32
    - ag-ui-protocol >=0.1.11
    - fastapi >=0.115.0,<1.0.0
    - partialjson >=0.0.8,<0.0.9
    - toml >=0.10.2,<0.11.0

test:
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  license: MIT
  license_file:
    - LICENSE
  home: https://github.com/CopilotKit/CopilotKit
  summary: "CopilotKit is an open-source framework for building AI copilots that assist users in various tasks by leveraging large language models and other AI technologies."

extra:
  recipe-maintainers:
    - rxm7706
