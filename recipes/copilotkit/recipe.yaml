# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.57.2"

package:
  name: copilotkit
  version: ${{ version }}

source:
  url: https://github.com/CopilotKit/CopilotKit/archive/v${{ version }}.tar.gz
  sha256: e308fb515e9116d26b0d3beb40be25dae2cad569d9cafc619b76690aa2d26837

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install sdk-python/ -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - langgraph >=0.3.25,<2
    - langchain >=0.3.0
    - ag-ui-langgraph >=0.0.35
    - ag-ui-protocol >=0.1.15
    - fastapi >=0.115.0,<1.0.0
    - partialjson >=0.0.8,<0.0.9
    - toml >=0.10.2,<0.11.0
    - pydantic-core >=2.35.0

tests:
  - python:
      imports:
        - copilotkit
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/CopilotKit/CopilotKit
  repository: https://github.com/CopilotKit/CopilotKit
  summary: "CopilotKit is an open-source framework for building AI copilots that assist users in various tasks by leveraging large language models and other AI technologies."
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: copilotkit
  cfe-upstream-registry: github
  cfe-upstream-name: CopilotKit/CopilotKit
  cfe-purls:
    - pkg:conda/copilotkit@${{ version }}
    - pkg:pypi/copilotkit@0.1.88
    - pkg:github/copilotkit/copilotkit@${{ version }}
  cfe-upstream-repo: https://github.com/CopilotKit/CopilotKit
  cfe-upstream-homepage: https://github.com/CopilotKit/CopilotKit
  cfe-import-names: [copilotkit]
  cfe-source-kind: github-tag
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/copilotkit-feedstock
  cfe-forge-recipe-updates-needed:
    - meta-yaml-to-recipe-yaml
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-21T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-21T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-21T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
