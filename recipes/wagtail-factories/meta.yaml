{% set name = "wagtail-factories" %}
{% set version = "4.5.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/wagtail/wagtail-factories/archive/v{{ version }}.tar.gz
  sha256: 1676550835d2179e9085e09712bcc1c0bf42c33c8b9cfed5ab9537eda0ccc464

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - django
    - python >={{ python_min }}
    - factory_boy >=3.2,<4
    - wagtail >=7.0

test:
  source_files:
    - tests/
  imports:
    - tests
    - tests.testapp
  commands:
    - pip check
  requires:
    - pip
    - factory_boy >=3.2,<4
    - wagtail >=7.0
    - djangorestframework
    - django-taggit
    - python {{ python_min }}
    - pytest ==9.0.3
    - pytest-django ==4.12.0
    - pytest-cov ==7.1.0
    - coverage ==7.13.5
    - ruff ==0.15.12
    - tox ==4.32.0

about:
  home: https://github.com/wagtail/wagtail-factories/
  summary: Factory boy classes for wagtail
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
