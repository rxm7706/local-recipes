# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.18"

package:
  name: tabcmd
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tabcmd/tabcmd-${{ version }}.tar.gz
  sha256: 7ab1a7809dc25be7373ee56ae014eb3c6499d8bfccd04ca44a8668724bb494e1

build:
  number: 0
  noarch: python
  python:
    entry_points:
      - tabcmd = tabcmd.tabcmd:main
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - python-build
    - setuptools >=62
    - wheel
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }},<3.12
    - appdirs
    - doit
    - ftfy
    - pyinstaller-versionfile
    - pytest-order
    - requests >=2.25,<3.0
    - setuptools <81
    - setuptools-scm
    - types-appdirs
    - types-mock
    - types-requests
    - types-setuptools
    - tableauserverclient ==0.37
    - urllib3

tests:
  - python:
      imports:
        - tabcmd
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - tabcmd --help

about:
  summary: A command line client for working with Tableau Server.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tableau/tabcmd
  repository: https://github.com/tableau/tabcmd

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: tabcmd
  cfe-upstream-registry: pypi
  cfe-upstream-name: tabcmd
  cfe-purls:
    - pkg:conda/tabcmd@${{ version }}
    - pkg:pypi/tabcmd@${{ version }}
  cfe-upstream-repo: https://github.com/tableau/tabcmd
  cfe-upstream-homepage: https://github.com/tableau/tabcmd
  cfe-import-names: [tabcmd]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/tabcmd-feedstock
  cfe-forge-recipe-updates-needed:
