# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.0"

package:
  name: py-key-value-shared
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/py-key-value-shared/py_key_value_shared-${{ version }}.tar.gz
  sha256: 8fdd786cf96c3e900102945f92aa1473138ebe960ef49da1c833790160c28a4b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.8.2,<0.9.0
    - pip
  run:
    - python >=${{ python_min }},<4
    - typing_extensions >=4.15.0
    - beartype >=0.22.2

tests:
  - python:
      imports:
        - key_value
        - key_value.shared
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/strawgate/py-key-value
  repository: https://github.com/strawgate/py-key-value/tree/main/key-value/key-value-shared
  documentation: https://github.com/strawgate/py-key-value/blob/main/README.md
  license: Apache-2.0
  license_file: LICENSE
  summary: Shared Key-Value, A pluggable interface for KV Stores

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: py-key-value-shared
  cfe-upstream-registry: pypi
  cfe-upstream-name: py-key-value-shared
  cfe-purls:
    - pkg:conda/py-key-value-shared@${{ version }}
    - pkg:pypi/py-key-value-shared@${{ version }}
  cfe-upstream-repo: https://github.com/strawgate/py-key-value
  cfe-upstream-homepage: https://pypi.org/project/py-key-value-shared/
  cfe-import-names: [key_value, key_value.shared]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/py-key-value-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
