# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.11.0"
  python_min: "3.11"

package:
  name: ibm-watsonx-orchestrate-core
  version: ${{ version }}

source:
  url: https://github.com/IBM/ibm-watsonx-orchestrate-adk/archive/refs/tags/${{ version }}.tar.gz
  sha256: afb442be18de9452f3f0a00f420d74d81440287af436048c99e73468cc90cbbc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install ./packages/core -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }},<3.15
    - pydantic >=2.10.3,<3.0.0
    - pyyaml >=6.0.2,<7.0.0

tests:
  - python:
      imports:
        - ibm_watsonx_orchestrate_core
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/ibm-watsonx-orchestrate-core/
  license: MIT
  license_file: LICENSE
  summary: Core Shared Dependencies of the IBM watsonx Orchestrate ADK
  repository: https://github.com/IBM/ibm-watsonx-orchestrate-adk
  documentation: https://developer.watson-orchestrate.ibm.com/
  description: |
    Core shared dependencies and types for the IBM watsonx Orchestrate
    Agent Development Kit (ADK). Provides the foundational Pydantic models
    (connections, channels, tools, model selection/policies, voice
    configurations) and utility helpers consumed by the watsonx
    Orchestrate ADK command-line client and SDK.

extra:
  recipe-maintainers:
    - rxm7706

