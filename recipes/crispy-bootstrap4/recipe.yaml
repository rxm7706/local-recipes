# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2026.2"

package:
  name: crispy-bootstrap4
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/crispy-bootstrap4/crispy_bootstrap4-${{ version }}.tar.gz
  sha256: 66f8f14bf9c2c16ed94243236ed253a94e5a625afa1ee64022ce29db98c6cd85

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.3
    - pip
  run:
    - python >=${{ python_min }}
    - django >=5.2
    - django-crispy-forms >=2.3

tests:
  - python:
      imports:
        - crispy_bootstrap4
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Bootstrap4 template pack for django-crispy-forms
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/django-crispy-forms/crispy-bootstrap4
  repository: https://github.com/django-crispy-forms/crispy-bootstrap4
  description: |
    Bootstrap4 template pack for django-crispy-forms. This template pack was
    included with the core django-crispy-forms package until version 2.0.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
