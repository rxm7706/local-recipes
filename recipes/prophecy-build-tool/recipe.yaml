# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.4"

package:
  name: prophecy-build-tool
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/prophecy-build-tool/prophecy_build_tool-${{ version }}.tar.gz
  sha256: 6d3692a3b7b59e4c0b0fd8685a8e293f0260234ffe3cff881fb4c4aee00604c3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pbt = pbt:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<3.13
    - requests >=2.28.0
    - pyyaml >=6.0
    - databricks-cli >=0.17.7,<=0.18.0
    - rich >=12.5.1
    - wheel >=0.41.3,<0.42.0
    - python-build
    - google-cloud-secret-manager >=2.22.0,<2.23.0
    - google-cloud-storage ==2.10.0
    - pydantic >=1.10,<2.0
    - pydantic-yaml ==1.1.1
    - boto3 >=1.34.120,<1.35.0
    - tenacity ==8.2.3
    - gitpython
    - git
    - semver
    - twine
    - jaraco.functools <=4.1.0
    - setuptools >=75.3.2,<81

# CFEP-25-justified: bare `import pbt` runs upstream's click CLI at import time
# (pbt/__init__.py ends with `if __name__ == "pbt": main()` — a long-standing
# upstream bug), so the module exits with click status 2 on import and the
# canonical python.imports test cannot pass under rattler-build. package_contents
# verifies installation; the script test exercises the real CLI (pbt --help) and
# pip check.
tests:
  - package_contents:
      site_packages:
        - pbt
  - requirements:
      run:
        - pip
        - git
        - python ${{ python_min }}.*
    script:
      - pip check
      - pbt --help

about:
  summary: Prophecy-build-tool (PBT) provides utilities to build and distribute projects created from the Prophecy IDE.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/SimpleDataLabsInc/prophecy-build-tool

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
