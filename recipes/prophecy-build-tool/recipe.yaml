    - pkg:pypi/prophecy-build-tool@${{ version }}
  cfe-upstream-repo: https://github.com/SimpleDataLabsInc/prophecy-build-tool
  cfe-upstream-homepage: https://github.com/SimpleDataLabsInc/prophecy-build-tool
