# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.13.5"

package:
  name: django-admin-rangefilter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-admin-rangefilter/django_admin_rangefilter-${{ version }}.tar.gz
  sha256: 3134e9e877f59ccad5949cd25cd2db9bf20d170fd8070be584875fdca96d3a14

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=4.2

tests:
  - python:
      imports:
        - rangefilter
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: django-admin-rangefilter app, add the filter by a custom date range on the admin UI.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/silentsokolov/django-admin-rangefilter
  repository: https://github.com/silentsokolov/django-admin-rangefilter

extra:
  recipe-maintainers:
    - rxm7706

