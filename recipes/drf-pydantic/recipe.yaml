# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.9.1"

package:
  name: drf-pydantic
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/drf-pydantic/drf_pydantic-${{ version }}.tar.gz
  sha256: 76070a9abb132395eb4d2ebe65abb2e842d0efa0cc967c9fa19ef14491dc0f39

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - djangorestframework >=3.13.0
    - pydantic >=2.0.0
    - email-validator >=2.0.0

tests:
  - python:
      imports:
        - drf_pydantic
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Use pydantic with the Django REST framework
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/georgebv/drf-pydantic
  repository: https://github.com/georgebv/drf-pydantic
  description: |
    drf-pydantic lets you use pydantic models with the Django REST
    framework, generating DRF serializers automatically from pydantic
    model definitions.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
