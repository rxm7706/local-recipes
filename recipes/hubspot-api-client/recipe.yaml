# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "12.0.0"

package:
  name: hubspot-api-client
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/hubspot-api-client/hubspot_api_client-${{ version }}.tar.gz
  sha256: ddfc60f3a80565dd5bf7fc7554d0d2dabad37926f547436158258772f1a04e69

build:
  number: 0
  noarch: python
  script:
    - if: unix
      then: echo "${{ version }}" > "${SRC_DIR}/VERSION"
      else: echo ${{ version }}> "%SRC_DIR%\VERSION"
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - requests >=2.31.0
    - urllib3 >=1.15,<3.0
    - six >=1.10,<2.0
    - certifi >=2023.1.1
    - python-dateutil >=2.8.2

tests:
  - python:
      imports:
        - hubspot
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: HubSpot API client
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/HubSpot/hubspot-api-python
  repository: https://github.com/HubSpot/hubspot-api-python
  description: |
    Python client library for the HubSpot CRM, CMS, marketing, and other
    HubSpot APIs. Generated from HubSpot's public OpenAPI specifications.

extra:
  recipe-maintainers:
    - rxm7706

