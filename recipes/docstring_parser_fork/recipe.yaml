# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.14"

package:
  name: docstring_parser_fork
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/docstring_parser_fork/docstring_parser_fork-${{ version }}.tar.gz
  sha256: a2743a63d8d36c09650594f7b4ab5b2758fee8629dcf794d1b221b23179baa5c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - docstring_parser
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Parse Python docstrings in reST, Google and Numpydoc format
  license: MIT
  license_file: LICENSE.md
  homepage: https://github.com/jsh9/docstring_parser_fork
  repository: https://github.com/jsh9/docstring_parser_fork
  description: |
    A fork of the docstring_parser library. Parses Python docstrings written
    in reStructuredText (reST), Google, and Numpydoc formats into a common
    structured representation.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
