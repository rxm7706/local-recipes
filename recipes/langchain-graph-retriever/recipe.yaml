# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.0"

package:
  name: langchain-graph-retriever
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-graph-retriever/langchain_graph_retriever-${{ version }}.tar.gz
  sha256: cd39b551bc3caf1c4bb83c380eb1d7df4de58a9cb56f700e3cd2b577b280be00

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - backoff >=2.2.1
    - graph-retriever
    - immutabledict >=4.2.1
    - langchain-core >=0.3.29
    - networkx >=3.4.2
    - pydantic >=2.10.4
    - typing_extensions >=4.12.2

tests:
  - python:
      imports:
        - langchain_graph_retriever
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://datastax.github.io/graph-rag
  license: Apache-2.0
  license_file: LICENSE
  summary: LangChain retriever for traversing document graphs on top of vector-based similarity search.
  repository: https://github.com/datastax/graph-rag
  documentation: https://datastax.github.io/graph-rag
  description: |
    LangChain Graph Retriever is a Python library that supports traversing a
    document graph on top of vector-based similarity search. It works seamlessly
    with LangChain's retriever framework and supports various graph traversal
    strategies for efficient document discovery.

extra:
  recipe-maintainers:
    - rxm7706

