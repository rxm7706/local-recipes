# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.1.2"

package:
  name: djangocms-attributes-field
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/djangocms-attributes-field/djangocms_attributes_field-${{ version }}.tar.gz
  sha256: ed7e9d78a47b30801fe6b411e1cb8aff3434ac594c2b6bb86c859d98aff59838

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django-cms >=3.7

tests:
  - python:
      imports:
        - djangocms_attributes_field
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Adds attributes to Django models.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/django-cms/djangocms-attributes-field/
  repository: https://github.com/django-cms/djangocms-attributes-field/
  description: |
    Adds a model field and form field to allow arbitrary HTML element
    attributes to be stored against Django CMS models.

extra:
  recipe-maintainers:
    - rxm7706

