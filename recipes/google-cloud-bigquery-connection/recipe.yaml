# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.22.0"

package:
  name: google-cloud-bigquery-connection
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-cloud-bigquery-connection/google_cloud_bigquery_connection-${{ version }}.tar.gz
  sha256: 13dbaeb40db18f937cf152253a45e7a270c090c12bf26c793c47b0a688374658

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - wheel
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.17.1,<3.0.0
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    - grpcio >=1.59.0,<2.0.0
    - grpc-google-iam-v1 >=0.14.0,<1.0.0
    - proto-plus >=1.22.3,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - google.cloud.bigquery_connection
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Google Cloud Bigquery Connection API client library
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/python-bigquery-connection
  repository: https://github.com/googleapis/python-bigquery-connection
  description: |
    Python client library for the Google Cloud BigQuery Connection API,
    which lets you create and manage connections to external data sources
    for use in BigQuery queries.

extra:
  recipe-maintainers:
    - rxm7706

