# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.3.2"

package:
  name: wagtail-feedback
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-feedback/wagtail_feedback-${{ version }}.tar.gz
  sha256: b040de020f32dbee548a8abb289eeecc217a93f8ed3d567d6584e5b2fa8d6961

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=40.8.0
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - wagtail >=4.2
    - django-filter >=23.2

tests:
  # CFEP-25-justified: Django/Wagtail app — `import feedback` accesses
  # django.conf.settings at module import (feedback/options.py reads
  # getattr(settings, ...)), raising ImproperlyConfigured without
  # DJANGO_SETTINGS_MODULE configured. The test env can't resolve a
  # configured Django project, so the standard python.imports test fails.
  - package_contents:
      site_packages:
        - feedback

about:
  summary: A Django/Wagtail app to easily ask users for feedback.
  license: GPL-2.0-or-later
  license_file: LICENSE
  homepage: https://pypi.org/project/wagtail-feedback/
  repository: https://github.com/Nigel2392/wagtail_feedback
  description: |
    A Django/Wagtail app to easily ask users for feedback. Provides
    pluggable feedback models, forms, filters, and backends for
    collecting and managing user feedback within a Wagtail site.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
