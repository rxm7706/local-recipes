    - pkg:pypi/basedtyping@${{ version }}
  cfe-upstream-repo: https://github.com/KotlinIsland/basedtyping
  cfe-upstream-homepage: https://github.com/KotlinIsland/basedtyping
  cfe-import-names: [basedtyping]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
