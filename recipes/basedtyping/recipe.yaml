# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.10"

package:
  name: basedtyping
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/basedtyping/basedtyping-${{ version }}.tar.gz
  sha256: d7600917ec9f232c9eb4266916c2ea5a4719ffca59fb7902fc96fd59a4678110

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.8
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - typing-extensions >=4.12.2,<5.0.0

tests:
  - python:
      imports:
        - basedtyping
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/KotlinIsland/basedtyping
  repository: https://github.com/KotlinIsland/basedtyping
  summary: Utilities for basedmypy
  description: |
    It's recommended to use basedmypy when using basedtyping, as there are
    specialised adaptations made to basedmypy to support some functionality of
    this package.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: basedtyping
  cfe-upstream-registry: pypi
  cfe-upstream-name: basedtyping
  cfe-purls:
