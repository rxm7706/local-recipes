# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.14"
  python_min: '3.10'

package:
  name: boring-semantic-layer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/boring-semantic-layer/boring_semantic_layer-${{ version }}.tar.gz
  sha256: bf365106dfa2b4c650eb21d385b0f128c69f3c2071dbb9c3022c417ac674078c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - bsl = boring_semantic_layer.agents.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - attrs >=25.3.0
    - ibis-framework >=11.0.0
    - packaging
    - pyyaml >=6.0
    - returns >=0.26.0
    - toolz >=1.0.0
    - xorq >=0.3.19  # TBD Conda-forge

tests:
  - python:
      imports:
        - boring_semantic_layer
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - bsl --help

about:
  summary: A boring semantic layer built with ibis
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/boringdata/boring-semantic-layer/tree/main

extra:
  recipe-maintainers:
    - boringdata
    - hachej
    - hb1915
    - rxm7706
