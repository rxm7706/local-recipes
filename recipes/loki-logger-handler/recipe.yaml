# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.2"

package:
  name: loki-logger-handler
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/loki-logger-handler/loki_logger_handler-${{ version }}.tar.gz
  sha256: b3b588903420197ac9bb477f9c8fd6c18edf3e475b94f3d27d2aeed3930eb5d1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - loki_logger_handler
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Handler designed for transmitting logs to Grafana Loki in JSON format.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/xente/loki-logger-handler
  repository: https://github.com/xente/loki-logger-handler
  description: |
    A logging handler that sends Python log records to Grafana Loki in JSON
    format, with support for structured fields, labels, and asynchronous
    buffered transmission.

extra:
  recipe-maintainers:
    - rxm7706

