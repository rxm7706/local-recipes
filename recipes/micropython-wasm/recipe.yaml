# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  python_min: "3.10"
  version: 0.1a2

package:
  name: micropython-wasm
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/micropython-wasm/micropython_wasm-${{ version }}.tar.gz
  sha256: 2a8fa819677f89c2fb576e4937ea56bb284c81e706c6eb24a2fbecaf3aa72d31

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - micropython-wasm = micropython_wasm.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - wasmtime-py
tests:
  - python:
      imports:
        - micropython_wasm
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - micropython-wasm --help

about:
  summary: MicroPython packaged in WASM for wasmtime
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/simonw/micropython-wasm

extra:
  recipe-maintainers:
    - rxm7706
