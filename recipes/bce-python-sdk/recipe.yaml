# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.9.72"

package:
  name: bce-python-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/bce-python-sdk/bce_python_sdk-${{ version }}.tar.gz
  sha256: d9db568698792d74db4245252d98776eae8c9c5225fc0ba86548dfc52d478fcc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - pycryptodome >=3.8.0
    - future >=0.6.0
    - six >=1.4.0
    - crc32c >=2.2.post0

tests:
  - python:
      imports:
        - baidubce
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/bce-python-sdk/
  license: Apache-2.0
  license_file: LICENSE
  summary: BCE SDK for python
  repository: https://github.com/baidubce/bce-sdk-python
  documentation: https://cloud.baidu.com/doc/index.html
  description: |
    The BCE (Baidu Cloud Engine) SDK for Python provides a programmatic
    interface to Baidu AI Cloud services. The package is published on PyPI
    as bce-python-sdk and imports as the baidubce top-level module.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
