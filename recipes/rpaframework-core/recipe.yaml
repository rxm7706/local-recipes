# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: rpaframework-core
  version: "12.1.1"
  python_min: '3.10'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/rpaframework_core-${{ version }}.tar.gz
  sha256: 7b9322c8b9f7ad3caae0770918048aa9b41e0d40f7285ecb0e4e911f8db425ab

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - selenium >=4.0.0,<5.0.0
    - webdriver-manager >=4.0.2,<5.0.0
    - ${{ "psutil >=5.9.0" if win }}
    - ${{ "pywin32 >=306" if win }}
    - ${{ "uiautomation >=2.0.15" if win }}
    - pillow >=10.2.0
    - packaging >=24.0
    - httpx >=0.28.1

tests:
  - python:
      imports:
        - RPA
        - RPA.core
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://rpaframework.org/
  summary: Core utilities used by RPA Framework
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kariharju
    - osrjv
    - rxm7706
    - xylix
