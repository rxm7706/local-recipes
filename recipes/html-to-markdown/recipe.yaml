#    # declares a workspace path dep on crates/html-to-markdown/ that the
#    # tarball omits, so cargo metadata fails before maturin starts (G5 class).
#    # The GH tag ships the full workspace. cfe-source-kind records this so a
#    # regen does not silently revert to the broken PyPI sdist.
# context:
#    # python_min omitted: requires-python is >=3.10 (the conda-forge default
#    # floor) and ${{ python_min }} is not referenced anywhere in the recipe
#    # body (version_independent abi3 build uses bare `python`). The deployed
#    # feedstock carries an unused python_min: '3.10' in context; dropped here
#    # per the omit-at-floor modernization convention.
# build:
#    # version_independent: true — upstream builds a single cp310-abi3 wheel per
#    # platform (pyo3/abi3-py310), so one build covers Python 3.10+.
