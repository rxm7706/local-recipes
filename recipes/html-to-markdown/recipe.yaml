# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.5.2"
  python_min: '3.10'

package:
  name: html-to-markdown
  version: ${{ version }}

source:
  # Upstream PyPI sdist (3.5.x) is broken: workspace declares a path dep on
  # crates/html-to-markdown/ but the directory is not in the tarball, so
  # `cargo metadata` fails before the maturin build can start. The GitHub
  # tag tarball ships the full workspace. Same class as SKILL.md G5.
  url: https://github.com/kreuzberg-dev/html-to-markdown/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 8d977a7d763b0ea0c987483a1dd49a67b3513fd73ad17d0939759377c3bce1db

build:
  number: 0
  script:
    env:
      # Per conda-forge.org/docs/maintainer/example_recipes/rust/ — recommended
      # for any Rust build. maturin invokes cargo build and inherits these.
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      # GH source has no root-level pyproject.toml (the sdist synthesizes one);
      # the maturin entrypoint lives at packages/python/. cargo-bundle-licenses
      # runs at the workspace root so it sees all crates.
      - if: unix
        then: |
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          ${{ PYTHON }} -m pip install ./packages/python -vv --no-deps --no-build-isolation
        else: |
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          %PYTHON% -m pip install .\packages\python -vv --no-deps --no-build-isolation
  python:
    version_independent: true

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.9,<2

    - ${{ stdlib('c') }}
    - ${{ compiler("rust") }}
    - ${{ compiler("c") }}
    - cargo-bundle-licenses
  host:
    - python
    - maturin >=1,<2
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - html_to_markdown
      pip_check: true
  - requirements:
      run:
        - pip
        - python
    script:
      - pip check
      - "python -c \"import html_to_markdown\""

about:
  summary: High-performance HTML to Markdown converter powered by Rust with a clean Python API
  license: MIT
  license_file:
    - LICENSE
    - crates/html-to-markdown-py/src/LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/html-to-markdown/
  repository: https://github.com/kreuzberg-dev/html-to-markdown

extra:
  recipe-maintainers:
    - rxm7706
