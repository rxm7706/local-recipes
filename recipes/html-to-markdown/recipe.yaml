# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.6.18"

package:
  name: html-to-markdown
  version: ${{ version }}

source:
  # Upstream PyPI sdist (3.5.x) is broken: workspace declares a path dep on
  # crates/html-to-markdown/ but the directory is not in the tarball, so
  # `cargo metadata` fails before the maturin build can start. The GitHub
  # tag tarball ships the full workspace. Same class as SKILL.md G5.
  url: https://github.com/kreuzberg-dev/html-to-markdown/archive/refs/tags/v${{ version }}.tar.gz
  sha256: afcf77e49012ff2ac7af344c88f387821d8a9967af2b71652e23d379ef8b5f55

build:
  number: 0
  script:
    env:
      # Per conda-forge.org/docs/maintainer/example_recipes/rust/ — recommended
      # for any Rust build. maturin invokes cargo build and inherits these.
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      # GH source has no root-level pyproject.toml (the sdist synthesizes one);
      # the maturin entrypoint lives at packages/python/. cargo-bundle-licenses
      # runs at the workspace root so it sees all crates.
      - if: unix
        then: |
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          ${{ PYTHON }} -m pip install ./packages/python -vv --no-deps --no-build-isolation
        else: |
          cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
          %PYTHON% -m pip install .\packages\python -vv --no-deps --no-build-isolation
  python:
    version_independent: true

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.9,<2

    - ${{ stdlib('c') }}
    - ${{ compiler("rust") }}
    - ${{ compiler("c") }}
    - cargo-bundle-licenses
  host:
    - python
    - maturin >=1,<2
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - html_to_markdown
      pip_check: true
  - requirements:
      run:
        - pip
        - python
    script:
      - pip check
      - "python -c \"import html_to_markdown\""

about:
  summary: High-performance HTML to Markdown converter powered by Rust with a clean Python API
  license: MIT
  license_file:
    - LICENSE
    - crates/html-to-markdown-py/src/LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/html-to-markdown/
  repository: https://github.com/kreuzberg-dev/html-to-markdown

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: html-to-markdown
  cfe-upstream-registry: pypi
  cfe-upstream-name: html-to-markdown
  cfe-purls:
    - pkg:conda/html-to-markdown@${{ version }}
    - pkg:pypi/html-to-markdown@${{ version }}
  cfe-upstream-repo: https://github.com/kreuzberg-dev/html-to-markdown
  cfe-upstream-homepage: https://pypi.org/project/html-to-markdown/
  cfe-import-names: [html_to_markdown]
  cfe-source-kind: github-tag:pypi-sdist-broken-workspace-path-dep-G5
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/html-to-markdown-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
