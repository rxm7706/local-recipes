{% set name = "weasel" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/weasel-{{ version }}.tar.gz
  sha256: 7b129b44c90cc543b760532974ca1e4eb30dad2aa2026f57bdce66354ae610fc

build:
  entry_points:
    - weasel = weasel.cli:app
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.7
    - setuptools
    - pip
  run:
    - python >=3.7
    - confection >=1.0.0
    - packaging >=20.0
    - wasabi >=0.9.1
    - srsly >=2.4.3
    - typer >=0.3.0
    - cloudpathlib >=0.7.0
    - smart-open >=5.2.1
    - httpx >=0.24.0
    - pydantic >=2.0.0

test:
  imports:
    - weasel
  commands:
    - pip check
    - weasel --help
  requires:
    - pip

about:
  home: https://github.com/explosion/weasel/
  summary: 'Weasel: A small and easy workflow system'
  dev_url: https://github.com/explosion/weasel/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
