# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.1"

package:
  name: robocorp-http
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/robocorp-http/robocorp_http-${{ version }}.tar.gz
  sha256: c16ca123201d08cc7684b7f2e3dc6208505d2ae0ff240b285a07d37399daaa95

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - requests >=2.31.0,<3.0.0

tests:
  - python:
      imports:
        - robocorp.http
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Robocorp HTTP library
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/robocorp/robocorp
  repository: https://github.com/robocorp/robocorp

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: robocorp-http
  cfe-upstream-registry: pypi
  cfe-upstream-name: robocorp-http
  cfe-purls:
    - pkg:conda/robocorp-http@${{ version }}
    - pkg:pypi/robocorp-http@${{ version }}
  cfe-upstream-repo: https://github.com/robocorp/robocorp
  cfe-upstream-homepage: https://github.com/robocorp/robocorp
  cfe-import-names: [robocorp.http]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/robocorp-http-feedstock
  cfe-forge-recipe-updates-needed:
