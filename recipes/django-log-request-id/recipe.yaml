# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.1.2"

package:
  name: django-log-request-id
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-log-request-id/django_log_request_id-${{ version }}.tar.gz
  sha256: 4fe8e0702b09e8b08676f237d94063e0d54fc4d8867570bea6719ceba0a32486

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=1.8

tests:
  - python:
      imports:
        - log_request_id
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Django middleware and log filter to attach a unique ID to every log message generated as part of a request
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/dabapps/django-log-request-id/
  repository: https://github.com/dabapps/django-log-request-id/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
