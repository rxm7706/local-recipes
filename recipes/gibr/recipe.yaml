# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  python_min: '3.11'
  version: "0.10.2"

package:
  name: gibr
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gibr/gibr-${{ version }}.tar.gz
  sha256: 2f278040f5fc8c3e48ea78bb8f9ddb3c6ab86106864afc82bb8b9f12849bbb7f
  patches:
    - patches/0001-loosen-runtime-pins.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - gibr = gibr.cli:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }},<4
    - gitpython >=3.1.43
    - click >=8.3.0
    - python-dotenv >=1.2.1
    - python-slugify >=8.0.4
    - tabulate >=0.9.0
    - requests >=2.32.5
    #- pygithub >=2.8.1
    #- python-gitlab >=6.5.0
    #- jira >=3.9.2

tests:
  - python:
      imports:
        - gibr
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - gibr --help

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ytreister/gibr
  repository: https://github.com/ytreister/gibr
  summary: A Git CLI tool for intelligently creating branch names
  description: A Git CLI tool for intelligently creating branch names

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: gibr
  cfe-upstream-registry: pypi
  cfe-upstream-name: gibr
  cfe-purls:
    - pkg:conda/gibr@${{ version }}
    - pkg:pypi/gibr@${{ version }}
  cfe-upstream-repo: https://github.com/ytreister/gibr
  cfe-upstream-homepage: https://github.com/ytreister/gibr
  cfe-import-names: [gibr]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/gibr-feedstock
  cfe-forge-recipe-updates-needed:
    - recipe-regenerate
    - dependency-fix
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
