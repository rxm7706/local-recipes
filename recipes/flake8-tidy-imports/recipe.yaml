# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.12.0"

package:
  name: flake8-tidy-imports
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flake8-tidy-imports/flake8_tidy_imports-${{ version }}.tar.gz
  sha256: 9254788c3b6862c2fcec0250d2dc9af089afebff9c5b8a8ac8b9525b059b06db

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - flake8 >=3.8

tests:
  - python:
      imports:
        - flake8_tidy_imports
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A flake8 plugin that helps you write tidier imports.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/adamchainz/flake8-tidy-imports
  repository: https://github.com/adamchainz/flake8-tidy-imports
  documentation: https://github.com/adamchainz/flake8-tidy-imports/blob/main/CHANGELOG.rst
  description: |
    A flake8 plugin that helps you write tidier imports. It bans relative
    imports and the use of certain modules or imports, and can require
    specific banned-API replacements.

extra:
  recipe-maintainers:
    - rxm7706

