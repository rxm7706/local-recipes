# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.9.7"

package:
  name: django-markdownify
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-markdownify/django_markdownify-${{ version }}.tar.gz
  sha256: 2e59dfd445ad6362288f7bc1574e45d8356848463e261b878fd70df6a272c47f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - pip
  run:
    - python >=${{ python_min }}
    - django
    - markdown
    - bleach >=6.0.0
    - tinycss2 >=1.1.0

tests:
  - python:
      imports:
        - markdownify
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Markdown template filter for Django.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/erwinmatijsen/django-markdownify
  description: |
    Django Markdownify is a template filter to convert Markdown to HTML in
    Django templates. Markdown is converted to HTML and sanitized with bleach.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
