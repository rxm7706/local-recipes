# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: suitenumerique/st-deploycenter is a deployed Django web application, not
# a library. `pip install` ships the importable backend module
# (deploycenter-backend); running the service additionally requires Postgres,
# Redis/Celery, OIDC provider, S3-compatible storage, SMTP, and frontend
# build artifacts that this recipe does not install. conda-forge declines
# web-application recipes as a matter of policy.
#
# Pinned to commit c741c198cb49 on suitenumerique/st-deploycenter (no PyPI release).
# Build context: src/backend/ subdirectory (this recipe pip-installs from
# there).
#

context:
  version: "0.0.1"
  commit: "c741c198cb49eb0250ae600608372db695edcebf"
  python_min: "3.13"

package:
  name: suite-st-deploycenter
  version: ${{ version }}

source:
  - url: https://github.com/suitenumerique/st-deploycenter/archive/${{ commit }}.tar.gz
    sha256: b75b6c1f04104a9c21976076972c4b11aa10a20d8d8008df39ef9d63b25edafd
    patches:
      - patches/0001-build-metadata-fixups.patch
  # Org-level MIT LICENSE fallback for apps whose repo ships none directly.
build:
  number: 0
  noarch: python
  script:
    - |
      cd src/backend
      # patches/0001-build-metadata-fixups.patch makes two pyproject.toml fixes:
      # (1) strips the deprecated "License :: OSI Approved ::" trove classifier
      # (setuptools PEP 639 rejects it); (2) appends [tool.setuptools].packages
      # = ["core", "deploycenter"] (auto-discovery can't pick among multiple
      # top-level modules). Done as a source patch so the build is shell-portable.
      ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - celery
    - cryptography
    - dj-database-url
    - django
    - django-celery-beat
    - django-celery-results
    - django-configurations
    - django-cors-headers
    - django-countries
    - django-fernet-encrypted-fields
    - django-filter
    - django-redis
    - django-timezone-field
    - djangorestframework
    - drf-spectacular
    - gunicorn
    - mozilla-django-oidc
    - psycopg
    - pyjwt
    - redis-py
    - requests
    - sentry-sdk
    - whitenoise

# CFEP-25-justified: Django web-app backend — `import <module>` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE, and the test env
# can't resolve the full transitive Django-plugin chain. site_packages
# presence is the testable invariant.
tests:
  - package_contents:
      site_packages:
        - deploycenter

about:
  homepage: https://github.com/suitenumerique/st-deploycenter
  repository: https://github.com/suitenumerique/st-deploycenter
  summary: La Suite numérique st-deploycenter backend (Django web application — local-only)
  description: |
    suitenumerique/st-deploycenter backend. Distribution name "deploycenter-backend".
    This is a Django web service, not a library — installing this conda
    package gives you the importable backend code; running the service
    requires additional infrastructure (Postgres + Redis + Celery + OIDC +
    S3 + SMTP + frontend).
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
