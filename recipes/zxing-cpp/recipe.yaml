# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: zxing-cpp
  version: "2.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/zxing_cpp-${{ version }}.tar.gz
  sha256: 3babedb67a4c15c9de2c2b4c42d70af83a6c85780c1b2d9803ac64c6ae69f14e

build:
  number: 0
#  skip:
#    - match(python, "<3.10")
#    - match(python, ">3.14")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:

  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - pybind11-global <3.0.0
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib('c') }}
    - cmake >=3.15,<4.0.0
    - if: unix
      then:
        - make
  host:
    - python
    - setuptools >=42,<81.0.0
    - wheel
    - cmake >=3.15,<4.0.0
    - pkg-config
    - pybind11-global <3.0.0
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - zxingcpp
      pip_check: true

about:
  summary: Python bindings for the zxing-cpp barcode library
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/zxing-cpp/zxing-cpp

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
