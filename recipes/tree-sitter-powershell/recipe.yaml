schema_version: 1

context:
  version: "0.26.5"

package:
  name: tree-sitter-powershell
  version: ${{ version }}

source:
  url: https://github.com/airbus-cert/tree-sitter-powershell/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a949ac2bccd74b94b6199702c8b119cb353785e8a8828150a763b202ae8d4534

build:
  number: 1
  # abi3 packages build once at python_min and ship one artifact per platform.
  skip: is_abi3 and not is_python_min
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_powershell
      # Verify the abi3 wheel works on the build-time Python AND the latest.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/tree_sitter_powershell/_binding.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%/tree_sitter_powershell/_binding.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://github.com/airbus-cert/tree-sitter-powershell
  summary: PowerShell grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/airbus-cert/tree-sitter-powershell

extra:
  recipe-maintainers:
    - killua156
    - mgorny
    - rxm7706
