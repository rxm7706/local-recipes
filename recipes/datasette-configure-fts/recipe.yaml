# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.4"

package:
  name: datasette-configure-fts
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/datasette-configure-fts/datasette_configure_fts-${{ version }}.tar.gz
  sha256: 097ac91f03dc516de882193924662b2f24297fc94175ad7a61be05ae9c7a77a7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - datasette >=0.51
    - sqlite-utils >=2.10

tests:
  - python:
      imports:
        - datasette_configure_fts
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Datasette plugin for enabling full-text search against selected table columns
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/simonw/datasette-configure-fts
  repository: https://github.com/simonw/datasette-configure-fts
  description: |
    Datasette plugin that provides a UI for configuring SQLite full-text
    search (FTS) against selected columns of tables in a Datasette instance.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
