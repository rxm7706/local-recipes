# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.5.1"

package:
  name: metal-sdk
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/metal-sdk/metal_sdk-${{ version }}.tar.gz
  sha256: 97ac85e16669f256d2502b7c9606a5f0d4aa4cecc3938834b6064867ee47a34a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - httpx
    - typing_extensions

tests:
  - python:
      imports:
        - metal_sdk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/metal-sdk/
  license: Apache-2.0
  license_file: LICENSE
  summary: SDK for getmetal.io
  repository: https://github.com/getmetal/metal-python
  description: |
    Metal Python SDK — the official client library for getmetal.io,
    providing retrieval, indexing, and memory primitives for AI
    applications.

extra:
  recipe-maintainers:
    - rxm7706

