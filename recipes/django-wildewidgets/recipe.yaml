# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.6.1"

package:
  name: django-wildewidgets
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-wildewidgets/django_wildewidgets-${{ version }}.tar.gz
  sha256: dc5aa3803966c7839b6f20e51888f059c756ee26bce39205567f4455ed638514

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=5.1
    - django-crispy-forms >=2.4
    - crispy-bootstrap5 >=2025.6

tests:
  - python:
      imports:
        - wildewidgets
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: django-wildewidgets is a Django design library providing several tools for building full-featured, widget-based web applications with a standard, consistent design, based on Bootstrap.
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/caltechads/django-wildewidgets
  repository: https://github.com/caltechads/django-wildewidgets
  description: |
    django-wildewidgets is a Django design library providing several tools
    for building full-featured, widget-based web applications with a
    standard, consistent design, based on Bootstrap.

extra:
  recipe-maintainers:
    - rxm7706

