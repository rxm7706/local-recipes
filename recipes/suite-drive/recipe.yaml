# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: suitenumerique/drive is a deployed Django web application, not
# a library. `pip install` ships the importable backend module
# (drive); running the service additionally requires Postgres,
# Redis/Celery, OIDC provider, S3-compatible storage, SMTP, and frontend
# build artifacts that this recipe does not install. conda-forge declines
# web-application recipes as a matter of policy.
#
# Pinned to commit cd7bebfcb8ec on suitenumerique/drive (no PyPI release).
# Build context: src/backend/ subdirectory (this recipe pip-installs from
# there).
#

context:
  version: "0.18.0"
  commit: "cd7bebfcb8ecfac5f0aaeb11d485f2e459710a30"
  python_min: "3.13"

package:
  name: suite-drive
  version: ${{ version }}

source:
  - url: https://github.com/suitenumerique/drive/archive/${{ commit }}.tar.gz
    sha256: 4b10bc02c211ca3db19eab21095490266596c6b59fe433a0ee46106e814c64b2
  # Org-level MIT LICENSE fallback for apps whose repo ships none directly.
build:
  number: 0
  noarch: python
  script:
    - |
      cd src/backend
      # Upstream ships an empty __init__.py at src/backend/__init__.py that
      # uv_build rejects for namespace packages. Drop it.
      rm -f __init__.py
      # Upstream pyproject.toml omits [tool.uv.build-backend].module-name.
      # Inject it via sed so uv_build doesn't fall back to the
      # distribution name (which doesn't match any source dir here).
      sed -i '/^\[tool\.uv\.build-backend\]$/a module-name = [\"core\", \"demo\", \"drive\", \"e2e\", \"wopi\"]' pyproject.toml
      ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - boto3
    - brotli
    - dj-database-url
    - celery
    - defusedxml
    - django
    - django-configurations
    - django-cors-headers
    - django-countries
    - django-filter
    - django-lasuite
    - django-ltree
    - django-parler
    - django-pydantic-field
    - django-redis
    - django-storages
    - django-timezone-field
    - djangorestframework
    - djangorestframework-api-key
    - dockerflow
    - drf-spectacular
    - drf-standardized-errors
    - easy-thumbnails
    - factory-boy
    - gunicorn
    - jsonschema
    - markdown
    - mozilla-django-oidc
    - nested-multipart-parser
    - posthog
    - psycopg
    - pydantic
    - pyjwt
    - python-magic
    - redis-py
    - requests
    - sentry-sdk
    - url-normalize
    - whitenoise
    - zipstream-ng

# CFEP-25-justified: Django web-app backend — `import <module>` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE, and the test env
# can't resolve the full transitive Django-plugin chain. site_packages
# presence is the testable invariant.
tests:
  - package_contents:
      site_packages:
        - drive
        - wopi

about:
  homepage: https://github.com/suitenumerique/drive
  repository: https://github.com/suitenumerique/drive
  summary: La Suite numérique drive backend (Django web application — local-only)
  description: |
    suitenumerique/drive backend. Distribution name "drive".
    This is a Django web service, not a library — installing this conda
    package gives you the importable backend code; running the service
    requires additional infrastructure (Postgres + Redis + Celery + OIDC +
    S3 + SMTP + frontend).
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
