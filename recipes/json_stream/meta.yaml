{% set name = "json_stream" %}
{% set version = "2.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f7a2c72f208544276c0ee3f58c11eb635f2d3c1d37c7237cac2cf6681b67f655

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - wheel
    - pip
  run:
    - python >={{ python_min }},<4.0
    - json-stream-rs-tokenizer >=0.4.17

test:
  imports:
    - json_stream
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Streaming JSON encoder and decoder
  home: https://github.com/daggaz/json-stream
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - rxm7706
