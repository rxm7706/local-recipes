# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.2"

package:
  name: pksuid
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pksuid/pksuid-${{ version }}.tar.gz
  sha256: dc08ed7924a8affea5f36af4b6af345b126f521c9165b95e91ca1a2acef99e49
  patches:
    # Loosen upstream's pinned pybase62 ==0.4.3 to >=0.4.3 (in pyproject.toml,
    # PKG-INFO and setup.py) so the built wheel METADATA matches conda-forge's
    # pybase62 (1.0.0 keeps encodebytes/decodebytes — runtime-compatible) and
    # pip check passes. The pin is upstream's; drop this patch if a future
    # pksuid release loosens it.
    - patches/0001-loosen-pybase62-pin.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - pybase62 >=0.4.3

tests:
  - python:
      imports:
        - pksuid
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/sashahilton00/python-pksuid
  license: MIT
  license_file: LICENSE.txt
  summary: Python package for generating prefixed ksuids.
  repository: https://github.com/sashahilton00/python-pksuid
  description: |
    Python-PKSUID (Prefixed K-Sortable Unique IDentifier).

    This library extends the KSUID identifier (first proposed and used by
    Segment.io) with a prefix, inspired by Stripe-style prefixed IDs such as
    `txn_1032HU2eZvKYlo2CEPtcnUvl`. The prefix makes it easy to see at a
    glance the underlying type of the resource an identifier refers to, and
    makes for easier reading and tracing of resources in log files and other
    locations.

extra:
  recipe-maintainers:
    - rxm7706

