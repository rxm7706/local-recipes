# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.2.1"

package:
  name: django-tenant-users
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-tenant-users/django_tenant_users-${{ version }}.tar.gz
  sha256: 1fac19d52625aaa250681a1d7a052eac1d4bbe876d79963c3e7d3dd67f7e712d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.2.0
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - django-tenants >=3.6,<4.0

tests:
  - python:
      imports:
        - tenant_users
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Django app to extend django-tenants to incorporate global multi-tenant users
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Corvia/django-tenant-users
  repository: https://github.com/Corvia/django-tenant-users
  documentation: https://django-tenant-users.readthedocs.io/
  description: |
    django-tenant-users extends django-tenants to incorporate global
    multi-tenant users, providing a permissions framework for managing
    user access across multiple tenants in a Django SaaS application.

extra:
  recipe-maintainers:
    - rxm7706

