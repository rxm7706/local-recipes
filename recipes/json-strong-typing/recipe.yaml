# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.3"

package:
  name: json-strong-typing
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/json-strong-typing/json_strong_typing-${{ version }}.tar.gz
  sha256: eda43764914141d609be5cdb020c01c6fb5ee2f533382707fd382bd302b2a496

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - jsonschema >=4.25
    - typing_extensions >=4.15

tests:
  - python:
      imports:
        - strong_typing
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/hunyadi/strong_typing
  repository: https://github.com/hunyadi/strong_typing
  license: MIT
  license_file: LICENSE
  summary: Type-safe data interchange for Python data classes
  description: |
    Type-safe data interchange for Python data classes

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
