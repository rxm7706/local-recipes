# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.3.1"

package:
  name: djangocms-frontend
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/djangocms-frontend/djangocms_frontend-${{ version }}.tar.gz
  sha256: 85c4c85cd8c464a6f943d011a1c4aab6902829fd2aad36b9268b151fdb499f6b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django-cms >=3.7
    - django-entangled >=0.6
    - django-filer >=1.7
    - djangocms-attributes-field >=4
    - djangocms-link >=5
    - easy-thumbnails

tests:
  - python:
      imports:
        - djangocms_frontend
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Adds abstract User Interface items as plugins to django CMS.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/django-cms/djangocms-frontend
  repository: https://github.com/django-cms/djangocms-frontend
  documentation: https://djangocms-frontend.readthedocs.io
  description: |
    djangocms-frontend is a plugin bundle for django CMS that provides
    abstract user-interface items (rows, columns, cards, links, alerts,
    carousels, and more) as CMS plugins, with Bootstrap 5 support by
    default.

extra:
  recipe-maintainers:
    - rxm7706

