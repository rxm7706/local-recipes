# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.35.2"

package:
  name: tox-uv
  version: ${{ version }}

source:
  # tox-uv-bare provides the actual package code; the tox-uv PyPI dist is a
  # thin meta wheel (tox_uv_bare + uv). Build the bare sdist under the tox-uv
  # package name, matching the deployed conda-forge feedstock.
  url: https://pypi.org/packages/source/t/tox-uv-bare/tox_uv_bare-${{ version }}.tar.gz
  sha256: 49e28a804c97f23ea17e25859960c0fa78f35bccb7e14344cfd840e89a9aade9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatch-vcs >=0.5
    - hatchling >=1.28
    - pip
  run:
    - python >=${{ python_min }}
    - packaging >=26
    - tox <5,>=4.52.1
    - typing_extensions >=4.15
    - uv
    - tomli >=2.4

tests:
  - python:
      imports:
        - tox_uv
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Integration of uv with tox.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/tox-dev/tox-uv
  repository: https://github.com/tox-dev/tox-uv
  description: |
    tox-uv is a tox plugin replacing virtualenv and pip with uv in your tox
    environments, leveraging uv's speed for environment creation and package
    installation.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: tox-uv
  cfe-upstream-registry: pypi
  cfe-upstream-name: tox-uv-bare
  cfe-purls:
    - pkg:conda/tox-uv@${{ version }}
    - pkg:pypi/tox-uv-bare@${{ version }}
  cfe-upstream-repo: https://github.com/tox-dev/tox-uv
  cfe-upstream-homepage: https://github.com/tox-dev/tox-uv
  cfe-import-names: [tox_uv]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/tox-uv-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
