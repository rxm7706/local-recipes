# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.4.2"

package:
  name: google-search-results
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-search-results/google_search_results-${{ version }}.tar.gz
  sha256: 603a30ecae2af8e600b22635757a6df275dad4b934f975e67878ccd640b78245

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - requests

tests:
  - python:
      imports:
        - serpapi
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/google-search-results/
  license: MIT
  license_file: LICENSE
  summary: Scrape and search localized results from Google, Bing, Baidu, Yahoo, Yandex, Ebay, Homedepot, youtube at scale using SerpApi.com
  repository: https://github.com/serpapi/google-search-results-python
  documentation: https://serpapi.com/search-api
  description: |
    Python client for SerpApi.com — scrape and search localized results from
    Google, Bing, Baidu, Yahoo, Yandex, Ebay, Home Depot, YouTube, Walmart,
    Naver, the Apple App Store, and Google Scholar at scale. The distribution
    is published on PyPI as ``google-search-results`` but imports as
    ``serpapi``.

extra:
  recipe-maintainers:
    - rxm7706

