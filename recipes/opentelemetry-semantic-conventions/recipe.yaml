# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.62b1"
  python_min: "3.10"

package:
  name: opentelemetry-semantic-conventions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opentelemetry-semantic-conventions/opentelemetry_semantic_conventions-${{ version }}.tar.gz
  sha256: c5cc6e04a7f8c7cdd30be2ed81499fa4e75bfbd52c9cb70d40af1f9cd3619802

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - opentelemetry-api ==1.41.1
    - typing-extensions >=4.5.0

tests:
  - python:
      imports:
        - opentelemetry
        - opentelemetry.semconv
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: OpenTelemetry Semantic Conventions
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/open-telemetry/opentelemetry-python/tree/main/opentelemetry-semantic-conventions

extra:
  recipe-maintainers:
    - timkpaine
    - rxm7706
    - mariusvniekerk
    - conda-forge/opentelemetry-api
