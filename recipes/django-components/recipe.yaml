# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.150.0"

package:
  name: django-components
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-components/django_components-${{ version }}.tar.gz
  sha256: 84a021246f228a113e8c97332c8b2d55340cb2d435374ffd894c83d94a6a6214

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=5.2
    - djc-core >=1.3.0
    - typing_extensions >=4.12.2

tests:
  - python:
      imports:
        - django_components
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A way to create simple reusable template components in Django.
  homepage: https://django-components.github.io/django-components/latest/overview/welcome/
  repository: https://github.com/django-components/django-components
  documentation: https://django-components.github.io/django-components/latest/reference/api/
  license: MIT
  license_file: LICENSE
  description: |
    Create simple reusable template components in Django.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: django-components
  cfe-upstream-registry: pypi
  cfe-upstream-name: django-components
