    - pkg:pypi/django-components@${{ version }}
  cfe-upstream-repo: https://github.com/django-components/django-components
  cfe-upstream-homepage: https://django-components.github.io/django-components/latest/overview/welcome/
  cfe-import-names: [django_components]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
