# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.2.4"

package:
  name: langchain-google-vertexai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-google-vertexai/langchain_google_vertexai-${{ version }}.tar.gz
  sha256: f0c16b4b639037f60357dbf6d4aa3b0f301f23be6b33b0688c75902235cb9434

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.3.2,<2.0.0
    - google-cloud-aiplatform >=1.97.0,<2.0.0
    - google-cloud-storage >=2.18.0,<4.0.0
    - httpx >=0.28.0,<1.0.0
    - httpx-sse >=0.4.0,<1.0.0
    - pydantic >=2.9.0,<3.0.0
    - validators >=0.22.0,<1.0.0
    - bottleneck >=1.4.0,<2.0.0
    - numexpr >=2.8.6,<3.0.0
    - pyarrow >=19.0.1,<24.0.0
    - google-cloud-vectorsearch >=0.2.0

tests:
  - python:
      imports:
        - langchain_google_vertexai
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://docs.langchain.com/oss/python/integrations/providers/google
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting Google VertexAI and LangChain
  repository: https://github.com/langchain-ai/langchain-google/tree/master/libs/vertexai
  documentation: https://reference.langchain.com/python/integrations/langchain_google_vertexai/
  description: |
    langchain-google-vertexai is the LangChain partner package that
    integrates Google Cloud Vertex AI with LangChain. It exposes Vertex AI
    chat models, text and multimodal LLMs, embeddings, model-garden and
    Anthropic-on-Vertex models, evaluators, and Vertex AI Vector Search
    vector stores through the standard LangChain interfaces.

extra:
  recipe-maintainers:
    - rxm7706

