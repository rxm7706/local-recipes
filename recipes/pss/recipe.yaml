# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.45"

package:
  name: pss
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pss/pss-${{ version }}.tar.gz
  sha256: 13b81a4a7a33a7d6c4de85b908911c48849050fbaab596aeeceac78eaf067149

build:
  number: 0
  noarch: python
  python:
    entry_points:
      - pss = psslib.pss:main
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - psslib
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pss --help

about:
  summary: Tool for grepping through source code
  license: Unlicense
  license_file: LICENSE
  homepage: https://github.com/eliben/pss
  repository: https://github.com/eliben/pss
  description: |
    pss is a power-tool for searching inside source code files. It searches
    recursively within a directory tree, knows which extensions and file
    names to search and which to ignore, automatically skips directories you
    wouldn't want to search in (for example .svn or .git), colors its output
    in a helpful way, and much more.

extra:
  recipe-maintainers:
    - rxm7706

