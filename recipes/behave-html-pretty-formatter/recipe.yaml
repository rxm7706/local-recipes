# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.16.1"

package:
  name: behave-html-pretty-formatter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/behave-html-pretty-formatter/behave_html_pretty_formatter-${{ version }}.tar.gz
  sha256: b6a70707c5f0a0f84045438efa0fb00e44a6539b4f22cef44887349213e77de0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=59
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - behave >=1.3.0
    - dominate ==2.9.0
    - markdown
    - pyhamcrest

tests:
  - python:
      imports:
        - behave_html_pretty_formatter
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/behave-contrib/behave-html-pretty-formatter
  license: GPL-3.0-only
  license_file: LICENSE
  summary: Pretty HTML Formatter for Behave
  description: |
    HTML Pretty formatter for Behave. Generates a self-contained, readable
    HTML report for Behave BDD test runs, inspired by jest-html-reporter and
    built on the dominate HTML-generation library.

extra:
  recipe-maintainers:
    - rxm7706

