# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.11.3"
  python_min: "3.11"

package:
  name: spec-kit
  version: ${{ version }}

source:
  url: https://github.com/github/spec-kit/archive/v${{ version }}.tar.gz
  sha256: 78b37dbcda69648ab648f82b6af83da4b56e34b2a6c9b2027c0152819d6e0646

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - specify = specify_cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - json5 >=0.13.0
    - pathspec >=0.12.0
    - click >=8.2.1
    - typer >=0.24.0
    - rich
    - httpx
    - socksio ==1
    - platformdirs
    - readchar
    - truststore >=0.10.4
    - pyyaml >=6.0
    - packaging >=23.0

tests:
  - python:
      imports:
        - specify_cli
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - specify --help

about:
  summary: Specify CLI, part of GitHub Spec Kit. A tool to bootstrap your projects for Spec-Driven Development (SDD).
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/github/spec-kit
  repository: https://github.com/github/spec-kit

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: spec-kit
  cfe-upstream-registry: github
  cfe-upstream-name: github/spec-kit
  cfe-purls:
    - pkg:conda/spec-kit@${{ version }}
    - pkg:pypi/specify-cli@${{ version }}
    - pkg:github/github/spec-kit@v${{ version }}
  cfe-upstream-repo: https://github.com/github/spec-kit
  cfe-upstream-homepage: https://github.com/github/spec-kit
  cfe-import-names: [specify_cli]
  cfe-source-kind: github-tag
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/spec-kit-feedstock
  cfe-forge-recipe-updates-needed:
    - meta-yaml-to-recipe-yaml
  cfe-forge-blocker-list: []
