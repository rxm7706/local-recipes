# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: crewai-tools
  version: 1.14.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/crewai_tools-${{ version }}.tar.gz
  sha256: 2e24e062aa37acf93a7cdec6e514ecee08c7819a2f2f51c9ab85d172376fe691

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10,<3.14
    - hatchling
    - pip
  run:
    - python >=3.10,<3.14
    - pytube >=15.0.0,<15.1.dev0
    - requests >=2.32.5,<2.33.dev0
    - crewai ==1.14.1
    - tiktoken >=0.8.0,<0.9.dev0
    - beautifulsoup4 >=4.13.4,<4.14.dev0
    - python-docx >=1.2.0,<1.3.dev0
    - youtube-transcript-api >=1.2.2,<1.3.dev0
    - pymupdf >=1.26.6,<1.27.dev0

tests:
  - python:
      imports:
        - crewai_tools
      pip_check: true

about:
  summary: Set of tools for the crewAI framework
  license: Unlicense
  license_file: PLEASE_ADD_LICENSE_FILE

extra:
  recipe-maintainers:
    - rxm7706