# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.6"

package:
  name: pptx2md
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pptx2md/pptx2md-${{ version }}.tar.gz
  sha256: 2adc052d9fb5e031b0760887eea931e7c78c208b7b2440b10468a3c2874b4e44

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pptx2md = pptx2md.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - python-pptx >=0.6.18
    - rapidfuzz >=0.10.0
    - pillow >=6.0.0
    - tqdm >=4
    - pydantic >=2.9.2,<3.0.0
    - scipy >=1.14.1,<2.0.0
    - numpy >=2.1.3,<3.0.0
tests:
  - python:
      imports:
        - pptx2md
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pptx2md --help

about:
  summary: This package converts pptx to markdown
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ssine/pptx2md

extra:
  recipe-maintainers:
    - rxm7706
