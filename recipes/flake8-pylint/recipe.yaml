# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.1"

package:
  name: flake8-pylint
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/flake8-pylint/flake8_pylint-${{ version }}.tar.gz
  sha256: 7741f9a63b05768fc4c641c7f6389bc33c91f9ed9bfd59c01540bbb7acc180e3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - flake8
    - pylint

tests:
  - python:
      imports:
        - flake8_pylint
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Flake8 plugin that runs PyLint.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/orsinium-labs/flake8-pylint
  repository: https://github.com/orsinium-labs/flake8-pylint

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: flake8-pylint
  cfe-upstream-registry: pypi
  cfe-upstream-name: flake8-pylint
  cfe-purls:
    - pkg:conda/flake8-pylint@${{ version }}
    - pkg:pypi/flake8-pylint@${{ version }}
  cfe-upstream-repo: https://github.com/orsinium-labs/flake8-pylint
  cfe-upstream-homepage: https://github.com/orsinium-labs/flake8-pylint
  cfe-import-names: [flake8_pylint]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/flake8-pylint-feedstock
  cfe-forge-recipe-updates-needed:
