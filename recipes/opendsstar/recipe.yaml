# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.26"
  python_min: "3.11"

package:
  name: opendsstar
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opendsstar/opendsstar-${{ version }}.tar.gz
  sha256: 035fdeaf2bc3d9b9126f9f2f9ffe9f8de17b28f43a8539dbe5fcd46a857703e7

build:
  noarch: python
  number: 0
  script: |
    # conda `docling` is a metapackage; the importable `docling` module + its
    # dist-info ship as `docling-slim`. Rewrite the wheel METADATA dep so
    # `pip check` sees `docling-slim`; the conda run dep stays `docling` (G28).
    sed -i.bak 's/"docling>=2.36.1,<3.0.0"/"docling-slim>=2.36.1,<3.0.0"/' pyproject.toml && rm pyproject.toml.bak
    ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=75.0
    - wheel >=0.45
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - langgraph >=1.1.6
    - langchain >=1.2.15
    - langchain-core >=1.2.28
    - langchain-community >=0.3.31
    - langchain-text-splitters >=1.1.0
    - langchain-litellm >=0.3.5
    - langchain-milvus >=0.3.3
    - langchain-huggingface >=1.2.1
    - pymilvus >=2.6.7,<3
    - pymilvus-model >=0.3.0
    - if: not win
      then:
        - milvus-lite >=2.4.0
    - scipy >=1.13.0,<2.0.0
    - pydantic >=2.12,<3
    - numpy >=1.26.4,<2.5.0
    - pandas >=2.2.3,<2.4
    - pyarrow >=18.0.0
    - python-dotenv >=1.0.0,<2
    - litellm >=1.83.0
    - openai >=1.82.0
    - docling >=2.36.1,<3.0.0
    - sentence-transformers >=5.0.0,<6
    - diskcache >=5.6.0,<6
    - tqdm >=4.65.0,<5
    - smolagents >=1.0.0,<2.0.0
    - matplotlib-base >=3.9.0,<4
    - plotly >=6.0.0,<7
    - python-kaleido >=1.0.0,<2
    - datasets >=2.14.7
    - huggingface_hub >=0.36.0,<2
    - ragworkbench

tests:
  - python:
      imports:
        - OpenDsStar
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/IBM/OpenDsStar
  repository: https://github.com/IBM/OpenDsStar
  documentation: https://github.com/IBM/OpenDsStar#readme
  license: Apache-2.0
  license_file: LICENSE
  summary: A tool-based DS-Star agent implementation using LangGraph

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: opendsstar
  cfe-upstream-registry: pypi
  cfe-upstream-name: opendsstar
  cfe-purls:
    - pkg:conda/opendsstar@${{ version }}
    - pkg:pypi/opendsstar@${{ version }}
  cfe-upstream-repo: https://github.com/IBM/OpenDsStar
  cfe-upstream-homepage: https://github.com/IBM/OpenDsStar
  cfe-import-names: [OpenDsStar]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: pending-approval-on-conda-forge
  cfe-on-conda-forge-feedstock: none
  cfe-submission-pr: https://github.com/conda-forge/staged-recipes/pull/33840
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list:
