# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.24.0"

package:
  name: django-treenode
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-treenode/django_treenode-${{ version }}.tar.gz
  sha256: 7ad2198620c285ebaa9a75d0bdcb9164c5e88c084f4c3e8f765ed0fa44cbd0d6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - treenode
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/fabiocaccamo/django-treenode
  repository: https://github.com/fabiocaccamo/django-treenode
  summary: probably the best abstract model/admin for your tree based stuff.

extra:
  recipe-maintainers:
    - rxm7706

