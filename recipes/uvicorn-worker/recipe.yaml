# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.0"

package:
  name: uvicorn-worker
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/u/uvicorn-worker/uvicorn_worker-${{ version }}.tar.gz
  sha256: 8ee5306070d8f38dce124adce488c3c0b50f20cf0c0222b12c66188da7214493

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - uvicorn >=0.36.0
    - gunicorn >=21.0.0

tests:
  - python:
      imports:
        - uvicorn_worker
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Uvicorn worker for Gunicorn!
  license: BSD-3-Clause
  license_file: LICENSE.md
  homepage: https://github.com/Kludex/uvicorn-worker
  repository: https://github.com/Kludex/uvicorn-worker
  description: |
    An ASGI worker class for running Uvicorn under the Gunicorn process
    manager, combining Gunicorn's process management with Uvicorn's
    high-performance ASGI server.

extra:
  recipe-maintainers:
    - rxm7706

