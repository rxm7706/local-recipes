{% set name = "ag-ui-langgraph" %}
{% set version = "0.0.34" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ag_ui_langgraph-{{ version }}.tar.gz
  sha256: 755323d5256407ce62d6b9af447a9f1250554e7056c5e2115027a4174a736c41

build:
  entry_points:
    - dev = ag_ui_langgraph.dojo:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - ag-ui-protocol >=0.1.10
    - langchain >=1.2.0
    - langchain-core >=0.3.0
    - langgraph >=0.3.25,<2
    - pydantic >=2.0.0
  run_constrained:
    - fastapi >=0.115.12

test:
  imports:
    - ag_ui_langgraph
  commands:
    - pip check
    #- dev --help # NOTE ModuleNotFoundError: No module named 'ag_ui_langgraph.dojo'
  requires:
    - pip
    - fastapi >=0.115.12
    - python {{ python_min }}

about:
  summary: Implementation of the AG-UI protocol for LangGraph.
  license: 'MIT'
  license_file: LICENSE
  home: https://pypi.org/project/ag-ui-langgraph/
  dev_url: https://github.com/ag-ui-protocol/ag-ui/tree/main/integrations/langgraph/python

extra:
  recipe-maintainers:
    - rxm7706
