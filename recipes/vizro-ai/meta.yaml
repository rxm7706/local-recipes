{% set name = "vizro-ai" %}
{% set version = "0.4.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/vizro_ai-{{ version }}.tar.gz
  sha256: 32c2fe360b0ebe1fe92d7674c6dbb438413ab4fc7b4bb079f168cb4e8572b0e2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<3.14
    - pandas
    - plotly
    - black
    - autoflake
    - pydantic-ai-slim >=1.39.0

test:
  imports:
    - vizro_ai
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Vizro-AI is a tool for generating data visualizations
  home: https://pypi.org/project/vizro-ai
  dev_url: https://github.com/mckinsey/vizro
  doc_url: https://vizro.readthedocs.io/en/stable
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - rxm7706
