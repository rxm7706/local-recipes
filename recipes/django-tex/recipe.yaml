# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.1.12"

package:
  name: django-tex
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-tex/django_tex-${{ version }}.tar.gz
  sha256: e9075209847d629f956b4ba2645a99146aa4e35527b188cce0e47532ea88a170

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools-scm
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - django >=2.2
    - jinja2 >=2.9

tests:
  - python:
      imports:
        - django_tex
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A simple Django app to render Latex templates and compile them into PDF files.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/weinbusch/django-tex
  repository: https://github.com/weinbusch/django-tex
  description: |
    A simple Django app to render LaTeX templates and compile them into PDF
    files. Provides a template engine that renders Jinja2-based LaTeX
    templates and a helper to build PDFs from the rendered output.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
