# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.13.0.0"

package:
  name: openmetadata-managed-apis
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/openmetadata-managed-apis/openmetadata_managed_apis-${{ version }}.tar.gz
  sha256: b7046eceddf1f02387de5fb0a04f3a2aeaaf215b930bc2a5aff4bb03211ff188

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=70.3.0,<70.4.dev0
    - pip
  run:
    - python >=${{ python_min }}
    - pendulum >=3.0,<4.dev0
    - apache-airflow >=2.2.2
    - apache-airflow-providers-fab >=1.0.0
    - apache-airflow-core >=3.0.2,<3.1.0
    - flask ==3.1.3
    - flask-admin ==1.6.0
    - packaging >=20.0

tests:
  - python:
      imports:
        - openmetadata_managed_apis
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Airflow REST APIs to create and manage DAGS
  homepage: https://open-metadata.org/
  repository: https://github.com/open-metadata/OpenMetadata
  documentation: https://docs.open-metadata.org/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
