# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: suitenumerique/menshen is a deployed Django web application, not
# a library. `pip install` ships the importable backend module
# (menshen); running the service additionally requires Postgres,
# Redis/Celery, OIDC provider, S3-compatible storage, SMTP, and frontend
# build artifacts that this recipe does not install. conda-forge declines
# web-application recipes as a matter of policy.
#
# Pinned to commit 851d5b585066 on suitenumerique/menshen (no PyPI release).
# Build context: src/backend/ subdirectory (this recipe pip-installs from
# there).
#

context:
  version: "0.1.0"
  commit: "851d5b585066a147d586c4b8b682c1208554d040"
  python_min: "3.14"

package:
  name: suite-menshen
  version: ${{ version }}

source:
  - url: https://github.com/suitenumerique/menshen/archive/${{ commit }}.tar.gz
    sha256: c1e7ead0c58cc0b0c3931eab9c8f85358a61ad615e497d4cc061fe1324acc4ff
    patches:
      - patches/0001-add-uv-module-name.patch
  # Org-level MIT LICENSE fallback for apps whose repo ships none directly.
build:
  number: 0
  noarch: python
  script:
    - |
      cd src/backend
      # [tool.uv.build-backend].module-name is injected via
      # patches/0001-add-uv-module-name.patch (uv_build would otherwise fall
      # back to the distribution name, which matches no source dir here).
      ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - dj-database-url
    - django
    - django-configurations
    - django-cors-headers
    - django-lasuite
    - django-redis
    - djangorestframework
    - dockerflow
    - drf-spectacular
    - drf-standardized-errors
    - msgspec
    - psycopg
    - sentry-sdk
    - whitenoise

# CFEP-25-justified: Django web-app backend — `import <module>` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE, and the test env
# can't resolve the full transitive Django-plugin chain. site_packages
# presence is the testable invariant.
tests:
  - package_contents:
      site_packages:
        - menshen
        - token_exchange

about:
  homepage: https://github.com/suitenumerique/menshen
  repository: https://github.com/suitenumerique/menshen
  summary: La Suite numérique menshen backend (Django web application — local-only)
  description: |
    suitenumerique/menshen backend. Distribution name "menshen".
    This is a Django web service, not a library — installing this conda
    package gives you the importable backend code; running the service
    requires additional infrastructure (Postgres + Redis + Celery + OIDC +
    S3 + SMTP + frontend).
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
