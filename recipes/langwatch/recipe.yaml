# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.26.0"

package:
  name: langwatch
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langwatch/langwatch-${{ version }}.tar.gz
  sha256: b605689edf7fafec26da8adbfeaadbd560d2e460e117a463f6836c8dbaea2166

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - nanoid >=2.0.0,<3.0.0
    - coolname >=2.2.0
    - httpx >=0.27.0
    - openinference-instrumentation-haystack >=0.1.20
    - openinference-instrumentation-langchain >=0.1.24
    - openinference-instrumentation-openai >=0.1.25
    - openinference-semantic-conventions >=0.1.17
    - opentelemetry-api >=1.32.1
    - opentelemetry-exporter-otlp-proto-http >=1.32.1
    - opentelemetry-sdk >=1.32.1
    - opentelemetry-instrumentation-crewai >=0.45.0
    - retry >=0.9.2
    - tenacity >=8.0.0
    - termcolor >=3.0.1
    - deprecated >=1.2.18
    - python-liquid >=2.2.0
    - pydantic >=2
    - attrs >=24
    - pksuid >=1.1.2
    - pyyaml >=6.0.2

tests:
  - python:
      imports:
        - langwatch
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langwatch/
  summary: LangWatch Python SDK, for monitoring your LLMs
  license: MIT
  license_file: LICENSE
  description: |
    # LangWatch Python SDK

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: langwatch
  cfe-upstream-registry: pypi
  cfe-upstream-name: langwatch
  cfe-purls:
    - pkg:conda/langwatch@${{ version }}
    - pkg:pypi/langwatch@${{ version }}
  cfe-upstream-repo: https://github.com/langwatch/langwatch
  cfe-upstream-homepage: https://pypi.org/project/langwatch/
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list:
    - pksuid        # local-only (recipes/pksuid); not on conda-forge any spelling
    - pybase62      # pksuid's only dep; local-only (recipes/pybase62); not on conda-forge
  cfe-last-checked: 2026-06-19T20:30:00Z
  cfe-generated-by-version: 8.34.0
  cfe-generated-at-datetime: 2026-06-19T20:30:00Z
