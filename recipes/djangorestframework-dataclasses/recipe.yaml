# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.4.0"

package:
  name: djangorestframework-dataclasses
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/djangorestframework-dataclasses/djangorestframework_dataclasses-${{ version }}.tar.gz
  sha256: fffa19b6f650b2c4c346b3cadf42dd9aa5a265a34f0827608953910d01919039

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - django >=2.0
    - djangorestframework >=3.9

tests:
  - python:
      imports:
        - rest_framework_dataclasses
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A dataclasses serializer for Django REST Framework
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/oxan/djangorestframework-dataclasses
  repository: https://github.com/oxan/djangorestframework-dataclasses
  documentation: https://github.com/oxan/djangorestframework-dataclasses/blob/master/README.rst
  description: |
    A dataclasses serializer for the Django REST Framework. Maps Python
    dataclasses to DRF serializer fields, generating serializers from
    dataclass type annotations.

extra:
  recipe-maintainers:
    - rxm7706

