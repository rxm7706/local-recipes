schema_version: 1

context:
  version: "0.24.2"

package:
  name: tree-sitter-php
  version: ${{ version }}

# Patch fixes upstream pyproject.toml's invalid `license = "LICENSE"`
# (rejected as a non-SPDX identifier by setuptools >=70). Reported upstream.
source:
  url: https://github.com/tree-sitter/tree-sitter-php/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 0e73ad63dda67ac12c0e012726a4e1a9811c26b020a0a2dea3e889f8246d9cf4
  patches:
    - patches/0001-fix-invalid-pep621-license-field.patch

build:
  number: 1
  # abi3 packages build once at python_min and ship one artifact per platform.
  skip: is_abi3 and not is_python_min
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_php
      # Verify the abi3 wheel works on the build-time Python AND the latest.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/tree_sitter_php/_binding.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%/tree_sitter_php/_binding.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://github.com/tree-sitter/tree-sitter-php
  summary: PHP grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/tree-sitter/tree-sitter-php

extra:
  recipe-maintainers:
    - killua156
    - mgorny
    - rxm7706
