# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.1.7"

package:
  name: djangocms-text-ckeditor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/djangocms-text-ckeditor/djangocms_text_ckeditor-${{ version }}.tar.gz
  sha256: c729764cc5f3c856911b204392ef1fbbef831341bbd9c62ff00b2d3f07159c83

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django-cms >=3.6
    - html5lib >=1
    - pillow
    - packaging

tests:
  - python:
      imports:
        - djangocms_text_ckeditor
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Text Plugin for django CMS with CKEditor support
  license: BSD-3-Clause AND GPL-2.0-or-later AND MIT
  license_file:
    - LICENSE
    - djangocms_text_ckeditor/static/djangocms_text_ckeditor/ckeditor/LICENSE.md
    - djangocms_text_ckeditor/static/djangocms_text_ckeditor/ckeditor/plugins/wsc/LICENSE.md
    - djangocms_text_ckeditor/static/djangocms_text_ckeditor/ckeditor/plugins/exportpdf/LICENSE.md
    - djangocms_text_ckeditor/static/djangocms_text_ckeditor/ckeditor/plugins/scayt/LICENSE.md
    - djangocms_text_ckeditor/static/djangocms_text_ckeditor/ckeditor/samples/toolbarconfigurator/font/LICENSE.txt
    - djangocms_text_ckeditor/static/djangocms_text_ckeditor/ckeditor/samples/toolbarconfigurator/lib/codemirror/LICENSE
  homepage: https://github.com/django-cms/djangocms-text-ckeditor
  repository: https://github.com/django-cms/djangocms-text-ckeditor
  description: |
    Text Plugin for django CMS providing rich-text editing with CKEditor
    support, including HTML cleanup via html5lib and inline plugin embedding.

extra:
  recipe-maintainers:
    - rxm7706

