    - pkg:pypi/wagtail-experiments@${{ version }}
  cfe-upstream-repo: https://github.com/torchbox/wagtail-experiments
  cfe-upstream-homepage: https://github.com/torchbox/wagtail-experiments
  cfe-import-names: [experiments]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/wagtail-experiments-feedstock
  cfe-forge-recipe-updates-needed:
