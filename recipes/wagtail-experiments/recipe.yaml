# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4"

package:
  name: wagtail-experiments
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-experiments/wagtail-experiments-${{ version }}.tar.gz
  sha256: 32adc3e85685ef44e1760806208b426bcc722646f3624ff72cf81c662f78f93a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - experiments
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A/B testing for Wagtail
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/torchbox/wagtail-experiments
  repository: https://github.com/torchbox/wagtail-experiments

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: wagtail-experiments
  cfe-upstream-registry: pypi
  cfe-upstream-name: wagtail-experiments
