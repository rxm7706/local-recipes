# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.0"
  # langflow-sdk is wheel-only on PyPI (no sdist), but its source IS in the langflow
  # monorepo (src/sdk). conda-forge prefers source over wheel → source the GitHub tag
  # archive + build the subdir. The monorepo tag (1.10.0) is INDEPENDENT of this
  # package's version (0.2.0) — bump BOTH on update (autotick can't auto-bump this).
  monorepo_tag: "1.10.0"

package:
  name: langflow-sdk
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ monorepo_tag }}.tar.gz
  sha256: 45a317111a5d7cbc2709e683a72a80779801a658f61e506b612978588788ab71

build:
  noarch: python
  number: 0
  # build the src/sdk subdir from the monorepo source (hatchling backend)
  script: ${{ PYTHON }} -m pip install ./src/sdk --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.15
    - httpx
    - h2
    - pydantic-settings >=2.10.1
    - pydantic >=2.0.0
    - tomli >=2.2.1
    - typing_extensions >=4.14.0

tests:
  - python:
      imports:
        - langflow_sdk
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langflow-sdk/
  license: MIT
  license_file: LICENSE
  summary: Python SDK for the Langflow REST API
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org
  description: |
    langflow-sdk is the Python client SDK for the Langflow REST API. It provides
    synchronous and asynchronous clients (Client / LangflowClient and
    AsyncClient / AsyncLangflowClient), typed models for flows and projects,
    environment-based configuration, and helpers for running flows and
    streaming responses against a Langflow server.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: langflow-sdk
  cfe-upstream-registry: pypi
  cfe-upstream-name: langflow-sdk
  cfe-purls:
