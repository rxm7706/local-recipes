# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.1.1"

package:
  name: confluence-markdown-exporter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/confluence-markdown-exporter/confluence_markdown_exporter-${{ version }}.tar.gz
  sha256: 858b2bd5d77762908de3611c79a085dda4256ee650d3326b97a295683c5500c3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - confluence-markdown-exporter = confluence_markdown_exporter.main:app
      - cme = confluence_markdown_exporter.main:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - atlassian-python-api
    - jmespath
    - markdownify
    - pydantic-settings
    - pyyaml
    - questionary
    - rich
    - tabulate
    - typer
    - python-dateutil
    - lxml >=6.0.2
    - pydantic
    - beautifulsoup4
    - requests

tests:
  - python:
      imports:
        - confluence_markdown_exporter
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - confluence-markdown-exporter --help
      - cme --help

about:
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/confluence-markdown-exporter
  repository: https://github.com/Spenhouet/confluence-markdown-exporter
  documentation: https://github.com/Spenhouet/confluence-markdown-exporter/blob/main/README.md
  summary: A tool to export Confluence pages to Markdown
  description: |
    The confluence-markdown-exporter exports Confluence pages in Markdown format.
    This exporter helps in migrating content from Confluence to platforms that support Markdown.
    e.g. Obsidian, Gollum, Azure DevOps (ADO), Foam, Dendron and more.

extra:
  recipe-maintainers:
    - rxm7706

