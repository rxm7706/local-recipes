# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: wagtail
  version: "7.4"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/wagtail-${{ version }}.tar.gz
  sha256: 9570c51d61ee524cc5558a84df40e2ccc03f7c50c6dad343644a45d037096d13

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - wagtail = wagtail.bin.wagtail:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=78.0
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=5.2
    - django-modelcluster >=6.5,<7.0
    - django-permissionedforms >=0.1,<1.0
    - django-taggit >=5.0,<7
    - django-treebeard >=4.8,<6.0
    - djangorestframework >=3.15.1,<4.0
    - django-filter >=23.3
    - draftjs_exporter >=2.1.5,<6.0
    - pillow >=9.1.0
    - beautifulsoup4 >=4.13.3,<5
    - willow >=1.11.0,<2
    - requests >=2.11.1,<3.0
    - openpyxl >=3.0.10,<4.0
    - anyascii >=0.1.5
    - telepath >=0.3.1,<1
    - laces >=0.1,<0.2
    - django-tasks >=0.9,<0.13
    - modelsearch >=1.3,<1.4
tests:
  - python:
      imports:
        - wagtail
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - wagtail help

about:
  summary: A Django content management system focused on flexibility and user experience
  homepage: https://wagtail.org/
  description: |
    Wagtail is an open source content management system built on Django, with a strong community and commercial support.
    It's focused on user experience, and offers precise control for designers and developers.
  repository: https://github.com/wagtail/wagtail
  documentation: https://docs.wagtail.org/en/stable/
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - wagtail/models/copying.py

extra:
  recipe-maintainers:
    - darynwhite
    - rxm7706
