# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  python_min: "3.12"
  version: "1.3.0"

package:
  name: cuga-oak-health
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/cuga-oak-health/cuga_oak_health-${{ version }}.tar.gz
  sha256: 53800bcfc30a89d7046dfcc8225f746f81077fd9816b0cd88f215506775b37b9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - cuga-oak-health = oak_health.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - fastapi >=0.104.0
    - uvicorn >=0.24.0
    - pydantic >=2.0.0

tests:
  - python:
      imports:
        - oak_health
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/cuga-project/cuga-agent
  license: Apache-2.0
  license_file: LICENSE
  summary: Oak Health Insurance FastAPI application and benchmark data
  repository: https://github.com/cuga-project/cuga-agent
  description: |
    Oak Health Insurance FastAPI application and benchmark data, part of
    IBM Research's CUGA (ConfigUrable Generalist Agent) project. Provides a
    mock health-insurance REST API (claims, coverage, benefits, billing,
    find-care, medical information) used as a benchmark target for the
    CUGA enterprise agent harness.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
