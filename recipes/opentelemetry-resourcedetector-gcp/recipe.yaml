# CFE comments
# Header:
#    C1 keep-meta refresh. The conda-forge feedstock is still v0/meta.yaml at
#    the same deployed version (1.12.0a0); meta.yaml mirrors it verbatim and
#    recipe.yaml is the proposed v1 migration. cfe-forge-recipe-updates-needed
#    carries meta-yaml-to-recipe-yaml because the feedstock owes the v0->v1
#    switch.
# context:
#    version is the EXACT deployed/PyPI pre-release string "1.12.0a0", quoted
#    so YAML keeps it a string (an unquoted pre-release can mis-type).
#    python_min is omitted from context: upstream requires-python is >=3.9,
#    below the conda-forge default floor of 3.10, so the default floor applies
#    and conda-forge-pinning supplies python_min.
# source:
#    sdist ships LICENSE at the archive root, so license_file: LICENSE resolves
#    from the extracted tarball (canonical pattern 1); no secondary source.
# requirements:
#  host:
#    setuptools is required: the project builds from setup.py + setup.cfg (no
#    pyproject.toml / PEP 517 backend), so the legacy setuptools backend must
#    be present in host. Matches the deployed feedstock meta.yaml.
#  run:
#    Dependency translations from setup.cfg install_requires (the authoritative
#    source) - all use PEP 440 compatible-release (~=) which grayskull/the
#    feedstock emit as the verbose "<N.dev0" glob form:
#      opentelemetry-api ~= 1.30  ->  >=1.30,<2
#      opentelemetry-sdk ~= 1.30  ->  >=1.30,<2
#      requests          ~= 2.24  ->  >=2.24,<3
#      typing_extensions ~= 4.0   ->  >=4.0,<5
#    Translated to the clean semantically-equivalent ">=floor,<next_major" form
#    (the deployed feedstock meta.yaml keeps the verbose "<N.dev0" form verbatim).
#    No "==N.*,>=floor" conda-build glob deps were present, so no incompatible
#    "'*' with '=='" translation was needed in this recipe.
#    conda-forge dep name: typing_extensions uses the underscore spelling on
#    conda-forge (the feedstock lists both spellings; the underscore one is
#    canonical).
# tests:
#    import name is the verified dotted namespace path from the sdist
#    (src/opentelemetry/resourcedetector/gcp_resource_detector/__init__.py),
#    not the hyphen->underscore distribution name (G7).
