# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.4.0"

package:
  name: django-colorful
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-colorful/django_colorful-${{ version }}.tar.gz
  sha256: f668374b20f6d8135a2de4534ca0d6d8bdb3d46235db8664a8d8532e5af0f66e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64
    - setuptools-scm >=8
  run:
    - python >=${{ python_min }}
    - django >=4.2

tests:
  - python:
      imports:
        - colorful
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: An extension to the Django web framework that provides database and form color fields
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/charettes/django-colorful
  repository: https://github.com/charettes/django-colorful

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
