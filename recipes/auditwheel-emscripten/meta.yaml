{% set name = "auditwheel-emscripten" %}
{% set version = "0.2.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/auditwheel_emscripten-{{ version }}.tar.gz
  sha256: 022a1526e549f9365aab5ca52402d54756c4ff57f0fd88f56548c329f91740b1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.12
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.12
    - leb128
    - packaging
    - pyodide-cli >=0.4
    - wheel

test:
  imports:
    - auditwheel_emscripten
  commands:
    - pip check
  requires:
    - pip

about:
  summary: auditwheel-like tool for Pyodide
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
