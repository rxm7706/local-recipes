# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.9.0"

package:
  name: django-celery-beat
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-celery-beat/django_celery_beat-${{ version }}.tar.gz
  sha256: 92404650f52fcb44cf08e2b09635cb1558327c54b1a5d570f0e2d3a22130934c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - celery >=5.2.3,<6.0
    - django-timezone-field >=5.0
    - tzdata
    - python-crontab >=2.3.4
    - cron-descriptor >=1.2.32,<2.0.0
    - django >=2.2,<6.1

tests:
  - python:
      imports:
        - django_celery_beat
        - django_celery_beat.migrations
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Database-backed Periodic Tasks.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/celery/django-celery-beat
  repository: https://github.com/celery/django-celery-beat

extra:
  recipe-maintainers:
    - hadim
    - rxm7706

#### CFE metadata AND comments
