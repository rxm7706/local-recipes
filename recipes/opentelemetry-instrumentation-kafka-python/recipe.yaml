# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.63b1"

package:
  name: opentelemetry-instrumentation-kafka-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opentelemetry-instrumentation-kafka-python/opentelemetry_instrumentation_kafka_python-${{ version }}.tar.gz
  sha256: b572bd9f02b5efe18292442190924bef9b86a51436c9d120745a950a584fe5f8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - kafka-python >=2.0,<3.0
    - opentelemetry-api >=1.5,<2.dev0
    - opentelemetry-instrumentation ==${{ version }}
    - opentelemetry-semantic-conventions ==${{ version }}

tests:
  - python:
      imports:
        - opentelemetry.instrumentation.kafka
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/instrumentation/opentelemetry-instrumentation-kafka-python
  repository: https://github.com/open-telemetry/opentelemetry-python-contrib
  license: Apache-2.0
  license_file: LICENSE
  summary: OpenTelemetry Kafka-Python instrumentation
  description: |
    OpenTelemetry Kafka-Python instrumentation

extra:
  recipe-maintainers:
    - rxm7706

