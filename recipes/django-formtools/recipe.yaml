# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.6.1"

package:
  name: django-formtools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-formtools/django_formtools-${{ version }}.tar.gz
  sha256: 603ebc69a4b76b9bf38534f6e0245face007c7ed31bdfa073f8bf45cff5d7122

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2

tests:
  - python:
      imports:
        - formtools
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A set of high-level abstractions for Django forms
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://django-formtools.readthedocs.io/en/latest/
  repository: https://github.com/jazzband/django-formtools

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: django-formtools
  cfe-upstream-registry: pypi
  cfe-upstream-name: django-formtools
