    - pkg:pypi/django-formtools@${{ version }}
  cfe-upstream-repo: https://github.com/jazzband/django-formtools
  cfe-upstream-homepage: https://django-formtools.readthedocs.io/en/latest/
  cfe-import-names: [formtools]
