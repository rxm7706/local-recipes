# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.31.0"

package:
  name: wagtail-grapple
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-grapple/wagtail_grapple-${{ version }}.tar.gz
  sha256: 5a70e88dca5188181e42306b207b1e38cf5df4452aa62e764b9e997e2ea19797

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - wagtail >=6.3
    - graphene-django >=3,<4
    - wagtail-headless-preview

tests:
  - python:
      imports:
        - grapple
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Wagtail package that speeds up and simplifies implementing a GraphQL endpoint!
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/torchbox/wagtail-grapple
  repository: https://github.com/torchbox/wagtail-grapple
  description: |
    Grapple is a Wagtail app that speeds up and simplifies implementing a
    GraphQL endpoint for your Wagtail site. It builds on top of
    graphene-django to expose your Wagtail pages, models, snippets, images,
    documents and settings through a configurable GraphQL API.

extra:
  recipe-maintainers:
    - rxm7706

