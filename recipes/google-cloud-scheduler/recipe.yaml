# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.20.0"

package:
  name: google-cloud-scheduler
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-cloud-scheduler/google_cloud_scheduler-${{ version }}.tar.gz
  sha256: 17fee4b894e588587f76518185f20b6f7ddbce04ca91bbbb325ea995222d2b87

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.17.1,<3.0.0
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    - grpcio >=1.59.0,<2.0.0
    - grpcio-status >=1.59.0,<2.0.0
    - proto-plus >=1.22.3,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - google.cloud.scheduler
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Google Cloud Scheduler API client library
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-scheduler
  repository: https://github.com/googleapis/google-cloud-python
  documentation: https://cloud.google.com/python/docs/reference/cloudscheduler/latest

extra:
  recipe-maintainers:
    - rxm7706

