# context:
#    # python_min omitted from context: upstream requires-python is >=3.8, below
#    # the conda-forge 3.10 floor, so let conda-forge-pinning supply python_min.
# package:
#    # literal package.name (django-nyt) + literal pypi.org source.url path,
#    # replacing the feedstock's name-interpolation chain.
# requirements:
#  run:
#    # dropped the feedstock's speculative python <4.0 upper bound (upstream only
#    # declares requires-python >=3.8, no maximum); broad >=python_min is correct.
#    # django >=2.2,<5.3 mirrors upstream pyproject [project.dependencies]; the
#    # <5.3 upper bound is upstream-declared, load-bearing under pip_check.
# tests:
#    # CFEP-25 triad with [python_min.*, "*"] — modernizes the feedstock's
#    # single-version python_version. django_nyt imports cleanly standalone (the
#    # bare package __init__ does not require DJANGO_SETTINGS_MODULE), so the
#    # standard python.imports test holds — no package_contents escape hatch.
