# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.0"

package:
  name: wagtail-pdf
  version: ${{ version }}

source:
  url: https://github.com/donhauser/wagtail-pdf/archive/${{ version }}.tar.gz
  sha256: 54ad1d87ae6795e4572bb7b98cc072f07aa26517ac94e99f09a740733e61d760

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - wagtail
    - django-weasyprint

tests:
  - python:
      imports:
        - wagtail_pdf_view
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: PDF rendering views for the Wagtail CMS
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/donhauser/wagtail-pdf
  repository: https://github.com/donhauser/wagtail-pdf
  description: |
    PDF rendering views for the Wagtail CMS. Provides view mixins to render
    Wagtail pages and Django views as PDF documents via WeasyPrint
    (django-weasyprint), with optional LaTeX rendering via django-tex.

extra:
  recipe-maintainers:
    - rxm7706

