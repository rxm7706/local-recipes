# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0"

package:
  name: wagtail-storages
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-storages/wagtail_storages-${{ version }}.tar.gz
  sha256: ba3da585d4ffeb8acd828adbed905cbe3db1e799d41318afbd953a472afd1b38

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=4.2
    - wagtail >=5.2
    - django-storages <2
    - boto3 >=1.4.4

tests:
  - python:
      imports:
        - wagtail_storages
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Use AWS S3 with private documents in Wagtail.
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/torchbox/wagtail-storages
  repository: https://github.com/torchbox/wagtail-storages

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
