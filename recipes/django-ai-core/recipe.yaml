# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.5"
  python_min: "3.11"

package:
  name: django-ai-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-ai-core/django_ai_core-${{ version }}.tar.gz
  sha256: a6c20b1fc29c7bed8fd3639a0898cbc91eb67da5f5762882d9b0880b6ab8678a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.8.22,<0.9.0
    - pip
  run:
    - python >=${{ python_min }}
    - any-llm-sdk ==0.20.3
    - queryish >=0.3.0

tests:
  - python:
      imports:
        - django_ai_core
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Django AI Core provides developer-focused AI features for implementing AI tooling in to Django sites.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/wagtail/django-ai-core

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
