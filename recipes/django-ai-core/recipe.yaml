    - pkg:pypi/django-ai-core@${{ version }}
  cfe-upstream-repo: https://github.com/wagtail/django-ai-core
  cfe-upstream-homepage: https://github.com/wagtail/django-ai-core
  cfe-import-names: [django_ai_core]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
