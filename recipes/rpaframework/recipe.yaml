# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: rpaframework
  version: "31.2.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/rpaframework-${{ version }}.tar.gz
  sha256: 65ebca4b7db36a0235fbc5caa3d9aa9e0e4d9ff2fcc6b40938b773901be1b2a7

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - rpa-crypto = RPA.scripts.crypto:main
      - use-robocorp-vault = RPA.scripts.robocorp_cloud:main

requirements:
  host:
    - python >3.9.1,<3.14
    - hatchling
    - pip
  run:
    - python >3.9.1,<3.14
    - docutils >=0.21.2
    - rpaframework-core >=12.1.1
    - rpaframework-pdf >=10.0.3
    - if: win
      then: rpaframework-windows >=10.0.2
    - java-access-bridge-wrapper >=1.1.0
    - robocorp-storage >=1.0.2
    - jsonpath-ng >=1.5.2
    - robotframework >=4.0.0,!=4.0.1,!=6.1.0,<8.0.0
    - if: win
      then: robotframework-sapguilibrary >=1.1
    - robotframework-seleniumlibrary >=6.7.1
    - robotframework-seleniumtestability >=2.0.0
    - robotframework-requests >=0.9.1
    - if: win
      then: pywinauto >=0.6.8
    - if: win
      then: pywin32-on-windows >=302,<=311
    - if: win
      then: comtypes >=1.1.11
    - robotframework-pythonlibcore >=4.2.0
    - pynput-robocorp-fork >=5.0.0
    - if: linux
      then: python-xlib >=0.17
    - if: win
      then: psutil >=5.7.0
    - pyperclip >=1.8.0
    - exchangelib >=5.1.0
    - tzlocal >=4.2
    - xlrd >=2.0.1
    - xlwt >=1.3.0
    - xlutils >=2.0.0
    - openpyxl >=3.0.9
    - pillow >=10.2.0
    - simple-salesforce >=1.0.0
    - netsuitesdk >=1.1.0
    - tweepy >=3.8.0
    - python-graphviz >=0.13.2
    - notifiers >=1.3.3
    - cryptography >=46.0.5
    - python-mss >=6.0.0
    - chardet >=3.0.0
    - pysocks >=1.5.6,!=1.5.7,<2.0.0
    - selenium >=4.16.0,<5.0.0
    - click >=8.1.2
    - pyyaml >=5.4.1,<7.0.0
    - tenacity >=8.0.1
    - htmldocx >=0.0.6
    - python-docx >=0.8.11
    - beautifulsoup4 >=4.7.0
    - pyotp >=2.6.0
    - importlib-metadata >=4.13.0
    - o365 >=2.0.21,<2.0.27
    - requests >=2.28.1
    - oauthlib >=3.2.2
    - requests-oauthlib >=1.3.1
    - pyjwt >=2.6.0
    - validators >=0.34.0
    - smartsheet-python-sdk ==3.0.2
    - pendulum >=3.0.0
    - wrapt >=1.14.0
    - holidays >=0.45

tests:
  - python:
      imports:
        - rpaframework
      pip_check: true
  - requirements:
      run:
        - pip
    script:
      - rpa-crypto --help
      - use-robocorp-vault --help

about:
  summary: A collection of tools and libraries for RPA
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706