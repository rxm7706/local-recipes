# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.1.0"
  python_min: "3.12"

package:
  name: scrapegraph-py
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/scrapegraph-py/scrapegraph_py-${{ version }}.tar.gz
  sha256: c4d1ed4d0c11c5c10e999d310ce1146f62809a91292b3d07d69b40c2a0954d75

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.27.0
    - pydantic >=2.0.0

tests:
  - python:
      imports:
        - scrapegraph_py
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/scrapegraph-py/
  license: MIT
  license_file: LICENSE
  summary: Official Python SDK for ScrapeGraph AI API
  repository: https://github.com/ScrapeGraphAI/scrapegraph-py
  documentation: https://docs.scrapegraphai.com
  description: |
    scrapegraph-py is the official Python SDK for the ScrapeGraph AI API,
    providing a client for AI-powered web scraping and data extraction.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: scrapegraph-py
  cfe-upstream-registry: pypi
  cfe-upstream-name: scrapegraph-py
  cfe-name-aliases:
