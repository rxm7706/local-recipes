  cfe-purls:
    - pkg:conda/scrapegraph-py@${{ version }}
    - pkg:pypi/scrapegraph-py@${{ version }}
  cfe-upstream-repo: https://github.com/ScrapeGraphAI/scrapegraph-py
  cfe-upstream-homepage: https://scrapegraphai.com
