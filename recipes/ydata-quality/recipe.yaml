# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: ydata-quality
  version: "0.1.2"
  python_min: '3.7'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/ydata_quality-${{ version }}.tar.gz
  sha256: a0e7d9816b3cd07167c7d2cb0c24cd88477fef49549540d6a94a96c8dad497bf

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }},<3.9
    - dython ==0.6.7
    - matplotlib-base ==3.4.2
    - numpy ==1.20.3
    - pandas >=1.2.0,<1.3.0
    - pydantic ==1.8.2
    - scikit-learn ==0.24.2
    - statsmodels ==0.12.2

tests:
  - python:
      imports:
        - ydata_quality
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: YData open-source tools for Data Quality.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ydataai/ydata-quality

extra:
  recipe-maintainers:
    - rxm7706
