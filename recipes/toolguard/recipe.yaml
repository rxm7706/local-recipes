# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.19"

package:
  name: toolguard
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/toolguard/toolguard-${{ version }}.tar.gz
  sha256: a4f11dbfe7d53b3d6b5425005ae2d066a06a80ebe80b212ef3e560d15ffc6f4c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.15
    - datamodel-code-generator >=0.52.2
    - langchain-core >=0.3.72
    - litellm >=1.82.6,!=1.82.7,!=1.82.8
    - markdown >=3.7
    - pydantic >=2.11.0
    - pytest >=8.3.3
    - pytest-asyncio >=1.3.0
    - pytest-json-report >=1.5.0
    - pyright >=1.1.408
    - smolagents >=1.21.3
    - fastmcp >=2.14
    - loguru

tests:
  - python:
      imports:
        - toolguard
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/AgentToolkit/toolguard
  license: Apache-2.0
  license_file: LICENSE
  summary: Policy adherence code generation for guarding AI agent tools
  repository: https://github.com/AgentToolkit/toolguard
  description: |
    ToolGuard generates deterministic Python code that enforces operational
    policies before an AI agent invokes a tool. It analyzes a policy document
    and a set of tools, then emits per-tool ToolGuard specifications declaring
    preconditions that must hold prior to function invocation, raising alerts
    when a tool-related policy is deemed violated.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: toolguard
  cfe-upstream-registry: pypi
  cfe-upstream-name: toolguard
  cfe-purls:
    - pkg:conda/toolguard@${{ version }}
    - pkg:pypi/toolguard@${{ version }}
  cfe-upstream-repo: https://github.com/AgentToolkit/toolguard
  cfe-upstream-homepage: https://github.com/AgentToolkit/toolguard
  cfe-import-names: [toolguard]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list:
    - smolagents not yet on conda-forge
  cfe-last-checked: 2026-06-19T19:01:00Z
  cfe-generated-by-version: 8.30.1
  cfe-generated-at-datetime: 2026-06-19T13:36:19Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:01:55Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
