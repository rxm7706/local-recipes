{% set name = "vulture" %}
{% set version = "2.16" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/vulture-{{ version }}.tar.gz
  sha256: f8d9f6e2af03011664a3c6c240c9765b3f392917d3135fddca6d6a68d359f717

build:
  noarch: python
  entry_points:
    - vulture = vulture.core:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=68.0
    - wheel
  run:
    - python >={{ python_min }}
    - tomli >=1.1.0

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
     - dev
     #- dist
     - vulture
  commands:
    - pip check
    - vulture --help

about:
  home: https://github.com/jendrikseipp/vulture
  summary: Find dead code
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - Zeitsperre
    - jakirkham
    - rxm7706
