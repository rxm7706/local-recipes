# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: vulture
  version: "2.16"
  python_min: '3.10'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/vulture-${{ version }}.tar.gz
  sha256: f8d9f6e2af03011664a3c6c240c9765b3f392917d3135fddca6d6a68d359f717

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - vulture = vulture.core:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<4
    - tomli >=1.1.0

tests:
  - python:
      imports:
        - dev
        - vulture
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - vulture --help

about:
  homepage: https://github.com/jendrikseipp/vulture
  summary: Find dead code
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - Zeitsperre
    - jakirkham
    - rxm7706
