{% set name = "sqlglot" %}
{% set version = "29.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sqlglot-{{ version }}.tar.gz
  sha256: 0010b4f77fb996c8d25dd4b16f3654e6da163ff1866ceabc70b24e791c203048

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=61.0
    - setuptools-scm
    - pip
  run:
    - python >=3.9

test:
  imports:
    - sqlglot
  commands:
    - pip check
  requires:
    - pip

about:
  summary: An easily customizable SQL parser and transpiler
  license: BSD-2-Clause AND MIT
  license_file:
    - LICENSE
    - tests/fixtures/jsonpath/LICENSE

extra:
  recipe-maintainers:
    - rxm7706
