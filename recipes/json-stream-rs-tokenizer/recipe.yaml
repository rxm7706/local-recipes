# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.1"

package:
  name: json-stream-rs-tokenizer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/json-stream-rs-tokenizer/json_stream_rs_tokenizer-${{ version }}.tar.gz
  sha256: a07f1aae5915adc431e9dd61dd636a333c46b52f34ab6dccf98b2c65eae269f8

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python
    - setuptools
    - wheel
    - setuptools-rust >=1,<2
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - json_stream_rs_tokenizer
      pip_check: true

about:
  homepage: https://github.com/smheidrich/py-json-stream-rs-tokenizer
  summary: A faster tokenizer for the json-stream Python library
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: json-stream-rs-tokenizer
  cfe-upstream-registry: pypi
  cfe-upstream-name: json-stream-rs-tokenizer
  cfe-purls:
    - pkg:conda/json-stream-rs-tokenizer@${{ version }}
    - pkg:pypi/json-stream-rs-tokenizer@${{ version }}
  cfe-upstream-repo: https://github.com/smheidrich/py-json-stream-rs-tokenizer
  cfe-upstream-homepage: https://github.com/smheidrich/py-json-stream-rs-tokenizer
  cfe-import-names: [json_stream_rs_tokenizer]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/json-stream-rs-tokenizer-feedstock
  cfe-forge-recipe-updates-needed:
    - meta-yaml-to-recipe-yaml
