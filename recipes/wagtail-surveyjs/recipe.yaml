# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.0"

package:
  name: wagtail-surveyjs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-surveyjs/wagtail_surveyjs-${{ version }}.tar.gz
  sha256: f7f8e609a0f7b6334d0555d51c0ea382c558f1e43c7882579fd11c3c2ca1a2f9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - wagtail >=7.0
    - wagtail-modeladmin >=2.0.0

tests:
  - python:
      imports:
        - wagtailsurveyjs
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Integrate SurveyJS in Wagtail Projects.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/wmo-raf/wagtail-surveyjs
  repository: https://github.com/wmo-raf/wagtail-surveyjs

extra:
  recipe-maintainers:
    - rxm7706

