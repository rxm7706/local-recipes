# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.11.0"
  python_min: "3.11"

package:
  name: ibm-watsonx-orchestrate-clients
  version: ${{ version }}

source:
  url: https://github.com/IBM/ibm-watsonx-orchestrate-adk/archive/refs/tags/${{ version }}.tar.gz
  sha256: afb442be18de9452f3f0a00f420d74d81440287af436048c99e73468cc90cbbc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install ./packages/clients -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }},<3.15
    - ibm-cloud-sdk-core >=3.24.2
    - ibm-watsonx-orchestrate-core ==2.11.0
    - websocket-client >=1.8.0,<2.0.0

tests:
  - python:
      imports:
        - ibm_watsonx_orchestrate_clients
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/ibm-watsonx-orchestrate-clients/
  license: MIT
  license_file: LICENSE
  summary: IBM watsonx Orchestrate ADK API Client Library
  repository: https://github.com/IBM/ibm-watsonx-orchestrate-adk
  documentation: https://developer.watson-orchestrate.ibm.com/
  description: |
    API client library for the IBM watsonx Orchestrate Agent Development
    Kit (ADK). Provides typed HTTP and WebSocket clients for the watsonx
    Orchestrate platform — agents, channels, connections, knowledge bases,
    tools, threads, models and model policies, voice configurations, and
    chat/run orchestration — built on the shared types in
    ibm-watsonx-orchestrate-core.

extra:
  recipe-maintainers:
    - rxm7706

