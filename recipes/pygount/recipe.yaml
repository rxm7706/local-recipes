# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.2.0"

package:
  name: pygount
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pygount/pygount-${{ version }}.tar.gz
  sha256: 27b03a6c6d791c4920003eec361a3c38ccd815637c51f5536efb9e47db1d452a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pygount = pygount.command:main

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - chardet >=5,<6
    - gitpython >=3.1,<4.0
    - pygments >=2,<3
    - rich >=14

tests:
  - python:
      imports:
        - pygount
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - git
    script:
      - pygount --help

about:
  summary: count source lines of code (SLOC) using pygments
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: https://github.com/roskakori/pygount
  repository: https://github.com/roskakori/pygount
  documentation: https://pygount.readthedocs.io
  description: |
    pygount counts lines of source code (SLOC) using pygments lexers to
    distinguish code, comments, and empty lines across many programming
    languages.

extra:
  recipe-maintainers:
    - rxm7706

