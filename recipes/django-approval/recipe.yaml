# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.15.1"

package:
  name: django-approval
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-approval/django-approval-${{ version }}.tar.gz
  sha256: 92bc352206c1761152eb3f20cff462f1cf4ad927b1d5949df7643c895bee8a7c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
  run:
    - python >=${{ python_min }}
    - django >=3.2

tests:
  - python:
      imports:
        - approval
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Easily moderate any content in Django before it's visible to the public.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/artscoop/django-approval
  repository: https://github.com/artscoop/django-approval

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: django-approval
