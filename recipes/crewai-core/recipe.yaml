# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.14.7"

package:
  name: crewai-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/crewai-core/crewai_core-${{ version }}.tar.gz
  sha256: c8c16f29abb515380c45b729c22fca3ade29a51d25211ce5ac63b50f7af7179e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - appdirs >=1.4.4,<1.5.dev0
    - cryptography >=42.0
    - httpx >=0.28.1,<0.29.dev0
    - packaging >=23.0
    - portalocker >=2.7.0,<2.8.dev0
    - pyjwt >=2.13.0,<3
    - pydantic >=2.11.9,<2.13
    - rich >=13.7.1
    - opentelemetry-api >=1.34.0,<1.35.dev0
    - opentelemetry-sdk >=1.34.0,<1.35.dev0
    - opentelemetry-exporter-otlp-proto-http >=1.34.0,<1.35.dev0
    - tomli >=2.0.2,<2.1.dev0

tests:
  - python:
      imports:
        - crewai_core
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Shared utilities for CrewAI — version, paths, user-data, telemetry, printer.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/crewAIInc/crewAI
  documentation: https://docs.crewai.com

extra:
  recipe-maintainers:
    - rxm7706
