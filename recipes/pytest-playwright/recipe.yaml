# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.0"

package:
  name: pytest-playwright
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-playwright/pytest_playwright-${{ version }}.tar.gz
  sha256: 7888d4a2443160c82e0c506c437076679f86b36d1910427250d90fbf1843a981

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - setuptools-scm
  run:
    - python >=${{ python_min }}
    - playwright-python >=1.18
    - pytest >=6.2.4,<10.0.0
    - pytest-base-url >=1.0.0,<3.0.0
    - python-slugify >=6.0.0,<9.0.0

tests:
  - python:
      imports:
        - pytest_playwright
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A pytest wrapper with fixtures for Playwright to automate web browsers
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/microsoft/playwright-pytest
  repository: https://github.com/microsoft/playwright-pytest
  description: |
    A pytest wrapper with fixtures for Playwright to automate web browsers.
    Provides context-managed Playwright fixtures (page, browser, context)
    so end-to-end browser tests can be written as ordinary pytest functions.

extra:
  recipe-maintainers:
    - rxm7706

