# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.1.0"

package:
  name: wagtail-flexible-forms
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-flexible-forms/wagtail_flexible_forms-${{ version }}.tar.gz
  sha256: 558401f14ee116887eeecb55d98e5b901c4455f32b7ccd1e235d8a0928121479

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=65.0
    - pip
  run:
    - python >=${{ python_min }}
    - wagtail >=6.0,<8.0

tests:
  - python:
      imports:
        - wagtail_flexible_forms
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Wagtail StreamField-based form builder.
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: https://docs.coderedcorp.com/wagtail-flexible-forms
  repository: https://github.com/coderedcorp/wagtail-flexible-forms
  documentation: https://docs.coderedcorp.com/wagtail-flexible-forms

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
