# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.1"
  # wheel-only on PyPI; source IS in the langflow monorepo (src/bundles/ibm).
  # conda-forge prefers source > wheel. monorepo tag != package version - bump BOTH.
  monorepo_tag: "1.10.0"

package:
  name: lfx-ibm
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ monorepo_tag }}.tar.gz
  sha256: 45a317111a5d7cbc2709e683a72a80779801a658f61e506b612978588788ab71

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install ./src/bundles/ibm --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - ibm_db >=3.2.9,<4.0.0
    - ibm-watsonx-ai >=1.3.1,<2.0.0
    - langchain-community >=0.4.1,<1.0.0
    - langchain-ibm >=1.1.0,<1.2.0
    - lfx >=1.10.0

tests:
  - python:
      imports:
        - lfx_ibm
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langflow-ai/langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org/extensions
  license: MIT
  license_file: LICENSE
  summary: IBM components (Db2 Vector Store + watsonx.ai LLM and embeddings) as a standalone Langflow Extension Bundle

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: lfx-ibm
  cfe-upstream-registry: pypi
  cfe-upstream-name: lfx-ibm
  cfe-purls:
    - pkg:conda/lfx-ibm@${{ version }}
    - pkg:pypi/lfx-ibm@${{ version }}
  cfe-upstream-repo: https://github.com/langflow-ai/langflow
  cfe-upstream-homepage: https://github.com/langflow-ai/langflow
  cfe-import-names: [lfx_ibm]
  cfe-source-kind: github-tag
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list:
    - langchain-ibm        # not on conda-forge AND not in local channel (third-party blocker; needs authoring)
    - ibm-watsonx-ai       # not on conda-forge AND not in local channel (third-party blocker; needs authoring)
  cfe-last-checked: 2026-06-19T20:15:00Z
  cfe-generated-by-version: 8.34.0
  cfe-generated-at-datetime: 2026-06-19T20:15:00Z
  cfe-local-build-status: build-clean-test-blocked
  cfe-local-build-datetime: 2026-06-20T01:16:55Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
