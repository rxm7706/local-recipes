# CFE comments
# Header:
#    # lfx-ibm is a langflow Extension Bundle (langflow-ai/langflow monorepo,
#    # src/bundles/) shipping the IBM components: Db2 Vector Store + watsonx.ai
#    # LLM + watsonx embeddings. The entry point is a `langflow.extensions`
#    # plugin entry (lfx-ibm = lfx_ibm), NOT a console script, so no
#    # build.python.entry_points block is needed.
#    # grayskull cannot generate this recipe: PyPI ships a wheel only (no
#    # sdist), so the recipe is hand-authored from the canonical wheel URL.
# source:
#    # Wheel-only upstream (no sdist on PyPI). Path-2 segment is hyphenated
#    # (lfx-ibm); filename stem is underscored (lfx_ibm). py-tag is "py3" and
#    # may change on a version bump — re-check the wheel filename when bumping.
# about:
#    # No LICENSE in the wheel and the metadata License field is just "MIT"
#    # (no bundled file); the langflow-ai/langflow monorepo LICENSE is MIT
#    # (Copyright 2024 Langflow). LICENSE shipped in-recipe (canonical pattern
#    # 2) because the wheel omits it.
# requirements:
#  run:
#    # Import name is lfx_ibm (verified from the wheel's lfx_ibm/__init__.py),
#    #   G7-checked.
#    # ibm_db (underscore) is the conda-forge feedstock spelling (G10): PyPI
#    #   ships `ibm-db` (hyphen) but conda-forge ships `ibm_db`. It is a
#    #   compiled C-extension shipping linux-64 only (no noarch); upstream's
#    #   marker gates it to NOT-(linux aarch64), consistent with that. For a
#    #   noarch artifact a per-platform run-dep marker would need
#    #   noarch_platforms and risks G12/G35; listed unconditionally. ibm_db IS
#    #   on conda-forge, so NOT a blocker.
#    # langchain-ibm and ibm-watsonx-ai are KNOWN third-party blockers: absent
#    #   from conda-forge (all four G10 spellings checked) AND the local
#    #   channel; each needs authoring before lfx-ibm can be submitted (see
#    #   cfe-forge-blocker-list).
#    # langchain-community resolves on conda-forge (langchain-community
#    #   feedstock). lfx resolves from the local channel (lfx 1.10.0).
####
