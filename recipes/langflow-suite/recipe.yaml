# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.10.0"
  python_min: "3.11"

recipe:
  name: langflow-suite
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 45a317111a5d7cbc2709e683a72a80779801a658f61e506b612978588788ab71

build:
  number: 0

outputs:
  # ======================================================================
  # OUTPUT 1: lfx (Langflow Executor Engine)
  # ======================================================================
  - package:
      name: lfx
      version: ${{ version }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install src/lfx -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        - langchain-core >=1.2.28,<2.0.0
        - pandas >=2.0.0,<3.0.0
        - pydantic >=2.0.0,<3.0.0
        - pillow >=11.1.0,<13.0.0
        - fastapi >=0.135.0,<1.0.0
        - uvicorn >=0.34.3,<1.0.0
        - typer >=0.16.0,<1.0.0
        - platformdirs >=4.3.8,<5.0.0
        - aiofiles >=24.1.0,<25.0.0
        - typing_extensions >=4.14.0,<5.0.0
        - python-dotenv >=1.0.0,<2.0.0
        - rich >=13.0.0,<14.0.0
        - httpx >=0.24.0,<1.0.0
        - h2
        - aiofile >=3.8.0,<4.0.0
        - json-repair >=0.30.3,<1.0.0
        - docstring_parser >=0.16,<1.0.0
        - networkx >=3.4.2,<4.0.0
        - nanoid >=2.0.0,<3.0.0
        - cachetools >=6.0.0
        - emoji >=2.14.1,<3.0.0
        - chardet >=7.3.0
        - defusedxml >=0.7.1,<1.0.0
        - passlib >=1.7.4,<2.0.0
        - pydantic-settings >=2.10.1,<3.0.0
        - tomli >=2.2.1,<3.0.0
        - pyyaml >=6.0.0,<7.0.0
        - orjson >=3.11.6,<4.0.0
        - asyncer >=0.0.8,<1.0.0
        - structlog >=25.4.0,<26.0.0
        - loguru >=0.7.3,<1.0.0
        - langchain >=1.2.0,<1.3.0
        - langchain-classic >=1.0.7,<1.1.0
        - validators >=0.34.0,<1.0.0
        - filelock >=3.20.1,<4.0.0
        - pypdf >=6.10.0,<7.0.0
        - cryptography >=46.0.7
        - ag-ui-protocol >=0.1.10
        - langflow-sdk >=0.1.0
        - markitdown >=0.1.4,<2.0.0
        - setuptools >=80.0.0,<81.0.0
        - wheel >=0.46.2,<1.0.0
        - mcp >=1.17.0,<2.0.0
        - opendsstar ==1.0.26
    tests:
      - python:
          imports:
            - lfx
          pip_check: true
          python_version:
            - ${{ python_min }}.*

  # ======================================================================
  # OUTPUT 2: langflow-base (Core Platform & System Execution)
  # ======================================================================
  - package:
      name: langflow-base
      version: ${{ version }}
    build:
      noarch: python
      script:
        - |
          # Strip optional-integration deps from the wheel METADATA so langflow-base
          # stays lean (no langflow[full]); they are listed in run_constraints below.
          sed -i -E '/^dependencies = \[/,/^\]/{/(langchain-mongodb|langchain-perplexity|langchain-qdrant|langchain-weaviate|langchain-chroma|langchain-ibm|ibm-watsonx-ai|firecrawl-py|spider-client|assemblyai|elevenlabs|clickhouse-connect|duckdb|trustcall|jq|onnxruntime)[<>=~]/d}' src/backend/base/pyproject.toml
        - ${{ PYTHON }} -m pip install src/backend/base -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        - ${{ pin_subpackage('lfx', exact=True) }}
        # Flattened from upstream src/backend/base/pyproject.toml
        # [project.dependencies] (G25: conda has no extras; G24: caps mirrored).
        - fastapi >=0.135.0,<1.0.0
        - slowapi >=0.1.9,<1.0.0
        - httpx >=0.27,<1.0.0
        - h2
        - aiofile >=3.9.0,<4.0.0
        - uvicorn >=0.30.0,<1.0.0
        - gunicorn >=25.3.0,<27.0.0
        - langchain >=1.2.0,<1.3.0
        - langchain-community >=0.4.1,<0.5.0
        - langchain-core >=1.3.3,<2.0.0
        - langchainhub >=0.1.15,<0.2.0
        - loguru >=0.7.1,<1.0.0
        - structlog >=25.4.0,<26.0.0
        - rich >=13.7.0,<14.0.0
        - langchain-experimental >=0.4.1,<0.5.0
        - sqlmodel >=0.0.37,<0.1.0
        - pydantic >=2.13.0,<3.0.0
        - pydantic-settings >=2.2.0,<3.0.0
        - email-validator >=2.0.0
        - typer >=0.13.0,<1.0.0
        - cachetools >=6.0.0
        - platformdirs >=4.2.0,<5.0.0
        - python-multipart >=0.0.12,<1.0.0
        - orjson >=3.11.6,<4.0.0
        - alembic >=1.13.0,<2.0.0
        - passlib >=1.7.4,<2.0.0
        - bcrypt ==4.0.1
        - pillow >=12.1.1,<13.0.0
        - docstring_parser >=0.16,<1.0.0
        - pyjwt >=2.12.1
        - pandas >=2.2.3
        - multiprocess >=0.70.14,<1.0.0
        - python-docx >=1.1.0,<2.0.0
        - jq >=1.7.0,<2.0.0
        - nest-asyncio >=1.6.0,<2.0.0
        - emoji >=2.12.0,<3.0.0
        - cryptography >=46.0.7
        - asyncer >=0.0.5,<1.0.0
        - pyperclip >=1.8.2,<2.0.0
        - uncurl >=0.0.11,<1.0.0
        - sentry-sdk >=2.5.1,<3.0.0
        - chardet >=7.3.0
        - opentelemetry-api >=1.30.0,<2.0.0
        - opentelemetry-sdk >=1.30.0,<2.0.0
        - opentelemetry-exporter-prometheus >=0.50b0,<1.0.0
        - opentelemetry-exporter-otlp >=1.30.0,<2.0.0
        - opentelemetry-instrumentation-fastapi >=0.50b0,<1.0.0
        - opentelemetry-instrumentation-requests >=0.50b0,<1.0.0
        - opentelemetry-instrumentation-urllib3 >=0.50b0,<1.0.0
        - prometheus_client >=0.20.0,<1.0.0
        - aiofiles >=24.1.0,<25.0.0
        - pip >=26.0.0,<27.0.0
        - setuptools >=80.0.0,<81.0.0
        - nanoid >=2.0.0,<3.0.0
        - filelock >=3.20.1,<4.0.0
        - grandalf >=0.8.0,<1.0.0
        - fastapi-pagination >=0.13.1,<1.0.0
        - defusedxml >=0.7.1,<1.0.0
        - pypdf >=6.10.0,<7.0.0
        - validators >=0.34.0,<1.0.0
        - networkx >=3.4.2,<4.0.0
        - json-repair >=0.30.3,<1.0.0
        - mcp >=1.17.0,<2.0.0
        - aiosqlite >=0.20.0,<1.0.0
        - greenlet >=3.1.1,<4.0.0
        - jsonquerylang >=1.1.1,<2.0.0
        - sqlalchemy >=2.0.38,<3.0.0
        - scipy >=1.15.2,<2.0.0
        - jaraco.context >=6.1.0
        - wheel >=0.46.2,<1.0.0
        - onnxruntime >=1.20
        - dynaconf >=3.2.13,<4.0.0
        - pyasn1 >=0.6.3,<0.7.0
        - langgraph-checkpoint >4.0.0,<5.0.0
      run_constraints:
        # Optional integrations (upstream langflow-base extras) — stripped from the
        # wheel METADATA at build (lean base, no langflow[full]); version-pinned so
        # they are constrained IF a user installs them, never forced.
        - langchain-mongodb >=0.11.0
        - langchain-perplexity >=1.0.0,<2.0.0
        - langchain-qdrant >=1.0.0,<2.0.0
        - langchain-weaviate >=0.0.6
        - langchain-chroma >=0.2.6,<0.3.0
        - langchain-ibm >=1.1.0,<1.2.0
        - ibm-watsonx-ai >=1.3.1,<2.0.0
        - firecrawl-py >=1.0.16,<2.0.0
        - spider-client >=0.0.27,<1.0.0
        - assemblyai >=0.33.0,<1.0.0
        - elevenlabs >=1.52.0,<2.0.0
        - clickhouse-connect ==0.7.19
        - duckdb >=1.0.0,<2.0.0
        - trustcall >=0.0.38,<1.0.0
        - jq >=1.7.0,<2.0.0
        - onnxruntime >=1.20
    tests:
      - python:
          imports:
            - langflow
          pip_check: true
          python_version:
            - ${{ python_min }}.*

  # ======================================================================
  # OUTPUT 3: langflow (Top-Level Web Interface Umbrella Package)
  # ======================================================================
  - package:
      name: langflow
      version: ${{ version }}
    build:
      noarch: python
      script:
        - |
          # Lean umbrella: depend only on langflow-base (not [complete]); the lfx-*
          # component packs + all integrations are optional (run_constraints), not forced.
          sed -i -E '/^dependencies = \[/,/^\]/{s/langflow-base\[complete\]/langflow-base/; /"(lfx-duckduckgo|lfx-arxiv|lfx-ibm|lfx-docling)>/d}' pyproject.toml
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        # Upstream langflow = langflow-base[complete] + 4 lfx-* extension packs.
        # Lean: hard-dep only langflow-base (it provides the importable `langflow`);
        # the lfx-* packs + all integrations are optional (run_constraints below).
        - ${{ pin_subpackage('langflow-base', exact=True) }}
      run_constraints:
        # langflow's own optional component deps (upstream extras), demoted from run:
        - fastmcp
        - lark
        - sseclient-py
        # 1. Internal Comps/Component Packs (Isolated to prevent staging locks)
        - lfx-arxiv >=0.1  # cf-W2 optional, recipe ready
        - lfx-docling >=0.1  # cf-W2 optional, recipe ready
        - lfx-duckduckgo >=0.1  # cf-W2 optional, recipe ready
        - lfx-ibm >=0.1  # cf-W2 optional, recipe ready
        # 2. Heavy Multi-Agent & Specialized LLM Framework Interops
        - ag2 >=0.1  # cf-W3 optional SDK leaf, author
        - agent-lifecycle-toolkit >=0.1  # cf-W2 optional, recipe ready
        - smolagents >=0.1  # cf-W3 optional SDK leaf, author
        - litellm >=0.1
        - openai >=0.1
        - apify-client >=0.1  # cf-W3 optional SDK leaf, author
        - assemblyai >=0.1  # cf-W3 optional SDK leaf, author
        # 3. Complete LangChain Provider Integration Matrix Constraints
        - langchain-anthropic >=0.1
        - langchain-astradb >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-aws >=0.1
        - langchain-chroma >=0.1
        - langchain-cohere >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-elasticsearch >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-experimental >=0.1
        - langchain-google-calendar-tools >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-google-community >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-google-genai >=0.1
        - langchain-google-vertexai >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-graph-retriever >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-groq >=0.1
        - langchain-huggingface >=0.1
        - langchain-ibm >=0.1  # cf-W2 optional, recipe ready
        - langchain-mcp-adapters >=0.1
        - langchain-milvus >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-mistralai >=0.1
        - langchain-mongodb >=0.1
        - langchain-nvidia-ai-endpoints >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-ollama >=0.1
        - langchain-openai >=0.1
        - langchain-perplexity >=0.1
        - langchain-pinecone >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-qdrant >=0.1
        - langchain-sambanova >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-unstructured >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-weaviate >=0.1  # cf-W4 optional langchain wrapper, author
        - langchainhub >=0.1
        - langfuse-python >=0.1  # on conda-forge as langfuse-python (G10), renamed
        - langgraph-checkpoint >=0.1
        - langsmith >=0.1
        - langwatch >=0.1  # cf-W2 optional, recipe ready
        # 4. Storage Engine, VectorDB, Data Access Clients
        - chromadb >=0.1
        - qdrant-client >=0.1
        - weaviate-client >=0.1
        - opensearch-py >=0.1
        - elasticsearch >=0.1
        - clickhouse-connect >=0.1
        - couchbase >=0.1  # cf-W3 optional SDK leaf, author
        - pymongo >=0.1
        - aiosqlite >=0.1
        - pgvector >=0.1
        - cassio >=0.1  # cf-W3 optional SDK leaf, author
        - astrapy >=0.1  # cf-W3 optional SDK leaf, author
        - duckdb >=0.1
        - fastavro >=0.1
        - fastparquet >=0.1
        # 5. Heavy/External Domain-Specific SDK Tools
        - docling-core >=0.1
        - docling-slim >=0.1
        - firecrawl-py >=0.1  # cf-W3 optional SDK leaf, author
        - scrapegraph-py >=0.1  # cf-W3 optional SDK leaf, author
        - spider-client >=0.1  # cf-W3 optional SDK leaf, author
        - cleanlab-tlm >=0.1  # cf-W3 optional SDK leaf, author
        - composio >=0.1
        - composio-langchain >=0.1  # cf-W4 optional langchain wrapper, author
        - needle-python >=0.1  # cf-W3 optional SDK leaf, author
        - metal-sdk >=0.1  # cf-W3 optional SDK leaf, author
        - mem0ai >=0.1  # cf-W3 optional SDK leaf, author
        - upstash-vector >=0.1  # cf-W3 optional SDK leaf, author
        - opik >=0.1  # cf-W3 optional SDK leaf, author
        - traceloop-sdk >=0.1
        - openinference-instrumentation-langchain >=0.1
        - openlayer >=0.1  # cf-W3 optional SDK leaf, author
    tests:
      - python:
          imports:
            - langflow
          pip_check: true
          python_version:
            - ${{ python_min }}.*

about:
  homepage: https://github.com/langflow-ai/langflow
  license: MIT
  license_file: LICENSE
  summary: Core execution and UI service runtime engines for Langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org
  description: |
    Langflow is a modular visual framework designed for building scalable RAG and 
    multi-agent setups. This recipe structures the codebase into dedicated core outputs 
    while placing downstream integration plugins under strict constraint gates.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: langflow
  cfe-upstream-registry: pypi
  cfe-upstream-name: langflow
  cfe-purls:
    - pkg:conda/langflow@${{ version }}
    - pkg:pypi/langflow@${{ version }}
  cfe-upstream-repo: https://github.com/langflow-ai/langflow
  cfe-upstream-homepage: https://pypi.org/project/langflow/
  cfe-import-names: [lfx, langflow]
  cfe-source-kind: github-tag
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list:
    # 2026-06-23 STATUS: ALL 3 outputs (lfx, langflow-base, langflow) BUILD +
    # TEST GREEN locally (imports + pip_check) against the local channel. Two
    # things made this work:
    #  (A) LEAN re-architecture (rxm7706 directive): langflow-base + langflow
    #      hard-dep only the framework core; ALL integrations (langchain
    #      providers, vector/analytics DB clients, external SDKs, the 4 lfx-*
    #      component packs) are run_constraints, and those integration deps are
    #      sed-stripped from the wheel METADATA at build so pip_check stays
    #      lean + green. No more langflow[full] forced on every user.
    #  (B) Local skew-workaround channel builds for the two cf feedstock pins
    #      that block lfx's HARD deps (lfx -> langchain + langchain-classic, and
    #      lfx -> opendsstar -> litellm). These two remain the DURABLE
    #      conda-forge submission prerequisites:
    #
    #   1. cf `langchain` feedstock carries a STALE `langchain-text-splitters
    #      <1.0.0` pin — absent from upstream langchain 1.2.x (which deps only
    #      langchain-core/langgraph/pydantic) — that conflicts with
    #      langchain-classic + opendsstar (both need >=1.1.0). Worked around with
    #      a local langchain 1.2.18 (base deps). Durable fix: langchain-feedstock
    #      PR dropping the stale text-splitters pin.
    #   2. cf `litellm` feedstock flattens the proxy / proxy-runtime EXTRAS
    #      (fastapi, cryptography, opentelemetry-api==1.28.0) into HARD deps;
    #      upstream lists them ONLY under extras. otel-api==1.28.0 then conflicts
    #      with langflow-base's otel-api>=1.30 and the fastapi pin with lfx's
    #      fastapi>=0.135. Worked around with a local litellm 1.89.3 (base deps
    #      only). Durable fix: litellm-feedstock not flattening proxy extras.
    - cf langchain-feedstock - drop stale langchain-text-splitters <1.0.0 pin
    - cf litellm-feedstock - do not flatten proxy/proxy-runtime extras as hard deps
  cfe-last-checked: 2026-06-23T15:48:01Z
  cfe-generated-by-version: 8.34.0
  cfe-generated-at-datetime: 2026-06-19T13:36:19Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-23T15:48:01Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
####
# CFE comments
# source:
#    # Multi-output build of the langflow MONOREPO (lfx + langflow-base + langflow,
#    # one GitHub tag archive). A PyPI wheel cannot be used: the outputs build
#    # src/lfx, src/backend/base, and . from the source tree. sha256 of the
#    # v1.10.0 archive verified 2026-06-23 (cfe-source-kind: github-tag).
# requirements:
#  run:
#    # --- conda-forge submission order (leaves-first) for prereqs NOT yet on cf ---
#    # Each missing dep carries a trailing "cf-Wn" marker:
#    #   W1  HARD prerequisite — gates langflow-suite install; submit FIRST.
#    #   W2  langflow-family extra with a local recipe already authored.
#    #   W3  optional integration SDK leaf — net-new, not yet authored.
#    #   W4  optional langchain-* provider wrapper — depends on a W3 leaf.
#    # Order: W1 -> (langflow-suite core: lfx+langflow-base+langflow build here as
#    # one feedstock) -> W2 -> W3 -> W4. W3/W4 are run_constraints (soft); they do
#    # NOT block langflow-suite install, so they may trail the core submission.
#    # "recipe ready" = recipes/<name>/ exists locally; "author" = net-new recipe.
#    # NAME FIX: langfuse -> langfuse-python (already on conda-forge, G10).
#    # NOT REAL DEPS: atlaspy, dynamicconf are absent from every upstream langflow
#    # pyproject (v1.10.0) — flagged for removal, not submission.
#    # DIVERGENCE: the langflow output's run list does not match upstream
#    # [project.dependencies] (real = langflow-base[complete] + the 4 lfx-* extras;
#    # the rest are langflow-base deps). A full dep-list reconciliation is a
#    # recommended separate pass.
####
