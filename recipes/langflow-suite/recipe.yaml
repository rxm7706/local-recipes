# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.10.0"
  python_min: "3.11"

recipe:
  name: langflow-suite
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 45a317111a5d7cbc2709e683a72a80779801a658f61e506b612978588788ab71

build:
  number: 0

outputs:
  # ======================================================================
  # OUTPUT 1: lfx (Langflow Executor Engine)
  # ======================================================================
  - package:
      name: lfx
      version: ${{ version }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install src/lfx -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        - pydantic
        - fastapi
        - httpx
        - uv
    tests:
      - python:
          imports:
            - lfx
          pip_check: true
          python_version:
            - ${{ python_min }}.*

  # ======================================================================
  # OUTPUT 2: langflow-base (Core Platform & System Execution)
  # ======================================================================
  - package:
      name: langflow-base
      version: ${{ version }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install src/backend/base -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        - ${{ pin_subpackage('lfx', exact=True) }}
        # Core Underlying Framework Dependencies
        - langchain >=1.2.0,<1.3.0
        - langchain-core
        - langchain-community
        - pydantic
        - fastapi
        - fastapi-pagination
        - uvicorn
        - gunicorn
        - alembic
        - sqlmodel
        - sqlalchemy
        - greenlet
        - cachetools
        - loguru
        - rich
        - typer
        - httpx
        - h2
        - orjson
        - numpy
        - pandas
        - scipy
        - transformers
        - onnxruntime
        - pillow
        - filelock
        - multiprocess
        - networkx
        - pyarrow
        - cryptography
        - bcrypt
        - pyjwt
        - passlib
        - nest-asyncio
        - platformdirs
        - python-multipart
        - chardet
        - validators
        - email-validator
        - jinja2
        - markupsafe
        - markdown
        - beautifulsoup4
        - defusedxml
        - slowapi
        - prometheus-client
        - opentelemetry-api
        - opentelemetry-sdk
    tests:
      - python:
          imports:
            - langflow
          pip_check: true
          python_version:
            - ${{ python_min }}.*

  # ======================================================================
  # OUTPUT 3: langflow (Top-Level Web Interface Umbrella Package)
  # ======================================================================
  - package:
      name: langflow
      version: ${{ version }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
      run:
        - python >=${{ python_min }},<3.15
        - ${{ pin_subpackage('langflow-base', exact=True) }}
        - jsonquerylang >=1.1.1,<2.0.0  # cf-W1 HARD prereq, recipe ready
        - mcp
        - fastmcp
        - atlaspy  # NOT an upstream langflow dep (v1.10.0) - remove
        - dynamicconf  # NOT an upstream langflow dep (v1.10.0) - remove
        - grandalf
        - lark
        - nanoid
        - uncurl
        - sseclient-py
        - structlog
      run_constraints:
        # 1. Internal Comps/Component Packs (Isolated to prevent staging locks)
        - lfx-arxiv >=0.1  # cf-W2 optional, recipe ready
        - lfx-docling >=0.1  # cf-W2 optional, recipe ready
        - lfx-duckduckgo >=0.1  # cf-W2 optional, recipe ready
        - lfx-ibm >=0.1  # cf-W2 optional, recipe ready
        # 2. Heavy Multi-Agent & Specialized LLM Framework Interops
        - ag2 >=0.1  # cf-W3 optional SDK leaf, author
        - agent-lifecycle-toolkit >=0.1  # cf-W2 optional, recipe ready
        - smolagents >=0.1  # cf-W3 optional SDK leaf, author
        - litellm >=0.1
        - openai >=0.1
        - apify-client >=0.1  # cf-W3 optional SDK leaf, author
        - assemblyai >=0.1  # cf-W3 optional SDK leaf, author
        # 3. Complete LangChain Provider Integration Matrix Constraints
        - langchain-anthropic >=0.1
        - langchain-astradb >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-aws >=0.1
        - langchain-chroma >=0.1
        - langchain-cohere >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-elasticsearch >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-experimental >=0.1
        - langchain-google-calendar-tools >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-google-community >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-google-genai >=0.1
        - langchain-google-vertexai >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-graph-retriever >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-groq >=0.1
        - langchain-huggingface >=0.1
        - langchain-ibm >=0.1  # cf-W2 optional, recipe ready
        - langchain-mcp-adapters >=0.1
        - langchain-milvus >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-mistralai >=0.1
        - langchain-mongodb >=0.1
        - langchain-nvidia-ai-endpoints >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-ollama >=0.1
        - langchain-openai >=0.1
        - langchain-perplexity >=0.1
        - langchain-pinecone >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-qdrant >=0.1
        - langchain-sambanova >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-unstructured >=0.1  # cf-W4 optional langchain wrapper, author
        - langchain-weaviate >=0.1  # cf-W4 optional langchain wrapper, author
        - langchainhub >=0.1
        - langfuse-python >=0.1  # on conda-forge as langfuse-python (G10), renamed
        - langgraph-checkpoint >=0.1
        - langsmith >=0.1
        - langwatch >=0.1  # cf-W2 optional, recipe ready
        # 4. Storage Engine, VectorDB, Data Access Clients
        - chromadb >=0.1
        - qdrant-client >=0.1
        - weaviate-client >=0.1
        - opensearch-py >=0.1
        - elasticsearch >=0.1
        - clickhouse-connect >=0.1
        - couchbase >=0.1  # cf-W3 optional SDK leaf, author
        - pymongo >=0.1
        - aiosqlite >=0.1
        - pgvector >=0.1
        - cassio >=0.1  # cf-W3 optional SDK leaf, author
        - astrapy >=0.1  # cf-W3 optional SDK leaf, author
        - duckdb >=0.1
        - fastavro >=0.1
        - fastparquet >=0.1
        # 5. Heavy/External Domain-Specific SDK Tools
        - docling-core >=0.1
        - docling-slim >=0.1
        - firecrawl-py >=0.1  # cf-W3 optional SDK leaf, author
        - scrapegraph-py >=0.1  # cf-W3 optional SDK leaf, author
        - spider-client >=0.1  # cf-W3 optional SDK leaf, author
        - cleanlab-tlm >=0.1  # cf-W3 optional SDK leaf, author
        - composio >=0.1
        - composio-langchain >=0.1  # cf-W4 optional langchain wrapper, author
        - needle-python >=0.1  # cf-W3 optional SDK leaf, author
        - metal-sdk >=0.1  # cf-W3 optional SDK leaf, author
        - mem0ai >=0.1  # cf-W3 optional SDK leaf, author
        - upstash-vector >=0.1  # cf-W3 optional SDK leaf, author
        - opik >=0.1  # cf-W3 optional SDK leaf, author
        - traceloop-sdk >=0.1
        - openinference-instrumentation-langchain >=0.1
        - openlayer >=0.1  # cf-W3 optional SDK leaf, author
    tests:
      - python:
          imports:
            - langflow
          pip_check: true
          python_version:
            - ${{ python_min }}.*

about:
  homepage: https://github.com/langflow-ai/langflow
  license: MIT
  license_file: LICENSE
  summary: Core execution and UI service runtime engines for Langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org
  description: |
    Langflow is a modular visual framework designed for building scalable RAG and 
    multi-agent setups. This recipe structures the codebase into dedicated core outputs 
    while placing downstream integration plugins under strict constraint gates.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: langflow
  cfe-upstream-registry: pypi
  cfe-upstream-name: langflow
  cfe-purls:
    - pkg:conda/langflow@${{ version }}
    - pkg:pypi/langflow@${{ version }}
  cfe-upstream-repo: https://github.com/langflow-ai/langflow
  cfe-upstream-homepage: https://pypi.org/project/langflow/
  cfe-import-names: [lfx, langflow]
  cfe-source-kind: github-tag
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list:
    # 2026-06-19 re-build: ALL previously-named missing third-party deps now
    # RESOLVE (authored + in local channel). The recipe BUILDS; both legs are
    # TEST-solve-blocked by TWO external conda-forge ecosystem version-skew
    # conflicts (NOT locally fixable — require upstream feedstock pin
    # convergence or upstream langflow-base constraint relaxation):
    #
    # 1. litellm <-> lfx fastapi/cryptography/langchain-text-splitters skew:
    #    lfx requires fastapi>=0.135.0,<1.0 + cryptography>=46.0.7, but every
    #    conda-forge litellm build (pulled via opendsstar>=1.83.0) bakes in
    #    fastapi==0.124.4 (1.83-1.87) or otlp/langchain-text-splitters pins
    #    that conflict with lfx's langchain stack. The pins live in the cf
    #    litellm / langchain-text-splitters feedstock wheel METADATA.
    # 2. observability-cluster opentelemetry-semantic-conventions / -api skew:
    #    traceloop-sdk needs otel-instrumentation-logging>=0.57b0 (forcing
    #    semantic-conventions==0.57b0..0.62b0) + langchain>=0.3.15,<0.4.0,
    #    which conflict with arize-phoenix-otel / opik / openinference-* and
    #    with lfx's newer langchain. All on conda-forge.
    #
    # LOCAL FIXES APPLIED THIS SESSION (recipe corrections, all built green):
    #  - docstring-parser -> docstring_parser (G10 underscore feedstock name;
    #    fixed here AND in langflow-base, whose artifact baked the bad hyphen).
    #  - python_min raised to 3.11: jsonquerylang (every version) imports
    #    typing.NotRequired unconditionally (PEP 655, py3.11+), and
    #    ibm-watsonx-orchestrate-* are py3.11-gated -> 3.11 is the honest floor
    #    despite upstream's aspirational requires-python >=3.10.
    #  - jsonquerylang pinned >=1.1.1,<2.0.0 (mirror upstream langflow-base
    #    pin; load-bearing under pip_check, G24/G26). jsonquerylang 1.1.1
    #    built into the local channel (channel had only 2.1.0, which violates
    #    the <2.0.0 upstream cap).
    - litellm/fastapi/cryptography ecosystem skew (external cf)
    - opentelemetry-semantic-conventions/api observability skew (external cf)
  cfe-last-checked: 2026-06-23T08:49:23Z
