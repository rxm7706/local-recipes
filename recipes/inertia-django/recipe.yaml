# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.2.0"

package:
  name: inertia-django
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/inertia-django/inertia_django-${{ version }}.tar.gz
  sha256: 36511038caf2cbb6f54a08f17dc18fe1dd1b30c712a616672704e395b984f250

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4
    - requests >=2.0.0,<3.0.0

tests:
  - python:
      imports:
        - inertia
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/inertiajs/inertia-django
  repository: https://github.com/inertiajs/inertia-django
  summary: Django adapter for the InertiaJS framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706

