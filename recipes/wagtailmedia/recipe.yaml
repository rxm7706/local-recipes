# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.17.2"

package:
  name: wagtailmedia
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtailmedia/wagtailmedia-${{ version }}.tar.gz
  sha256: 4457e267fc53d8db4c9eb9a48d27f4b47b0823a9f7d0820f2dd98f1ba5d58600

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.11,<4
    - pip
  run:
    - python >=${{ python_min }}
    - wagtail >=6.3
    - django >=4.2
    - django-taggit
    - djangorestframework

tests:
  - python:
      imports:
        - wagtailmedia
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Wagtail module for audio and video files.
  description: |
    wagtailmedia is a Wagtail module for managing audio and video files.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/torchbox/wagtailmedia
  repository: https://github.com/torchbox/wagtailmedia

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
