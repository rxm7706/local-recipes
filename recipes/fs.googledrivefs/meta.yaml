{% set name = "fs.googledrivefs" %}
{% set version = "2.6.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fs_googledrivefs-{{ version }}.tar.gz
  sha256: ea94d33930a6883d13f5eceebde10156333ea83e9417a30409d1a53ad44d46c4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - fs >=2.4.13
    - google-api-python-client >=1.7.10
    - google-auth >=1.5.1
    # fs (Pyfilesystem2) calls pkg_resources.declare_namespace at import time;
    # setuptools 81+ removed pkg_resources, breaking `import fs`. TODO: drop
    # once the fs feedstock caps setuptools or fs stops using pkg_resources.
    - setuptools <81

test:
  imports:
    - fs
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rkhwaja/fs.googledrivefs
  summary: Pyfilesystem2 implementation for Google Drive
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
