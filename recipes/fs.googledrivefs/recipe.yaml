# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.6.2"

package:
  name: fs.googledrivefs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fs.googledrivefs/fs_googledrivefs-${{ version }}.tar.gz
  sha256: ea94d33930a6883d13f5eceebde10156333ea83e9417a30409d1a53ad44d46c4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - fs >=2.4.13
    - google-api-python-client >=1.7.10
    - google-auth >=1.5.1
    - setuptools <81

tests:
  - python:
      imports:
        - fs.googledrivefs
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Pyfilesystem2 implementation for Google Drive
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/rkhwaja/fs.googledrivefs
  repository: https://github.com/rkhwaja/fs.googledrivefs

extra:
  recipe-maintainers:
    - rxm7706

