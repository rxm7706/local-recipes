# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.3"

package:
  name: condense-json
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/condense-json/condense_json-${{ version }}.tar.gz
  sha256: 25fe8d434fdafd849e8d98f21a3e18f96ae2d6dbc2c17565f29e4843d039d2bc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - condense_json
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/condense-json/
  license: Apache-2.0
  license_file: LICENSE
  summary: Python function for condensing JSON using replacement strings
  repository: https://github.com/simonw/condense-json
  documentation: https://github.com/simonw/condense-json#readme
  description: |
    condense-json provides a condense_json function that searches a
    JSON-like object for strings containing specified replacement
    substrings and replaces them with a compact representation, making
    the JSON more concise. A companion uncondense_json function reverses
    the process. Strings consisting entirely of a replacement are encoded
    as {"$": replacement_id}.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
