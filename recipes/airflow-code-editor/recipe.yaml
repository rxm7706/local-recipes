# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "8.2.4"

package:
  name: airflow-code-editor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/airflow-code-editor/airflow_code_editor-${{ version }}.tar.gz
  sha256: 6e237efd1fe98d8b46e970346bf92b1a15c3f22743fe6626cb500fd76e5b63bc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - flask
    - fsspec
    - pss >=1.44

tests:
  - python:
      imports:
        - airflow_code_editor
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Apache Airflow code editor and file manager
  license: Apache-2.0
  license_file:
    - LICENSE
    - airflow_code_editor/static/fonts/LICENSE
  homepage: https://github.com/andreax79/airflow-code-editor
  repository: https://github.com/andreax79/airflow-code-editor

extra:
  recipe-maintainers:
    - xylar
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: airflow-code-editor
