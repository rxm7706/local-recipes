# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.0.0"

package:
  name: hll
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/hll/hll-${{ version }}.tar.gz
  sha256: 9f17e21f1d41c5c6e50990b730e28a6baa9d06e6c62bb320c8e8d2a4f17634b9

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - pip
    - setuptools >=64,<77
  run:
    - python

tests:
  - python:
      imports:
        - HLL
      pip_check: true

about:
  summary: Fast HyperLogLog for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ascv/HyperLogLog
  repository: https://github.com/ascv/HyperLogLog
  description: |
    HyperLogLog implementation in C for Python. The HyperLogLog algorithm is a
    space efficient method to estimate the cardinality of extraordinarily large
    datasets. This module implements a 64 bit version of HyperLogLog using a
    Murmur64A hash.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: hll
