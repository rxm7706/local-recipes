    - pkg:pypi/hll@${{ version }}
  cfe-upstream-repo: https://github.com/ascv/HyperLogLog
  cfe-upstream-homepage: https://github.com/ascv/HyperLogLog
  cfe-import-names: [HLL]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
