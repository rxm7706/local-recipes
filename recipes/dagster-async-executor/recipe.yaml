# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.0.3"

package:
  name: dagster-async-executor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dagster-async-executor/dagster_async_executor-${{ version }}.tar.gz
  sha256: 6991133945ff20f41614d40938af5d72f8610279fbb0e5a7ead6b6900aad0690

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - pip
  run:
    - python >=${{ python_min }}
    - anyio >=4.12.0
    - dagster >=1.12.2

tests:
  - python:
      imports:
        - dagster_async_executor
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Async Support for Dagster
  homepage: https://github.com/dagster-io/community-integrations
  repository: https://github.com/dagster-io/community-integrations
  description: Async Support for Dagster.

extra:
  recipe-maintainers:
    - rxm7706

