    - pkg:pypi/cyclonedx-bom@${{ version }}
  cfe-upstream-repo: https://github.com/CycloneDX/cyclonedx-python
  cfe-upstream-homepage: https://pypi.org/project/cyclonedx-bom/
  cfe-import-names: [cyclonedx_py]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
