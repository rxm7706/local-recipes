# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.0"

package:
  name: kedro-boot
  version: ${{ version }}

source:
  url: https://github.com/takikadiri/kedro-boot/archive/${{ version }}.tar.gz
  sha256: 5e33351b7aae360ca446a241c99fd2553ae8627dc575ffde23979e857c501704

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - kedro >=1.0.0,<2.0

tests:
  - python:
      imports:
        - kedro_boot
      pip_check: true
      python_version:
        - ${{ python_min }}.*

about:
  summary: A kedro plugin that streamlines the integration between Kedro projects and external applications, making it easier for you to develop production-ready data science applications.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/takikadiri/kedro-boot
  repository: https://github.com/takikadiri/kedro-boot
  description: |
    A kedro plugin that streamlines the integration between Kedro projects
    and external applications, making it easier for you to develop
    production-ready data science applications.

extra:
  recipe-maintainers:
    - rxm7706

