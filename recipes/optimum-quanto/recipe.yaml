# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.7"
  python_min: "3.10"

package:
  name: optimum-quanto
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/optimum-quanto/optimum_quanto-${{ version }}.tar.gz
  sha256: 91b5c2dc8a9100297dc7924a93747fb77ab010784b5e1f6d0208976ba054dade

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >65.5.1
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - pytorch >=2.6.0
    - ninja
    - numpy
    - safetensors
    - huggingface_hub

tests:
  - python:
      imports:
        - optimum
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
about:
  summary: A pytorch quantization backend for optimum.
  license: Apache-2.0
  license_file:
    - LICENSE
    - optimum/quanto/library/extensions/cuda/marlin/COPYRIGHT
  homepage: https://pypi.org/project/optimum-quanto/

extra:
  recipe-maintainers:
    - rxm7706
