# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.13.4"

package:
  name: dataprofiler
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/D/DataProfiler/DataProfiler-${{ version }}.tar.gz
  sha256: 469e3acb234b43300f498b84d678949cee1a02f88e98fadfaad725f63447f086

build:
  number: 1
  noarch: python
  script: |
    sed -i -E 's/^requests==2\.32\.\*/requests>=2.32/' requirements.txt
    ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - versioneer
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - h5py >=2.10.0
    - wheel >=0.33.1
    - numpy <2.0.0
    - pandas >=1.1.2
    - python-dateutil >=2.7.5
    - pytz >=2020.1
    - pyarrow >=1.0.1
    - chardet >=3.0.4
    - fastavro >=1.1.0
    - python-snappy >=0.7.1
    - charset-normalizer >=1.3.6
    - psutil >=4.0.0
    - scipy >=1.10.0
    - requests >=2.32
    - networkx >=2.5.1
    - typing-extensions >=3.10.0.2
    - hll >=2.0.3
    - datasketches >=4.1.0
    - packaging >=23.0
    - boto3 >=1.28.61
    - versioneer
    - setuptools <81

tests:
  - python:
      imports:
        - dataprofiler
        - resources
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: What is in your data? Detect schema, statistics and entities in almost any file.
  homepage: https://github.com/capitalone/data-profiler
  repository: https://github.com/capitalone/data-profiler

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: dataprofiler
  cfe-upstream-registry: pypi
  cfe-upstream-name: DataProfiler
  cfe-purls:
    - pkg:conda/dataprofiler@${{ version }}
    - pkg:pypi/dataprofiler@${{ version }}
  cfe-upstream-repo: https://github.com/capitalone/data-profiler
  cfe-upstream-homepage: https://github.com/capitalone/data-profiler
  cfe-import-names: [dataprofiler, resources]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/dataprofiler-feedstock
  cfe-forge-recipe-updates-needed:
    - setuptools-lt-81-cap-G34
