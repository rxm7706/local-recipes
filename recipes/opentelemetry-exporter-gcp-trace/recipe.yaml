# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.12.0"

package:
  name: opentelemetry-exporter-gcp-trace
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opentelemetry-exporter-gcp-trace/opentelemetry_exporter_gcp_trace-${{ version }}.tar.gz
  sha256: 18c6e56fe123eed020d5005fdd819b196d64f651545bce1ca7e2e2cbaf9d343b

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-cloud-trace ~=1.1
    - opentelemetry-api ~=1.30
    - opentelemetry-sdk ~=1.30
    - opentelemetry-resourcedetector-gcp >=1.5.0dev0,<2.0

tests:
  - python:
      imports:
        - opentelemetry.exporter.cloud_trace
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/GoogleCloudPlatform/opentelemetry-operations-python/tree/main/opentelemetry-exporter-gcp-trace
  summary: Google Cloud Trace exporter for OpenTelemetry
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
