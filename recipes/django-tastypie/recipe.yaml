# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.15.1"

package:
  name: django-tastypie
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-tastypie/django_tastypie-${{ version }}.tar.gz
  sha256: 1eb41318b08c0ebc9b8a386871b45401a623e6a5566bf32ae3e17be2c59318b7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - python-mimeparse >=0.1.4,!=1.5
    - python-dateutil >=2.1

tests:
  - python:
      imports:
        - tastypie
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A flexible & capable API layer for Django.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/django-tastypie/django-tastypie
  repository: https://github.com/django-tastypie/django-tastypie
  description: |
    Tastypie is a webservice API framework for Django. It provides a
    convenient, yet powerful and highly customizable abstraction for
    creating REST-style interfaces.

extra:
  recipe-maintainers:
    - rxm7706

