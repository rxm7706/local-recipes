# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.0"

package:
  name: langchain-mcp-adapters
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-mcp-adapters/langchain_mcp_adapters-${{ version }}.tar.gz
  sha256: fa6c9497015eb2807de5d0c341a36e1d2445cecbae1f4a24e922fc5b94f1a36c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - langchain-core >=1.0.0,<2.0.0
    - mcp >=1.9.2
    - typing_extensions >=4.14.0
    - httpx

tests:
  - python:
      imports:
        - langchain_mcp_adapters
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/langchain-mcp-adapters/
  repository: https://github.com/langchain-ai/langchain-mcp-adapters
  summary: Make Anthropic Model Context Protocol (MCP) tools compatible with LangChain and LangGraph agents.

extra:
  recipe-maintainers:
    - rxm7706

