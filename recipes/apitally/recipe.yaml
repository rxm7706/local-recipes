# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.25.0"

package:
  name: apitally
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/apitally/apitally-${{ version }}.tar.gz
  sha256: 8f6a5c015aac9c69d0b3a393ece62378f01a28e47b987a40d8001c36be74adb6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - backoff >=2.0.0
    - opentelemetry-sdk >=1.39.1,<2.0.0
    - psutil >=5.9.6
    - typing-extensions >=4.0.0

tests:
  - python:
      imports:
        - apitally
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://apitally.io
  repository: https://github.com/apitally/apitally-py
  documentation: https://docs.apitally.io
  license: MIT
  license_file: LICENSE
  summary: Simple API monitoring & analytics for REST APIs built with FastAPI, Flask, Django, Starlette, Litestar and BlackSheep.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: apitally
  cfe-upstream-registry: pypi
  cfe-upstream-name: apitally
  cfe-purls:
    - pkg:conda/apitally@${{ version }}
    - pkg:pypi/apitally@${{ version }}
  cfe-upstream-repo: https://github.com/apitally/apitally-py
  cfe-upstream-homepage: https://apitally.io
  cfe-import-names: [apitally]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/apitally-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
