# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "7.2.2"

package:
  name: django-timezone-field
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-timezone-field/django_timezone_field-${{ version }}.tar.gz
  sha256: a004d0b19fe10bf5964cb21a65b36324b16a61879e4711c0dafdf8d6253e8ebc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2,<6.2

# CFEP-25-justified: Django app — `import timezone_field` imports
# django.db.models at module level, which raises ImproperlyConfigured
# without DJANGO_SETTINGS_MODULE / settings.configure() in the test env.
tests:
  - package_contents:
      site_packages:
        - timezone_field

about:
  summary: A Django app providing DB, form, and REST framework fields for zoneinfo and pytz timezone objects.
  license: BSD-2-Clause
  license_file: LICENSE.txt
  homepage: https://github.com/mfogel/django-timezone-field/
  repository: https://github.com/mfogel/django-timezone-field/
  description: |
    A Django app providing database, form, and REST framework fields for
    zoneinfo and pytz timezone objects.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
