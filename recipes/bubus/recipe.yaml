schema_version: 1

context:
  name: "bubus"
  version: "1.5.6"
  python_min: "3.11"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 1a5456f0a576e86613a7bd66e819891b677778320b6e291094e339b0d9df2e0d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - aiofiles >=24.1.0
    - anyio >=4.9.0
    - portalocker >=2.7.0
    - pydantic >=2.11.5
    - typing_extensions >=4.12.2
    - uuid7 >=0.1.0

tests:
  - python:
      imports:
        - bubus
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Advanced Pydantic-powered event bus with async support
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/bubus/

extra:
  recipe-maintainers:
    - rxm7706
