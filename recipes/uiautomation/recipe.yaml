# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.29"

package:
  name: uiautomation
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/u/uiautomation/uiautomation-${{ version }}.tar.gz
  sha256: 3c169112043ce21065aead1d79c3baebdafc9cf03bd24ded02b2db11d423d88d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - comtypes >=1.2.1
  run:
    - python >=${{ python_min }}
    - comtypes >=1.2.1
    - if: win
      then: __win

tests:
  - python:
      imports:
        - uiautomation
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python UIAutomation for Windows
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/yinkaisheng/Python-UIAutomation-for-Windows
  repository: https://github.com/yinkaisheng/Python-UIAutomation-for-Windows
  description: |
    Python UIAutomation for Windows. A wrapper around the Windows
    UIAutomation COM API (via comtypes) for inspecting and driving the
    UI of Windows desktop applications. Windows-only at runtime.

extra:
  recipe-maintainers:
    - rxm7706

