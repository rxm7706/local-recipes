# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.0.0"

package:
  name: hatch-build-scripts
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/hatch-build-scripts/hatch_build_scripts-${{ version }}.tar.gz
  sha256: 563735e2f265c9e1b92dece6f762309114505ffaf6e5d51d462eb6a3b4f14640

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pathspec
    - hatchling

tests:
  - python:
      imports:
        - hatch_build_scripts
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A plugin for Hatch for writing build scripts
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/rmorshea/hatch-build-scripts
  repository: https://github.com/rmorshea/hatch-build-scripts
  description: |
    A plugin for Hatch that runs user-defined build scripts and copies the
    resulting artifacts into the built package, configured via the
    [[tool.hatch.build.hooks.build-scripts]] table in pyproject.toml.

extra:
  recipe-maintainers:
    - rxm7706

