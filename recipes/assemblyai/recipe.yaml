    - pkg:pypi/assemblyai@${{ version }}
  cfe-upstream-repo: https://github.com/AssemblyAI/assemblyai-python-sdk
  cfe-upstream-homepage: https://www.assemblyai.com/
  cfe-import-names: [assemblyai]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
