# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.12.1"

package:
  name: avro
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/avro/avro-${{ version }}.tar.gz
  sha256: c5b8dd2dd4c10816f0dc127cc29cfd43b5e405cf7e6840e89460a024bf3d098d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - avro = avro.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=40.8.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - avro
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - avro --help

about:
  summary: Avro is a serialization and RPC framework.
  license: Apache-2.0
  license_file:
    - avro/LICENSE
    - avro/NOTICE
  homepage: https://avro.apache.org/

extra:
  recipe-maintainers:
    - rxm7706
    - mariusvniekerk

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: avro
  cfe-upstream-registry: pypi
  cfe-upstream-name: avro
  cfe-purls:
    - pkg:conda/avro@${{ version }}
    - pkg:pypi/avro@${{ version }}
  cfe-upstream-repo: https://github.com/apache/avro
  cfe-upstream-homepage: https://avro.apache.org/
  cfe-import-names: [avro]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/avro-feedstock
  cfe-forge-recipe-updates-needed:
    - meta-yaml-to-recipe-yaml
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-21T00:00:00Z
