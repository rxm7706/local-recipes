# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.0.0"

package:
  name: wagtail-cache
  version: ${{ version }}

source:
  url: https://github.com/coderedcorp/wagtail-cache/archive/v${{ version }}.tar.gz
  sha256: 3265216885459445531806d37fd6eadc899c56742cb3924094efbd037df37311

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - wagtail >=3.0,<8.0

tests:
  - python:
      imports:
        - wagtailcache
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A simple page cache for Wagtail based on the Django cache middleware.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/coderedcorp/wagtail-cache
  repository: https://github.com/coderedcorp/wagtail-cache
  description: |
    wagtail-cache is a simple page cache for Wagtail based on the Django
    cache middleware. It provides an efficient, automatic cache for serving
    Wagtail pages, with cache invalidation on page publish.

extra:
  recipe-maintainers:
    - rxm7706

