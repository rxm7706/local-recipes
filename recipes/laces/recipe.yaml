# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.2"

package:
  name: laces
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/laces/laces-${{ version }}.tar.gz
  sha256: 3218e09c1889ae5cf3fc7a82f5bb63ec0c7879889b6a9760bfc42323c694b84d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - django >=3.2

tests:
  - python:
      imports:
        - laces
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Django components that know how to render themselves.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/tbrlpld/laces
  repository: https://github.com/tbrlpld/laces
  documentation: https://github.com/tbrlpld/laces/blob/main/README.md
  description: |
    Laces provides a way to define Django components that know how to render
    themselves, encapsulating template and context logic into reusable objects.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
