# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.11.3"

package:
  name: lm-format-enforcer
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lm-format-enforcer/lm_format_enforcer-${{ version }}.tar.gz
  sha256: e68081c108719cce284a9bcc889709b26ffb085a1945b5eba3a12cfa96d528da

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic >=1.10.8
    - interegular >=0.3.2
    - packaging
    - pyyaml

tests:
  - python:
      imports:
        - lmformatenforcer
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Enforce the output format (JSON Schema, Regex etc) of a language model
  description: |
    Enforce the output format (JSON Schema, Regex etc) of a language model.
    lm-format-enforcer combines a character-level parser with a tokenizer
    prefix tree to allow only sequences of tokens that conform to the
    required format, while still allowing the language model to control the
    fields' content.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/noamgat/lm-format-enforcer
  repository: https://github.com/noamgat/lm-format-enforcer
  documentation: https://github.com/noamgat/lm-format-enforcer

extra:
  recipe-maintainers:
    - rxm7706

