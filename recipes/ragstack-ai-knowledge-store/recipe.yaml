# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.1"

package:
  name: ragstack-ai-knowledge-store
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/ragstack-ai-knowledge-store/ragstack_ai_knowledge_store-${{ version }}.tar.gz
  sha256: 20424d42978be228feb887a71d76228638765446d1a37a1f6faef109e448fe06

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<3.13
    - cassio >=0.1.7,<0.2.0
    - numpy >=1.26

tests:
  - python:
      imports:
        - ragstack_knowledge_store
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/datastax/ragstack-ai
  license: BUSL-1.1
  license_file: LICENSE
  summary: DataStax RAGStack Graph Store
  repository: https://github.com/datastax/ragstack-ai
  documentation: https://docs.datastax.com/en/ragstack
  description: |
    RAGStack Knowledge Store provides a graph-based store for RAG
    (Retrieval-Augmented Generation) content backed by Apache Cassandra /
    DataStax Astra DB via the cassio integration layer. It supports linked
    content, MMR retrieval, and embedding-model-driven knowledge graphs.

extra:
  recipe-maintainers:
    - rxm7706

