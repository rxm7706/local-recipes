# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "20.0.0"

package:
  name: cucumber-expressions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/cucumber-expressions/cucumber_expressions-${{ version }}.tar.gz
  sha256: 5cbd4012c66584aa82ada990a6e7cb131274796e132e905d27d95ae9a2ca0f48

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.11.0,<0.12.0
    - pip
  run:
    - python >=${{ python_min }},<4.0

tests:
  - python:
      imports:
        - cucumber_expressions
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/cucumber/cucumber-expressions
  repository: https://github.com/cucumber/cucumber-expressions
  summary: Cucumber Expressions - a simpler alternative to Regular Expressions
  description: |
    Cucumber Expressions is a simpler alternative to Regular Expressions
    with a syntax that is easy to read, even for people who are not
    programmers.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
