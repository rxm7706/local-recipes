# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: wagtail-resume
  version: "2.12.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/wagtail_resume-${{ version }}.tar.gz
  sha256: a406085793d51cabec5b68ccffe893ac13961d64e497b95bc4f4b33cbbaa9144

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - django >=4.0.0,<7.0.0
    - wagtail >=4.0.0,<8.0.0
    - wagtail-markdown >=0.10.0,<0.14.0
    - wagtail-metadata >=4.0.0,<6.0.0
    - weasyprint >=63.0.0,<68.0.0
    - pymdown-extensions >=10.0.0,<12.0.0

tests:
  - python:
      imports:
        - wagtail_resume
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A Wagtail project made to simplify creation of resumes for developers.
  homepage: https://github.com/adinhodovic/wagtail-resume
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
