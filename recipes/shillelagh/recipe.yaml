# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.4.4"

package:
  name: shillelagh
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/shillelagh/shillelagh-${{ version }}.tar.gz
  sha256: 9bafbad11b5ec6272d1ad3cd014575962b458c29a289c21f98ac1a8817486f8e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - shillelagh = shillelagh.console:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=46.1.0
    - setuptools-scm >=5
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - apsw >=3.43.2.0
    - python-dateutil >=2.8.1
    - requests >=2.31.0
    - requests-cache >=0.7.1
    - sqlalchemy >=1.3
    - greenlet >=2.0.2
    - typing_extensions >=3.7.4.3
    - packaging

tests:
  - python:
      imports:
        - shillelagh
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Making it easy to query APIs via SQL
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/betodealmeida/shillelagh/
  repository: https://github.com/betodealmeida/shillelagh/
  documentation: https://shillelagh.readthedocs.io/
  description: |
    Shillelagh is an implementation of the Python DB API 2.0 and a SQLAlchemy
    dialect that lets you query and join APIs and other resources (Google
    Sheets, CSV files, generic JSON/XML/HTML endpoints, S3, GitHub, and more)
    as if they were SQL tables.

extra:
  recipe-maintainers:
    - rxm7706

