# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.18.3"

package:
  name: kantoku
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/k/kantoku/kantoku-${{ version }}.tar.gz
  sha256: 751882b2bde074cd8d65f8f9f62606a805b7aa9ea956ba452d13fab0352b5163

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - circusd = circus.circusd:main
      - circusd-stats = circus.stats:main
      - circusctl = circus.circusctl:main
      - circus-top = circus.stats.client:main
      - circus-plugin = circus.plugins:main

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.4,<4
    - pip
  run:
    - python >=${{ python_min }}
    - psutil
    - pyzmq >=17.0
    - tornado >=5.0.2
    - if: unix
      then:
        - ncurses

tests:
  - python:
      imports:
        - circus
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - if: unix
        then:
          - circusd --help
          - circusd-stats --help
          - circusctl --help
          - circus-top --help
          - circus-plugin --help

about:
  summary: Circus is a program that will let you run and watch multiple processes and sockets.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://circus.readthedocs.io/en/latest/
  repository: https://github.com/bentoml/kantoku
  documentation: https://circus.readthedocs.io
  description: |
    Circus is a Python program which can be used to monitor and control
    processes and sockets. kantoku is the BentoML-maintained distribution of
    the circus process and socket manager.

extra:
  recipe-maintainers:
    - rxm7706

