# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.2.1"

package:
  name: wagtail-meta-preview
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-meta-preview/wagtail_meta_preview-${{ version }}.tar.gz
  sha256: 327ac63c8f7ff19e53ed5bd7f68d46406d6442f3ad85dd76bb77a1b404e9fcfe

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - wheel
  run:
    - python >=${{ python_min }}
    - wagtail >=5.2

tests:
  - python:
      imports:
        - wagtail_meta_preview
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Add preview panels for meta data to wagtail
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Frojd/wagtail-meta-preview
  repository: https://github.com/Frojd/wagtail-meta-preview

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: wagtail-meta-preview
  cfe-upstream-registry: pypi
  cfe-upstream-name: wagtail-meta-preview
  cfe-purls:
    - pkg:conda/wagtail-meta-preview@${{ version }}
    - pkg:pypi/wagtail-meta-preview@${{ version }}
  cfe-upstream-repo: https://github.com/Frojd/wagtail-meta-preview
  cfe-upstream-homepage: https://github.com/Frojd/wagtail-meta-preview
  cfe-import-names: [wagtail_meta_preview]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/wagtail-meta-preview-feedstock
  cfe-forge-recipe-updates-needed:
    - meta-yaml-to-recipe-yaml
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
