# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.62.0"

package:
  name: feast
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/feast/feast-${{ version }}.tar.gz
  sha256: 1896bec798c7b81c6e4afb3ba429facfa8a1d67c1fad6adf300dd9a40cca490e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - feast = feast.cli.cli:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - pybindgen >=0.22.0  # Pinned to ==0.22.0, which is not available
    - setuptools >=60,<81
    - setuptools-scm >=6.2
    - sphinx !=4.0.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - click >=7.0.0,<9.0.0
    - colorama >=0.3.9,<1
    - dill >=0.3.0,<0.4.dev0
    - protobuf >=4.24.0
    - jinja2 >=2,<4
    - jsonschema
    - mmh3
    - numpy >=2.0.0,<3
    - pandas >=1.4.3,<3
    - pyarrow >=21.0.0
    - pydantic >=2.10.6
    - pygments >=2.12.0,<3
    - pyyaml >=5.4.0,<7
    - requests
    - sqlalchemy >1
    - tabulate >=0.8.0,<1
    - tenacity >=7,<9
    - toml >=0.10.0,<1
    - tqdm >=4,<5
    - typeguard >=4.0.0
    - fastapi >=0.68.0
    - uvicorn >=0.30.6,<=0.34.0
    - uvicorn-worker
    - gunicorn
    - dask-core >=2024.2.1
    - prometheus_client
    - psutil
    - bigtree >=0.19.2
    - pyjwt

tests:
  - python:
      imports:
        - feast
      pip_check: true
      # multiprocess 0.70.18 has requirement dill>=0.4.0, but you have dill 0.3.9.
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - feast --help

about:
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/feast-dev/feast
  repository: https://github.com/feast-dev/feast
  summary: Python SDK for Feast

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: feast
  cfe-upstream-registry: pypi
  cfe-upstream-name: feast
  cfe-purls:
    - pkg:conda/feast@${{ version }}
    - pkg:pypi/feast@${{ version }}
  cfe-upstream-repo: https://github.com/feast-dev/feast
  cfe-upstream-homepage: https://github.com/feast-dev/feast
  cfe-import-names: [feast]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/feast-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T06:33:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
