# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.1"

package:
  name: intake-dataframe-catalog
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/intake-dataframe-catalog/intake_dataframe_catalog-${{ version }}.tar.gz
  sha256: 4e4d6d542cf8c9afc88bf480ffc685826541b2d94d8c1a6c91427afc1920f980

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0.0
    - versioneer
    - pip
  run:
    - python >=${{ python_min }}
    - intake >=0.7.0
    - itables
    - pandas
    - polars >=1.12,<1.33
    - fsspec
    - numpy
    - pyyaml
    - toolz

tests:
  - python:
      imports:
        - intake_dataframe_catalog
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: An intake driver for a searchable table of intake sources and associated metadata
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ACCESS-NRI/intake-dataframe-catalog
  repository: https://github.com/ACCESS-NRI/intake-dataframe-catalog
  description: |
    An intake driver for a searchable table of intake sources and associated
    metadata.

extra:
  recipe-maintainers:
    - rxm7706

