# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.4.3"

package:
  name: drf-to-mkdoc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/drf-to-mkdoc/drf_to_mkdoc-${{ version }}.tar.gz
  sha256: e1a8340d6c7d45358b1857f755afef48f10255316c5b2bde298cec6da567e85f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80
    - wheel
    - setuptools-scm >=8.0
    - pip
  run:
    - python >=${{ python_min }}
    - django >=3.2,<6.0
    - djangorestframework >=3.12,<4.0
    - pyyaml >=6.0
    - drf-spectacular >=0.26.0
    - mkdocs >=1.4.0
    - mkdocs-material >=9.0.0
    - click <8.2.2
    - python-coreapi >=2.3.0

tests:
  - python:
      imports:
        - drf_to_mkdoc
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/shayestehhs/drf-to-mkdoc
  repository: https://github.com/shayestehhs/drf-to-mkdoc
  documentation: https://github.com/shayestehhs/drf-to-mkdoc
  summary: Generate Markdown API docs from Django/DRF OpenAPI schema for MkDocs

extra:
  recipe-maintainers:
    - rxm7706

