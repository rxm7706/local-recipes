    - pkg:pypi/sqlite-vec@${{ version }}
  cfe-upstream-repo: https://github.com/asg017/sqlite-vec
  cfe-upstream-homepage: https://alexgarcia.xyz/sqlite-vec
  cfe-import-names: [sqlite_vec]
  cfe-source-kind: pypi-sdist
