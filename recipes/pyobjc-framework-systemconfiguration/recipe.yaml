# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "12.1"

package:
  name: pyobjc-framework-systemconfiguration
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyobjc-framework-systemconfiguration/pyobjc_framework_systemconfiguration-${{ version }}.tar.gz
  sha256: 90fe04aa059876a21626931c71eaff742a27c79798a46347fd053d7008ec496e

build:
  number: 0
  skip: not osx
  script:
    # force pyobjc to use conda-forge's chosen SDK
    - export CFLAGS="${CFLAGS} -isysroot ${SDKROOT:-$CONDA_BUILD_SYSROOT}"
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - pyobjc-core >=${{ version }}
    - pyobjc-framework-cocoa >=${{ version }}

tests:
  - python:
      imports:
        - PyObjCTools
        - SystemConfiguration
      pip_check: true

about:
  summary: Wrappers for the framework SystemConfiguration on macOS
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/ronaldoussoren/pyobjc
  repository: https://github.com/ronaldoussoren/pyobjc
  documentation: https://pyobjc.readthedocs.io/en/latest/
  description: |
    Wrappers for the SystemConfiguration framework on macOS. Part of the
    PyObjC bridge, this package lets Python code call the Objective-C
    SystemConfiguration APIs (network reachability, dynamic store, captive
    network, and related configuration services).

extra:
  recipe-maintainers:
    - rxm7706

