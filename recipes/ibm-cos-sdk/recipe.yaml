  cfe-purls:
    - pkg:conda/ibm-cos-sdk@${{ version }}
    - pkg:pypi/ibm-cos-sdk@${{ version }}
  cfe-upstream-repo: https://github.com/ibm/ibm-cos-sdk-python
  cfe-upstream-homepage: https://www.ibm.com/cloud/object-storage
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
