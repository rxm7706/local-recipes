# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.25.4"

package:
  name: mindroom-nio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mindroom-nio/mindroom_nio-${{ version }}.tar.gz
  sha256: 4f65dab4bb8f7563356fcfdb82d31a5e676d512044444fbc2023abb686ff862b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61
  run:
    - python >=${{ python_min }}
    - aiohttp >=3.10,<4
    - aiofiles >=24.1,<25
    - h11 >=0.14,<1
    - h2 >=4,<5
    - jsonschema >=4.14,<5
    - unpaddedbase64 >=2.1,<3
    - pycryptodome >=3.10,<4
    - aiohttp-socks >=0.8,<1
    # [e2e] extras — bundled because the downstream `mindroom` recipe
    # requires `mindroom-nio[e2e]`. conda-forge has no first-class
    # optional-deps story; ship them in run.
    - atomicwrites >=1.4,<2
    - cachetools >=5.3,<6
    - peewee >=3.14,<4
    - vodozemac >=0.9,<1

tests:
  - python:
      # Source layout is src/nio/* — after install the top-level package
      # is `nio` (verified: sdist contains src/nio/__init__.py). The
      # distribution name `mindroom-nio` is just the PyPI name.
      imports:
        - nio
        - nio.client
        - nio.crypto
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/mindroom-ai/mindroom-nio
  repository: https://github.com/mindroom-ai/mindroom-nio
  documentation: https://matrix-nio.readthedocs.io/en/latest/
  license: ISC
  license_file: LICENSE.md
  summary: A Python Matrix client library, designed according to sans I/O principles.
  description: |
    mindroom-nio is a fork of matrix-nio, a Python Matrix client library
    designed according to sans I/O principles. It provides asynchronous
    Matrix client functionality including end-to-end encryption via
    vodozemac (the Rust replacement for libolm).

extra:
  recipe-maintainers:
    - rxm7706
