# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "7.0.1"

package:
  name: yo
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/yo/-/yo-${{ version }}.tgz
  sha256: 466f653547a99ae4cf0de84beac13b8a882804f56718d81df3a2327343bbf7f4

build:
  number: 0
  script:
    - if: unix
      then:
        - set -ex
        - pnpm install --ignore-scripts
        - npm pack --ignore-scripts
        - npm install --global "${SRC_DIR}/yo-${{ version }}.tgz"
        - pnpm-licenses generate-disclaimer --prod --output-file=third-party-licenses.txt
      else:
        - call pnpm install --ignore-scripts
        - if %ERRORLEVEL% neq 0 exit 1
        - call npm pack --ignore-scripts
        - if %ERRORLEVEL% neq 0 exit 1
        - call npm install --global %SRC_DIR%/yo-${{ version }}.tgz
        - if %ERRORLEVEL% neq 0 exit 1
        - call pnpm-licenses generate-disclaimer --prod --output-file=third-party-licenses.txt
        - if %ERRORLEVEL% neq 0 exit 1

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  host:
    - nodejs
  run:
    - nodejs

tests:
  - script:
      - yo --help

about:
  license: BSD-2-Clause
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: CLI tool for running Yeoman generators
  description: |
    Yeoman helps you to kickstart new projects, prescribing best practices and tools to help you stay productive.
  homepage: http://yeoman.io
  documentation: http://yeoman.io
  repository: https://github.com/yeoman/yo

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: yo
  cfe-upstream-registry: npm
  cfe-upstream-name: yo
  cfe-purls:
    - pkg:conda/yo@${{ version }}
    - pkg:npm/yo@${{ version }}
  cfe-upstream-repo: https://github.com/yeoman/yo
  cfe-upstream-homepage: http://yeoman.io
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/yo-feedstock
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list: []
