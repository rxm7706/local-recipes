# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.0"
  python_min: "3.12"

package:
  name: django-o11y
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-o11y/django_o11y-${{ version }}.tar.gz
  sha256: 92e0389023022e55f2bce7a76b2d1a3ce5ba2074c7eb4bc7ae35d971c3174dfe

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - django >=5.2
    - opentelemetry-api >=1.39.1
    - opentelemetry-sdk >=1.39.1
    - opentelemetry-instrumentation-django >=0.60b1
    - opentelemetry-exporter-otlp-proto-grpc >=1.39.1
    - structlog >=25.5.0
    - django-structlog >=10.0.0
    - click >=8.1.7
    - django-prometheus >=2.4.0
    - prometheus_client >=0.24.1

tests:
  # CFEP-25-justified: Django app backend — `import django_o11y` raises
  # ImproperlyConfigured without DJANGO_SETTINGS_MODULE configured; the test
  # env cannot exercise python.imports standalone.
  - package_contents:
      site_packages:
        - django_o11y

about:
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/adinhodovic/django-o11y
  summary: Comprehensive OpenTelemetry observability for Django with traces, logs, metrics, and profiling
  description: |
    Comprehensive OpenTelemetry observability for Django with traces, logs, metrics, and profiling

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: django-o11y
  cfe-upstream-registry: pypi
  cfe-upstream-name: django-o11y
  cfe-purls:
    - pkg:conda/django-o11y@${{ version }}
    - pkg:pypi/django-o11y@${{ version }}
  cfe-upstream-repo: https://github.com/adinhodovic/django-o11y
  cfe-upstream-homepage: https://github.com/adinhodovic/django-o11y
  cfe-import-names: [django_o11y]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
