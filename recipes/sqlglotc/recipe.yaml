schema_version: 1

context:
  name: sqlglotc
  version: 29.0.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/sqlglotc-${{ version }}.tar.gz
  sha256: 2b3116880e6f44c8cee2f690ae9ac58dfa23ce2921e6f67ea1715d70873a0d51

build:
  number: 0
  skip: match(python, "<3.9")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
  host:
    - python >=3.9
    - setuptools >=61.0
    - setuptools-scm
    - mypy >=1.0
    - types-python-dateutil
    - pip
  run:
    - python >=3.9

tests:
  - python:
      imports:
        - e1890b2472c724a62761__mypyc
        - sqlglot
  - requirements:
      run:
        - pip
    script:
      - pip check

about:
  summary: mypyc-compiled extensions for sqlglot
  license: MIT
  license_file: PLEASE_ADD_LICENSE_FILE

extra:
  recipe-maintainers:
    - rxm7706