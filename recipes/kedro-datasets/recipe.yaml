# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "9.4.0"

package:
  name: kedro-datasets
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/k/kedro-datasets/kedro_datasets-${{ version }}.tar.gz
  sha256: 46b2e20e6b1d81914d44eab83f6d911da1191b79ce3d43eb07bc49ceea3f7cc8

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - pip
  run:
    - python >=${{ python_min }}
    - backports.strenum
    - kedro >=1.0.0rc1,<2.0.0
    - lazy_loader

tests:
  - python:
      imports:
        - kedro_datasets
        - kedro_datasets_experimental
      pip_check: true
      python_version:
        - ${{ python_min }}.*

about:
  summary: Kedro-Datasets is where you can find all of Kedro's data connectors.
  license: Apache-2.0
  license_file: LICENSE.md
  homepage: https://github.com/kedro-org/kedro-plugins/tree/main/kedro-datasets
  repository: https://github.com/kedro-org/kedro-plugins/tree/main/kedro-datasets
  description: |
    Kedro-Datasets is where you can find all of Kedro's data connectors.
    These data connectors are implementations of the AbstractDataset.

extra:
  recipe-maintainers:
    - rxm7706

