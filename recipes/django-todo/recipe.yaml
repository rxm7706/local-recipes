# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.5.6"

package:
  name: django-todo
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-todo/django_todo-${{ version }}.tar.gz
  sha256: 6dc00b23dc976c3136b5254ce046932adc692ba0d6403e66beafd882f60405ce

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.0
    - factory_boy
    - titlecase
    - bleach
    - django-autocomplete-light
    - html2text

tests:
  - python:
      imports:
        - todo
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A multi-user, multi-group task management and assignment system for Django.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: http://django-todo.org
  repository: https://github.com/shacker/django-todo

extra:
  recipe-maintainers:
    - rxm7706

