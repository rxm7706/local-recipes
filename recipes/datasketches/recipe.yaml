# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.2.0"

package:
  name: datasketches
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/datasketches/datasketches-${{ version }}.tar.gz
  sha256: c00d61da4695e00036e63f590999f584cc39246cbb147b171f375f792604a612
  patches:
    - patches/0001-drop-const-on-k_-d_-members.patch

build:
  number: 1
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip:
    - match(python, ">=3.13")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - python
        - numpy
  host:
    - python
    - pip
    - wheel
    - setuptools >=30.3.0
    - cmake >=3.16
    - numpy <2.0
    - nanobind >=1.6
    - make
  run:
    - python
    - ${{ pin_compatible('numpy') }}

tests:
  - python:
      imports:
        - datasketches
      pip_check: true

about:
  homepage: http://datasketches.apache.org
  repository: https://github.com/apache/datasketches-cpp/tree/master/python
  summary: The Apache DataSketches Library for Python
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: datasketches
  cfe-upstream-registry: pypi
  cfe-upstream-name: datasketches
  cfe-purls:
    - pkg:conda/datasketches@${{ version }}
    - pkg:pypi/datasketches@${{ version }}
  cfe-upstream-repo: https://github.com/apache/datasketches-python
  cfe-upstream-homepage: https://datasketches.apache.org
  cfe-import-names: [datasketches]
  cfe-source-kind: pypi-sdist
  cfe-noarch: compiled
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/datasketches-feedstock
  cfe-forge-recipe-updates-needed: meta-yaml-to-recipe-yaml
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-21T00:00:00Z
