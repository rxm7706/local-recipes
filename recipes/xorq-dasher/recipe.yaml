# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.1"

package:
  name: xorq-dasher
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/x/xorq-dasher/xorq_dasher-${{ version }}.tar.gz
  sha256: 377a590f3c491e9b8dc2599e7869eb8f8c0a3d56e38965073afb284fa5942fef

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - attrs
    - toolz
    - python-xxhash

tests:
  - python:
      imports:
        - xorq_dasher
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/xorq-dasher/
  repository: https://github.com/xorq-labs/dasher
  summary: xorq-labs dasher

extra:
  recipe-maintainers:
    - rxm7706

