{% set name = "django-sesame" %}
{% set version = "3.2.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/django_sesame-{{ version }}.tar.gz
  sha256: 09977a1c55bdbcce0a024c712c4d683e1a69543a217626ffa1d5f7ef7ebffc58

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core >=1.0.0
    - pip
  run:
    - python >={{ python_min }}
    - django >=3.2
  run_constrained:
    - ua-parser >=0.15

test:
  imports:
    - sesame
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/aaugustin/django-sesame
  summary: Frictionless authentication with "Magic Links" for your Django project.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
