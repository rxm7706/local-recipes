# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.2.3"

package:
  name: django-sesame
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-sesame/django_sesame-${{ version }}.tar.gz
  sha256: 09977a1c55bdbcce0a024c712c4d683e1a69543a217626ffa1d5f7ef7ebffc58

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - django >=4.2
  run_constraints:
    - ua-parser >=0.15

tests:
  - python:
      imports:
        - sesame
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Frictionless authentication with "Magic Links" for your Django project.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/aaugustin/django-sesame
  repository: https://github.com/aaugustin/django-sesame
  documentation: https://django-sesame.readthedocs.io/
  description: |
    django-sesame provides frictionless authentication with "Magic Links"
    for your Django project. It generates URLs containing authentication
    tokens and logs users in when they click these links.

extra:
  recipe-maintainers:
    - rxm7706

