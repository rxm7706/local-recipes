{% set name = "grunnur" %}
{% set version = "0.6.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/grunnur-{{ version }}.tar.gz
  sha256: 2736168585c8935018630efc7ea3cf0f15b2beab698e24c1bfdfb4990c02f446

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pdm-pep517
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2
    - mako >=1

test:
  imports:
    - grunnur
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Uniform API for PyOpenCL and PyCUDA.
  home: https://github.com/fjarri/grunnur
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - rxm7706
