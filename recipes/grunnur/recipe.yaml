# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.0"

package:
  name: grunnur
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/grunnur/grunnur-${{ version }}.tar.gz
  sha256: 2736168585c8935018630efc7ea3cf0f15b2beab698e24c1bfdfb4990c02f446

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-pep517
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=2
    - mako >=1

tests:
  - python:
      imports:
        - grunnur
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Uniform API for PyOpenCL and PyCUDA.
  license: MIT
  license_file: LICENSE.md
  homepage: https://github.com/fjarri/grunnur
  repository: https://github.com/fjarri/grunnur

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: grunnur
  cfe-upstream-registry: pypi
  cfe-upstream-name: grunnur
  cfe-purls:
    - pkg:conda/grunnur@${{ version }}
    - pkg:pypi/grunnur@${{ version }}
  cfe-upstream-repo: https://github.com/fjarri/grunnur
  cfe-upstream-homepage: https://github.com/fjarri/grunnur
  cfe-import-names: [grunnur]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/grunnur-feedstock
  cfe-forge-recipe-updates-needed:
    - meta-yaml-to-recipe-yaml
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
  cfe-generated-by-version: 8.37.0
  cfe-generated-at-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-20T00:00:00Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
