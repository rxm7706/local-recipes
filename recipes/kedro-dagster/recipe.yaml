# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: kedro-dagster
  version: "0.6.0"
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/kedro_dagster-${{ version }}.tar.gz
  sha256: 492197ec1501485c0512c90b53ad4711775cca4f02bfe0a514bdf19048b7361a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }},<3.14
    - kedro >=1.0.0
    - kedro-datasets >=1.0.0
    - dagster >=1.10,<2.0
    - dagster-webserver
    - dagster-dg-cli
    - pydantic >=2.0.0
    - cachetools >=4.1

tests:
  - python:
      imports:
        - kedro_dagster
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Kedro-Dagster makes it easy to deploy Kedro projects to Dagster
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/gtauzin/kedro-dagster
  documentation: https://gtauzin.github.io/kedro-dagster/
  repository: https://github.com/gtauzin/kedro-dagster

extra:
  recipe-maintainers:
    - gtauzin
    - rxm7706
