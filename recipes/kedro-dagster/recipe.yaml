# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: kedro-dagster
  version: "0.7.0"
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/kedro_dagster-${{ version }}.tar.gz
  sha256: a52d63fc3571ed399db7eed2877eb8a9e1cf5f44a821a7ad4cd233608757b782

build:
  number: 1
  noarch: python
  script:
    env:
      WARNINGS: "ignore::kedro.KedroPythonVersionWarning"
      PYTHONWARNINGS: "ignore::UserWarning"
    content:
      - "${{ PYTHON }} -m pip install -vv --use-pep517 --no-deps --no-build-isolation ."

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }},<3.15
    - kedro >=1.0.0
    - kedro-datasets >=1.0.0
    - dagster >=1.10,<2.0
    - dagster-webserver
    - dagster-dg-cli
    - pydantic >=2.0.0
    - cachetools >=4.1

tests:
#  - python:
#      imports:
#        - kedro_dagster
#      pip_check: true
#      python_version:
#        - ${{ python_min }}.*
#        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      env:
        WARNINGS: "ignore::kedro.KedroPythonVersionWarning"
        PYTHONWARNINGS: "ignore::UserWarning"
      interpreter: python
      content: |
        import kedro_dagster

about:
  summary: Kedro-Dagster makes it easy to deploy Kedro projects to Dagster
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/kedro-dagster
  documentation: https://kedro-dagster.readthedocs.io
  repository: https://github.com/stateful-y/kedro-dagster

extra:
  recipe-maintainers:
    - gtauzin
    - rxm7706
