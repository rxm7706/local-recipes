# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.2.0"

package:
  name: lazy-imports
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/lazy-imports/lazy_imports-${{ version }}.tar.gz
  sha256: 3c546b3c1e7c4bf62a07f897f6179d9feda6118e71ef6ecc47a339cab3d2e2d9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - lazy_imports
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Tool to support lazy imports
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/bachorp/lazy-imports
  repository: https://github.com/bachorp/lazy-imports
  description: |
    Tool to support lazy imports. Provides helpers (try_import, LazyImporter,
    LazyModule) to defer importing optional or heavy dependencies until they
    are actually used, raising a helpful error only when the missing import
    is accessed.

extra:
  recipe-maintainers:
    - rxm7706

