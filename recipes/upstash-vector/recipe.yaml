# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.8.0"

package:
  name: upstash-vector
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/u/upstash-vector/upstash_vector-${{ version }}.tar.gz
  sha256: cdeeeeabe08c813f0f525d9b6ceefbf17abb720bd30190cd6df88b9f2c318334

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.23.0,<1

tests:
  - python:
      imports:
        - upstash_vector
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/upstash-vector/
  license: MIT
  license_file: LICENSE
  summary: Serverless Vector SDK from Upstash
  repository: https://github.com/upstash/vector-py
  documentation: https://github.com/upstash/vector-py
  description: |
    Serverless Vector SDK from Upstash for working with the Upstash Vector
    database over HTTP. Provides a Python client to upsert, query, fetch,
    and delete vectors.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
