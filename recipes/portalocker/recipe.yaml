# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.7.0"

package:
  name: portalocker
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/portalocker/portalocker-${{ version }}.tar.gz
  sha256: 032e81d534a88ec1736d03f780ba073f047a06c478b06e2937486f334e955c51

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - pywin32 # could replace pywin32-on-windows
    - if: win
      then: pywin32-on-windows >=226

tests:
  - python:
      imports:
        - portalocker
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/WoLpH/portalocker
  license: PSF-2.0
  license_family: PSF
  license_file: LICENSE
  summary: Portalocker is a library to provide an easy API to file locking.
  documentation: http://portalocker.readthedocs.org
  repository: https://github.com/WoLpH/portalocker

extra:
  recipe-maintainers:
    - tyrius02
    - sodre
    - rxm7706
