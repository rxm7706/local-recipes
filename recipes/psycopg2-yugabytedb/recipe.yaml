# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.9.3.5"

package:
  name: psycopg2-yugabytedb
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/psycopg2-yugabytedb/psycopg2_yugabytedb-${{ version }}.tar.gz
  sha256: af41d31a910435377483b0034eba6e0da1f2f8b2b5171e78e9439f8fdd66fdbc

build:
  number: 0
  skip:
    - match(python, ">=3.13")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - pip
    - setuptools
    - libpq
  run:
    - python
  run_constraints:
    - psycopg2 <0a0

tests:
  - python:
      # https://github.com/yugabyte/yugabyte-db/issues/12283
      # For now, psycopg2-yugabytedb has the same underlying library (psycopg2)
      # as the upstream driver which when installed together override one
      # another based on the sequence of installation.
      imports:
        - psycopg2
      pip_check: true

about:
  summary: Yugabyte Psycopg2 driver is a distributed python driver for YugabyteDB built on the PostgreSQL psycopg2 driver.
  license: MPL-2.0-no-copyleft-exception
  license_file: LICENSE
  homepage: https://github.com/yugabyte/psycopg2
  repository: https://github.com/yugabyte/psycopg2

extra:
  recipe-maintainers:
    - rxm7706

