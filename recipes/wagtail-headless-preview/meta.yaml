{% set name = "wagtail-headless-preview" %}
{% set version = "0.9.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/wagtail_headless_preview-{{ version }}.tar.gz
  sha256: dbabbb614bd1689f048738c46034c557a3ee426e0ef80feb4831bcfc93a24e15

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2,<4
    - pip
  run:
    - django
    - python >={{ python_min }}
    - wagtail >=7.0

test:
  imports:
    - wagtail_headless_preview
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/torchbox/wagtail-headless-preview
  summary: Enhance Wagtail previews in headless setups.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
