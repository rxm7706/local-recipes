# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.9.0"

package:
  name: wagtail-headless-preview
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-headless-preview/wagtail_headless_preview-${{ version }}.tar.gz
  sha256: dbabbb614bd1689f048738c46034c557a3ee426e0ef80feb4831bcfc93a24e15

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - wagtail >=7.0

tests:
  - python:
      imports:
        - wagtail_headless_preview
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/torchbox/wagtail-headless-preview
  repository: https://github.com/torchbox/wagtail-headless-preview
  summary: Enhance Wagtail previews in headless setups.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
