# CFE comments
# Header:
#    # Consolidates the three version-locked IBM COS packages
#    # (ibm-cos-sdk-core / ibm-cos-sdk-s3transfer / ibm-cos-sdk) — formerly
#    # three standalone recipes — into one multi-output feedstock. Each is a
#    # fork of botocore / s3transfer / boto3 respectively, released together
#    # at matching versions. This is the boto3/botocore/s3transfer fork
#    # family; on conda-forge the upstream-of-this-fork ships as THREE
#    # separate feedstocks, so a reviewer may prefer that shape. Consolidating
#    # is justified here: all three version-lock, none is on conda-forge yet,
#    # and one bump updates the whole triad.
# source:
#    # Three distinct sdists (separate GitHub repos: ibm-cos-sdk-python,
#    # -core, -s3transfer) each extracted into its own target_directory.
# outputs:
#  build:
#    # script is `${{ PYTHON }} -m pip install ./<subdir>` (jinja-rendered
#    # interpreter + relative subdir path) — NOT a bash `cd "$SRC_DIR/<subdir>"`
#    # form. noarch:python is built on win-64 too, where cmd.exe can't parse
#    # `$SRC_DIR`/`$PYTHON`. The cd-form passed linux+osx but failed win_64 on
#    # staged-recipes PR #33886 (Azure buildId 1543755). Do not reintroduce cd.
#  requirements:
#    run:
#    # exact=True pins replace the standalone recipes' cross-recipe pins
#    # (sdk: core==ver + s3transfer==ver; s3transfer: core>=ver). Because all
#    # three are built together from this one recipe, exact=True mirrors
#    # upstream's == intent and removes any cross-feedstock version skew. This
#    # consolidation RESOLVES the old blocked-pending-prerequisites status
#    # (core/s3transfer no longer need to be on conda-forge first).
#    # setuptools added to core's host (G55: a source build needs the backend
#    # declared; the s3transfer/sdk standalones already had it — core's
#    # omission was the anomaly).
# tests:
#    # G7 import-name divergences (verified against each sdist top_level.txt):
#    #   ibm-cos-sdk-core      -> ibm_botocore
#    #   ibm-cos-sdk-s3transfer-> ibm_s3transfer
#    #   ibm-cos-sdk           -> ibm_boto3
