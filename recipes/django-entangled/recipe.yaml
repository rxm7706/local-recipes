# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.7"

package:
  name: django-entangled
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-entangled/django_entangled-${{ version }}.tar.gz
  sha256: 40afbdcaf91ec061d5e5365eaf7b978a03879620ad68f97c0615daaa66843cc2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django >=2.1

tests:
  - python:
      imports:
        - entangled
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Edit JSON field using Django Model Form
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/jrief/django-entangled
  repository: https://github.com/jrief/django-entangled

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: django-entangled
  cfe-upstream-registry: pypi
  cfe-upstream-name: django-entangled
  cfe-purls:
    - pkg:conda/django-entangled@${{ version }}
    - pkg:pypi/django-entangled@${{ version }}
  cfe-upstream-repo: https://github.com/jrief/django-entangled
  cfe-upstream-homepage: https://github.com/jrief/django-entangled
  cfe-import-names: [entangled]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/django-entangled-feedstock
  cfe-forge-recipe-updates-needed: [recipe-regenerate]
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-20T00:00:00Z
