# CFE comments
# Header:
#    Wave-H sole-maintainer feedstock refresh. Deployed feedstock is v1
#    (recipe.yaml only) at version 4.2.0, which equals the latest PyPI
#    release and the prior local meta.yaml version -> this is a
#    version-current FORMAT modernization, not a version bump.
# package:
#    Modernized from the deployed feedstock's name|lower templated form to a
#    literal package.name (canonical 2026 shape).
# source:
#    Modernized from the deployed feedstock's name[0]/name templated PyPI URL
#    to fully-literal path segments; only version interpolates. The prior
#    local meta.yaml used a pypi.io host -- corrected to pypi.org.
# build:
#    number kept at 2 to match the deployed feedstock build.number (same
#    version, format modernization). Reset to 0 only on an upstream version bump.
# requirements:
#  run:
#    Upstream requirements-common.txt / requirements.txt pin many deps with
#    == (boto3, click, flasgger, flask, flask-cors, itsdangerous, jinja2,
#    pytz, requests-aws4auth, statsd, typing, werkzeug, wheel) plus
#    elasticsearch==7.13.3 and elasticsearch-dsl==7.4.0. The deployed
#    feedstock loosened the general deps to >= but kept the two elasticsearch
#    pins exact; this recipe mirrors that authoritative shape.
# tests:
#    pip_check is false because the loosened >= run-deps conflict with the
#    wheel METADATA's upstream == pins (G26: loosening run-deps does not
#    rewrite the bundled dist-info, so pip check would fail). Mirrors the
#    deployed feedstock's pip_check: false. Modernized the test to the
#    CFEP-25 dual-version triad (python_min.* + "*").
# about:
#    license set to Apache-2.0 (authoritative: setup.py declares
#    SPDX-License-Identifier: Apache-2.0; the prior local meta.yaml's
#    "Apache-2.0 AND MIT" was a stale guess). NOTICE shipped alongside LICENSE
#    as the Apache-2.0 attribution file (present in the sdist).
