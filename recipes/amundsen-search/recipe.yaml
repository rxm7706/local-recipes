# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.2.0"

package:
  name: amundsen-search
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/amundsen-search/amundsen-search-${{ version }}.tar.gz
  sha256: 4d6cf0e15b27a628880e44097fe9318f28fae4eb7683a0974e3c147e35e3f32d

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<4.0
    - elasticsearch ==7.13.3
    - elasticsearch-dsl ==7.4.0
    - amundsen-common >=0.27.0
    - attrs >=19.1.0
    - boto3 >=1.17.23
    - click >=8.1.7
    - flasgger >=0.9.5
    - flask >=2.2.5
    - flask-restful >=0.3.9
    - flask-cors >=3.0.10
    - itsdangerous >=2.1.2
    - jinja2 >=3.1.2
    - jsonschema >=3.0.1,<4.0
    - marshmallow >=3.0,<=3.6
    - marshmallow3-annotations >=1.1.0
    - pytz >=2021.1
    - requests >=2.25.0
    - requests-aws4auth >=1.1.0
    - statsd >=3.2.1
    - typing >=3.6.4
    - werkzeug >=3.0.1
    - wheel >=0.38.1

tests:
  - python:
      imports:
        - search_service
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Search Service for Amundsen
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  homepage: https://github.com/amundsen-io/amundsen/tree/main/search
  repository: https://github.com/amundsen-io/amundsen
  documentation: https://www.amundsen.io/amundsen/

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: amundsen-search
  cfe-upstream-registry: pypi
  cfe-upstream-name: amundsen-search
  cfe-purls:
    - pkg:conda/amundsen-search@${{ version }}
    - pkg:pypi/amundsen-search@${{ version }}
  cfe-upstream-repo: https://github.com/amundsen-io/amundsen
  cfe-upstream-homepage: https://www.amundsen.io/amundsen/
  cfe-import-names: [search_service]
  cfe-source-kind: pypi-sdist
  cfe-noarch: python
  cfe-pip-check: false:upstream-exact-pins-loosened-G26
  cfe-on-conda-forge-status: confirmed-on-conda-forge
  cfe-on-conda-forge-feedstock: https://github.com/conda-forge/amundsen-search-feedstock
  cfe-forge-recipe-updates-needed: recipe-regenerate
  cfe-forge-blocker-list: []
  cfe-last-checked: 2026-06-21T00:00:00Z
  cfe-generated-by-version: 8.40.0
  cfe-generated-at-datetime: 2026-06-21T00:00:00Z
  cfe-local-build-status: success
  cfe-local-build-datetime: 2026-06-21T11:56:15Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
