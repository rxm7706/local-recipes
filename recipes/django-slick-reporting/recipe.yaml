# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: django-slick-reporting
  version: 1.4.0
  python_min: "3.10"


package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 6a930f7c911200bca80cf768f84765824198f45c4cae44486b388998b943d27a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=61.0
  run:
    - python >=${{ python_min }},<4.0
    - django >=2.2
    - python-dateutil >2.8.1
    - pytz
    - simplejson
    - django-crispy-forms
tests:
  - python:
      imports:
        - slick_reporting
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: A one-stop report and analytics generation and computation with batteries included
  license: BSD-3-Clause
  license_file: LICENSE.md
  homepage: https://django-slick-reporting.com/
  repository: https://github.com/ra-systems/django-slick-reporting
  documentation: https://django-slick-reporting.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - rxm7706
