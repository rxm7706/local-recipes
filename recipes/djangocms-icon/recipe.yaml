# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.1.1"

package:
  name: djangocms-icon
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/djangocms-icon/djangocms_icon-${{ version }}.tar.gz
  sha256: 77f7b4c697d652077113203049b54c32c27cf2d05cc45e7275520d1762569ad3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django
    - django-cms >=3.10
    - djangocms-attributes-field >=1

tests:
  - python:
      imports:
        - djangocms_icon
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Adds icon plugin to django CMS.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/django-cms/djangocms-icon
  repository: https://github.com/django-cms/djangocms-icon

extra:
  recipe-maintainers:
    - rxm7706

