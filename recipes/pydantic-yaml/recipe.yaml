# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.6.0"

package:
  name: pydantic-yaml
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydantic-yaml/pydantic_yaml-${{ version }}.tar.gz
  sha256: ce5f10b65d95ca45846a36ea8dae54e550fa3058e7d6218e0179184d9bf6f660

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0.0
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic >=1.8
    - ruamel.yaml >=0.17.0,<0.19.0
    - typing-extensions >=4.5.0

tests:
  - python:
      imports:
        - pydantic_yaml
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Adds some YAML functionality to the excellent `pydantic` library.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/NowanIlfideme/pydantic-yaml
  repository: https://github.com/NowanIlfideme/pydantic-yaml
  documentation: https://pydantic-yaml.readthedocs.io/en/latest/
  description: |
    pydantic-yaml adds YAML serialization and deserialization support to the
    pydantic library, including support for versioned models.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
