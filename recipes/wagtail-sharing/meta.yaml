{% set name = "wagtail-sharing" %}
{% set version = "2.16" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: bfe1b1dc76b468cbd88a55c650bdd39c946c70a0754dd6736d171145c2e80b4e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=43.0.0
    - wheel
    - pip
  run:
    - django
    - python >={{ python_min }}
    - wagtail >=6.2

test:
  imports:
    - wagtailsharing
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Easier sharing of Wagtail drafts
  home: https://github.com/cfpb/wagtail-sharing
  license: CC0-1.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
