# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.16"
  python_min: "3.12"

package:
  name: wagtail-sharing
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-sharing/wagtail_sharing-${{ version }}.tar.gz
  sha256: bfe1b1dc76b468cbd88a55c650bdd39c946c70a0754dd6736d171145c2e80b4e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64
    - setuptools-scm >=8
    - wheel
  run:
    - python >=${{ python_min }}
    - wagtail >=6.2

tests:
  - python:
      imports:
        - wagtailsharing
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Easier sharing of Wagtail drafts
  license: CC0-1.0
  license_file: LICENSE
  homepage: https://github.com/cfpb/wagtail-sharing
  repository: https://github.com/cfpb/wagtail-sharing

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
