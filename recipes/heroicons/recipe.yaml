# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.14.0"

package:
  name: heroicons
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/heroicons/heroicons-${{ version }}.tar.gz
  sha256: e55ecc0a839cf872f55977d2dd04a1855bfdf080bed1d13db5264b0060e65a96

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - heroicons
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Use heroicons in your Django and Jinja templates.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/adamchainz/heroicons
  repository: https://github.com/adamchainz/heroicons
  documentation: https://github.com/adamchainz/heroicons#readme
  description: |
    heroicons provides a set of free MIT-licensed high-quality SVG icons
    for use in your web projects, wired up for use in Django and Jinja
    templates via template tags.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
