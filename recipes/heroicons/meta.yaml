{% set name = "heroicons" %}
{% set version = "2.14.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/heroicons-{{ version }}.tar.gz
  sha256: e55ecc0a839cf872f55977d2dd04a1855bfdf080bed1d13db5264b0060e65a96

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - heroicons
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/adamchainz/heroicons
  summary: Use heroicons in your Django and Jinja templates.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
