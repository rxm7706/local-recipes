# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.29"

package:
  name: tableauscraper
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tableauscraper/TableauScraper-${{ version }}.tar.gz
  sha256: 7fa031b9b4aacecb8b525ad1d5908623456c3975fc46bf88fb2b6fd13156288e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - beautifulsoup4 >=4.0.0
    - pandas
    - requests >=2.14.0

tests:
  - python:
      imports:
        - tableauscraper
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Library to get data from Tableau Viz
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/bertrandmartel/tableau-scraping
  repository: https://github.com/bertrandmartel/tableau-scraping
  description: |
    Python library to scrape data from Tableau visualizations (Tableau Viz),
    returning the underlying worksheet data as pandas DataFrames.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
