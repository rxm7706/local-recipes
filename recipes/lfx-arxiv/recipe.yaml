# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.1.1"
  # wheel-only on PyPI; source IS in the langflow monorepo (src/bundles/arxiv).
  # conda-forge prefers source > wheel. monorepo tag != package version - bump BOTH.
  monorepo_tag: "1.10.0"

package:
  name: lfx-arxiv
  version: ${{ version }}

source:
  url: https://github.com/langflow-ai/langflow/archive/refs/tags/v${{ monorepo_tag }}.tar.gz
  sha256: 45a317111a5d7cbc2709e683a72a80779801a658f61e506b612978588788ab71

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install ./src/bundles/arxiv --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - defusedxml >=0.7.1,<1.0.0
    - lfx >=1.10.0.rc0,<2.0.0

tests:
  - python:
      imports:
        - lfx_arxiv
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/langflow-ai/langflow
  repository: https://github.com/langflow-ai/langflow
  documentation: https://docs.langflow.org/extensions
  license: MIT
  license_file: LICENSE
  summary: arXiv search component as a standalone Langflow Extension Bundle.

extra:
  recipe-maintainers:
    - rxm7706

#### CFE metadata AND comments
# CFE metadata
  cfe-conda-name: lfx-arxiv
  cfe-upstream-registry: pypi
  cfe-upstream-name: lfx-arxiv
  cfe-purls:
    - pkg:conda/lfx-arxiv@${{ version }}
    - pkg:pypi/lfx-arxiv@${{ version }}
  cfe-upstream-repo: https://github.com/langflow-ai/langflow
  cfe-upstream-homepage: https://github.com/langflow-ai/langflow
  cfe-import-names: [lfx_arxiv]
  cfe-source-kind: github-tag
  cfe-noarch: python
  cfe-pip-check: true
  cfe-on-conda-forge-status: blocked-pending-prerequisites
  cfe-on-conda-forge-feedstock: none
  cfe-forge-recipe-updates-needed: none
  cfe-forge-blocker-list:
    - lfx                 # langflow-family core dep; built in local channel, not yet on conda-forge
  cfe-last-checked: 2026-06-19T20:15:00Z
  cfe-generated-by-version: 8.34.0
  cfe-generated-at-datetime: 2026-06-19T20:15:00Z
  cfe-local-build-status: build-clean-test-blocked
  cfe-local-build-datetime: 2026-06-20T01:14:08Z
  cfe-local-build-platform: linux-64
  cfe-local-build-tool: rattler-build
