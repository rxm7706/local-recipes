schema_version: 1

context:
  name: "cdp-use"
  version: "1.4.5"
  python_min: "3.11"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/cdp_use-${{ version }}.tar.gz
  sha256: 0da3a32df46336a03ff5a22bc6bc442cd7d2f2d50a118fd4856f29d37f6d26a0

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.28.1
    - typing_extensions >=4.12.2
    - websockets >=15.0.1

tests:
  - python:
      imports:
        - cdp_use
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Type safe generator/client library for CDP
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/cdp-use/

extra:
  recipe-maintainers:
    - rxm7706
