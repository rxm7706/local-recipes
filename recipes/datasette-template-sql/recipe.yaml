# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: datasette-template-sql
  version: "1.0.3"
  python_min: '3.10'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/datasette_template_sql-${{ version }}.tar.gz
  sha256: c31c96be9cbf10423a55089d3180cf2379debf1c4ac155ba2d95e55be7c02910

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.9.18,<0.12.0
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - datasette >=0.54

tests:
  - python:
      imports:
        - datasette_template_sql
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"

about:
  summary: Datasette plugin for executing SQL queries from templates
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/simonw/datasette-template-sql

extra:
  recipe-maintainers:
    - rxm7706
