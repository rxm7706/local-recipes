# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.0.7"

package:
  name: wagtailmenus
  version: ${{ version }}

source:
  url: https://github.com/jazzband/wagtailmenus/archive/v${{ version }}.tar.gz
  sha256: 9d14c5835bd0b0f1829ed9f8a3fb4931753f818dd27b522319546b9c65bdc9f1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - requests
    - django
    - django-modelcluster
    - wagtail >=6.3
    - django-cogwheels ==0.3

tests:
  - python:
      imports:
        - wagtailmenus
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: An app to help you manage menus in your Wagtail projects more consistently.
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/jazzband/wagtailmenus
  repository: https://github.com/jazzband/wagtailmenus
  description: |
    wagtailmenus is an extension for the Wagtail CMS that helps you define,
    manage, and render menus (main menus and flat menus) in your Wagtail
    projects more consistently and flexibly.

extra:
  recipe-maintainers:
    - rxm7706

