# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

# ⚠️ LOCAL-ONLY RECIPE — NOT FOR conda-forge/staged-recipes SUBMISSION
# Reason: suitenumerique/people is a deployed Django web application, not
# a library. `pip install` ships the importable backend module
# (people); running the service additionally requires Postgres,
# Redis/Celery, OIDC provider, S3-compatible storage, SMTP, and frontend
# build artifacts that this recipe does not install. conda-forge declines
# web-application recipes as a matter of policy.
#
# Pinned to commit 65cbaac1713d on suitenumerique/people (no PyPI release).
# Build context: src/backend/ subdirectory (this recipe pip-installs from
# there).
#

context:
  version: "1.25.4"
  commit: "65cbaac1713df87348e5480d9097a8f79b7cdd97"
  python_min: "3.14"

package:
  name: suite-people
  version: ${{ version }}

source:
  - url: https://github.com/suitenumerique/people/archive/${{ commit }}.tar.gz
    sha256: b1db38d9dd46580419cbfcf9cacc4d942a1541c803cae3d2c7ec3eac34334b3d
  # Org-level MIT LICENSE fallback for apps whose repo ships none directly.
build:
  number: 0
  noarch: python
  script:
    - cd src/backend && ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - brotli
    - pyjwt
    - boto3
    - celery
    - django-celery-beat
    - django-celery-results
    - django-configurations
    - django-cors-headers
    - django-countries
    - django-extensions
    - django-import-export
    - django-lasuite
    - django-oauth-toolkit
    - django-parler
    - django-redis
    - django-storages
    - django-timezone-field
    - django-treebeard
    - django-zxcvbn-password-validator
    - django
    - djangorestframework
    - dockerflow
    - drf-spectacular
    - drf-spectacular
    - easy-thumbnails
    - factory-boy
    - flower
    - gunicorn
    - jaraco.context
    - joserfc
    - jsonschema
    - mozilla-django-oidc
    - nested-multipart-parser
    - psycopg
    - redis-py
    - requests
    - sentry-sdk
    - whitenoise

# CFEP-25-justified: Django web-app backend — `import <module>` raises
# ImproperlyConfigured without DJANGO_SETTINGS_MODULE, and the test env
# can't resolve the full transitive Django-plugin chain. site_packages
# presence is the testable invariant.
tests:
  - package_contents:
      site_packages:
        - people

about:
  homepage: https://github.com/suitenumerique/people
  repository: https://github.com/suitenumerique/people
  summary: La Suite numérique people backend (Django web application — local-only)
  description: |
    suitenumerique/people backend. Distribution name "people".
    This is a Django web service, not a library — installing this conda
    package gives you the importable backend code; running the service
    requires additional infrastructure (Postgres + Redis + Celery + OIDC +
    S3 + SMTP + frontend).
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
