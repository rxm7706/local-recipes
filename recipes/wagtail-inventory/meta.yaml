{% set version = "3.3" %}

package:
  name: wagtail-inventory
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/w/wagtail-inventory/wagtail_inventory-{{ version }}.tar.gz
  sha256: f079afbdb8a7d6f98fbe0d23887867807d980faff9e3b0cbd44c9beb378e1610

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.12
    - setuptools >=63
    - setuptools-scm >=8
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - tqdm >=4.15.0,<5
    - wagtail >=6.2

test:
  imports:
    - wagtailinventory
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/cfpb/wagtail-inventory
  summary: Wagtail report to filter pages by block content
  dev_url: https://github.com/cfpb/wagtail-inventory
  license: CC0-1.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
