{% set name = "tree-sitter" %}
{% set version = "0.25.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tree-sitter-{{ version }}.tar.gz
  sha256: fe43c158555da46723b28b52e058ad444195afd1db3ca7720c59a254544e9c20

build:
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python >=3.10
    - setuptools >=43
    - pip
  run:
    - python >=3.10

test:
  imports:
    - tree_sitter
  commands:
    - pip check
  requires:
    - pip

about:
  summary: Python bindings to the Tree-sitter parsing library
  dev_url: https://github.com/tree-sitter/py-tree-sitter
  license: EPL-2.0 AND MIT
  license_file:
    - LICENSE
    - tree_sitter/core/lib/src/unicode/LICENSE

extra:
  recipe-maintainers:
    - rxm7706
