# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.0.4"

package:
  name: mem0ai
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mem0ai/mem0ai-${{ version }}.tar.gz
  sha256: 0cffdbdaa961aa4371c707e5f90f25961ae0cf170169abf6aaf6adba14c6bca1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - openai >=1.90
    - posthog >=4.5
    - protobuf >=5.29.6,<7
    - pydantic >=2.7.3
    - pytz >=2024.1
    - qdrant-client >=1.12
    - sqlalchemy >=2.0.31

tests:
  - python:
      # Distribution name `mem0ai`, import name `mem0`
      # (verified: sdist contains mem0/__init__.py).
      imports:
        - mem0
        - mem0.client
        - mem0.memory
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/mem0ai/mem0
  repository: https://github.com/mem0ai/mem0
  documentation: https://docs.mem0.ai
  license: Apache-2.0
  license_file: LICENSE
  summary: Long-term memory for AI Agents
  description: |
    Mem0 provides a smart, self-improving memory layer for Large
    Language Models, enabling personalized AI experiences that save
    costs and delight users. It offers persistent memory across
    sessions and contextual recall to make AI agents more useful and
    coherent over time.

extra:
  recipe-maintainers:
    - rxm7706

