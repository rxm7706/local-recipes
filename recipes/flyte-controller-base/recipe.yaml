# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.5.7"

package:
  name: flyte-controller-base
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/84/d3/f6e9405a73c2d15b9076a12e11162adbc90eac4f5dfec6a08cd7b7589f29/flyte_controller_base-${{ version }}-cp310-abi3-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
  sha256: de556c506042eb819728fe3cdea056710c143ca7966523318ad79677c85f6550
  file_name: flyte_controller_base-${{ version }}-cp310-abi3-manylinux_2_17_x86_64.whl

build:
  number: 0
  python:
    version_independent: true
  script:
    - ${{ PYTHON }} -m pip install flyte_controller_base-${{ version }}-cp310-abi3-manylinux_2_17_x86_64.whl -vv --no-deps

requirements:
  host:
    - python
    - pip
  run:
    - python >=3.10
    - flyteidl2 ==2.0.26

tests:
  - python:
      imports:
        - flyte_controller_base
      pip_check: true

about:
  summary: Flyte 2 Rust controller base (rust-controller extra of flyte)
  description: |
    flyte_controller_base is the compiled Rust controller runtime that backs
    the flyte SDK's optional `rust-controller` extra (from flyteorg/flyte-sdk
    rs_controller). Version-locked to the flyte SDK.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/flyteorg/flyte
  repository: https://github.com/flyteorg/flyte-sdk
  documentation: https://docs.flyte.org

extra:
  recipe-maintainers:
    - rxm7706

