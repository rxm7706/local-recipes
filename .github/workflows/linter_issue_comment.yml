name: rerun-staged-recipes-linter

on:
  issue_comment: null

permissions:
  contents: read
  checks: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rerun-linter:
    name: rerun-linter
    runs-on: ubuntu-slim
    if: ${{ (github.event_name == 'issue_comment' && github.event.issue.pull_request) }}
    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - name: checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: install code
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476
        with:
          environment-name: lint
          condarc: |
            show_channel_urls: true
            channel_priority: strict
            channels:
              - conda-forge
          create-args: >-
            pygithub

      - name: rerun linter
        run: |
          python .github/workflows/scripts/linter_issue_comment.py \
            --owner=${{ github.repository_owner }} \
            --pr-num=${{ github.event.issue.number  }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
