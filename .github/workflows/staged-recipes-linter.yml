name: staged-recipes-linter

on:
  # this workflow requires access to a read-only github token
  # and potentially runs untrusted code via python's `eval`
  # thus we can only run it on pull_request events so that the
  # the token does not have any write permi-sions
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  actions: read
  checks: read
  contents: read
  issues: read
  pull-requests: read
  statuses: read

jobs:
  linter:
    name: linter
    runs-on: ubuntu-slim
    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: install code
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476
        with:
          micromamba-version: "2.5.0-2"
          environment-name: lint
          condarc: |
            show_channel_urls: true
            channel_priority: strict
            channels:
              - conda-forge
          create-args: >-
            conda-smithy
            pygithub
            requests
            pixi

      - name: lint
        run: |
          python .github/workflows/scripts/linter.py \
            --owner=${{ github.repository_owner }} \
            --pr-num=${{ github.event.number }} \
          >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
