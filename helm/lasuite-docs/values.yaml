image:
  repository: ghcr.io/suitenumerique/docs-backend
  tag: "latest"

# Reuse your existing PostgreSQL instance
postgresql:
  enabled: false
  external:
    host: postgresql.unity-stack.svc.cluster.local
    port: 5432
    database: lasuite_docs
    secretName: postgresql-credentials

# Reuse your existing Minio instance
s3:
  enabled: true
  endpoint: minio.unity-stack.svc.cluster.local:9000
  bucket: lasuite-docs
  secretName: minio-credentials
  useSSL: false  # internal cluster traffic

# Air-gap: pull images from internal registry
imagePullSecrets:
  - name: artifactory-pull-secret

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  host: docs.unity-stack.internal
