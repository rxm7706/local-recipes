#                             VVVVVV  minimum `pixi` version
"$schema" = "https://pixi.sh/v0.67.2/schema/manifest/schema.json"

[workspace]
name = "staged-recipes"
requires-pixi = ">=0.67.2"
description = "The entry point to conda-forge"
version = "0.2.0"
license = "BSD-3-Clause"
license-file = "LICENSE.txt"
authors = ["@conda-forge/core"]
channels = ["conda-forge"]
platforms = [
    "linux-64", "osx-arm64", "win-64"
    # TODO: add here and below in `feature.win` when possible
    # "win-arm64", "linux-aarch64", "osx-64",
]

[feature.python.dependencies]
python = ">=3.12.13,3.12.*"
pixi = ">=0.67.2"
gh = ">=2.92.0"
nodejs = ">=24.14.1,24.*"  # Pin to LTS version
bmad-method = ">=6.6.0"
spec-kit = ">=0.8.5"
truststore = ">=0.10.4"  # OS trust store for corporate CA / JFrog TLS
# pixi upgrade --pinning-strategy latest-up --exclude python --exclude django --exclude wagtail --exclude nodejs --exclude coderedcms --exclude conda-libmamba-solver --exclude conda-build --exclude conda-index --exclude conda-forge-ci-setup --exclude conda-forge-pinning --exclude frozendict --exclude networkx --exclude rattler-build-conda-compat --exclude grayskull --exclude conda-recipe-manager --exclude conda-smithy --exclude shellcheck

[feature.build.dependencies]
conda = ">=26.3.2"
conda-libmamba-solver = ">=24.9.0"
conda-build = ">=25.3.1"
conda-index = ">=0.3.0"
conda-forge-ci-setup = ">=4.9.3,<5.0"
conda-forge-pinning = "*"
frozendict = "*"
networkx = "2.4.*"
rattler-build-conda-compat = ">=1.2.0,<2.0.0a0"

[feature.linux]
# The linux feature runs on every platform that can run Docker.
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
[feature.linux.tasks.build-linux]
description = "build for Linux inside a docker container"
cmd = "python build-locally.py --filter 'linux*'"

[feature.osx]
# The osx env will run directly on the machine.
platforms = ["osx-64", "osx-arm64"]
[feature.osx.tasks.build-osx]
description = "build directly on a MacOS host machine"
cmd = "python build-locally.py --filter 'osx*'"
[feature.osx.tasks.build-osx.env]
CONDA_BLD_PATH = "$PIXI_PROJECT_ROOT/build_artifacts"
MINIFORGE_HOME = "$CONDA_PREFIX"
OSX_SDK_DIR = "$PIXI_PROJECT_ROOT/.pixi/macOS-SDKs"

[feature.win]
# The windows env will run directly on the machine.
platforms = ["win-64"]
[feature.win.tasks.build-win]
description = "build directly on a Windows host machine"
cmd = "python build-locally.py --filter 'win*'"
[feature.win.tasks.build-win.env]
CONDA_BLD_PATH = "$PIXI_PROJECT_ROOT/build_artifacts"
MINIFORGE_HOME = "$CONDA_PREFIX"

[feature.grayskull.dependencies]
grayskull = ">=2.7.3"
conda-recipe-manager = ">=0.8.0"
[feature.grayskull.tasks.pypi]
description = "generate a v1 (rattler-build) recipe for a PyPI package name with `grayskull`"
cmd = "cd recipes && grayskull pypi --strict-conda-forge --use-v1-format"
[feature.grayskull.tasks.cran]
description = "generate a v1 (rattler-build) recipe for a CRAN package name with `grayskull`"
cmd = "cd recipes && grayskull cran --strict-conda-forge --use-v1-format"
[feature.grayskull.tasks.pypi-v0]
description = "generate a v0 (conda-build) recipe for a PyPI package name with `grayskull`"
cmd = "cd recipes && grayskull pypi --strict-conda-forge"
[feature.grayskull.tasks.cran-v0]
description = "generate a v0 (conda-build) recipe for a CRAN package name with `grayskull`"
cmd = "cd recipes && grayskull cran --strict-conda-forge"

[feature.conda-smithy.dependencies]
conda-smithy = ">=3.44.6,<4"
[feature.conda-smithy.tasks.lint]
description = "validate all recipes with `conda-smithy`"
cmd = "conda-smithy recipe-lint --conda-forge recipes/*"

[feature.shellcheck]
# merge this with `conda-smithy` when available for `linux-ppc64le`
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
dependencies.shellcheck = ">=0.10.0"

[environments]
# default-env: local-recipes
# ^ The "default-env:" directive above tells scripts/load-env.sh which environment
# to activate by default when entering this repository. Change the value to any
# environment name defined below. If omitted, the first environment key is used.
# linux only needs Python to run build-locally.py. Everything else happens in Docker.
linux = ["linux", "python"]
# osx and win do run natively on the machine, so we need the build deps too
osx = ["osx", "python", "build"]
win = ["win", "python", "build"]
build = ["python", "build"]
grayskull = ["python", "grayskull"]
conda-smithy = ["python", "conda-smithy", "shellcheck"]
local-recipes = ["python", "build", "grayskull", "conda-smithy", "local-recipes"]
vuln-db = ["python", "vuln-db"]

[feature.local-recipes.activation]
scripts = ["scripts/load-env.sh"]

[feature.local-recipes.tasks.sync-upstream-conda-forge]
description = "Sync with upstream conda-forge/staged-recipes and rebase local commits"
cmd = "bash scripts/sync-upstream-conda-forge.sh"

[feature.local-recipes.tasks.sync-upstream-public-fork]
description = "Pull the latest from the public GitHub fork and merge/rebase the local commits"
cmd = "bash scripts/sync-public-fork.sh"

[feature.local-recipes.tasks.verify-env]
description = "Verify that the shell is running inside the local-recipes pixi environment"
cmd = "bash scripts/ensure-local-recipes-env.sh"

[feature.local-recipes.tasks.bmad-preflight]
description = "Verify local-recipes env, BMAD installation, and active project before BMAD workflows"
cmd = "bash scripts/ensure-bmad-preflight.sh"


[feature.local-recipes.tasks.submit-pr]
description = "Submit a recipe PR to conda-forge/staged-recipes (use --dry-run first)"
cmd = "python .claude/scripts/conda-forge-expert/submit_pr.py"

[feature.local-recipes.tasks.health-check]
description = "Run a health check on the local development environment"
cmd = "python .claude/scripts/conda-forge-expert/health_check.py"

[feature.local-recipes.tasks.update-cve-db]
description = "Download and update the local CVE vulnerability database"
cmd = "python .claude/scripts/conda-forge-expert/cve_manager.py"

[feature.local-recipes.tasks.scan-vulnerabilities]
description = "Scan a recipe's dependencies for vulnerabilities using the local CVE database"
cmd = "python .claude/scripts/conda-forge-expert/vulnerability_scanner.py"

[feature.local-recipes.tasks.update-mapping-cache]
description = "Update the local PyPI-to-Conda name mapping cache from Grayskull"
cmd = "python .claude/scripts/conda-forge-expert/mapping_manager.py"

[feature.local-recipes.tasks.lint-optimize]
description = "Lint a recipe for optimizations and best practices"
cmd = "python .claude/scripts/conda-forge-expert/recipe_optimizer.py"

[feature.local-recipes.tasks.autotick]
description = "Check for new upstream versions of a package and update the recipe"
cmd = "python .claude/scripts/conda-forge-expert/recipe_updater.py"

[feature.local-recipes.tasks.test]
description = "Run the conda-forge-expert test suite (offline, fast subset)"
cmd = "pytest .claude/skills/conda-forge-expert/tests -m 'not network and not slow'"

[feature.local-recipes.tasks.test-all]
description = "Run the full conda-forge-expert test suite incl. live network/slow tests"
cmd = "pytest .claude/skills/conda-forge-expert/tests"

[feature.local-recipes.tasks.test-coverage]
description = "Run the conda-forge-expert test suite with coverage report"
cmd = "pytest .claude/skills/conda-forge-expert/tests -m 'not network and not slow' --cov=.claude/skills/conda-forge-expert/scripts --cov-report=term-missing"

# ── conda-forge-expert script wrappers ───────────────────────────────────────
# Every conda-forge-expert/scripts/*.py that has a stable user-facing CLI gets
# a pixi-task alias here. Pass extra args through with `--`:
#     pixi run -e local-recipes validate -- recipes/numpy
# Scripts deliberately without a task: recipe_editor.py (JSON args don't fit
# task metaphor), test-skill.py (internal smoke).

[feature.local-recipes.tasks.validate]
description = "Validate a recipe against conda-forge schema and best practices"
cmd = "python .claude/scripts/conda-forge-expert/validate_recipe.py"

[feature.local-recipes.tasks.check-deps]
description = "Check that all recipe dependencies resolve on conda-forge"
cmd = "python .claude/scripts/conda-forge-expert/dependency-checker.py"

[feature.local-recipes.tasks.resolve-name]
description = "Resolve a PyPI package name to its conda-forge equivalent"
cmd = "python .claude/scripts/conda-forge-expert/name_resolver.py"

[feature.local-recipes.tasks.generate-recipe]
description = "Generate a new recipe from PyPI / template / GitHub"
cmd = "python .claude/scripts/conda-forge-expert/recipe-generator.py"

[feature.local-recipes.tasks.autotick-github]
description = "Update a recipe to the latest GitHub release (use --dry-run first)"
cmd = "python .claude/scripts/conda-forge-expert/github_updater.py"

[feature.local-recipes.tasks.autotick-npm]
description = "Update a recipe to the latest npm registry version (use --dry-run first)"
cmd = "python .claude/scripts/conda-forge-expert/npm_updater.py"

# ── Docker-less local builds (linux-64 / linux-aarch64 / osx-* / win-64) ─────
# Wraps `rattler-build build` with per-platform flags. Native linux-64 runs
# full build+test; cross-builds use --no-test (and --allow-symlinks-on-windows
# for win-64).
[feature.local-recipes.tasks.build-local]
description = "Build a recipe natively on this host (linux-64) — full build + test"
cmd = "python .claude/scripts/conda-forge-expert/local_builder.py"

[feature.local-recipes.tasks.build-local-all]
description = "Build a recipe for every supported target platform (cross-builds skip tests)"
cmd = "python .claude/scripts/conda-forge-expert/local_builder.py --all-platforms"

[feature.local-recipes.tasks.build-local-check]
description = "Diagnose what's available for local cross-platform builds"
cmd = "python .claude/scripts/conda-forge-expert/local_builder.py --check"

[feature.local-recipes.tasks.build-local-setup-sdk]
description = "Download MacOSX SDK to ./SDKs/ for osx-* cross-builds (Apple licence applies)"
cmd = "python .claude/scripts/conda-forge-expert/local_builder.py --setup-osx-sdk"

[feature.local-recipes.tasks.version-check]
description = "Check the latest GitHub release version for a recipe (read-only)"
cmd = "python .claude/scripts/conda-forge-expert/github_version_checker.py"

[feature.local-recipes.tasks.migrate]
description = "Migrate a meta.yaml recipe to v1 recipe.yaml (use --dry-run first)"
cmd = "python .claude/scripts/conda-forge-expert/feedstock-migrator.py"

[feature.local-recipes.tasks.analyze-failure]
description = "Analyze a build error log against known failure patterns"
cmd = "python .claude/scripts/conda-forge-expert/failure_analyzer.py"

[feature.local-recipes.tasks.license-check]
description = "Validate SPDX license identifier and license_file presence"
cmd = "python .claude/scripts/conda-forge-expert/license-checker.py"

[feature.local-recipes.tasks.test-recipes]
description = "Run test-recipes.py — random / targeted recipe smoke validation"
cmd = "python test-recipes.py"

# ── Ecosystem-aware scaffolders (rattler-build native back-end) ──────────────

[feature.local-recipes.tasks.generate-cran]
description = "Scaffold a v1 recipe for an R package from CRAN"
cmd = "python .claude/scripts/conda-forge-expert/recipe-generator.py cran"

[feature.local-recipes.tasks.generate-cpan]
description = "Scaffold a v1 recipe for a Perl package from CPAN"
cmd = "python .claude/scripts/conda-forge-expert/recipe-generator.py cpan"

[feature.local-recipes.tasks.generate-luarocks]
description = "Scaffold a v1 recipe for a Lua package from LuaRocks"
cmd = "python .claude/scripts/conda-forge-expert/recipe-generator.py luarocks"

[feature.local-recipes.tasks.generate-npm]
description = "Scaffold a v1 recipe for an npm package (registry.npmjs.org)"
cmd = "python .claude/scripts/conda-forge-expert/recipe-generator.py npm"

[feature.local-recipes.tasks.build-cf-atlas]
description = "Build the conda-forge atlas — cross-channel package map (conda-forge ↔ PyPI ↔ npm/CRAN/CPAN/LuaRocks, SQLite)"
cmd = "python .claude/scripts/conda-forge-expert/conda_forge_atlas.py build"

[feature.local-recipes.tasks.query-cf-atlas]
description = "Look up a package in the conda-forge atlas by name"
cmd = "python .claude/scripts/conda-forge-expert/conda_forge_atlas.py query"

[feature.local-recipes.tasks.stats-cf-atlas]
description = "Show summary statistics from the conda-forge atlas"
cmd = "python .claude/scripts/conda-forge-expert/conda_forge_atlas.py stats"

[feature.local-recipes.tasks.detail-cf-atlas]
description = "Show detailed package card from atlas + anaconda.org (use --deep for per-build artifact metadata, --files to list paths, --version VER to override the version used for vuln scans)"
cmd = "python .claude/scripts/conda-forge-expert/detail_cf_atlas.py"

# ── vuln-db feature: AppThreat multi-source vulnerability database ─────────
# Adds NVD + GHSA + OSV + npm + custom advisory sources (vs. our OSV-only
# pypi_cve_db.json). Deliberately a separate env to keep local-recipes lean.
# First `vdb-refresh` is slow (~5-10 min, ~500MB-1GB at ~/.local/share/vdb).
# Subsequent refreshes are incremental.

[feature.vuln-db]
platforms = ["linux-64", "osx-arm64", "win-64"]

[feature.vuln-db.dependencies]
python = "3.12.*"
conda-forge-metadata = ">=0.13.0"  # so --deep also works in this env
# truststore lives in [feature.python.dependencies] — included via the python feature

[feature.vuln-db.pypi-dependencies]
appthreat-vulnerability-db = { version = ">=6.0.13", extras = ["all"] }

[feature.vuln-db.activation.env]
VDB_HOME = "$PIXI_PROJECT_ROOT/.claude/data/conda-forge-expert/vdb"
VDB_CACHE = "$PIXI_PROJECT_ROOT/.claude/data/conda-forge-expert/vdb-cache"
TRUSTSTORE = "1"

[feature.vuln-db.tasks.vdb-refresh]
description = "Build/refresh the AppThreat multi-source vulnerability DB (~5-10 min first time, ~600MB at .claude/data/conda-forge-expert/vdb/)"
cmd = 'python -c "import truststore; truststore.inject_into_ssl(); from vdb.cli import main; main()" --cache'

[feature.vuln-db.tasks.detail-cf-atlas]
description = "Detail card with --vdb support enabled (multi-source vulnerability lookup); add --version VER to scope the affecting-set to an arbitrary release"
cmd = "python .claude/scripts/conda-forge-expert/detail_cf_atlas.py"

[feature.vuln-db.tasks.detail-cf-atlas-vdb]
description = "Detail card with --vdb --vdb-all preset; pass <name> [--version VER] to list every CVE affecting a specific release"
cmd = "python .claude/scripts/conda-forge-expert/detail_cf_atlas.py --vdb --vdb-all"

[feature.vuln-db.tasks.scan-project]
description = "Scan a project's manifests (pixi.lock, pixi.toml, Cargo.lock/toml, requirements.txt, pyproject.toml, environment.yml, Containerfile/Dockerfile) for CVEs. Use --github URL or local path. Add --os for OS-package lookups, --brief for summary, --sbom {cyclonedx,spdx} for SBOM output."
cmd = "python .claude/scripts/conda-forge-expert/scan_project.py"

[feature.vuln-db.tasks.inventory-channel]
description = "Inventory a channel/mirror (conda repodata.json | PyPI Simple v1 | npm registry | crates.io). Auto-detects format. --with-vulns ON by default for conda, OFF for others. JFrog auth via env vars. --diff for upstream comparison, --health for mirror signals, --sbom for SBOM."
cmd = "python .claude/scripts/conda-forge-expert/inventory_channel.py"

