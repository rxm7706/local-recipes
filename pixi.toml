## MLX (Apple's array framework) and mlx-lm (LLM runner).
## mlx-lm is noarch python; the native mlx C++ lib builds for linux-64 + osx-arm64
## (skip rule: "win or match(python,'<3.9') or (osx and x86_64)" — excludes Windows + Intel Mac).
## Primary value is on osx-arm64 (Metal-accelerated, 2-3x over llama.cpp for some workloads).
## On linux-64 mlx runs against libblas/lapack — usable for experimentation, no perf advantage over the existing pytorch path.
## macOS minimum bumped to 14.5 (Sonoma) — required by mlx 0.31.2+; M-series users are always above this.
[feature.local-recipes.system-requirements]
macos = "14.5"

[feature.local-recipes.target.linux-64.dependencies]
mlx = ">=0.31.2"                  # Apple's array framework (Linux build via libblas/lapack)
mlx-lm = ">=0.31.3"               # noarch — opt-in alternative LLM runner on Linux, parity with macOS dep set

[feature.local-recipes.target.osx-arm64.dependencies]
mlx = ">=0.31.2"                  # Apple's array framework (Metal-accelerated on M-series)
mlx-lm = ">=0.31.3"               # Apple-native LLM runner; deckcraft prefers this on M-series

