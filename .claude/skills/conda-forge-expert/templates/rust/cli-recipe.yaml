# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
# Template: Rust CLI application (conda-forge canonical pattern, 2026)
#
# Validated against:
#   - https://conda-forge.org/docs/maintainer/example_recipes/rust/
#   - 17/17 CLI Rust recipes merged to staged-recipes Apr–May 2026
#
# Universal patterns (do NOT drop any of these without a reason):
#   - `cargo auditable install` (embeds dependency SBOM into the binary)
#   - `--locked --no-track --bins`
#   - `--root ${{ PREFIX }}` on unix, `--root %LIBRARY_PREFIX%` on win
#   - `CARGO_PROFILE_RELEASE_STRIP: symbols` + `..._LTO: fat` for smaller binaries
#   - `script.env` + `script.content` shape (avoids the G1 "exports don't carry" trap)
#   - Both `cargo-bundle-licenses` AND `cargo-auditable` in build deps
schema_version: 1

context:
  name: REPLACE_NAME
  version: "REPLACE_VERSION"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://github.com/REPLACE_ORG/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: REPLACE_SHA256
  # OR from crates.io:
  # url: https://static.crates.io/crates/${{ name }}/${{ name }}-${{ version }}.crate
  # sha256: REPLACE_SHA256

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
      # Optional: shell completions when upstream supports `<bin> completion --shell <X>`
      # or the clap-derived `COMPLETE=<shell>` env var. Drop this block if not applicable.
      # - if: unix
      #   then:
      #     - mkdir -p $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d $PREFIX/share/zsh/site-functions
      #     - $PREFIX/bin/${{ name }} completion --shell bash > $PREFIX/share/bash-completion/completions/${{ name }}
      #     - $PREFIX/bin/${{ name }} completion --shell fish > $PREFIX/share/fish/vendor_completions.d/${{ name }}.fish
      #     - $PREFIX/bin/${{ name }} completion --shell zsh  > $PREFIX/share/zsh/site-functions/_${{ name }}

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
  # host: openssl / libgit2 / pkg-config etc. only when the crate links to a native lib
  # host:
  #   - openssl

tests:
  - script:
      - ${{ name }} --help
      - ${{ name }} --version
  - package_contents:
      bin:
        - ${{ name }}
      # If shell completions are enabled above, add:
      # files:
      #   - if: unix
      #     then:
      #       - share/bash-completion/completions/${{ name }}
      #       - share/fish/vendor_completions.d/${{ name }}.fish
      #       - share/zsh/site-functions/_${{ name }}
      strict: true

about:
  homepage: REPLACE_HOMEPAGE
  summary: REPLACE_SUMMARY
  description: |
    REPLACE_DESCRIPTION
  license: REPLACE_LICENSE
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: REPLACE_REPO_URL

extra:
  recipe-maintainers:
    - REPLACE_MAINTAINER
