# Template: Rust CLI application (meta.yaml v0 / conda-build)
#
# Prefer the v1 recipe.yaml template (cli-recipe.yaml) for new submissions.
# This v0 form is only for legacy feedstocks that have not yet migrated.
#
# Validated against the same conda-forge canonical pattern as cli-recipe.yaml.
{% set name = "REPLACE_NAME" %}
{% set version = "REPLACE_VERSION" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/REPLACE_ORG/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: REPLACE_SHA256

build:
  number: 0
  script_env:
    - CARGO_PROFILE_RELEASE_STRIP=symbols
    - CARGO_PROFILE_RELEASE_LTO=fat
  script:
    - cargo auditable install --locked --no-track --bins --root $PREFIX --path .                # [unix]
    - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .       # [win]
    - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

test:
  commands:
    - {{ name }} --help
    - {{ name }} --version
    - test -f $PREFIX/bin/{{ name }}                       # [unix]
    - if not exist %LIBRARY_PREFIX%\bin\{{ name }}.exe exit 1   # [win]

about:
  home: REPLACE_HOMEPAGE
  license: REPLACE_LICENSE
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: REPLACE_SUMMARY
  description: |
    REPLACE_DESCRIPTION
  dev_url: REPLACE_REPO_URL

extra:
  recipe-maintainers:
    - REPLACE_MAINTAINER
