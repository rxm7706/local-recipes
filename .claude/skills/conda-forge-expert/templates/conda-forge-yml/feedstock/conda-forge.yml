# conda-forge.yml — feedstock root template.
# Lives at the root of <pkg>-feedstock; consumed by `conda smithy rerender`.
# Uncomment only what you need.
# Reference: reference/conda-forge-yml-reference.md

# bot:
#   automerge: true                       # auto-merge bot PRs that pass CI
#   inspection: hint-all                  # hint | hint-all | update-all | update-grayskull
#   run_deps_from_wheel_metadata: true
#   version_updates:
#     exclude:
#       - "1.0.0rc1"                      # tags the bot keeps mis-detecting as releases
#     # sources: [pypi]                   # restrict source (default: all detected)

# os_version:                             # default cos7 (glibc 2.17)
#   linux_64: alma9                       # alma8 (2.28) | alma9 (2.34) | alma10 (2.38+) | ubi8
#   linux_aarch64: alma9

# provider:                               # default azure
#   linux_64: github_actions              # opt-in for linux_64 only (conda-smithy 3.57.1+)

# build_platform:                         # cross-build emulated targets on x86_64 + qemu
#   linux_aarch64: linux_64
#   linux_ppc64le: linux_64

# channels:
#   sources: [conda-forge]                # default
#   targets:
#     - [conda-forge, main]               # default

# channel_priority: strict                # strict (recommended) | flexible | disabled

# linter:
#   skip:                                 # justify each entry in a comment
#     # - lint_check_name

# conda_forge_output_validation: true     # default true; leave on

# azure:
#   store_build_artifacts: true           # save build_artifacts/ to Azure (default false)
#   # upload_packages: false              # skip anaconda.org upload (rare)
#   # timeout_minutes: 480
#   # free_disk_space: [true]
