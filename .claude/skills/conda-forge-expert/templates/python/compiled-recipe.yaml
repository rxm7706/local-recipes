# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
# Template: Python package with C/C++ extensions
schema_version: 1

context:
  version: "REPLACE_VERSION"

package:
  # Literal distribution name (2026 grayskull / conda-forge convention).
  # `context.name` and `${{ name | lower }}` substitution are no longer used.
  name: REPLACE_NAME
  version: ${{ version }}

source:
  # Path segments (first letter, distribution name, sdist stem) are literal;
  # only `${{ version }}` interpolates. Stem may use underscores even when
  # the distribution name uses hyphens.
  url: https://pypi.org/packages/source/R/REPLACE_NAME/REPLACE_SDIST_STEM-${{ version }}.tar.gz
  sha256: REPLACE_SHA256

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  # Conda-forge floor is Python 3.10 (Aug 2025). Only set a skip if upstream
  # actually requires a higher floor (e.g. match(python, "<3.11") for tomllib).
  # `py < N` is silently ignored by rattler-build v1 — always use match(python, ...).
  # skip:
  #   - match(python, "<3.11")

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    # Cross-compilation support
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - pip
    - setuptools
    - cython
    # Add host libraries here (e.g., numpy for numpy API)
    - numpy
  run:
    - python
    - ${{ pin_compatible("numpy") }}
    # Add runtime dependencies here

tests:
  - python:
      imports:
        - ${{ name | replace("-", "_") }}
      pip_check: true
  - script:
      - python -c "from ${{ name | replace('-', '_') }} import __version__; print(__version__)"

about:
  homepage: REPLACE_HOMEPAGE
  license: REPLACE_LICENSE
  license_file: LICENSE
  summary: REPLACE_SUMMARY
  repository: REPLACE_REPO_URL

extra:
  recipe-maintainers:
    - REPLACE_MAINTAINER
