# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
# Template: Python noarch package (pure Python, no compiled extensions)
schema_version: 1

context:
  version: "REPLACE_VERSION"
  # `python_min` defaults to 3.10 from conda-forge-pinning. Uncomment and set
  # only when upstream's python_requires demands a higher floor.
  # python_min: "3.11"

package:
  # Write the distribution name literally (already lowercase, hyphens). This
  # is the 2026 grayskull / conda-forge convention — `context.name` and
  # `${{ name | lower }}` substitution are no longer used.
  name: REPLACE_NAME
  version: ${{ version }}

source:
  # Path segments (first letter, distribution name, sdist filename stem) are
  # literal; only `${{ version }}` interpolates. The stem may use underscores
  # while the distribution name uses hyphens (PyPI normalizes that way).
  url: https://pypi.org/packages/source/R/REPLACE_NAME/REPLACE_SDIST_STEM-${{ version }}.tar.gz
  sha256: REPLACE_SHA256

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    # Build backend - choose one:
    - hatchling
    # - setuptools
    # - flit-core
    # - poetry-core
    # - pdm-backend
    # - scikit-build-core   # for packages with compiled extensions
  run:
    - python >=${{ python_min }}
    # Add runtime dependencies here

tests:
  - python:
      imports:
        - ${{ name | replace("-", "_") }}
      pip_check: true
      python_version:
      - ${{ python_min }}.*
      - "*"
  - script:
      - ${{ name }} --version
      - ${{ name }} --help

about:
  homepage: REPLACE_HOMEPAGE
  license: REPLACE_LICENSE
  license_file: LICENSE
  summary: REPLACE_SUMMARY
  description: |
    REPLACE_DESCRIPTION
  documentation: REPLACE_DOCS_URL
  repository: REPLACE_REPO_URL

extra:
  recipe-maintainers:
    - REPLACE_MAINTAINER
