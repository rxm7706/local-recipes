# Conda-Forge Expert Skill Configuration
# This file controls skill behavior and can be customized for different environments

skill:
  name: conda-forge-expert
  version: 8.0.2
  description: |
    Autonomous conda-forge packaging agent. Manages the entire recipe lifecycle
    from generation, security scanning, and building to debugging, maintenance,
    and PR submission. Integrates 21 agent-skills for engineering best practices.

# Behavioral Principles (CLAUDE.md + using-agent-skills)
# These govern all agent behavior — apply unconditionally.
behavioral_principles:
  think_before_generating: true      # surface assumptions, emit plan before executing
  simplicity_first: true             # minimum recipe that solves the problem
  surgical_changes: true             # touch only what the task requires
  goal_driven_execution: true        # define success criteria, loop until verified
  stop_the_line_on_failure: true     # preserve error log, fix root cause, not workaround
  verify_dont_assume: true           # check current docs, don't rely on memory

# Environment Configuration
environment:
  # Default channels (override for enterprise)
  default_channels:
    - conda-forge

  # Enterprise channel override (uncomment to use)
  # channels:
  #   - https://artifactory.corp/artifactory/conda-forge-virtual

  # Build tool preferences
  build_tools:
    primary: rattler-build      # Modern, fast Rust-based builder
    fallback: conda-build       # Legacy Python-based builder

  # Package manager preferences
  package_manager:
    primary: pixi               # Cross-platform, fast
    fallback: mamba             # Faster conda alternative
    legacy: conda               # Original package manager

# Feature Flags
features:
  # Enterprise features (air-gapped, private channels)
  enable_enterprise: false
  enable_airgapped: false

  # PyPI-Conda name mapping
  pypi_mapping_enabled: true
  pypi_mapping_cache_ttl_days: 7
  pypi_mapping_source: parselmouth  # parselmouth, cf_graph, grayskull

  # Recipe format preferences
  prefer_recipe_yaml: true      # Recommend recipe.yaml over meta.yaml
  enforce_cfep25: true          # Require python_min for noarch:python
  require_stdlib: true          # Require stdlib("c") for compiled packages

# Integration Settings
integrations:
  # CI Platforms
  ci:
    azure_pipelines: true
    github_actions: true
    jenkins: false              # Enable for enterprise
    gitlab_ci: false            # Enable for enterprise

  # Package Registries
  registries:
    anaconda_org: true
    prefix_dev: true
    artifactory: false          # Enable for enterprise

  # Source Code Hosts
  source_hosts:
    github_com: true
    gitlab_com: true
    enterprise_github: false    # Enable for enterprise

# Agent Skills Integration (addyosmani/agent-skills — all 21 installed at .claude/skills/)
agent_skills:
  lifecycle_mapping:
    define:          [idea-refine, spec-driven-development]
    plan:            [planning-and-task-breakdown, incremental-implementation]
    generate_edit:   [source-driven-development, context-engineering, code-simplification]
    validate_optimize: [test-driven-development, code-review-and-quality, performance-optimization]
    security_scan:   [security-and-hardening]
    build_debug:     [ci-cd-and-automation, debugging-and-error-recovery]
    submit_pr:       [git-workflow-and-versioning, shipping-and-launch, documentation-and-adrs]
    migration:       [deprecation-and-migration]
    cross_cutting:   [context-engineering, using-agent-skills]
    ui:              [frontend-ui-engineering, browser-testing-with-devtools]
    api_design:      [api-and-interface-design]

# Linting Configuration
linting:
  # Mandatory checks (cannot be skipped)
  # Codes map to recipe_optimizer.py check functions
  mandatory:
    - license_file_present       # ABT-001 (about section)
    - license_spdx_valid
    - maintainers_present        # MAINT-001
    - source_sha256_present      # SEC-001
    - stdlib_with_compiler       # STD-001 — CI-blocking; missing stdlib() causes auto-rejection
    - no_format_mixing           # STD-002 — CI-blocking; meta.yaml + recipe.yaml cannot coexist

  # Recommended checks (warnings only)
  recommended:
    - cfep25_python_min          # SEL-002 — python_min must be >=3.10 (floor raised Aug 2025)
    - no_git_url_for_releases
    - tests_present              # TEST-001
    - pip_check_in_tests

  # Skip these checks (use sparingly)
  skip: []
  # skip:
  #   - lint_noarch_selectors

# Template Defaults
templates:
  # Default maintainer for generated recipes
  default_maintainer: "rxm7706"

  # Default license for new recipes
  default_license: MIT

  # Include schema header in recipe.yaml
  include_schema_header: true

  # Python minimum version (CFEP-25)
  python_min: "3.10"            # conda-forge global floor (dropped 3.9 Aug 2025)

# Enterprise Configuration (when features.enable_enterprise is true)
enterprise:
  # Artifactory Settings
  artifactory:
    url: ""                     # https://artifactory.corp/artifactory
    conda_remote_repo: ""       # conda-forge-remote
    conda_local_repo: ""        # conda-internal
    conda_virtual_repo: ""      # conda-forge-virtual

  # Enterprise GitHub
  github:
    url: ""                     # https://github.enterprise.com
    api_url: ""                 # https://github.enterprise.com/api/v3

  # Self-Hosted CI
  ci_runner:
    type: ""                    # jenkins, gitlab, github-actions-self-hosted
    docker_image: ""            # custom build image

  # Security Settings
  security:
    require_package_signing: false
    require_sbom: false
    vulnerability_scanning: false

# Paths (relative to skill directory)
paths:
  templates: templates/
  reference: reference/
  guides: guides/
  enterprise: enterprise/
  scripts: scripts/
  quickref: quickref/
  examples: examples/
  pypi_mappings: pypi_conda_mappings/
